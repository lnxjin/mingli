<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>数独在线 - Sudoku Online</title>
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            color: #5a67d8;
            font-size: 2em;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 1em;
        }

        .game-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .info-box {
            background: #f7fafc;
            padding: 8px 16px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            font-weight: 600;
            color: #4a5568;
            font-size: 0.9em;
        }

        .info-box span {
            color: #5a67d8;
            font-size: 1.1em;
        }

        .sudoku-board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 1px;
            background: #2d3748;
            border: 3px solid #2d3748;
            max-width: 100%;
            width: 100%;
            max-width: 450px;
            margin: 0 auto 20px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .cell {
            aspect-ratio: 1;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1em, 4vw, 1.5em);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            user-select: none;
        }

        .cell:hover {
            background: #e6fffa;
        }

        .cell.selected {
            background: #90cdf4 !important;
            box-shadow: inset 0 0 0 3px #3182ce;
        }

        .cell.fixed {
            background: #f7fafc;
            color: #2d3748;
            font-weight: 700;
        }

        .cell.user-input {
            color: #3182ce;
        }

        .cell.error {
            background: #fed7d7 !important;
            color: #e53e3e;
            animation: shake 0.5s;
        }

        /* 新增：检查错误时的高亮样式 */
        .cell.check-error {
            background: #ff6b6b !important;
            color: white !important;
            box-shadow: inset 0 0 0 2px #ee5a5a;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                background: #ff6b6b; 
                transform: scale(1);
            }
            50% { 
                background: #ff8585; 
                transform: scale(1.05);
            }
        }

        .cell.highlight {
            background: #faf5ff;
        }

        .cell.same-number {
            background: #c6f6d5;
        }

        /* 3x3 区块边框 */
        .cell:nth-child(3n) {
            border-right: 2px solid #2d3748;
        }

        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid #2d3748;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .difficulty-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: #edf2f7;
            color: #4a5568;
            border: 2px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            transform: translateY(-2px);
        }

        /* 新增：检查错误按钮的特殊样式 */
        .btn-check {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .btn-check:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }

        .btn-difficulty {
            background: white;
            color: #5a67d8;
            border: 2px solid #5a67d8;
            padding: 8px 14px;
            font-size: 0.85em;
        }

        .btn-difficulty:hover, .btn-difficulty.active {
            background: #5a67d8;
            color: white;
        }

        /* 5列布局的数字键盘 - 完美居中 */
        .number-pad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 200px;
            margin: 15px auto;
            padding: 0;
            justify-content: center;
            align-content: center;
        }

        .num-btn {
            aspect-ratio: 1;
            min-height: 36px;
            font-size: clamp(1em, 3.5vw, 1.3em);
            background: white;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 700;
            color: #2d3748;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .num-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: scale(1.05);
        }

        .num-btn:active {
            transform: scale(0.95);
        }

        .num-btn.erase {
            background: #fed7d7;
            border-color: #fc8181;
            color: #e53e3e;
            font-size: clamp(0.9em, 3vw, 1.1em);
        }

        .num-btn.erase:hover {
            background: #e53e3e;
            color: white;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .rules {
            margin-top: 30px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .rules h3 {
            color: #5a67d8;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .rules p, .rules li {
            color: #4a5568;
            line-height: 1.5;
            margin-bottom: 6px;
            font-size: 0.9em;
        }

        .rules ul {
            margin-left: 18px;
        }

        .win-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .win-content {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.5s;
            max-width: 320px;
            margin: 20px;
            width: 90%;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .win-content h2 {
            color: #48bb78;
            font-size: 1.8em;
            margin-bottom: 15px;
        }

        .win-content p {
            color: #4a5568;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        /* 新增：错误提示信息样式 */
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 10px 20px;
            border-radius: 8px;
            margin: 10px auto;
            max-width: 300px;
            text-align: center;
            font-weight: 600;
            display: none;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f56565;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        /* 手机端优化 */
        @media (max-width: 600px) {
            body {
                padding: 5px;
            }
            
            .container {
                padding: 12px;
                border-radius: 15px;
            }
            
            h1 {
                font-size: 1.6em;
            }
            
            .subtitle {
                font-size: 0.9em;
                margin-bottom: 15px;
            }
            
            .game-info {
                gap: 10px;
                margin-bottom: 10px;
            }
            
            .info-box {
                padding: 6px 12px;
                font-size: 0.85em;
            }
            
            .sudoku-board {
                margin-bottom: 15px;
            }
            
            .cell {
                font-size: clamp(0.9em, 5vw, 1.3em);
            }
            
            .number-pad {
                gap: 4px;
                max-width: 180px;
                margin: 10px auto;
            }
            
            .num-btn {
                border-radius: 6px;
                border-width: 1.5px;
                min-height: 32px;
            }
            
            button {
                padding: 8px 14px;
                font-size: 0.85em;
            }
            
            .btn-difficulty {
                padding: 6px 10px;
                font-size: 0.8em;
            }
            
            .controls {
                gap: 12px;
            }
            
            .rules {
                margin-top: 20px;
                padding: 12px;
            }
            
            .rules h3 {
                font-size: 1em;
            }
            
            .rules p, .rules li {
                font-size: 0.85em;
            }

            .error-message {
                font-size: 0.9em;
                padding: 8px 15px;
                max-width: 250px;
            }
        }

        /* 超小屏幕优化 */
        @media (max-width: 380px) {
            .number-pad {
                gap: 3px;
                max-width: 160px;
            }
            
            .num-btn {
                font-size: 0.9em;
                min-height: 28px;
            }
            
            .cell {
                font-size: clamp(0.8em, 4.5vw, 1.1em);
            }
        }
    </style>
    </head>
    <body>
        <div class="container">
            <h1>🧩 数独在线</h1>
            <p class="subtitle">4 个难度级别的免费数独游戏</p>

            <div class="game-info">
                <div class="info-box">
                    难度: <span id="current-difficulty">容易</span>
                </div>
                <div class="info-box">
                    时间: <span id="timer">00:00</span>
                </div>
            </div>

            <div class="sudoku-board" id="board"></div>

            <!-- 新增：错误提示信息 -->
            <div class="error-message" id="errorMessage">
                🔍 发现 <span id="errorCount">0</span> 处错误，已用红色标出
            </div>

            <!-- 5列布局的数字键盘 -->
            <div class="number-pad">
                <button class="num-btn" onclick="inputNumber(1)">1</button>
                <button class="num-btn" onclick="inputNumber(2)">2</button>
                <button class="num-btn" onclick="inputNumber(3)">3</button>
                <button class="num-btn" onclick="inputNumber(4)">4</button>
                <button class="num-btn" onclick="inputNumber(5)">5</button>
                <button class="num-btn" onclick="inputNumber(6)">6</button>
                <button class="num-btn" onclick="inputNumber(7)">7</button>
                <button class="num-btn" onclick="inputNumber(8)">8</button>
                <button class="num-btn" onclick="inputNumber(9)">9</button>
                <button class="num-btn erase" onclick="eraseNumber()">✕</button>
            </div>

            <div class="controls">
                <div class="difficulty-buttons">
                    <button class="btn-difficulty active"
                        onclick="newGame('easy')">容易</button>
                    <button class="btn-difficulty"
                        onclick="newGame('medium')">中等</button>
                    <button class="btn-difficulty"
                        onclick="newGame('hard')">高级</button>
                    <button class="btn-difficulty"
                        onclick="newGame('expert')">专家</button>
                </div>

                <div class="action-buttons">
                    <button class="btn-primary"
                        onclick="newGame(currentDifficulty)">🎮 新游戏</button>
                    <button class="btn-secondary" onclick="undo()">↩️
                        撤销</button>
                    <button class="btn-secondary" onclick="restart()">🔄
                        重新开始</button>
                    <button class="btn-secondary" onclick="hint()">💡
                        提示</button>
                    <!-- 新增：检查错误按钮 -->
                    <button class="btn-check" onclick="checkErrors()">🔍
                        检查错误</button>
                </div>
            </div>

            <div class="rules">
                <h3>📋 关于数独</h3>
                <p><strong>数独</strong>是一种逻辑填数游戏。目标是在 9×9 的网格中填入数字 1-9：</p>
                <ul>
                    <li>每一行必须包含数字 1-9，且不能重复</li>
                    <li>每一列必须包含数字 1-9，且不能重复</li>
                    <li>每一个 3×3 的宫格必须包含数字 1-9，且不能重复</li>
                </ul>
                <p>每个数独谜题只有一个唯一解。尽情享受吧！</p>
            </div>
        </div>

        <div class="win-modal" id="winModal">
            <div class="win-content">
                <h2>🎉 恭喜完成！</h2>
                <p>你成功解决了这个数独谜题！</p>
                <p>用时: <span id="finalTime">00:00</span></p>
                <button class="btn-primary"
                    onclick="closeWinModal()">再来一局</button>
            </div>
        </div>

        <script>
        let board = [];
        let solution = [];
        let initialBoard = [];
        let selectedCell = null;
        let currentDifficulty = 'easy';
        let history = [];
        let timer = 0;
        let timerInterval = null;
        let gameStarted = false;

        const difficulties = {
            easy: 35,
            medium: 45,
            hard: 55,
            expert: 64
        };

        const difficultyNames = {
            easy: '容易',
            medium: '中等',
            hard: '高级',
            expert: '专家'
        };

        function init() {
            createBoard();
            newGame('easy');
            
            document.addEventListener('keydown', (e) => {
                if (e.key >= '1' && e.key <= '9') {
                    inputNumber(parseInt(e.key));
                } else if (e.key === 'Backspace' || e.key === 'Delete') {
                    eraseNumber();
                } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || 
                          e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                    moveSelection(e.key);
                }
            });
        }

        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            for (let i = 0; i < 81; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => selectCell(i));
                boardEl.appendChild(cell);
            }
        }

        function generateSolution() {
            const newBoard = Array(9).fill().map(() => Array(9).fill(0));
            
            for (let i = 0; i < 9; i += 3) {
                fillBox(newBoard, i, i);
            }
            
            solveSudoku(newBoard);
            return newBoard;
        }

        function fillBox(board, row, col) {
            const nums = [1, 2, 3, 4, 5, 6, 7, 8, 9];
            shuffle(nums);
            let index = 0;
            
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    board[row + i][col + j] = nums[index++];
                }
            }
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function isValid(board, row, col, num) {
            for (let x = 0; x < 9; x++) {
                if (board[row][x] === num) return false;
            }
            
            for (let x = 0; x < 9; x++) {
                if (board[x][col] === num) return false;
            }
            
            const startRow = row - row % 3;
            const startCol = col - col % 3;
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    if (board[i + startRow][j + startCol] === num) return false;
                }
            }
            
            return true;
        }

        function solveSudoku(board) {
            for (let row = 0; row < 9; row++) {
                for (let col = 0; col < 9; col++) {
                    if (board[row][col] === 0) {
                        for (let num = 1; num <= 9; num++) {
                            if (isValid(board, row, col, num)) {
                                board[row][col] = num;
                                if (solveSudoku(board)) return true;
                                board[row][col] = 0;
                            }
                        }
                        return false;
                    }
                }
            }
            return true;
        }

        function createPuzzle(solution, holes) {
            const puzzle = solution.map(row => [...row]);
            const positions = [];
            
            for (let i = 0; i < 81; i++) {
                positions.push(i);
            }
            shuffle(positions);
            
            for (let i = 0; i < holes; i++) {
                const pos = positions[i];
                const row = Math.floor(pos / 9);
                const col = pos % 9;
                puzzle[row][col] = 0;
            }
            
            return puzzle;
        }

        function newGame(difficulty) {
            currentDifficulty = difficulty;
            document.getElementById('current-difficulty').textContent = difficultyNames[difficulty];
            
            document.querySelectorAll('.btn-difficulty').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === difficultyNames[difficulty]) {
                    btn.classList.add('active');
                }
            });
            
            solution = generateSolution();
            initialBoard = createPuzzle(solution, difficulties[difficulty]);
            board = initialBoard.map(row => [...row]);
            history = [];
            
            // 清除错误检查状态
            clearErrorHighlight();
            
            clearInterval(timerInterval);
            timer = 0;
            gameStarted = true;
            startTimer();
            
            renderBoard();
        }

        function renderBoard() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, index) => {
                const row = Math.floor(index / 9);
                const col = index % 9;
                const value = board[row][col];
                const isFixed = initialBoard[row][col] !== 0;
                
                cell.textContent = value === 0 ? '' : value;
                
                // 保留 check-error 类，移除其他状态类
                const hasError = cell.classList.contains('check-error');
                cell.className = 'cell';
                if (hasError) cell.classList.add('check-error');
                
                if (isFixed) {
                    cell.classList.add('fixed');
                } else if (value !== 0) {
                    cell.classList.add('user-input');
                }
            });
        }

        function selectCell(index) {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => cell.classList.remove('selected', 'highlight', 'same-number'));
            
            selectedCell = index;
            const cell = cells[index];
            cell.classList.add('selected');
            
            const row = Math.floor(index / 9);
            const col = index % 9;
            const value = board[row][col];
            
            cells.forEach((c, i) => {
                const r = Math.floor(i / 9);
                const cc = i % 9;
                
                if (r === row || cc === col || 
                    (Math.floor(r/3) === Math.floor(row/3) && Math.floor(cc/3) === Math.floor(col/3))) {
                    c.classList.add('highlight');
                }
                
                if (value !== 0 && board[r][cc] === value && i !== index) {
                    c.classList.add('same-number');
                }
            });
        }

        function moveSelection(key) {
            if (selectedCell === null) {
                selectCell(0);
                return;
            }
            
            let row = Math.floor(selectedCell / 9);
            let col = selectedCell % 9;
            
            switch(key) {
                case 'ArrowUp': row = Math.max(0, row - 1); break;
                case 'ArrowDown': row = Math.min(8, row + 1); break;
                case 'ArrowLeft': col = Math.max(0, col - 1); break;
                case 'ArrowRight': col = Math.min(8, col + 1); break;
            }
            
            selectCell(row * 9 + col);
        }

        function inputNumber(num) {
            if (selectedCell === null) return;
            
            const row = Math.floor(selectedCell / 9);
            const col = selectedCell % 9;
            
            if (initialBoard[row][col] !== 0) return;
            
            history.push({
                index: selectedCell,
                value: board[row][col]
            });
            
            board[row][col] = num;
            
            // 如果该格子之前有错误标记，现在输入了正确数字，移除错误标记
            const cells = document.querySelectorAll('.cell');
            const cell = cells[selectedCell];
            if (num === solution[row][col]) {
                cell.classList.remove('check-error');
            }
            
            if (num !== solution[row][col]) {
                cell.classList.add('error');
                setTimeout(() => cell.classList.remove('error'), 500);
            }
            
            renderBoard();
            selectCell(selectedCell);
            
            if (checkWin()) {
                gameWin();
            }
        }

        function eraseNumber() {
            if (selectedCell === null) return;
            
            const row = Math.floor(selectedCell / 9);
            const col = selectedCell % 9;
            
            if (initialBoard[row][col] !== 0) return;
            
            history.push({
                index: selectedCell,
                value: board[row][col]
            });
            
            board[row][col] = 0;
            renderBoard();
            selectCell(selectedCell);
        }

        function undo() {
            if (history.length === 0) return;
            
            const lastMove = history.pop();
            const row = Math.floor(lastMove.index / 9);
            const col = lastMove.index % 9;
            
            board[row][col] = lastMove.value;
            renderBoard();
            selectCell(lastMove.index);
        }

        function restart() {
            board = initialBoard.map(row => [...row]);
            history = [];
            timer = 0;
            clearErrorHighlight();
            renderBoard();
            if (selectedCell !== null) {
                selectCell(selectedCell);
            }
        }

        function hint() {
            if (selectedCell === null) return;
            
            const row = Math.floor(selectedCell / 9);
            const col = selectedCell % 9;
            
            if (initialBoard[row][col] !== 0) return;
            
            if (board[row][col] !== solution[row][col]) {
                board[row][col] = solution[row][col];
                renderBoard();
                selectCell(selectedCell);
                
                if (checkWin()) {
                    gameWin();
                }
            }
        }

        // 新增：检查错误功能
        function checkErrors() {
            const cells = document.querySelectorAll('.cell');
            let errorCount = 0;
            
            // 先清除之前的错误标记
            cells.forEach(cell => cell.classList.remove('check-error'));
            
            // 检查所有非空且非固定的格子
            for (let i = 0; i < 81; i++) {
                const row = Math.floor(i / 9);
                const col = i % 9;
                
                // 跳过空格和初始数字
                if (board[row][col] === 0 || initialBoard[row][col] !== 0) continue;
                
                // 检查是否与答案不符
                if (board[row][col] !== solution[row][col]) {
                    cells[i].classList.add('check-error');
                    errorCount++;
                }
            }
            
            // 显示错误信息
            const errorMessage = document.getElementById('errorMessage');
            const errorCountSpan = document.getElementById('errorCount');
            
            if (errorCount > 0) {
                errorCountSpan.textContent = errorCount;
                errorMessage.style.display = 'block';
                
                // 3秒后自动隐藏提示
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 3000);
            } else {
                // 没有错误，显示恭喜信息
                errorMessage.innerHTML = '✅ 没有发现错误，继续加油！';
                errorMessage.style.background = '#c6f6d5';
                errorMessage.style.color = '#22543d';
                errorMessage.style.display = 'block';
                
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                    // 恢复原始样式
                    setTimeout(() => {
                        errorMessage.innerHTML = '🔍 发现 <span id=\"errorCount\">0</span> 处错误，已用红色标出';
                        errorMessage.style.background = '#fed7d7';
                        errorMessage.style.color = '#c53030';
                    }, 300);
                }, 2000);
            }
            
            // 5秒后自动清除错误高亮（可选，如果需要持续显示可以删除这部分）
            // setTimeout(() => {
            //     clearErrorHighlight();
            // }, 5000);
        }

        // 新增：清除错误高亮
        function clearErrorHighlight() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => cell.classList.remove('check-error'));
            document.getElementById('errorMessage').style.display = 'none';
        }

        function checkWin() {
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j < 9; j++) {
                    if (board[i][j] !== solution[i][j]) {
                        return false;
                    }
                }
            }
            return true;
        }

        function gameWin() {
            clearInterval(timerInterval);
            document.getElementById('finalTime').textContent = formatTime(timer);
            document.getElementById('winModal').style.display = 'flex';
            createConfetti();
        }

        function closeWinModal() {
            document.getElementById('winModal').style.display = 'none';
            newGame(currentDifficulty);
        }

        function createConfetti() {
            const colors = ['#f56565', '#48bb78', '#4299e1', '#ecc94b', '#9f7aea', '#ed8936'];
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 5000);
                }, i * 50);
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timer++;
                document.getElementById('timer').textContent = formatTime(timer);
            }, 1000);
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }

        init();
    </script>
    </body>
</html>
