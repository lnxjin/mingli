        .container {

            background-color: #fafafa;
            border-radius: 12px;

        .container h1 {

        .container a{
            display: inline-block;
            margin: 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        /* 针对小屏幕的响应式调整 */
        @media (max-width: 768px) {
            .container {
                width: 95%;
                padding: 24px;
                border-radius: 8px;
            }
            
            .container h1 {
                font-size: 22px;
                margin-bottom: 20px;
                padding-bottom: 15px;
            }
            
            .container p {
                font-size: 16px;
                line-height: 1.7;
                text-indent: 1.5em;
            }
        }

        /* 打印优化 */
        @media print {
            .container {
                width: 100%;
                max-width: none;
                box-shadow: none;
                background: white;
                padding: 20px;
            }
            
            .container p {
                line-height: 1.6;
            }
        }

 
    </style>
