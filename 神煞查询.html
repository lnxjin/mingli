<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>四柱神煞查询系统（年日双查）</title>
<style>
*{box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{max-width:1300px;margin:30px auto;padding:0 20px;background:#f5f7fa}
.input-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);margin-bottom:24px}
#baziInput{width:100%;padding:12px 15px;font-size:16px;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:14px}
button{padding:10px 24px;background:#3b82f6;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px}
.pillars{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:30px}
.pillar{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);border-top:3px solid #3b82f6}
.pillar-title{font-size:17px;font-weight:bold;text-align:center;margin-bottom:10px;color:#1e293b}
.pillar-bazi{font-size:26px;font-weight:bold;text-align:center;color:#ef4444;margin-bottom:16px}
.shensha-tag{display:inline-block;background:#eff6ff;color:#2563eb;padding:4px 8px;border-radius:6px;margin:3px;font-size:13px}
.global-box{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.global-title{font-size:17px;font-weight:bold;margin-bottom:12px;color:#1e293b}
</style>
</head>

<body>
<h2 style="text-align:center;color:#1e293b">四柱神煞查询系统（年日双查）</h2>

<div class="input-card">
  <input type="text" id="baziInput" placeholder="输入四柱：己酉 丙寅 甲子 辛未（空格分隔）" value="己酉 丙寅 甲子 辛未">
  <button onclick="compute()">查询神煞</button>
</div>

<div id="pillars" class="pillars"></div>
<div id="global" class="global-box"></div>

<script>
// 1. 解析四柱
function parseBazi(str) {
  const arr = str.trim().split(/\s+/).filter(s => s.length === 2);
  if (arr.length !== 4) return null;
  return [
    { name: "年柱", g: arr[0][0], z: arr[0][1] },
    { name: "月柱", g: arr[1][0], z: arr[1][1] },
    { name: "日柱", g: arr[2][0], z: arr[2][1] },
    { name: "时柱", g: arr[3][0], z: arr[3][1] }
  ];
}

// 2. 万能神煞规则库（年支 / 日支 / 年干 / 日干 / 月支）
const shenshaRules = [
  // ========== 日支查 ==========
  { name: "桃花", by: "riZhi", source: "日", fn: (b, t) => {
    const m = {申:"酉",子:"酉",辰:"酉",巳:"午",酉:"午",丑:"午",寅:"卯",午:"卯",戌:"卯",亥:"子",卯:"子",未:"子"};
    return m[b] === t;
  }},
  { name: "驿马", by: "riZhi", source: "日", fn: (b, t) => {
    const m = {申:"寅",子:"寅",辰:"寅",寅:"申",午:"申",戌:"申",巳:"亥",酉:"亥",丑:"亥",亥:"巳",卯:"巳",未:"巳"};
    return m[b] === t;
  }},
  { name: "华盖", by: "riZhi", source: "日", fn: (b, t) => {
    const m = {寅:"戌",午:"戌",戌:"戌",亥:"未",卯:"未",未:"未",申:"辰",子:"辰",辰:"辰",巳:"丑",酉:"丑",丑:"丑"};
    return m[b] === t;
  }},
  { name: "将星", by: "riZhi", source: "日", fn: (b, t) => {
    const m = {寅:"午",午:"午",戌:"午",巳:"酉",酉:"酉",丑:"酉",申:"子",子:"子",辰:"子",亥:"卯",卯:"卯",未:"卯"};
    return m[b] === t;
  }},
  { name: "孤辰", by: "riZhi", source: "日", fn: (b, t) => {
    const m = {寅:"寅",卯:"寅",辰:"寅",巳:"巳",午:"巳",未:"巳",申:"申",酉:"申",戌:"申",亥:"亥",子:"亥",丑:"亥"};
    return m[b] === t;
  }},
  { name: "寡宿", by: "riZhi", source: "日", fn: (b, t) => {
    const m = {寅:"戌",卯:"戌",辰:"戌",巳:"丑",午:"丑",未:"丑",申:"辰",酉:"辰",戌:"辰",亥:"未",子:"未",丑:"未"};
    return m[b] === t;
  }},

  // ========== 年支查 ==========
  { name: "桃花", by: "nianZhi", source: "年", fn: (b, t) => {
    const m = {申:"酉",子:"酉",辰:"酉",巳:"午",酉:"午",丑:"午",寅:"卯",午:"卯",戌:"卯",亥:"子",卯:"子",未:"子"};
    return m[b] === t;
  }},
  { name: "驿马", by: "nianZhi", source: "年", fn: (b, t) => {
    const m = {申:"寅",子:"寅",辰:"寅",寅:"申",午:"申",戌:"申",巳:"亥",酉:"亥",丑:"亥",亥:"巳",卯:"巳",未:"巳"};
    return m[b] === t;
  }},
  { name: "华盖", by: "nianZhi", source: "年", fn: (b, t) => {
    const m = {寅:"戌",午:"戌",戌:"戌",亥:"未",卯:"未",未:"未",申:"辰",子:"辰",辰:"辰",巳:"丑",酉:"丑",丑:"丑"};
    return m[b] === t;
  }},
  { name: "将星", by: "nianZhi", source: "年", fn: (b, t) => {
    const m = {寅:"午",午:"午",戌:"午",巳:"酉",酉:"酉",丑:"酉",申:"子",子:"子",辰:"子",亥:"卯",卯:"卯",未:"卯"};
    return m[b] === t;
  }},
  { name: "孤辰", by: "nianZhi", source: "年", fn: (b, t) => {
    const m = {寅:"寅",卯:"寅",辰:"寅",巳:"巳",午:"巳",未:"巳",申:"申",酉:"申",戌:"申",亥:"亥",子:"亥",丑:"亥"};
    return m[b] === t;
  }},
  { name: "寡宿", by: "nianZhi", source: "年", fn: (b, t) => {
    const m = {寅:"戌",卯:"戌",辰:"戌",巳:"丑",午:"丑",未:"丑",申:"辰",酉:"辰",戌:"辰",亥:"未",子:"未",丑:"未"};
    return m[b] === t;
  }},

  // ========== 年干查（关键修复） ==========
  { name: "天乙", by: "nianGan", source: "年", fn: (b, t) => {
    const m = {甲:["丑","未"],戊:["丑","未"],庚:["丑","未"],乙:["子","申"],己:["子","申"],丙:["亥","酉"],丁:["亥","酉"],壬:["卯","巳"],癸:["卯","巳"],辛:["寅","午"]};
    return m[b]?.includes(t);
  }},
  { name: "文昌", by: "nianGan", source: "年", fn: (b, t) => {
    const m = {甲:["巳"],乙:["午"],丙:["申"],戊:["申"],丁:["酉"],己:["酉"],庚:["亥"],辛:["子"],壬:["寅"],癸:["卯"]};
    return m[b]?.includes(t);
  }},
  { name: "太极", by: "nianGan", source: "年", fn: (b, t) => {
    const m = {甲:["子","午"],乙:["子","午"],丙:["酉","卯"],丁:["酉","卯"],戊:["辰","戌","丑","未"],己:["辰","戌","丑","未"],庚:["寅","亥"],辛:["寅","亥"],壬:["巳","申"],癸:["巳","申"]};
    return m[b]?.includes(t);
  }},
  { name: "禄神", by: "nianGan", source: "年", fn: (b, t) => {
    const m = {甲:"寅",乙:"卯",丙:"巳",丁:"午",戊:"巳",己:"午",庚:"申",辛:"酉",壬:"亥",癸:"子"};
    return m[b] === t;
  }},
  { name: "羊刃", by: "nianGan", source: "年", fn: (b, t) => {
    const m = {甲:"卯",乙:"寅",丙:"午",丁:"巳",戊:"午",己:"巳",庚:"酉",辛:"申",壬:"子",癸:"亥"};
    return m[b] === t;
  }},
  { name: "红艳", by: "nianGan", source: "年", fn: (b, t) => {
    const m = {甲:"午",乙:"申",丙:"寅",丁:"未",戊:"午",己:"申",庚:"卯",辛:"寅",壬:"子",癸:"酉"};
    return m[b] === t;
  }},

  // ========== 日干查 ==========
  { name: "天乙", by: "riGan", source: "日", fn: (b, t) => {
    const m = {甲:["丑","未"],戊:["丑","未"],庚:["丑","未"],乙:["子","申"],己:["子","申"],丙:["亥","酉"],丁:["亥","酉"],壬:["卯","巳"],癸:["卯","巳"],辛:["寅","午"]};
    return m[b]?.includes(t);
  }},
  { name: "太极", by: "riGan", source: "日", fn: (b, t) => {
    const m = {甲:["子","午"],乙:["子","午"],丙:["酉","卯"],丁:["酉","卯"],戊:["辰","戌","丑","未"],己:["辰","戌","丑","未"],庚:["寅","亥"],辛:["寅","亥"],壬:["巳","申"],癸:["巳","申"]};
    return m[b]?.includes(t);
  }},
  { name: "文昌", by: "riGan", source: "日", fn: (b, t) => {
    const m = {甲:["巳"],乙:["午"],丙:["申"],戊:["申"],丁:["酉"],己:["酉"],庚:["亥"],辛:["子"],壬:["寅"],癸:["卯"]};
    return m[b]?.includes(t);
  }},
  { name: "禄神", by: "riGan", source: "日", fn: (b, t) => {
    const m = {甲:"寅",乙:"卯",丙:"巳",丁:"午",戊:"巳",己:"午",庚:"申",辛:"酉",壬:"亥",癸:"子"};
    return m[b] === t;
  }},
  { name: "羊刃", by: "riGan", source: "日", fn: (b, t) => {
    const m = {甲:"卯",乙:"寅",丙:"午",丁:"巳",戊:"午",己:"巳",庚:"酉",辛:"申",壬:"子",癸:"亥"};
    return m[b] === t;
  }},
  { name: "红艳", by: "riGan", source: "日", fn: (b, t) => {
    const m = {甲:"午",乙:"申",丙:"寅",丁:"未",戊:"午",己:"申",庚:"卯",辛:"寅",壬:"子",癸:"酉"};
    return m[b] === t;
  }},

  // ========== 月支查（天德月德） ==========
  { name: "天德", by: "yueZhi", source: "月", fn: (b, t) => {
    const m = {寅:"丁",卯:"申",辰:"壬",巳:"辛",午:"亥",未:"甲",申:"癸",酉:"寅",戌:"丙",亥:"乙",子:"巳",丑:"庚"};
    return m[b] === t;
  }},
  { name: "月德", by: "yueZhi", source: "月", fn: (b, t) => {
    const m = {寅:"丙",午:"丙",戌:"丙",申:"壬",子:"壬",辰:"壬",亥:"甲",卯:"甲",未:"甲",巳:"庚",酉:"庚",丑:"庚"};
    return m[b] === t;
  }}
];

// 三奇贵人
function getSanQi(gans) {
  const t = ["甲","戊","庚"], d = ["乙","丙","丁"], r = ["壬","癸","辛"];
  const res = [];
  if(t.every(x=>gans.includes(x))) res.push("天上三奇");
  if(d.every(x=>gans.includes(x))) res.push("地下三奇");
  if(r.every(x=>gans.includes(x))) res.push("人中三奇");
  return res.join(" ") || "无";
}

// 魁罡
function isKuigang(gan, zhi) {
  return ["庚戌","庚辰","戊戌","壬辰"].includes(gan+zhi);
}

// 主计算
function compute() {
  const val = document.getElementById("baziInput").value.trim();
  const pillars = parseBazi(val);
  if (!pillars) { alert("请输入正确四柱，如：己酉 丙寅 甲子 辛未"); return; }

  const nianG = pillars[0].g;
  const nianZ = pillars[0].z;
  const yueZ  = pillars[1].z;
  const riG   = pillars[2].g;
  const riZ   = pillars[2].z;
  const allGans = pillars.map(p => p.g);

  let html = "";

  pillars.forEach((zhu, index) => {
    let tags = [];
    shenshaRules.forEach(rule => {
      let ok = false;
      switch(rule.by) {
        case "riZhi":
          if (index !== 2) ok = rule.fn(riZ, zhu.z); break;
        case "nianZhi":
          if (index !== 0) ok = rule.fn(nianZ, zhu.z); break;
        case "nianGan":
          ok = rule.fn(nianG, zhu.z); break;
        case "riGan":
          ok = rule.fn(riG, zhu.z); break;
        case "yueZhi":
          ok = rule.fn(yueZ, zhu.g); break;
      }
      if (ok) tags.push(`${rule.name}(${rule.source})`);
    });

    if (zhu.name === "日柱" && isKuigang(zhu.g, zhu.z)) {
      tags.push("魁罡");
    }

    const tagHtml = tags.map(t => `<span class="shensha-tag">${t}</span>`).join("");
    html += `
    <div class="pillar">
      <div class="pillar-title">${zhu.name}</div>
      <div class="pillar-bazi">${zhu.g}${zhu.z}</div>
      <div>${tagHtml}</div>
    </div>`;
  });

  document.getElementById("pillars").innerHTML = html;
  const sanqi = getSanQi(allGans);
  document.getElementById("global").innerHTML = `
    <div class="global-title">全局神煞</div>
    <div><span class="shensha-tag">${sanqi}</span></div>
  `;
}

window.onload = compute;
</script>
</body>
</html>
