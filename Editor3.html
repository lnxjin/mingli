<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>离线代码编辑器</title>
<style>
:root {
  --bg: #e8e8e8;
  --editor-bg: #e8e8e8;
  --editor-color: #333;
  --line-bg: #d0d0d0;
  --line-color: #666;
  --line-border: #bbb;
  --menu-bg: #fff;
  --menu-item-bg: #fff;
  --menu-color: #333;
  --search-bg: #fff;
  --input-bg: #f5f5f5;
  --input-color: #333;
}
:root.dark {
  --bg: #1c1c1c;
  --editor-bg: #1e1e1e;
  --editor-color: #d4d4d4;
  --line-bg: #252525;
  --line-color: #858585;
  --line-border: #333;
  --menu-bg: #252525;
  --menu-item-bg: #2d2d2d;
  --menu-color: #eee;
  --search-bg: #252525;
  --input-bg: #333;
  --input-color: #eee;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0; height: 100%;
  background: var(--bg);
  color: var(--editor-color);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
  overflow: hidden;
  transition: all 0.2s;
}
#header {
  position: fixed; top: 0; left: 0; width: 100%; height: 44px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex; align-items: center;
  justify-content: space-between; padding: 0 8px;
  z-index: 100;
}
#filename {
  font-size: 15px; flex: 1; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; padding: 0 6px;
  text-align: center; color: #fff;
}
.iconBtnHead {
  width: 34px; height: 34px; background: transparent;
  border: none; color: #fff; font-size: 17px;
  cursor: pointer; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
.iconBtnHead:active { background: rgba(255,255,255,0.2); }

#editorContainer {
  position: fixed; top: 44px; left: 0; width: 100%;
  height: calc(100% - 44px);
  display: flex; background: var(--bg);
}
#lineNumbers {
  width: 42px;
  background: var(--line-bg);
  color: var(--line-color);
  font-size: 14px;
  line-height: 1.6;
  padding: 8px 4px;
  text-align: right;
  user-select: none;
  border-right: 1px solid var(--line-border);
  font-family: monospace;
  overflow: hidden;
  height: 100%;
}
#editor {
  flex: 1;
  padding: 8px;
  background: var(--editor-bg);
  color: var(--editor-color);
  border: none; outline: none;
  font-size: 14px; line-height: 1.6;
  resize: none; overflow: auto;
  white-space: pre;
  word-wrap: normal;
  font-family: monospace;
  -webkit-overflow-scrolling: touch;
  transition: all 0.2s;
}
#editor.wrap {
  white-space: pre-wrap;
  word-wrap: break-word;
  word-break: break-all;
}
#editor::placeholder { color: #999; }
::selection { background-color: #ffff00; color: #000; }

#sideMenu {
  position: fixed; top: 0; right: -210px; width: 210px; height: 100%;
  background: var(--menu-bg); z-index: 200; transition: right 0.25s ease;
  box-shadow: -2px 0 8px rgba(0,0,0,0.15);
}
#sideMenu.open { right: 0; }
#menuOverlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); z-index: 150;
  opacity: 0; visibility: hidden; transition: opacity 0.25s;
}
#menuOverlay.show { opacity: 1; visibility: visible; }
.menuHeader {
  height: 44px; 
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex; align-items: center; justify-content: space-between; padding: 0 10px;
}
.menuTitle { font-size: 15px; color: #fff; }
#closeMenu { width: 28px; height: 28px; background: transparent; border: none; color: #fff; font-size: 18px; cursor: pointer; }
.menuContent { flex: 1; overflow-y: auto; padding: 4px 2px; background: var(--bg); }
.menuSection { margin-bottom: 6px; }
.menuSectionTitle {
  font-size: 10px; color: #888; text-transform: uppercase;
  padding: 4px 10px; letter-spacing: 0.4px;
}
.menuItem {
  display: flex; align-items: center; padding: 9px 10px;
  color: var(--menu-color); cursor: pointer; border-radius: 5px;
  margin: 1px 6px; font-size: 13px; gap: 8px;
  background: var(--menu-item-bg);
}
.menuItem:active { background: #667eea; color: #fff; }
.menuItem .icon { width: 18px; text-align: center; font-size: 15px; }
.toggleItem {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 10px; margin: 1px 6px; border-radius: 5px;
  background: var(--menu-item-bg);
}
.toggleLabel { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.switch { position: relative; width: 40px; height: 22px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
  background-color: #ccc; transition: .2s; border-radius: 22px;
}
.slider:before {
  position: absolute; content: ""; height: 16px; width: 16px;
  left: 3px; bottom: 3px; background-color: white; transition: .2s; border-radius: 50%;
}
input:checked + .slider { background-color: #667eea; }
input:checked + .slider:before { transform: translateX(18px); }

#searchModal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 300; display: none; pointer-events: none;
}
#searchModal.show { display: block; }
#searchModal.show .searchWindow { pointer-events: auto; }
.searchWindow {
  position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
  width: calc(100% - 20px); max-width: 320px;
  background: var(--search-bg); color: var(--editor-color);
  border-radius: 10px; box-shadow: 0 3px 15px rgba(0,0,0,0.3);
}
.searchWindowHeader {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 10px 10px 0 0;
  cursor: move;
}
.searchWindowTitle { font-size: 14px; color: #fff; }
#matchCount { font-size: 12px; color: rgba(255,255,255,0.8); margin-left: 4px; }
#closeSearch {
  width: 28px; height: 28px; background: rgba(255,255,255,0.2);
  border: none; color: #fff; font-size: 16px; cursor: pointer; border-radius: 5px;
}
.searchWindowBody { padding: 10px; }
.searchRow, .replaceRow { display: flex; gap: 5px; margin-bottom: 8px; }
.searchRow input, .replaceRow input {
  flex: 1; height: 34px; padding: 0 8px; font-size: 13px;
  background: var(--input-bg); color: var(--input-color); border: 1px solid #555;
  border-radius: 5px; outline: none;
}
.smallBtn {
  width: 34px; height: 34px; background: var(--input-bg);
  border: 1px solid #555; color: var(--input-color); font-size: 13px;
  border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.replaceBtn {
  height: 34px; padding: 0 10px; font-size: 13px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border: none; color: #fff; border-radius: 5px; cursor: pointer;
}
#fileInput { display: none; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div id="header">
  <button class="iconBtnHead" id="darkToggle" title="暗黑模式" onclick="toggleDark()">🌙</button>
  <div id="filename">未命名.txt</div>
  <button class="iconBtnHead" onclick="toggleSearchModal()" title="查找替换">🔍</button>
  <button class="iconBtnHead" onclick="toggleMenu()" title="菜单">☰</button>
</div>

<div id="searchModal">
  <div class="searchWindow" id="searchWindow">
    <div class="searchWindowHeader" id="dragHandle">
      <div class="searchWindowTitle">查找替换<span id="matchCount"></span></div>
      <button id="closeSearch" onclick="closeSearchModal()">×</button>
    </div>
    <div class="searchWindowBody">
      <div class="searchRow">
        <input type="text" id="searchInput" placeholder="查找">
        <button class="smallBtn" onclick="findPrev()">↑</button>
        <button class="smallBtn" onclick="findNext()">↓</button>
      </div>
      <div class="replaceRow">
        <input type="text" id="replaceInput" placeholder="替换为">
        <button class="replaceBtn" onclick="replaceText()">替换</button>
        <button class="replaceBtn" onclick="replaceAll()">全部</button>
      </div>
    </div>
  </div>
</div>

<div id="menuOverlay" onclick="toggleMenu()"></div>
<div id="sideMenu">
  <div class="menuHeader">
    <span class="menuTitle">菜单</span>
    <button id="closeMenu" onclick="toggleMenu()">×</button>
  </div>
  <div class="menuContent">
    <div class="menuSection">
      <div class="menuSectionTitle">文件</div>
      <div class="menuItem" onclick="newFile()"><span class="icon">📄</span><span>新建</span></div>
      <div class="menuItem" onclick="openFile()"><span class="icon">📂</span><span>打开</span></div>
      <div class="menuItem" onclick="saveFile()"><span class="icon">💾</span><span>保存</span></div>
      <div class="menuItem" onclick="saveAs()"><span class="icon">💾+</span><span>另存为</span></div>
      <div class="menuItem" onclick="closeFile()"><span class="icon">❌</span><span>关闭</span></div>
      <div class="menuItem" onclick="previewInBrowser()"><span class="icon">🌐</span><span>浏览器打开</span></div>
    </div>

    <div class="menuSection">
      <div class="menuSectionTitle">视图</div>
      <div class="toggleItem">
        <div class="toggleLabel"><span class="icon">↩️</span><span>自动折行</span></div>
        <label class="switch"><input type="checkbox" id="wrapToggle" onchange="toggleWrap()"><span class="slider"></span></label>
      </div>
      <div class="menuItem" onclick="increaseFont()"><span class="icon">A+</span><span>字体增大</span></div>
      <div class="menuItem" onclick="decreaseFont()"><span class="icon">A-</span><span>字体减小</span></div>
      <div class="menuItem" onclick="resetFont()"><span class="icon">Aa</span><span>重置字体</span></div>
    </div>

    <div class="menuSection">
      <div class="menuSectionTitle">编辑</div>
      <div class="menuItem" onclick="openSearchFromMenu()"><span class="icon">🔍</span><span>查找替换</span></div>
      <div class="menuItem" onclick="formatCode()"><span class="icon">✨</span><span>一键格式化</span></div>
    </div>
  </div>
</div>

<div id="editorContainer">
  <div id="lineNumbers">1</div>
  <textarea id="editor" spellcheck="false" placeholder="网页版离线文本编辑器第三版，可编辑文本类的文件，&#10;比如.txt,.html,.js,.css,.json,.md,&#10;在此输入代码..."></textarea>
</div>

<input type="file" id="fileInput" accept=".txt,.html,.js,.css,.json,.md">

<script>
const editor = document.getElementById('editor');
const lineNumbers = document.getElementById('lineNumbers');
const fileInput = document.getElementById('fileInput');
const searchInput = document.getElementById('searchInput');
const replaceInput = document.getElementById('replaceInput');
const sideMenu = document.getElementById('sideMenu');
const menuOverlay = document.getElementById('menuOverlay');
const searchModal = document.getElementById('searchModal');
const searchWindow = document.getElementById('searchWindow');
const dragHandle = document.getElementById('dragHandle');
const filename = document.getElementById('filename');
const wrapToggle = document.getElementById('wrapToggle');
const matchCount = document.getElementById('matchCount');

let matches = [], currentMatch = -1;
let fileHandle = null;
let currentFileName = '未命名.txt';
let isModified = false;
let isWrapEnabled = false;
let isSearchOpen = false;
let isComposing = false;

let fontSize = 14;
const minFont = 10, maxFont = 24, defaultFont = 14;

function updateFontSize() {
  editor.style.fontSize = fontSize + 'px';
  lineNumbers.style.fontSize = fontSize + 'px';
  showToast('字体：' + fontSize + 'px');
}
function increaseFont() {
  if (fontSize < maxFont) { fontSize++; updateFontSize(); }
}
function decreaseFont() {
  if (fontSize > minFont) { fontSize--; updateFontSize(); }
}
function resetFont() {
  fontSize = defaultFont; updateFontSize();
}

function toggleDark() {
  document.documentElement.classList.toggle('dark');
  const isDark = document.documentElement.classList.contains('dark');
  document.getElementById('darkToggle').textContent = isDark ? '☀️' : '🌙';
  showToast(isDark ? '暗黑模式已开启' : '亮色模式已开启');
}

function formatCode() {
  let v = editor.value;
  if (!v.trim()) return;
  try {
    let lines = v.split('\n').map(l => l.trimEnd());
    let indent = 0, res = [];
    for (let line of lines) {
      let t = line.trim();
      if (!t) { res.push(''); continue; }
      if (t.endsWith('>') && !t.startsWith('</')) indent++;
      if (t.startsWith('</')) indent = Math.max(0, indent - 1);
      res.push('  '.repeat(indent) + t);
      if (t.startsWith('</')) indent = Math.max(0, indent - 1);
    }
    editor.value = res.join('\n');
    updateLineNumbers();
    isModified = true;
    updateTitle();
    showToast('格式化完成（仅排版）');
  } catch (e) {
    showToast('格式化失败');
  }
}

function previewInBrowser() {
  const content = editor.value.trim();
  if (!content) { alert('编辑器内容为空'); return; }
  const ext = currentFileName.split('.').pop().toLowerCase();
  if (!['html','htm'].includes(ext)) { alert('仅支持HTML预览'); return; }
  const blob = new Blob([content], { type: 'text/html;charset=utf-8' });
  window.open(URL.createObjectURL(blob), '_blank');
  toggleMenu();
}

function updateLineNumbers() {
  const lines = editor.value.split('\n').length;
  let html = '';
  for (let i = 1; i <= lines; i++) html += `<div>${i}</div>`;
  lineNumbers.innerHTML = html;
}
editor.addEventListener('scroll', () => {
  lineNumbers.scrollTop = editor.scrollTop;
});

let isDragging = false;
let dragOffsetX = 0, dragOffsetY = 0;

dragHandle.addEventListener('mousedown', startDrag);
dragHandle.addEventListener('touchstart', startDrag, { passive: false });
document.addEventListener('mousemove', drag);
document.addEventListener('touchmove', drag, { passive: false });
document.addEventListener('mouseup', stopDrag);
document.addEventListener('touchend', stopDrag);

function startDrag(e) {
  if (e.target.closest('#closeSearch')) return;
  isDragging = true;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const rect = searchWindow.getBoundingClientRect();
  dragOffsetX = clientX - rect.left;
  dragOffsetY = clientY - rect.top;
  if (e.touches) e.preventDefault();
}
function drag(e) {
  if (!isDragging) return;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  let newX = clientX - dragOffsetX;
  let newY = clientY - dragOffsetY;
  const maxX = window.innerWidth - searchWindow.offsetWidth;
  const maxY = window.innerHeight - searchWindow.offsetHeight;
  newX = Math.max(0, Math.min(newX, maxX));
  newY = Math.max(0, Math.min(newY, maxY));
  searchWindow.style.left = newX + 'px';
  searchWindow.style.top = newY + 'px';
  searchWindow.style.transform = 'none';
  if (e.touches) e.preventDefault();
}
function stopDrag() { isDragging = false; }

function toggleMenu() {
  sideMenu.classList.toggle('open');
  menuOverlay.classList.toggle('show');
}
function toggleWrap() {
  isWrapEnabled = wrapToggle.checked;
  isWrapEnabled ? editor.classList.add('wrap') : editor.classList.remove('wrap');
}

// 全局统一更新计数
function updateMatchDisplay() {
  if (matches.length === 0) {
    matchCount.textContent = '';
  } else {
    matchCount.textContent = `(${currentMatch + 1}/${matches.length})`;
  }
}

// 一次性算出所有匹配位置（只算一次，不乱刷新）
function findAllMatches() {
  const key = searchInput.value.trim();
  matches = [];
  if (!key) {
    currentMatch = -1;
    updateMatchDisplay();
    return;
  }
  const text = editor.value;
  let pos = 0;
  while ((pos = text.indexOf(key, pos)) !== -1) {
    matches.push(pos);
    pos += key.length;
  }
  currentMatch = matches.length > 0 ? 0 : -1;
  updateMatchDisplay();
}

// 选中并滚动到当前匹配
function selectCurrentMatch() {
  if (currentMatch < 0 || currentMatch >= matches.length) return;
  const key = searchInput.value.trim();
  const pos = matches[currentMatch];
  editor.focus();
  editor.setSelectionRange(pos, pos + key.length);

  const lineCount = editor.value.substring(0, pos).split('\n').length;
  editor.scrollTop = (lineCount - 4) * 22;
  updateMatchDisplay();
}

// 下一个
function findNext() {
  const key = searchInput.value.trim();
  if (!key || matches.length === 0) return;
  currentMatch = (currentMatch + 1) % matches.length;
  selectCurrentMatch();
}

// 上一个
function findPrev() {
  const key = searchInput.value.trim();
  if (!key || matches.length === 0) return;
  currentMatch = (currentMatch - 1 + matches.length) % matches.length;
  selectCurrentMatch();
}

function toggleSearchModal() { isSearchOpen ? closeSearchModal() : openSearchModal(); }
function openSearchModal() {
  isSearchOpen = true;
  searchModal.classList.add('show');
  searchWindow.style.left = '50%';
  searchWindow.style.top = '60px';
  searchWindow.style.transform = 'translateX(-50%)';
  findAllMatches();
  setTimeout(() => searchInput.focus(), 50);
}
function closeSearchModal() {
  isSearchOpen = false;
  searchModal.classList.remove('show');
  matchCount.textContent = '';
  editor.focus();
}
function openSearchFromMenu() { toggleMenu(); openSearchModal(); }

function replaceText() {
  const key = searchInput.value.trim();
  const val = replaceInput.value;
  if (!key || currentMatch < 0 || currentMatch >= matches.length) return;

  const pos = matches[currentMatch];
  editor.value =
    editor.value.substring(0, pos) +
    val +
    editor.value.substring(pos + key.length);

  updateLineNumbers();
  isModified = true;
  updateTitle();
  findAllMatches();
}

function replaceAll() {
  const key = searchInput.value.trim();
  const val = replaceInput.value;
  if (!key) return;
  editor.value = editor.value.split(key).join(val);
  updateLineNumbers();
  isModified = true;
  updateTitle();
  findAllMatches();
  showToast('全部替换完成');
}

searchInput.addEventListener('input', () => {
  findAllMatches();
});

function updateTitle() {
  filename.textContent = (isModified ? '● ' : '') + currentFileName;
}

function newFile() {
  if (isModified && editor.value !== '') {
    if (!confirm('当前文件未保存，是否放弃更改？')) return;
  }
  const inputName = prompt('文件名（含后缀）：', 'index.html');
  if (!inputName) return;
  const ext = inputName.split('.').pop().toLowerCase();
  const templates = {
    html: `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>文档</title>
</head>
<body>
    <h1>Hello</h1>
</body>
</html>`,
    css: '/* CSS */',
    js: '// JS',
    json: '{}',
    md: '# 标题',
    txt: ''
  };
  editor.value = templates[ext] || '';
  currentFileName = inputName;
  updateLineNumbers();
  fileHandle = null;
  isModified = false;
  updateTitle();
  toggleMenu();
}

function closeFile() {
  if (isModified && editor.value !== '') {
    if (!confirm('是否保存？')) {
      editor.value = ''; updateLineNumbers(); currentFileName = '未命名.txt'; isModified = false; updateTitle(); toggleMenu(); return;
    }
    saveFile().then(() => {
      editor.value = ''; updateLineNumbers(); fileHandle = null; currentFileName = '未命名.txt'; isModified = false; updateTitle();
    });
    toggleMenu();
    return;
  }
  editor.value = ''; updateLineNumbers(); fileHandle = null; currentFileName = '未命名.txt'; isModified = false; updateTitle(); toggleMenu();
}

async function openFile() {
  try {
    if (isModified && editor.value !== '') {
      if (!confirm('是否放弃当前修改？')) return;
    }
    if ('showOpenFilePicker' in window) {
      [fileHandle] = await window.showOpenFilePicker({
        types: [{ description: '文本', accept: { 'text/*': ['.txt','.html','.js','.css','.json','.md'] } }], multiple: false
      });
      const file = await fileHandle.getFile();
      editor.value = await file.text();
      updateLineNumbers(); currentFileName = file.name; isModified = false; updateTitle();
    } else {
      fileInput.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = evt => {
          editor.value = evt.target.result;
          updateLineNumbers(); currentFileName = file.name; isModified = false; updateTitle();
        };
        reader.readAsText(file);
        fileInput.value = '';
      };
      fileInput.click();
    }
    if (sideMenu.classList.contains('open')) toggleMenu();
  } catch (err) { if (err.name !== 'AbortError') alert('打开失败'); }
}

async function saveFile() {
  try {
    if (fileHandle) {
      const writable = await fileHandle.createWritable();
      await writable.write(editor.value);
      await writable.close();
      isModified = false; updateTitle(); showToast('已保存');
    } else {
      await saveAs();
    }
    if (sideMenu.classList.contains('open')) toggleMenu();
    return true;
  } catch (err) { alert('保存失败'); return false; }
}

async function saveAs() {
  try {
    const ext = currentFileName.split('.').pop().toLowerCase();
    const typeMap = {
      html: { mime: 'text/html;charset=utf-8', exts: ['.html','.htm'] },
      css: { mime: 'text/css;charset=utf-8', exts: ['.css'] },
      js: { mime: 'application/javascript;charset=utf-8', exts: ['.js'] },
      json: { mime: 'application/json;charset=utf-8', exts: ['.json'] },
      md: { mime: 'text/markdown;charset=utf-8', exts: ['.md'] },
      txt: { mime: 'text/plain;charset=utf-8', exts: ['.txt'] }
    };
    const ct = typeMap[ext] || typeMap.txt;
    const h = await window.showSaveFilePicker({
      suggestedName: currentFileName,
      types: [{ accept: { [ct.mime.split(';')[0]]: ct.exts } }]
    });
    const w = await h.createWritable();
    await w.write(editor.value);
    await w.close();
    fileHandle = h;
    currentFileName = (await h.getFile()).name;
    isModified = false; updateTitle(); showToast('已保存');
  } catch (err) {
    const blob = new Blob([editor.value], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = currentFileName;
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
    showToast('已下载');
  }
  if (sideMenu.classList.contains('open')) toggleMenu();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:#667eea;color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;z-index:999;animation:fadeIn 0.3s';
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = 0; setTimeout(() => t.remove(), 200); }, 1200);
}

editor.addEventListener('input', () => {
  updateLineNumbers();
  if (!isModified) { isModified = true; updateTitle(); }
});

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'f') { e.preventDefault(); openSearchModal(); }
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveFile(); }
  if (e.ctrlKey && (e.key === '+' || e.key === '=')) { e.preventDefault(); increaseFont(); }
  if (e.ctrlKey && e.key === '-') { e.preventDefault(); decreaseFont(); }
  if (e.ctrlKey && e.key === '0') { e.preventDefault(); resetFont(); }
  if (e.key === 'Escape' && isSearchOpen) closeSearchModal();
});

updateLineNumbers();
</script>
</body>
</html>
