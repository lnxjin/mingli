 TYGR:`<h1>天乙贵人 </h1>
<p>天乙贵人大家都知道是后天贵人，可以借得到钱，坐牢人家把我保出来，跳票可以借得到钱。开店没有钱，你借钱开店铺那个不是解难，是增福。所以天乙贵人只是处理你患难的。那么一般性所想的，有难时有人救就不错了，这个是天乙贵人，女命不能用天乙贵人，最多一个天乙贵人，有首诗：「一坐天乙是好命，两坐天乙心不定，三坐天乙反为豪家正。」两个贵人怎么办呢？难以取舍了，就心不定了。三个贵人呢？干脆做小三算了，这个豪家正，豪门里边去了，就是贵人帮了你大忙，干脆嫁给你算了。这是天乙贵人，男女不一样的，男命没有关系，多少人借钱给我都可以。</p>`,
 TDYDGR:`<h1>天德、月德贵人 </h1>
<p>天德、月德贵人是从月柱取出来的，后面还有两个贵人，天乙和文昌。这个贵人这个字，不要说算命了，在我们口头上都在讲你是我的贵人啊！有没有贵人帮忙了，口头话啊！不分贵贱老少都希望有贵人。那么什么叫贵人呢？写张名片给你也是贵人，给你一万块也是贵人，送你一栋豪宅也是贵人，这就差很多了。这四个贵人里边，最有效的贵人，就是天月德贵人。天月德贵人是先天之福，天乙贵人是后天之福，怎么区别呢？尤其女命，男女命用贵人不同，男命四个贵人都可以用，我老爸有钱同人家借我两千万没什么不一样。
<p>但女命就不同了，女命要用天月德贵人，女命有钱，只能够是你老爸有钱，你先生有钱，应该得到的。同时我顺便解释一下，天德这个德字，同得到这个得字不一样，这个德不是讲道德问题，你应该拿到的叫德。一个小姐父母嫁妆给她几千万，或者先生有钱，应该得到的。天乙贵人就不是了，那是后天贵人，后天贵人就人家借给你钱，我们男人同一百个人借钱都没有关系，一个女人如果问三个人借钱，就会有麻烦了。所以说呢，天月德增福之神，男女都可以通用。
<p>那么现在解释神煞，同解释十神定位要复杂一点啰！譬如天德贵人在年，幼年家福好。天德贵人在月，中年好。如果日干自己就是天德贵人，就是你自己是有福之人。如果时柱天德贵人，晚年你可以得福。那么到底哪一种比较好？以当事人讲，或者以我个人认为最好是日干坐天德贵人，年龄上三十一到四十五岁。神煞算命可以超过十神算命，因为它是個特色。那么有贵人的人，一生不会有大难，连坐牢都不会，马上可以交保。命带天月德贵人的人啊，通常不会有什么坐牢、发生大车祸等等，通常都不会的，很少人能命带天月德的。那么我不要拉得太长了，带一个六亲好了，天月德在四柱啊！四柱是管年限的，譬如我举个例子说，年上正官带天月德贵人，对女命讲，这个年上这一柱只管一到十五岁，十六岁过后就没有这个贵人了。
<p>然后呢，要讲到十神了，正官对女人讲是她先生，年限是过了，但带着这个十神，只要这个女人一结婚，一直到她先生走，贵人都在的。各位有没有听清楚？神煞第一个是年限，第二是六亲，那么这是很正常的解释。如果反常一点来解释，不是每个人都可以一夫一妻到底的，中间有离、有散，甚至于说私生活比较乱一点的，她也是正官坐天月德贵人，那么这个解释法，就有点不一样了。刚才解释为先生，现在解释为男人，我管妳三嫁、五嫁，妳有几个男朋友，我都不过问，但是任何一个男人对妳都是有帮助的。算命是论实际的，不谈一般性的常情的，每个命都不一样，贵妇人可以找我算命，风尘女郎也可以找我算命啊，所以必须范围要宽！那么这个贵人是这样子解释的。
<p>然后真正要体会到的，就是神煞除了它本身的意思之外，还要注意到年限，还要带住这个十神，所以这个就比较谈十神定位要复杂一点，这就是天月德贵人。但我还没讲到底给你带多少来啊！这个复式的呢，等会我再讲。什么叫复式呢！可以先举个例子，天月德贵人带在正官，解释为这个男人给你很多钱，这只是当时而已，各位在报章上也见过，你拿了男人两千万，后面可以给你带个大麻烦来的哟！那是另当别论了。所以我们只解释前面这一个，然后我把贵人一起讲完。</p>
</div>

 NM:`<h1>女命 </h1>
<p>那么现在是专门一个题目叫女命。在研究八字有基础条件之后，研究女命为第一优先，为什么要先研究女命为第一优先呢？这就是男女人生态观的不同，女命是家庭为主，先生、小孩是第一优先，这是结构性的问题，另外还有一个原因就是或然率的问题，我说一个男人做生意失败六次，甚至于破产、坐过两次牢，他最后成功了，这个男人还是成功的男人。那女命就不行了，女命不能说离婚离过五次，第六次成功的，这个不行。所以女命的婚姻大概只有一次或然率，最多两次。三四次以后，她自己都失去信心了。所以对女命啊，在这种情况下输不起。男人破产可以再来，因为这个生态问题，决定一个人的人生观，没有钱，可以借，没有先生，不可以借啊！所以，就女命在算命方面，好像比较小气一点、窄一点，所以优先讲。
<p>除了来算命女性人数多以外，这还不是最主要的原因，就是我刚才说的结构性原因才是真正的原因。那么第二，讲十神定位、取格局，要不要，是无所谓，听听就好，有书也可以，没有书也可以。一旦讲女命就最好要看书。为什么道理呢？各位听命理初学的，可以听我讲啊，到最后是不行的，我能讲多少，总有书本上遇不到的。
<p>各位能体会到，命是很难懂的啦！其实并不是难懂，那么多术语看不懂，一行都很难懂。那么各位现在已经有五行的底子了，他们说命书是天书啊！现在对各位讲应该不是天书。命书里面有古文，我讲的不是現代人寫的命書，指清朝以前的命書，有一個很特別的情形，古書它沒有標點，要你自己去念的，念都念不懂。
<p>所以我現在一方面是講女命，同時也是幫助各位開始讀古書。按一般性總平均標準，一年以後，你就不要聽什麼人講什麼東西了，自己去買古書看看，看古書可以看三、五年都看不完的。所以現在練習看書，也是我介紹女命。
<p>那么这篇文章呢，是我编写的《女命详解，女命通会》合订本》里一二五页之后，那些文章都不是我写的，我从古书中摘过来，那么第一篇是出于《三命通会》，这本书各位一定要到书局去买。《三命通会》是明朝万育吾写的，他是个进士，是他所编的。他把当时有名的命理书统统收集起来，就叫《三命通会》。里边有部分讲女命的。
<p>这篇就是出自《三命通会》。为什么把它列在第一篇？各位要知道古人写文章，有两大类，一个是文章漂亮，但内容未必好。一种是内容真实，文章写的不好。那这篇文章的比较折中，内容同诗句都有一点够标准的意思。大家也可以看原文，没有原文也可以听我讲。
<p>他说女命经典集萃，这是客气话，命里没有什么经典的，不是四书五经，没有这东西，也就是说古人讲：凡观阴命，先推夫子兴衰，阴命就是女命，你每逢看女人的八字先看什么呢？夫、子分开念的，夫、子不是老师不是老夫子，是先生和孩子。兴衰，旺还是绝？一讲到兴衰，大家都会记得，就是前边所讲过的十二生旺库，兴就是讲禄旺，衰就是讲胎绝。所谓夫、子兴衰，比如有位小姐或者太太是甲日主，那我当然先看她先生、儿子好坏了。一起看还是分开看，要看她年龄了。三十五岁之前，先生优先。五十岁过后的，小孩优先。那以前我们所讲的那些食神、官杀各式各样，各种讲完了，现在综合起来讲，离不开人之常情！问先生好坏，各位想一想，这个题目对应该看那个女士是几岁啊？当然三十岁以前就定终身了。每一个女人都希望一嫁过去就是夫人、享福、条件好，二十几岁就嫁好了。
<p>在这种观念之下，就引发我们对八字的决定性了。那么问的是二、三十岁女性的先生好坏，要以哪一柱为主？当然是以月柱为主。那么我现在一路连下来。甲日主妳问先生，哪一个神是妳先生呢？正官、七杀，天干来讲就庚、辛了，金克木，克我者为官杀。妳整个八字天干、地支有庚、辛，代表妳有先生，在年月日时代表的是时间，不代表有钱、没有钱？妳的先生好与坏要比重。那么就用得上十二生旺库里面的庚辛旺在申酉、绝在寅卯。
<p>甲日主生长在申月、酉月，就是秋天啊！那就先生条件高、很有办法，旺啊！如果你生在寅月、卯月春天，这就夫绝了嘛！就是你先生没有办法的咯！那么就决定掉你三十岁以前的夫星条件了。各位有没有体会？甲日主，克我者为官杀，克我者就是庚辛，有没有是看你四柱有没有庚辛？有没有办法就看旺绝。甲日主庚辛为夫，生在申酉月，庚禄在申、辛禄在酉先生有办法。生在寅月、卯月，夫星坐绝，就没有办法。
<p>那什么叫有办法？什么叫没有办法？我从宽讲，大概拿七万块钱做标准呢，一个月七万块以上叫当令，三万块月薪以下的，那根本就没有先生了，结婚结不成的，都是坐绝的。为什么用月上来做比喻，的，两三岁就给你定终身了，这个时代没有这回事的，就算很特别的，十五岁谈恋爱，这种事不会长，所以不列为常数。
<p>欲究荣枯，次辨日时轻重。这是第二句话。什么叫轻重？刚才月上，是平均概念，不是算命的实务，那来的那个太太不一定是三十岁之前，譬如她就三十五岁了，她问的是现在的啦！来论命的人通常是有事情的，没有事情她不会来问的，那么她现在三十五岁，要看什么呢？要看自坐的支啦！日主自坐的。譬如甲申日，当然是夫旺，如果甲寅日夫绝。这个绝是讲三十一岁到四十五岁，这样往往算命就很为难的。
<p>你月上旺、日上不一定旺，你月上绝、日上旺，我倒可以讲啦！那么这要看情形的啦！所以一般性谈论命，不会同她谈很多了，就是谈眼前。比如一个人甲日主生在寅月，而且是甲寅日，在理论上讲三十岁以前结婚是没有用的。三十岁过后，你就过旺，也就是先生没有办法了，这是真正的答案了。那会考虑到人情问题的，通常都会说：不要早婚，早婚对你不利啊！那么以当事人讲，过了三十岁结婚，通常都不是当事人的真正本愿，没有办法了，拖过三十岁，也只好如此了。
<p>所以说要分日时轻重。轻重除了先生好与坏，还要带着当时的那个感受。以人之常情，我再举个例子讲，甲日主生在申时，讲轻重是一样的，那是指你晚年的先生有办法，但这个对我们算命讲，思虑会加入很多多余的想法啦！那你能够一夫一妻从二十几岁一直熬到六十岁，你先生发财，我会那么想吗？
<p>不会啊！我倒反而会说：晚年发财的先生，不一定是妳年轻时的那個先生啊！问题就复杂了。从另外一个角度看，就算妳是贫贱夫妻，一直熬到六十岁先生发了财，我嘴巴是不说了，恭喜妳啦！我心里有点替妳担受了，妳都六十岁啦！先生才发财，对妳来说也是失之晚矣。钱是好事，恐怕会有其他问题啊！
<p>所以算命要看日时轻重！一个八字本身要结合当时的轻重和以后的角度上看。如果假定说一个四十几岁、五十岁的女人，她问我：妳看我晚年会不会孤独？我们很会听话的，一听这个话，就是她现在就很孤独了嘛！晚年再孤独，这倒变成好事了，「放心，保证妳晚年一定有！」这是讲玩的，不谈过去的啰！如果三十几岁的女人她来问，她时上夫星当令，很不好讲，往往就论事啦！因为这个就算最正常的，她还要等十五年啊！我嘴巴讲十五年很轻松，对当事人讲，不要说十五年，一年半都很长啊！大家除了听懂我的话，还要懂它的理论。那么到现在你们就体会到了，为什么算命一定要把四组规则背熟，缺一条都没有办法。旺绝有没有？以及时效问题？那么看日时轻重？这是讲条件的好坏。那么算命有两个层次，一个质、一个量，妳先生有没有钱是一回事，每一个人都希望自己先生赚大钱、做大官，这是条件啦！还有一个什么呢？就是谈得来谈不来？又是另外一回事。有钱，但他三妻四妾，或者跟妳是个冤家。另外，没有钱，但是对妳很恩爱。

<p>现在就要讲孩子啦！女命是以夫、子两件事情为人生之主要目标的，那么以人之常情，讲到先生，总希望在三十岁以前就过好日子。那么讲到小孩就不同了，一个女人她能够看到她的小孩子有成就，不要说有多大的荣华富贵，很好的学校毕业，很好的职业，就仅仅如此的条件，这小孩子总得过二十五岁以上，对女命讲恐怕也得五十岁了。所以女命论子女以时支为标准，时支是五十岁以后。我们还是以甲做比喻，甲日主我生者为食伤是子女，我生就是火啰！木生火，一样比照十二生旺库，火旺在巳午，绝在亥子。

<p>如果印星出现在年柱，很简单地只解释为母亲很有办法；如果在月柱，可以说你很聪明稳重；如果在时柱，也可以说你有才学。但对女命来说就不一样了！印星克制食伤，女命最怕日支坐印星！即使你子星旺、食伤旺也不行，因为印星会克制食伤。那么由此引申出一个不成文的规定：印星代表文学、艺术，越是才学高的女人越不会带孩子，可能也有这种成分在里面。如果论及子女，印星克制食伤对子女不利；如果你问才学，就是论才学，与子女无关。就事论事，命理上没有面面俱到的。所以我们在实际算命时，妻财子禄寿这几样，你能拥有其中一样，也就不枉此生了。就怕是一样都没有，那真是有点虚度人生啊！这里既讲到父母，也讲到印星克制子女。

<p>各位试想一下，日主旺就是临官、帝旺就是比肩、劫财，因为支藏天干里就是比肩、劫财。官杀克比劫，你那么多比肩、劫财，官杀怎么制得住你呢。所以日主不宜太旺，太旺了，就算你有钱，你也是不满意的。那么这是在——自古说了：女子无才便是德，我也并不很同意的啦！少想一点，比较有福。

<p>女命官杀混杂，有没有算琐碎有钱包括在内呢？我倒没有注意，因为女命所关心的都是婚姻第一啦！也许也有相同的现象我不知道。所谓为人安得祯祥，不是吉祥，你就有钱，好比一个女人离了三次婚，每次离婚都有钱拿到，总是不能算祯祥，只能算有钱。那么这一条叫官杀混杂。
<p>官星无别值一德，当两国之封。这是下面一条，官星若逢天月二德，那是非常好的一件事情。天德、月德在神煞上有讲过，如果天月二德加到正官上，就是你的夫星可当高官。我在讲天月德的时候，稍微有讲过一点点带官星。现在讲官星带天月德，首先不管你四柱，这只讲官星，如果本来正官在年，从格局讲，没有关系的。
<p>如果六亲讲，正官在年带天月德，只要你一有先生、一有男朋友，这贵人就发生效果了。所以贵人带在六亲解释，没有年限之限制，也没有法律问题。先生也是男人，男朋友也是男人，随便你怎么解释法，它就是一个对象，都是对你有好处的。若官星坐贵人且没有冲合冲、样样都好，那就真的是你一结婚，福气就来了，一直到他死。那么这个女命啊，夫星同小孩一样解释的啦。
<p>现在我们反过来解释了，如果食神、伤官带天月德，照正常的解释，就是你的小孩带天月德，我刚才讲食神伤旺是讲旺不旺，这带贵人就不同了，食伤坐旺是儿子自己努力，从科员、科长、处长，一路慢慢升。如果食伤带天月德就不一样了，根本就不需要按部就班升迁的，忽然之间掉下来，在清朝讲是异路功名，莫名其妙的路线，就容易懂了。就以前考试，考中进士，好比你是御医，把皇太后病医好了，马上就是进士了，这就是天月德。所以你的食伤带天月德，就是你的小孩将来有办法，这种解释法是从最正常的情况来的。
<p>如果你食伤带合、食伤坐绝、食伤带冲、食伤带印，这个食伤原本站不住的嘛！然后它一样带天月德，还是可以为你带来好处的。我们首先讲正常，就是你食伤带天月德，一有小孩，你先生对你好得不得了，将来你的小孩也有办法，也可以享受他的福气。反过来讲，刑冲合会也带天月德，这里有个比喻，只能意会啊！你同一个男朋友有了小孩，他叫你拿掉、你不拿，两千万、五千万，因为有了这个小孩嘛！那你也可以得到很多好处啦！这种只能当比喻听的。不论你正常还是不正常，食伤带天月德，你都是能够在小孩方面得到好处。
<p>各位学算命要懂得以此类推，反过来讲正财、偏财带天月德呢？那是男人的啦！那么你的太太，你的女朋友都会帮你忙啊！听起来不正常，在商业的立场讲，没什么不一样，甚至于说，比肩、劫财带天月德，一样对你有好处。你们有没有看过人家做生意，还没谈生意，先请客、先送礼的，这也可以谈得成，也可以谈不成。
<p>如果比劫不带天月德，白丢钱，比劫带天月德，请客送礼的这个效果大。所以天月德加到任何一种地方去，包括六亲包括年限，统统对你有大帮助。好命人除了格局旺之外，还要带贵人。上课的时候，我问学生一句话：人哪！辛劳而得好呢？还是不劳而获好呢？到底哪种好？我没意见，我可以在理论上说，格局好、财官旺，这是辛劳而得。如果你带贵人、有调候用神的，可以不劳而获。我讲过程的啦！两种到底哪种好，我没意见，各人去按你自己的背景来推测。所以是官星带月德就有那么大的好处。
<p>就我刚才讲的两段，一段讲的是官杀混杂，一段讲的是官星带月德。那么七杀带月德也是一样的，不一定是正官。所有十神只要带天月德，都是对你有帮助的。那么下面一句就比较复杂一点。
<p>用杀不可逢官，用官不可遇杀。这用字啊，在算命里面叫用神，这是专门一个题目。在这个地方用就是讲格局，用官不可以遇到杀，就是天干有正官，地支有正官，天干不要见到七杀。用杀不可以逢官，天透地藏是七杀格，你不要再带正官。我刚才讲的官杀混杂是没有根的，都是在天干的。那通常我们都是指没结婚以前，不管你几岁，换男人就官杀混杂啦！一旦有了根就不同了，用官你是正官格，那怎么带杀呢？这个就等于说即便你没结婚也有固定的男朋友了，你又遇到其他的男朋友，这个麻烦就大了。那么在命理上解释，还不止如此一点点的意思，譬如月上正官格，七杀在前面的，或者月上正官格、七杀在后面的，大家有没有听懂啊！
<p>正官格在月的官杀混杂，一个在年前面、一个在后，这种解释法，月上正官是她的正配，那个七杀是外面的。他在正官之前的，她这个男朋友是在认识先生之前的男朋友，有年限的。如果正官在月，七杀是在时，那么她的男朋友是以后她认识的，那么到底留下？留不下？这是讲已经结婚的。那么有种情形，她来问：我现在有两个男朋友，一个前年认识的，一个去年认识的，对我都很好，你看我嫁给谁啊？她会嫁给后边那个，因为正官在后，七杀在前。有根那个是在后！大家有没有体会，这是问婚姻的，已婚之人来问我的很少。未婚之前来问：我现在有两个男朋友，一个去年认识的、一个前年认识的，拿不定注意嫁哪一个？都有关系的。那么前面认识的、就第一个它没有根，后面认识的第二个认识的正官它有根，所以她就嫁给第二个。
<p>这是就纯理论上讲，真正算命不会管闲事，管到这个程度上的。那么如果反过来讲呢！官杀一起都有根了，那就麻烦了，一个叫官杀混杂，一个叫官杀争强。譬如一个女孩子，天干官杀混杂，七杀、正官地支都没有根，鬼混鬼混、瞎闹瞎闹就算了。如果地支有根的，瞎闹完之后会留一个，不管留哪一个，都是留一个。
<p>如果正官、七杀地支通通有根的，这个不叫官杀混杂，这叫官杀争强，也就是我们看到报纸怎么样，一个女人两个男朋友，两个都不放，会出事的。最怕就是官杀混杂地支都有根，那是很麻烦的一件事情。所以用官不能逢杀，就是正官格不要带七杀，七杀格不要带正官。那么一旦官杀混杂起来，只有一个办法，就是合杀留官或者合官留杀，一个把七杀合走，解决掉，处理掉。或者七杀格把正官合走，有过麻烦，但是可以善后处理。
<p>那么这个女命最忌讳的官杀混杂，倒不是你夫星强或者夫星弱，有钱、没有钱是一个生活条件问题，那如果带冲，带冲并不是只是你这个夫妻，譬如日月逢冲那个三十年，当然把夫妻算进去，但是它讲的不仅仅是夫妻，全部在内啊！妻财统统在内。
<p>所以日月带冲，婚姻也不好，那是因为环境不好，而影响夫妻感情不好。如果单单官杀混杂、夫星坐绝的，与环境无关，只不过是妳男女之间的感情问题。那么合杀留官、合官留杀，可好、可不好，如果官杀混杂，合走一个，妳把后来男朋友赶走也罢，妳离婚再嫁个新的也罢，总得弄个干净啊！如果不是官杀混杂，是官星带合，这解释就不一样了，妳的先生就不是妳一个人的啊，他是共用的啊！就等于先生外面有什么、什么这些问题啦！所以女命头一个重要之事就是不要官杀混杂、夫星坐绝，日主不要太强。再讲另外一个题目。
<p>财重叠，婆年早丧。古人算命除了看你夫妻和好不和好？还要考虑到你跟公公婆婆合得来？合不来？这个限制当然已经没有了，然后还是有点连锁关系，有很多太大上了年纪，她儿子已经大了，拿儿子一个女朋友的八字，你看这个小姐怎么样？照她的意思不过是合不合？能不能久长？不过是这样子。那么我会考虑到一点，就普通人讲，克不克公婆啦？如果讲得通俗一点，就是跟公公婆婆合得来？合不来？婆媳之间如果有点小问题，人之常情啊！就是不要发生严重问题。
<p>财重叠，财就是正财、偏财重叠，非常之旺，而且十五年啊，对母亲最不利。财克印的嘛！这一条普通公式，我们要知道，如果对男命讲月上财旺，以一个妈妈讲，我儿子有办法，对我好坏无所谓了，这是母爱啦！那么如果在理论上讲，妈妈也是印，出嫁以后，婆婆也是印啦！那么财克印，这个女孩子财当令、财克印了，在家里对她妈妈就不合的，她妈妈是有亲情在的，什么都可以接受的，婆婆就未必了，所以说婆年早丧，这是最严重的，最轻的就是跟她婆婆谈不来。并不是她婆婆，只要是她女的长辈，她都谈不来。
<p>所以遇到这种情形呢，我们就会对那个当事人，就是拿八字来的那位，我就跟她建议了：这个女孩子不错的，也能帮忙赚钱的，不过最好不要住在一起，住在一起话就多了。所以财重叠，婆年早丧，女命对那个财不见得是好事，女人的钱，要先生有钱，老爸有钱，不希望是她自己赚来的钱。女人会赚钱是个好事，她也会骄，一个小姐一个月八万块，这先生就不好找了。那要找月薪十万块的，就很难找。
<p>那么这条公式规则，财重叠，婆年早丧，只要财旺，第一个条件，公公婆婆不放在眼里了，我一个月能赚十万、八万，公婆能放在哪里呢？同样，包括先生在内，如果你的待遇比她少，那她会有其他的想法啊！那么叫财重叠，婆年早丧，也是财坐旺，婆年早丧。这个是一条。
<p>另外一条，牵涉到日主强弱，刚才讲的日主强弱，是有志气，或是她什么也不想。现在是往深拉下 去一点，日主强的女人能办事。刚才不是说女人不要赚钱，这是讲的是财务，因为命理不是现在才有的，帝王时代就有，我相信各位都知道红楼梦里的王熙凤，那要管很多事的，她不是只管一个先生，还要管一个大宅院几百人啊！过个年每人做一套衣服，谁该送多少礼？光这件事情就够她搞半天的。要日主强的人，才能管很多事情，日主弱的人，什么都不懂，再有钱也不懂。
<p>我有时候举个例子，我们看戏——一个夫人后面站四个丫鬟，每人手里拿个盘子装点心，很威风，人家请问夫人啊！这件事怎么办？她什么都不懂，回过头问丫鬟了：那妳们看怎么办？这就是身弱。身弱对普通人来讲，不给先生找麻烦是好事。对大户人家讲，身太弱了，又不能管事，那怎么办呢？强又不好？弱又不好？那么照现在讲，就取中间。什么叫中间呢？我举个例子：甲禄在寅，绝在申，有了寅嫌太强，有了申嫌太弱，只要没有这两个字就刚好。强到不会干扰先生，弱到不会应该享的福享不到，就中庸。中庸就是没有临官位、也没有绝位，这就是中庸！这叫日强能管事，日弱不管事，那么这是一个强弱的问题。
<p>贵人乘驿马，决主风尘之美妓。再下面一点，同贵人有关了。就是贵人坐驿马，驿马大家都知道是跑来跑去的，在神煞的时候，我们有讲过，女命对贵人本来就喜欢天月德，不要其它的贵人。贵人在年没用，在月、在时是年龄问题，三十几岁、三十岁之后，贵人坐旺帮大忙，贵人坐绝、帮小忙。贵人带冲、恩将仇报。贵人带合，他不只帮你一个人，找他帮忙的人多得很。女命最忌讳贵人坐驿马，那贵人会跑来跑去的，今天帮妳是这个贵人，明天帮妳是另外一个贵人。如果男命就无所谓了，随便哪个来帮忙，一天换五个都没有关系，只要帮他忙。
<p>那么女命贵人坐驿马，就不是这么解释了，这个帮忙、那个帮忙，除非你是电影明星才可以啊！普通家庭主妇就会搞出麻烦来的。所以说贵人坐驿马，会搞出很多风韵之事出来，跑来跑去的。这个驿马本身是动的，至于什么东西坐驿马要看上面那个字，譬如说正官坐驿马，你先生会跑来跑去。正财坐驿马，你的太太很勤快，比劫坐驿马天天在外面请客吃饭……等等，这里特别讲的是女命不喜欢贵人坐驿马。</p>

 NM3:`<h1>女命（3） </h1>
<p>下面一个呢，讲的是合多贵众。
<p>合多贵众者，婚姻而多贱多情。命理上有很多道理，可以用在男人身上，不能用在女人身上，合多三合、六合，男命没什么关系，三合、六合有什么关系？合多这件事真正的意思是有人缘，同你也谈得来，同他也谈得来，这是好事情。那么女命就不行了，女命一个三合，就不能再带六合了，最多只能带一个，两个的话人缘太宽，这个也谈得来，那个也谈得来，最起码妳也不只是拿个菜篮买菜，多少有个业务是在外面做的。
<p>女命不宜合，女命有首诗：生日哪堪合上宫，外容尊重非真实，女命不宜合，一合的话外表的庄严是假的。那么贵众，贵人多，我们男人怎么合都是好事，多少贵人都是好事。女命就不能这样论，合多、人缘太广，除非你是电影明星，需要人家捧场。贵人一个就好了嘛！七八个贵人那就搞得很麻烦。贵人不要多，那个合的不要多，合多贵重对女命来说不是倒霉，钱是有的，家庭、感情生活就不是那种一夫一妻到底的啦！你说办什么事、找什么人、要赚多少钱很容易，但是一般女人呢，重点不在此，她只希望安定的家，小孩子好，所以合多贵重，生活形态上是不好，再下面问题就是桃花了。
<p>官星带桃花，定为深院良人。在神煞上讲过桃花，当时说只要桃花不克你，就没什么大问题。现在对女命讲桃花，就要讲得比较细一点。桃花对女人讲啊，不管怎么解释都是不好的，但是有一件事情是好的，就是正官桃花。书上讲正官桃花福禄夸，七杀桃花走天涯，什么桃花都是坏的，只有正官桃花是好的。那么桃花还是桃花啊！
<p>为什么正官桃花是好的呢，因为条件高。譬如我们现在说一个二十岁的小姐，她去跟一个年纪比她大两三倍的男人，那人家会笑她的了。这也未必啊，要看那个男人是谁啊！如果是商业钜子，那就不一样啊！西宫娘娘就是小老婆，但先生是皇帝啊！妳跟着个商业钜子，这叫一人得道鸡犬升天，妳全家大小统统跟着一起，住豪宅、出门是名牌汽车，人家非但不笑妳，还都说好命啊！那么这就是正官桃花福禄夸、深院之良人。深院就是现在讲的豪宅，所有桃花只有正官桃花是好的，那是条件问题。那么其他桃花都是不好的。
<p>在不好的中间，也有学问的。我们在神煞的时候，只讲到脑内桃花、脑外桃花，那么现在解释要再宽一点，一个叫外桃花。今天我表上查出来，寅午戌见卯为桃花，申子辰见酉为桃花，从十二生旺库表查的，这是沐浴桃花。什么叫外桃花，就是子午卯酉日生在子午卯酉时，子日生在卯时，或者生在酉时，酉日生在午时，酉日生在子时，两个都是子午卯酉，这是四正。那么子午卯酉日生在子午卯酉时叫外桃花，不是脑外桃花。
<p>不是你本分里的叫脑外桃花，这个外桃花意思就等于说，我用比较好懂的话说就是不甘寂寞，她不是为了钱，有个不恰当的比喻：船员太太一年都没看到先生了，结果发生这种事。这种比喻法还是正常的，可以从很反常的去想的，就是外桃花，不能够承受太久的寂寞，就是子午卯酉日遇到子午卯酉时。
<p>并不是贪财，都不是的，叫外桃花。
<p>另外有种叫做裸形桃花，各位有没有看到马路上有穿的很暴露的，这同私生活无关啊！她就喜欢穿的很明显就是反常的啊！她也没什么动机，也什么恶意，就是那种生活习惯，叫裸形桃花。

 NM4:`<h1>女命（4） </h1>
<p>那么现在呢，我再讲另外一个题目夫星坐绝：离婚、死先生等等，都是正常的，还有一种，各位有没有想到，不是死不死的的问题了，她根本就没有结婚了。譬如一个老板，同那个女秘书在一起可以二十年，这是什么呢？同居都谈不上了，同居是有房子养妳在这个地方，连这个条件都没有的。有空在一起出出国，对外又不能讲，这叫夫星入库。夫星入库，你的先生是摆在抽屉里的，拉开来看得见，关起来就没有。夫星入库包括同居，包括小三啊！那么也就是不是一两天的，一两天是桃花啦！时间蛮长叫夫星入库。
<p>夫星入库与夫星坐绝不同，夫星坐绝是条件问题，夫星入库是形象问题。这个"库"大家要记住，在十二生旺库中就有生旺库，库指的是辰戌丑未。按顺序来说，寅卯辰，辰是最后一个字。那么三合呢？申子辰，辰也是最后一个字。库是从三合来的：申子辰三合水，水库叫辰；寅午戌三合火，火库叫戌；巳酉丑三合金，金库是丑。这样讲是在背公式。如果问到算命，比如庚日主，庚日主的丈夫是什么呢？是火。如果生在戌月，火归库了，那你丈夫就入库了。
<p>比如巳酉丑，丑是金库，甲日主生在丑月就是夫星归库了。你的先生归库，看归到哪个地支？在月青年，自坐中年，时支是晚年。夫星归库同夫星坐绝不一样，我再举个例子讲：金日主火为夫，生在戌月，寅午戌火库，这夫星入库。金日主以火为夫，火绝在亥，妳生在亥月，这叫夫坐绝。

<p>那么从这个八字就体会到了，那才真正进入实务算命这个阶段。但实务算命不会算到这个地方去，所以我说我那位同道，劝我不要补，补下去的话太缺德了，算命不算这个也就能了。这一段大家有没有体会到，那么我说算命不公平的，确实不公平，单单讲财荣华富贵还可以，一到生死就是不公平，另 有一种天意。那么我再举个例子，两个八字排在一起就知道了，这个诗不是我写的，八字我是照它的话造的。两个八字一比，第二个八字不是甲日主，是乙日主。
<p>乙庚月金正疲，连向西方夫得时。丙子不来金水好，东方运乙贵分之。这是乙日主，怎么讲都没有死先生这条。刚才甲日主丙辛合，死先生啊！这个乙庚合，不死先生啊，贵分之，分给人家一半能了。所以你说夫星带合，到底是把先生烧掉了？还是把先生给分走了？要个案处理，以平常解释，都是指妳夫星被合，那我把它内容解释一下。
<p>乙日主庚就是她的丈夫，生在夏天，金正衰弱，火炼金，这个铁放在火上面一定会烧红，甚至熔化。所以乙日主生在夏天，金正衰弱。我们刚才只是讲那个夫星坐绝，坐绝是生在春天，庚绝在寅，生在夏天的五行性，火炼金啊！五行性现在还没谈到，讲得宽一点，庚日主生在午月，这个人麻烦得很，一辈子都是麻烦事啦！火炼金，金正衰弱啊！运向西方夫得时，西方就是庚辛申酉金，那么从一个女人的命可以看出她丈夫走不走运的啊！这是讲正常的夫妻。
<p>那么乙日主生在午月，如果你有申酉大运，你的先生就走运了。如果走寅卯大运，先生就不走运，你的先生先天就没有办法的，不当令嘛！如果你生在申酉月，先生先天就有办法了，决定在那大运方面。丙子不来金水好，丙子跟庚午是正冲的，月柱不要冲，金是生水的，那个是夫星的道理啊！东方运乙贵分乙，就算你的先生带合，也不会死人。所以我们算命，如果一个乙日主的女人来问你，我先生现在有病，会不会很严重？我根本不考虑他的年龄问题，除非六七十岁以上。我倒担心你前途怎么样？
<p>乙日主的女命只有婚姻有钱、没有钱，分离离，没有生跟死这个过程。甲日主的女命，就不一样了。如果你出生在夏天，那就会把你那个夫星给烧掉！我稍微讲深一点，看各位听不听得进去。那乙木生在夏天不是一样火炼金吗？辛为夫是火炼金，庚为夫也是火炼金，不一样。辛为夫是丙辛合，庚为夫它不合的、直接克的，合克比单独克来得凶。
<p>我曾经听有一位朋友讲，他说没有人能骗到他的，只有他的朋友才能骗到他。所以合克比单克来的厉害。丙辛合是合克，丙庚只是克没有合。所以这两个对比，合克比单克来的重，所以算命细节就重了。我举这两个例子给大家看啊，就体会到算命里面公平中间有不公平，那么它一共只有七句话，总共应该有一百二十句，那么这个问题是照它解释了，我们不需要解释那么深，我们就把它当作普通八字看好了。不谈她先生死不死，就算你算不出她先生死，你还可以给她算别的。我们再拉回去，前面一个八字：
乙酉
丙寅
甲寅
辛未
先不谈先生死不死，把它当作普通八字看。
<p>第一，年上是正财，通根到时支。不谈生死，那么这个人初生家里就有钱，一直到晚年也有钱。
<p>第二，年支酉，是正官，正官通正官，如果在清朝讲，应该是家里边替她订的婚姻，门当户对，家里也有钱，对方也是有权势的。现在没有门当户对这件事了，那怎么解释呢？她的男朋友啊，十五岁妳就认识他了，不是邻居，就是国中同学。因为妳是正官通根到年支，解释为妳的亲戚、邻居、同学也可以，各位有没有体会到？这出身问题同年有关系，因为妳后面的辛被合走了。
<p>第三，丙火月干食神，寅是甲丙戊，食神通根在月支，那么是食神格，女命食神是小孩，那这个女人很早就有小孩的，那么刚才说丙辛合在夏天把先生化掉了，如果不谈那个层次，丙辛合，先生、小孩妳只能有一个，它合走了嘛！甲寅这个寅字，刚才以食神讲的，甲丙戊，通根食神的，那么现在换到日主，甲禄在寅，身很强、很有自己的见解。
<p>那么女命身强没有用的啦！她的先生呢，庚辛绝在寅卯，就是前边讲的夫星坐绝，如果你不是丙辛合呢？只不过条件比较差。丙辛一合，就把先生熔掉了。所以甲寅是木虎，四个孤鸾日之一啊！出身是好的啦！夫是弱的，但是她靠家里就可以啦！正财通根到时支，所以晚年也是有钱的。
<p>这个八字按照普通的论法，年上正财通根到时支，家里钱财可以用到晚年，酉就是辛，辛是丈夫，年支通根到时干，她的丈夫是她童年就认识的啦！丙寅这叫食神，食神可以生财的，这个女人很厚道，甲寅自坐临官，又是夫星坐绝，大不利于夫星。时柱辛未，财通根到未时，那么把这个八字当普通八字来论。如果特别论法，就是丙辛合，强火炼金，丈夫忽然之间死亡。这是这个八字的两种讲法，第一种讲法太刻薄，第二种解释法是可以的。就是家里有钱到底有，丈夫是坐绝的，自己身很強，儿子是食神生财，很早有小孩。
<p>那么我们先把会死先生的问题暂时搁置一下，为了让各位理解一部分实质算命，譬如我刚才所讲的那个，包括以前讲的女命，都是依据《三命通会》讲的，命书并不是只有《三命通会》这一本书，还有其他零零碎碎都要拼起来。现在我再举个例子。
<p>庚寅  
甲申  
戊辰  
丁巳  
这个女命的八字，不是我批的，是古人已经批好的。这个八字有七个男人，这对普通人来说已经算是很不规则的了！那怎么会这样呢，我给大家做一个重点的介绍。
<p>第一个很容易看得出来的，庚寅年、甲申月，冲刑方面年月双冲，对女人讲，三十岁以前无论如何都可以解释为家里没有钱，嫁的男人也没有办法，每件事情都不对头。如果拿现在社会解释法，是个太妹，出来混的啦！倒也可以解释得通。所以年月双冲对这个八字，本身就是幼年有很麻烦的事情。那么双冲呢？谈得来谈不来那都是另外一回事啦！看十神，比肩、劫财，年干庚是食神，地支有没有庚？有，申就是庚，巳里也有，这是食神格。各位要连带着看到双冲啊，食神格就冲掉了，不仅仅是一到三十岁，小孩子全冲掉了，食伤是小孩！年限讲是三十岁，格局是食神，食神带冲，你一生的小孩都是带冲的啊！甲是七杀，地支有，年支七杀。
<p>那么这个八字很好懂的啦！年月双冲对时间上讲，一岁到三十岁，对亲属来讲是小孩、先生一起冲，又是格局，主冲一辈子。这个就很严重的啦！先天出了大问题。那戊辰、丁巳，这种冲法直到三十岁，就算有事后之影响，大概拖个十年也就过去了。有一种冲刑会发生影响的啊！所以我们算命里面如果你走四步坏运四十年，再走好运也没用的，船打斜掉了。那么这个年月冲三十年，从你出生就没有好过，一直到三十岁，那三十一岁就能好吗？就算好也不行的啦！天下了雨了，地面两个钟头都不能干的。那这应该十年、八年总可以平静了吧！那为啥批下来有七个先生呢？那么有关键啦！
<p>今天在这个地方给各位补充新的资料。有四个字诸位一定听过：天罗地网，一听就很麻烦的啊！地支戌亥叫天罗，辰巳叫地网。男怕天罗，女怕地网。要日时啊，倒过来也可以。在我一生中间，我已经八十二了，从来没有见过命带辰巳的人，可以有好婚姻，一个都没有。那么她年月带了双冲管三十岁，日时带了地网，就算不冲也没有的啦！所以说这个八字，古人批出来知道她的婚姻情形，七个。各位同道，就算你看不出她的婚姻，日月双冲，婚姻不好总看得出来吧。你七杀逢冲，夫星逢冲，子星逢冲，那怎么能好呢？所以一个命，如果谈细节不容易，谈个重点，还是很好懂的。
<p>那么这个八字我就补充上一句话，天罗地网。经常遇到这种事情。再介绍一个八字：
庚午
甲申
戊申
戊午
也是坏命。这个坏命容易懂的，戊日主以甲乙为夫，生在申月、申日，甲乙绝在申酉，夫临墓绝，三十年夫坐绝，那怎么能有好日子呢？一个申月就够了，戊申土猴嘛！就是我以前讲的孤鸾日，戊申土猴又生在申月，一拉住三十年，从她十六、七岁开始，一直到四十五岁夫都坐绝的。一个女人能有多少青春啊！
<p>这两个八字能提供一个新观点，刚才讲的是地网，现在又多一条补充给大家，戊申戊午，天干相同的，午申拱一个字未，也可叫夹，暗拱、暗夹，一样有十神的，不过是被藏在暗处了，那么这个未字，你就联想了，亥卯未吗是木库，拱个木库，单说木库没有吉凶祸福的，但这个八字就不同了，木是她的先生，先生入库了，夫临墓绝老困娇娘，前面是夫临绝，甲申，拱个未——夫库，前面坐绝、后面夫星入库，库还分明库、暗库，如果不是拱出来的，大家都知道你是某人的小三，你是拱出来的，是谁的小三都不知道了，变成暗中之暗了。大家有体会啦！
<p>所以这个夫星坐绝，后面拱未，前面讲那个八字不好，一个是年月对冲，冲三十年，后边是地网，就是穷的，你有什么办法？先天的。后面拱个未字，明见未是夫星的库，人家知道妳有个没结婚的男人，妳拱出来的未字，人家不知道的。所以两个婚姻都不好，谈内容跟过程都不一样，所以各位在这两个八字上细细体会。
<p>女命岂止上万种啊！不一样。如果你讲好不好？就一句话很简单，如果这两个八字你叫我来讲过程，前面的八字她自己找的，后面的八字才是真正的天生的，嫁先生没钱，那有什么办法。前面是你跟他吵吵闹闹的，那么这个在讲吉凶祸福之中间，我再三提醒各位，务必要把四组规则搞通，有多熟练，功夫就有多深。否则细节顾不到。</p>

 NM5:`<h1>女命（5） </h1>
<p>那么我们上次讲的女命举出的几个例子，是《三命通会》书里的，那么这个同十神定位的女命不一样，十神定位只讲你夫旺？还是绝？有办法？还是没有办法？以及有没有带冲？有没有伤官见官克你这个夫星？所谓克夫，普通讲就是离婚、分手了。这是十神定位的标准。如果照《三命通会》里边文字就往下加深了，那会不会死呢？离婚到死亡这个中间的差别，就不是旺跟绝可以谈的，还要搭上五行性和四时性春夏秋冬。也就是我上次讲的甲人生在寅月、巳月、午月就可能发生重大问题。如果出生在其它月呢？随便怎么冲、怎么刑，那只不过是谈得来、谈不来的情啊！
<p>那么既然越开十神定位之后，我们就必须要了解五行性，我们对女命讲，就以先生来做标准。金克木是官杀，木克土也是官杀，五种克过来都是官杀，强与不强或者冲与不冲这已经是果了，有钱？没有钱？谈得来？谈不来？那么说，谈先生的性格不一样的，我举个例子。木日主女人以金为夫，金克木，我们拿把刀把木头斩成两段，但木头还是一样的，不过两段罢了。木头一点影响都没有。所以木日主的女命来讲不管恩爱也好、不恩爱也好，一旦分手的时候，并没有什么实质上的严重关联。
<p>水克火为夫就不一样了，各位想想看，水到火里会什么样？跟金克木不一样了。金克木一刀两断，水克火搞得漫天都是烟，那是你死我活的啦！水不一定克得到火的，甚至水被火灭掉都不一定的。所以水克火如果发生事情，那是闹得满城风雨，你死我活啊！一样是离婚，一样是分手，过程就不一样的啦！那么在五行性上，各位就可以理解我所讲的。
<p>那么木克土呢，木怎么克土呢？背背公式是一样的，不过仔细想想，木克土不过一棵树在土地上生长罢了，只有树根抓住这个土啊！木并没有如何去克这个土了。那么如果木克土为夫，好命不谈了，如果一旦坏命了，就这个太太老是感觉到先生随时随地都在控制自己，又没有什么了不得的大事情。木克土就上面一棵树，他就抓住你，又没有怎么伤害你，所以木克土就感觉到出个门也要给他报告一下，多花几块钱也要跟他说一下了，就变成这个样子的积累下来的不愉快。
<p>土克水为夫呢？又不一样啦！各位想一想，拿一盆水泼在烂泥上面，你有看到水吗？一点都看不到啊，都吸光了。那么这就变成是不管男克女、还是女克男，就变成是全部控制了，变得对方一点意见都没有。那么这个就是五行性所造成的后果。如果不冲不刑，双方也就忍耐了。如果有冲有克，导火线就是因为五行性，并不完全因为钱。我们时常说夫妻离婚真正因为钱的事情并不多，也就是一句老生常谈啊——谈不来。什么叫谈不来呢，那么就要照五行性来划分。
<p>那么我现在讲出这几个例子，就是每一个女命的先生都有个五行性，这五行同她相克要照五行性来谈，这是讲人情话了。还有一部分不是人情话了，五行本身就有一种性质的，生克制化都有种种，譬如女命说我生为食伤就是小孩，如果照普通话讲，也不过小孩书读得好不好、或者将来有没有出息，同你谈得来谈不来，这个就叫做算命了。如果你往深处去想想，书读得好不好代表什么，同你谈得来谈不来那更抽象了，什么叫谈得来啊？那这里面就要讲到五行之根本。
<p>譬如我们讲水生木，女命日主是水，她的小孩是木，水怎么生木啊，细细想一想，这水是要从树根里面跑到树里面去的了。所以水生木的女人啊，她把这个小孩在想什么都掌握得很清楚的。她钻到你的身体里面去了，这叫水生木。
<p>那么木生火呢，也是小孩，有没有成就照旺相冲刑看，看母子关系不一样，木怎么生火？木头要烧起来才会有火的，烧到后来怎么样，木头没有了，所以那种母爱是完全牺牲掉自己来成全这个小孩的。
<p>那么两个一比，水生木对小孩很细心的，能体会到小孩内心想什么、想干什么，她钻到小孩心里去了。木生火就不是了，她才不管你想什么，可以把自己完全牺牲掉来给小孩。报纸上看到的捐肝什么的，自我牺牲太大啦！至于孩子领不领这个情有没有效果？那要看冲刑同旺绝，一个水生木一个木生火。
<p>另外火生土，也是小孩，就又不一樣了。結果變什麼？變灰了，什麼都沒有了。所以算命裹邊非常忌諱火生土的，你儘管做什麼事統統沒用。那麼我也聽到有些媽媽跟我講，她很關心小孩啊，但小孩對她怎麼講？你最好少關心我一點啊！那麼火生土就變成白搞。
<p>那么土生金呢，要照五行性讲，金啊，我现在讲的是女命，将来延伸到不是女命的时候说法也是一样的。这个金一搭，哪里有马上掘得出一块黄金出来的啊！连掘一块铁出来都没有啊！掘出来的都是矿砂。矿砂再慢慢下功夫。所以土生金不是你直接就掘出个金来，不过金是在泥土里面挖出来，要慢慢慢来炼。也就是土生金不是直接给他安排好学校了，安排好老师了，是不是到澳洲读书比较好了，总总很多、很多小问题，把他培养出来。
<p>那么金生水，金水一点关系都没有了，要怎样才变成水啊，要一千度以上才熔掉的。那么这种就比较辛苦了。这种五行性将来用到男命算命也用得到。讲冲刑、讲强弱，只是他将来的成果，同你谈得来谈不来没关系。五行性不管是成是败，是讲这个过程。所以我把这五行性补上去之后再来谈那个八字。
<p>比如上次举的例子：
壬寅
丙午
乙未
庚辰
那么我们现在谈八字不是用十神定位，首先看到乙庚合夫星带合，生在夏天，书上讲金正疲啊！谈八字的时候，没有引用那么多的文字，直接从五行上就看出来了。一个金摆在火上会怎么样？很烫啊，就算没有熔掉，你也不能拿！那这个比喻就直接比喻到她先生身上去了，她先生很烫手，坐在妳边上都不舒服，金正疲啊！那么这个庚呢，看支藏天干有没有庚？没有，只有庚一个字浮在时干，不管这个命离婚还是不离婚？也就是说普通人讲啊，是有一个先生而已啦！并没有很扎在心里！如果一有根，就不同了。
<p>我们看到有一些女命，先生下班迟了半个钟头就到处打电话去找，其实根本无所谓，如果打个电话回来说晚上不回来，也就算了。这就扎根不扎根的问题。那么这个生在夏天，金正疲，就说这个女人一辈子她的男人恩爱夫妻就是一个，如果假定不好的，离婚或者等等，不管任何情形，她的先生条件都不会很高。然后在四十五岁以后，她的先生在天干了，那么到四十五岁到六十岁之间，外相看得出与她那个先生有关系了，那这个讲得很抽象了。我举个例子，一个普通家庭主妇，人家根本不知道她先生是谁的，如果妳的先生是大公司总经理，人家就称呼妳夫人了。总经理不一定有钱的，也可以是空头的，但是四十五岁以后，妳的先生同妳在社会上就拉到一起了，这就是她那个夫星明显了。那么再解释第三个例子：

那么这个八字癸水是正官，我们暂时不照书上讲，书上讲的意思就是丙日主的女命是劳碌命，不太会发生死先生这个情形的。书上的重点是如此，那么现在我们照普通论命法来看，时上正官、水克火，地支有没有正官呢？有子水。就是说她的夫星时干通根到自坐地支。这就是她的八字最明显的地方。看月上巳月，比照禄绝来背，水绝在巳、旺在亥子，照公式背是如此，拿到实际算命怎么解释呢？就是说三十岁以前先生是没办法的，三十岁之后就到子了，先生就有办法了，一直有办法到四十五岁。那么十五年，然后再到时柱天干还可再加十五年，所以中年、晚年这个女命的先生都有办法的。那么在时柱跟坐引，解释法就是这样子的。
<p>因为这个八字没有冲刑，不管你有办法还是没有办法，客观条件都很正常。三十岁以前是先生比较辛苦点，那么晚年也是个巳时，如果解释下去，就是晚年先生没有办法了，但是不能这样解释了，因为一个人到了六十岁之后就该退休了，不需要有办法的。如果丙日主生在子时，照文字解释起来就是说晚年先生才有办法，这不见得是好啊！生活安定是要三十岁之后就安定，如果到了六十岁之后生活才安定，太辛苦了。
<p>说有没有办法，其实都是一样的，关键看从哪个年龄段来看更合适，这是从人之常情的角度来说的。年柱上是劫财，意味着这位女士小时候的家庭环境比较艰苦；月柱上是正印，正印代表秀气也可以解释为母亲，十六岁以后与母亲缘分较深，而且偏向文艺性质，不太喜欢谈论现实问题。月支是巳，丙禄在巳，我们说这是身强的表现，二十几岁时这位女士会有很多自己的想法，总是希望按照自己的意愿行事，因为身强。到了三十岁以后，自坐夫旺，那时丈夫会比较有能力，一直到六十岁丈夫都会很有能力。
<p>那么时支也是建禄，月上的建禄人之常情解释法，就是她年轻有志气，到了晚年建禄身强不解释为志气，管闲事不服老，根本不需要她管的，还东问西问问，这是女命。如果男命就不太会退休。所以根据四柱天干地支理论上解释统一一样的，然而真正解释起来，是要按照人之常情来的。以《三命通会》讲，乙日主跟丙日主，它所衬托出来的重点只是告诉我们，这两个日主的女命，发生年轻时做寡妇的可能性是很小的。
<p>乙日主是柔和的，比较听话，丙日主是阳日主，各位想想火啊！不管是男命、女命，火这个东西是一眼看得见的，划根火柴一下就看见了，火要靠近你的话怎么感觉？烫啊！危险啊！所以丙日主有那种耀眼的气息，处处让人感觉到他的存在。乙日主不会，乙日主是很柔的木头，不显眼。丙日主因为性格的关系，是非就会多。因为这个八字没有冲刑合会，所以一生没有什么特别大的问题。那么可能各位要问了，你说她三十岁以后先生有办法，那你能讲出她什么时候结婚吗？那这个是流年问题了。
<p>流年与八字有重大之不同。那么我可以为各位做一个重点解释，八字是讲你本身命的高低，譬如说你有几千万，或者一辈子嫁不出去，或者恩爱夫妻、或者离婚，这是一个现象。流年不是，流年是讲感受，去年赚三十万，今年赚五十万，我就走运了。去年赚三百万，今年赚二百万就是倒霉，流年没有实质的，它是跟去年比。
<p>算命可以算你夫妻恩爱好坏，流年不行，譬如你今年结婚，可以从流年算出来，但婚姻好坏以后怎么样，没有。因为它只管一年。所以说这个流年同八字最基本之差别，是在这个地方。那么我说八字只能看出你婚姻好坏，不能说哪一年遇到对象，讲遇到对象是看流年的，流年讲出你今年结婚，但讲不出你先生好坏。还是你这辈子夫妻恩爱？或者发生问题？流年没办法讲出来。我简单同各位讲一下这个。至于我要同你谈命本身还是谈流年？因人而异！也看她的主题是什么。再解释下面一个八字：

那甲乙丙跳出来，因为只举七个例子，这个己的例子，己日主在谈夫星之余，同时要谈到五行性，戊己是土，戊很厚重，己叫田园土，我们只是以最简单的讲，因为讲十天干喜忌是另外讲，田园土是种田的，戊土是城墙土，所以阳土很硬。既然是田园土就很浅了，所以它不怕什么冲。要它能生万物，一个命要好，还少不了两样东西，要太阳晒一晒，另外不能干。现在讲的是女命，己日主先生是什么呢？
<p>木炮土，甲乙啦！生在秋天申月，联想十干生旺库，甲禄在寅、绝在申，夫星月上坐绝，这个女生的性格很柔，她那个命不管，一个男朋友或者结婚有变化，三十岁以前她的先生，都是没什么成就，以现在讲，拿回家里的钱应该不会超过五万，这是甲绝在申。
<p>那么早婚、迟婚呢？我们就看天干有没有正官、七杀？月上正官、早婚的，但是甲申夫坐绝，二十岁左右就会遇到对象，讲得好听点，爱情主义，不管有钱、没有钱？我愿意就可以了。一直到三十岁之后，先生才有转机，这时空头理论，如果以人之常情讲：贫贱夫妻百事哀啊！根据我的经验，如果先生三年都拿不出房租来，通常是要bye-bye的啦！
<p>所以凡是夫星坐绝的，先生离开的原因是因为条件，如果官杀混杂的通常是这个女的男女关系太复杂。如果夫星带合的，容易发生先生那边有问题。夫星坐绝的因为条件差，爱情不能当饭吃，三年之后就会有变化。那么三十岁之前到底一次、还是两次变化呢？这要看流年。如果简单的讲，就三十岁以前，一次也罢、两次也罢，没有次数啦！有一次算一次，统统是不行的，这叫夫坐绝。
<p>那么我们就看年上是什么呢？庚。土生金，伤官。家里不代表是有钱的，各位也都知道，伤官克官，她的先生在月干，年上伤官，可以解释为她的婚姻，父母是不同意的，是她自己主张的。再看时柱乙，己日主木克土为夫，这就官杀混杂啦！那我们刚才所讲到的是两个范围，一个是夫星坐绝、绝在月，那夫临墓绝，老困婶娘啊，这是经典上明白说明的；第二是年上伤官甲庚冲，这就是个她家长是不同意的婚姻，她自己做主的。那下面把这个八字的其他特色讲下去。
<p>时柱是乙丑，乙是七杀，月上甲是正官，就是我们所说的官杀混杂！官杀混杂本来女命是忌讳的，不过月时官杀混杂要轻得多了，为什么呢？月是十六 - 三十岁，时是四十六以后，女命在四十五岁以后还是可以论婚姻的，时支就不论了，六十岁以后就算有什么感情之事，也随便了，不去讨论它了。那么月时官杀混杂就代表三十岁以前这段婚姻，同四十五岁以后不相干的，中间隔了十五年啊！这就没有我们一般性所讲的道德问题、传统问题了，这没关系的。
<p>但对一般人来说呢，两度婚姻总也不是美满之事。月时官杀混杂，指两度婚姻中间比较合乎情理。
<p>这是月时官杀混杂，有些婚姻不好的女性来问我，你看我以后还有没有感情生活？如果照这种讲那是有的。那官杀混杂在这里看出是有这一个特征。
<p>还有其他特征可以看得出来的，这就是为大家讲的通根问题，就是支藏天干。天干有甲正官，四个地支里面都没有甲，七杀乙在四个地支里面，年柱是乙戊癸有七杀的。那么正官在月令上坐绝，且没有根，是指在三十岁之前，最当红的年龄，她的男人条件不好。
<p>那么时上七杀通根在年柱，这种解释法第二个同她在一起的男人是她以前就认识的，通根在年支嘛！比她原来的先生认识得还要早。那么也有女士问我啦！晚年还有没有感情生活？有。是新认识的呢？还是我已经就认识的呢？像这个八字是早就认识的。比她先生认识得还要早，这又是一种解释法。
<p>但这个八字还有一组足以影响她一生婚姻的理论。
<p>大家都知道了，甲己合、巳申合，天干合、地支合，我们叫做双六合，对男人讲人缘比较宽，对女人讲，就犯了大忌，就算夫星不坐绝、官杀不混杂，也好像人缘太宽，会带来很多麻烦的。那么算命是论果不论因的，妳只有一个男朋友，搞出事情当然很不理想了，如果妳有过好几个男朋友，什么事情都没有发生，在算命里面并不认为有什么大妨碍，因为它并没有造成真正的灾难。
<p>像这个双六合，同她的先生死？或者离？两回事的，就算她先生有办法，她也是那种双六合的个性，认识人相当多，人缘也多、社交也广，这叫合多贵重，女命所忌讳的。这种情形从她一懂事就人际很宽，一直到四十五岁，整整三十年中会发生很多男女之间的啰嗦事，至于夫星坐绝、官杀混杂是另外的事了。这个同有人缘、没有人缘是不相干的。
<p>所以这个八字一共有四条：一条夫星坐绝，一条官杀混杂，一条正官无根、七杀有根，四是日月双合。算女命的规则通不会超过三十条，那么这样子合过来、合过去，每个八字都不一样。这个八字同前三个八字相比，这个八字算是最差的。头一个甲日主是寡妇、有钱，没有其它花边新闻，第二个乙日主的先生普普通通，几万块一个月，有的时候先生也可以走个十年、八年好运，很平常的命，那么家务事里边，先生会有点点短暂的外遇——乙庚合。
<p>第三，那个丙日主呢？它的特色是先生中年好，因为丙子透癸水在天干，月时是临官，有点个性，都不算苦。唯独这个己日主就差劲了，夫星坐绝、条件差，又是官杀混杂摆在天干，在天干和不在天干的唯一差别就是在天干大家都知道，不然没有人知道，我也认识一些人，私生活并不见得好，但没人道，有一些人偶然有一点小问题，谁都知道的。这是摆在天干的。那么人缘又很宽、又没有钱。这个算是最差的。

<p>在算命里面，有个专门的名词叫做调候用神。那么高命人一定有调候用神，候就是气候，春夏秋冬，现在这个八字符合这个条件。调候男女都一样的，不过个人背景不一样。调候最明显的就是夏天和冬天，所以这两个季节出生的人，财官印倒变成次要的了，调候为急！等于我们夏天和冬天出门穿衣服有特别的规定，春天跟秋天乱穿衣，多一件、少一件无所谓的。
<p>从五行角度来说，凡是夏季出生的人——我这里说的夏季是指巳月、午月，标准的盛夏时节，天气那么炎热，无论日主是什么八字都必须有水，如果没有水，就会失去平衡。出生在冬季，即农历十一月、十二月，天气那么寒冷，八字里就必须有火！这就是调候用神。不过一般来说，这种水火调候的八字比较少见，所谓水火不过是名称而已，最终还是要转换成十神来看的！
<p>这个庚金生在丑月是冬金，有句有名的口号：金冷水寒要丙丁！冬天金冷，拿水来讲寒冷，金日主生在冬天好命、还是坏命，决定在丙丁，有丙丁，你的命就高！没有丙丁，你就高不上去，但未必是坏命。有调候的人格局好的人差别之处，好格局财官印旺不冲、不合，这是你自己努力而有所成，自己努力有限的。
<p>根据我的经验，没长官提拔你，凭你自己的学历，工作能力好，总平均讲大概最多不过一个处长到头了，你要处长以上，再上去，一定要有人际关系！或者怎么、怎么特别情形，那就是调候。上千万以上、上亿的一定要有调候用神，没有调候用神高不上去的，这是男命，女命也是一样！要丙丁。那丙丁两个字是什么呢？还是照十神定位来讲，妳庚日主，丙丁就是妳的夫星。那么妳的好处，前途来源就是妳先生。
<p>那么以前我们讲过，夫旺坐临官位，财官印好命，或者调候是夫星，调候需要旺，只问有没有？如果你夫星坐旺，正官、七杀坐旺，一千万。像这个八字，庚日主生在冬天，时干有丁，丁是她的调候用神，又是她的夫星，那就高了，几千万以上。所以讲了，不论男命女命有调候用神露出天干，就是好的。如果你得到调候用神呢？在十神定位里面的全部规则都可不必遵守的。譬如我们说夫星怕冲、夫星怕坐绝、夫星又怕带合、又怕官杀混杂。如果你带了调候了，统统没有关系，照样是好命。这样听起来

<p>各位，如果问你到底是夫妻恩爱重要呢？还是有钱重要呢？这个就不能够到极端了，真正有钱到几十个亿，夫妻之间好像不在一起，都无所谓啦！再恩爱，连饭都没有的，恩爱也没有用。所以大致不必到极端。这个八字就是金冷水寒要丙丁！这个是属于有调候用神的好命，丁火正好有，男女命统统算在内的。这里还有个差别，她的丁在时柱，什么时候呢？晚年！就是一直可以好到她很老、很老都可以。以调候讲就这样解释了。
<p>我们用普通命来看这个八字，年上食神，反正年上财、官、印、食神，只要是这四种的，都是出生在很安逸的家庭，照现在讲呢，至少有一栋房子，不会很苦的。月上伤官而且是伤透的，对她先生不利，如果不带调候用神，那是很坏的婚姻。
<p>带了调候用神，还是不理想的婚姻，只是条件非常高，癸丑伤官坐伤官，对这个女命的个性讲，那是很骄的，也有才学，学历不坏。因为她带上来调候了，对方条件就高。日主是庚金，庚申自坐禄，那是很有自信！那么如果不带调候那是非常糟糕的，又有学问、又很骄、自己很有自信，同先生也谈不来。那因为她带上了调候了，因为对方有几千万以上，就不一样。
<p>那么还有一个特色，这里面有两个丑字是天乙贵人，一个八字带上两柱天乙贵人，从年轻到晚年都有贵人在帮她忙的。那么这个八字分作两段讲，如果不谈调候、婚姻不好、个性很骄、也很自信，但是有贵人帮忙。如果一见了丁是调候，这些都不重要了，因为丁是她先生，这个男的，尽管同她谈不来，她女人该有的一切权利，她都有。
<p>这个八字也没有冲刑，没有什么太大的难。那么这个是属于好命！所谓好命、坏命，如果下定义，上等社会只讲有钱，譬如你的先生当县长，吵架、不吵架不重要了，一种是中流社会，两夫妻一起摆地摊，很恩爱，也是好命！所以两者取舍，一半是在于客观现实，一半在于人生观。</p>

 NM6:`<h1>女命（6） </h1>
<p>那么我们现在再解释一个八字：
乙丑 丙子 辛未 壬辰
辛日主，记得以前曾经跟大家谈过，命理在刑冲合会、旺绝、调候都是固定的。但是这种规则，什么日主比较容易见到呢？这个不公平，女命辛日主是比较吃亏的一种。譬如丙日主、乙日主，就不大会发生那种年纪轻轻就孤寡了，辛日主就比较容易发生。
<p>首先最明显的，辛日主生在子月，同刚才庚日主生在丑月，在引用公式里边就发生一条完全一样——金冷水寒，要丙丁。刚才的庚日主有丁是好命，那么这个八字有个丙，但是丙辛合，就完全不一样了，庚日主用丁很单纯的。辛日主用丙，丙辛合，合走了。所以这个八字调候就没有了。那么丙当然是她夫星正官了，丙辛合，调候用神被合走了，丙也是正官，正官也被合。也解释为她的先生不完整，她年上是己，土生金那是偏印，偏印在十神定位解释为偏母，算命是不大过问命主家里环境的，但是年上正印是妈妈当权，年上偏印是偏母当权，这虽然不直接影响到她本身，但你的家庭生活就有点怪了，就不是一般性正常家庭了。
<p>时上伤官是讲小孩的，也克正官的。所以这个八字有调候，但被合、夫星坐绝，丙旺在巳午、绝在孩子，那么这个是夫星坐绝。故此这个八字看起来婚姻不理想！有没有冲刑呢？没有。就是她的先生被合、调候被合、福气没有了。这个八字算是比较容易算的。下面是最后一个八字：
庚子
戊寅
癸未
癸亥
癸日主，以什么为夫呢？戊己都是她的夫，这个八字看起来戊是夫，各位看到戊癸合，但这个地方两个癸，这叫争合，戊癸合，只是单独的合，两个癸见一个戊，就争合了，拿人生实际情形呢？妳先生外面有一个女人，妳知道的。那妳认真不认真呢？两回事了，两个癸是争，天天逼得妳先生同那个女的断掉，那个女的也一样，天天逼这个男的同妳离婚，吵闹不休，这叫争，争合比还要伤脑筋。
<p>就算你没有结婚，一个女人有两个男朋友就很麻烦。这种事情有人可以一笑了之，有人可以闹得不可开交。如果只是单独戊癸合的，是有那种现象，大家一笑了之；如果两个争合，那就会搞的非常麻烦。不是一个先生单纯不单纯啦！扰乱掉整个人生。
<p>所以一个八字两个癸合一个戊，有多久呢？你看从月日时啊！就从你懂事起一直到六十岁为止。那么一天到晚都争这个事情，所以对女命讲是非常不理想的。这是讲天干，那么她是争一个先生呢？还是谈过几次恋爱也是这样争呢？就不在这一条了。那是在另外一条，你看月柱戊寅，寅里有戊，在格局讲是正官格，对女命解释法不一样，正官坐正官，戊天干有正官，寅里也有正官，夫坐夫重叠了，正官坐正官的女命通常都是离婚的，重叠了。那么三十岁之前就发生了分手之事。如果你三十岁之前没有结婚，有男朋友也要分手。又带上天干合的，又分手，是这个分手之前，有男女关系扯不清，就很不理想。那么这样子还没有把这个八字全部解释清楚。
<p>癸未、癸亥，我以前和大家也提过，天干相同地支是长生和墓库的就叫拱，这个是亥卯未嘛！卯这个字她没有，但是一个癸未、一个癸亥，就拱出来了，三合木。三合木可以成格局的，水生木，月上是正官，那是伤官格，格局本身就不对头，正官格碰到伤官格，伤官克官，破格！这当事业讲是钱财问题，当六亲讲，正官坐正官是重叠夫，伤官格是克的，拱出来的亥卯未，这怎么解释呢？你有一个小孩，不大正常，有两种可能，一种是小孩是你生的，孩子的爸爸是谁？搞不清。
<p>另一种解释法，暗的，你领养一个小孩，人家不知道。或者你这个先生，跟你结婚的时候，本来就有两个小孩在的，也要你来养。那么就有其中之一这种情形啦！那么一起合起来，就是在上述七个八字里面，应该这个八字最啰嗦，很复杂。
<p>那么在这个算命规则里面，女命大概总共有三十条左右，到底一共用多少条？没有什么规定，看她八字本身了。《三命通会》举了七个例子，并没有多少解释，那么现在我把它这样解释一下呢，各位对八字的看法就有了解了。
<p>这个八字还可以补充一点，年上是庚，金生水正印，午是火，水克火为财，那么这个人出生年干正印，书香门第；年支正财，家里也有钱。月上正官坐正官，对她自己讲是离婚，对家庭来讲，正官坐正官也是正派啦！所以这个女生的出生背景是很好的家庭，没有发大财，也是大学教授，没有发财，听起来就是很得体的。那么四柱并没有冲刑，随便怎样生活到晚年，一生也没有什么大难。
<p>这七个八字，各种解释法都不同。随便什么八字，解释起来都是一样，而是以来查关心的问题是为主题。女命讲到这个地方，对夫妻方面是可以了，但是夫妻和子女，这是女命之重点，女命并不是只有夫妻而已，也有其他这个因素，一样有钱财，多少有点事业，那么这一方面是另外一个单元，也可以附属于女命，叫十天干喜忌。
<p>我再继续解释，让大家了解十天干喜忌的重要性。譬如说我们见过一种小姐嫁给一个男人，一感觉不投机，就马上离婚，也有一种人嫁给了一个人，根本就情不投、意不合啦！倒也是夫妻到老，也不离也不闹。心里不高兴了。那离与不离的中间，隐藏着别的因素啦！为什么她愿意那么做呢？就是十天干喜忌了。就等于说我们有句话讲了，男人做生意赚不赚钱其次，要合作愉快。本来做生意就要赚钱嘛！怎么变成合作愉快了，就是人的性格，内心超过物质，就是我们要谈十天干喜忌。</p>

 GCGS:`<h1>孤辰、寡宿 </h1>
<p>我们首先讲那个孤辰，每个人都知道孤寡，孤寡对普通人解释法就是死先生、死太太，那算命不一样，比较深。孤寡是包括夫妻走一个，但不只那么一点小问题，那么我把它从职业立场解释一下。男怕孤、女怕寡，什么意思呢？解释之前我先讲一讲，这个不是我的意见，是平均概念啊！男人不怕死老婆，命哪怕娶不到老婆。所以男不怕寡、怕孤，这个不代表公理啊！你们拿来参考就好了。女怕寡、不怕孤。女孤寡除了死以外，还有别的意思，性格孤僻，这同夫妻没有关系的，他不喜欢出去，也不喜欢交往，孤孤独独坐在家里，这是命带孤。这个寡呢？也不一定死先生，因为解释命理，就是解释一种很庸俗、很平常的事情。
<p>我们拿清朝做例子，三妻四妾，她先生没有死，但不到妳房里来，那不是守寡吗？我们叫守活寡。所以孤寡这个范围就宽了！那么还有年限问题，孤寡年上是没有的，是从年柱查出来的，年柱本身没有的。月上孤寡那好商量，通常我们劝人家不要早婚了，也就是这个道理。日坐孤寡，就有一点可轻、可重了，那如果时柱坐了孤寡，在算命里就不算这一条了，为什么不算这一条呢？不论男女过了六十岁了，就算走掉另一半，也不算什么不得了的大事，所以年月日时要分清。
<p>那么既然各位听过十神定位，也知道冲刑了，这个孤寡如果带冲的，大家都体会到可能会死先生，与先生有钱没有关系，可能先生一死，妳整个生活都没有办法了。所以孤寡本身还给妳带来好与坏，就连冲刑都连在一起了。那么这样解释孤寡，大家都有了这个了解了。</p>
`,
 SWPM:`<h1>實務批命 </h1>
<p>那么我现在根据以前所讲的全部，合起来对一个八字做出一个实务上的批导。那么谈八字是有两种谈法，一种当面谈，一种用笔批，有一种也就可以了。不过有一些例外，当面谈完之后，大概怕忘了，请我们把所讲的批一批，带回去留个纪念，那就叫做批八字。那批八字就等于我们讲《二十五史》，可以很详细，也可以很马马虎虎的。我们现在采取一个总平均的标准，起码应该要谈到的范围。尤其是教材，所以是以术理为主。举个例子：
庚干
庚辰
庚辰
壬寅
对初学批八字的业余同道讲啊，搞来搞去就那八个字，当教材来讲，就有它一定的层次。
<p>第一个层次，先看日主五行性。日主是壬水，每一个天干都有它的五行性。壬水是智慧聪明，这个人是成是败，都是因为这个智慧的关系，聪明智慧流露在外面。那么这一看是壬水，属水的，基本是属于动态的。
<p>第二个层次，就包括支藏天干内五行全不全。只要有就好了，多少慢慢再谈。这个八字，金木水火土五行俱全，如果缺一行，那么就照六亲为第一优先，譬如女命最怕缺正官、七杀，那是没有丈夫了。男命怕没有财，一生都留不住钱。如果高命一点的人，就要考虑有没有日主喜忌以及调候。这个对人生讲不是绝对必要的，人不一定成功的，也不需要谈什么理想，那么这个八字既然是五行全的，我们就不朝这个方向去考虑了。
<p>第三个层次，就是看有没有冲刑合会。冲刑与合会一样重要。比如说，有三个人来找你麻烦，固然不理想，如果三个朋友一起请你吃饭，那也是个麻烦事。到底去哪家呢？所以都不能太多。这个八字一看，冲是没有的，合会又包括拱的，譬如壬辰日、壬寅时三会寅卯辰，中间拱一个卯，表面是没有的，实际是有的。既然拱出寅卯辰了，这就成格局了。水生木为伤官，是伤官格。
<p>这个八字天干有庚偏印，地支没有的。然后庚午、庚辰，拱了一个巳，已是戊丙庚。因为拱那个巳里边有庚，偏印也成格。故此这个八字是没有冲、而有合，合的中间合出两个格，前边是偏印格，后边是伤官格。
<p>在没有谈吉凶之前，就把这个命造分为前后两段，三十岁以前是偏印，三十岁以后是伤官。到底哪个重要呢？这不是先来后到的。前面拱出来是三十岁，以人之常情，三十岁是成不了什么大事的，只是说前面这段白做。后面的三十岁以后一直到老，才是他生活之重心。这就看出了两端，是人生之阶段。
<p>那么偏印出天干，伤官没有出天干。首先我们就照十神定位的次序看，偏印是谈艺术的，偏印要偏财才能够成功的，这两句话对这八字讲都不存在，因为他还太小。三十岁以前的艺术，不成熟。偏财呢？他也没有，有也没用，因为他到三十岁之后，就不是偏印格了。
<p>然后论命呢，妻财子禄寿六亲一起论的。对六亲讲，偏印是什么呢？偏印是偏母，既然偏印成格了，在他童年的时候，他的家务事就会对他有影响，他的母亲是没有权的。但是算命不算人家家务事，尤其在清朝算命，那时是妻妾制度，三姨太、五姨太很平常，所以不是当事人的重点，只是可以知道这个人的家庭背景有点复杂。就是他爸爸那边不是很单纯的一个家，这个并没有吉凶祸福在里边。艺术性格也搞不出什么名堂的。所以这个年上偏印初步之定义就是这个样子。
<p>那时上伤官，伤官要生财，没有财星成不了气候。但是我们看到时柱天干是个比肩，我们叫做忌神，伤官生的财都被比肩克掉了。要克到什么时候为止呢？大概要克到五十几岁。所以这个人要到晚年才能够在财务方面有成就。那么伤官是有才学的，有点骄气的，这寅卯辰会合了伤官，天干并没有伤官，所以这个人的骄气不露在外面，不像有种人的骄显露在外面，那么在普通格讲呢，偏印格兼伤官格。
<p>然后这个八字还带着两个特别格。什么叫特别格呢？就不是天透地藏，也不是三合三会，是根据统计出来的一种经验。庚辰、壬辰是属于魁罡格，以前我们在特别格里就讲过三奇、魁罡，都归特别格。魁罡格最大的特色，就是通情达理。也就是我们讲的知己知彼，你只要开口讲两三个字，他就知道你来干什么了。他能看穿人心隐藏的事情。这个是好事、也是坏事，看穿，但不讲出来是好事，讲出来，人家会防范，就是善于揣摩人家的意思。那么关键就是有冲？没有冲？魁罡对冲，只是九流人物。古代之九流，包括僧道在内。没有冲，月日双魁罡，那么他的聪明才智会用在得体之处。
<p>所以这个八字两个普通格，一个是三十岁之前，一个是三十岁之后，魁罡格就站在中间了。十六岁到四十五岁。那么合起来一共四个格，先不谈吉凶祸福，就可以把它分为三个阶段或者四个阶段。在结构上讲，我们就可以论断这个八字一生有四个阶段。
<p>那么在行业上讲，士农工商，很明显的就不是商人。这怎么推论的呢？偏印要偏财他没有，魁罡本来就不是生意人，做公务员最好。伤官要生财的，也没有财。时上还一个比肩，所以合起来讲他不是一个商人。
<p>但是赚钱不一定要做商人的，律师也可以赚钱，医生也可以赚钱，所以他的财源是在于他的聪明才智，通情达理。所以这个人适合于做专家、搞政治或者是公关，从这一方面来的财。那么这种财，当然不会是财阀啦！如果有调候的，搞个几千万还是可以的。那么士农工商给它归出来了，在八字本身一眼就看得出是这个样子。那么我对他讲呢，通常是以他关心的角度，或者从流年讲。如果批出来呢，还是根据我刚才所讲这些理论重新组合一下，就变成有点公文的味道出来了。就好比我们一件事情，向县长报告，口头讲啰啰嗦嗦一大堆，县长说你写成报告来好了，那就不一样了。陈述句子不能太长、不能太短又不能啰嗦。
<p>所以批八字它有種公式的。公式在書上是沒有的，原理還是那一套，從日主是開頭，把它引到是什麼格？或者日主開始，把它引到有沒有用神？有沒有生格局的字，有沒有反剋這個格局的字，那麼以這個架構之下來批。因爲他有兩個格、三個格在，從哪個格開始批都可以，所以我先寫了個例子，大家可以看一看。尤其不擅談話的人，最好先學會批，你批出來，人家還是會問你的，通常都是照你所批的句子裏面來發問。
<p>第一个批法，从魁罡起。本造为日月魁罡格，为人通情达理，刚毅果断。果断就是管他对错，答案来得很快。心地仁慈。魁罡格的人很讲正义，不会加害于人的，嘴巴讲话很难听，骂了你一顿以后也就没事了。个性严肃，他不大喜欢跟人家啰啰嗦嗦、扯来扯去。适宜于政教，不宜于从事事业性之事业，所谓事业性，比如开家餐厅了，或者开家美容院了，不适合于这种。尤其不适合于偏财，因为魁罡很刚断的，搞小钱他不行的。
<p>那么这个八字本身刑冲是没有，合是有的，他两次合，我们照语句上讲也是三个阶段。批出去就说：一生要经过四次职业上的转变，才能安定。那么基本上从魁罡先批。那他还有偏印、伤官在呢，也要批下去，批在后面。
<p>本造也是伤官格配偏印格，清高。伤官有才，偏印是艺术，有点孤独感，中年就可以有好运了。为什么中年就可以有好运来呢？因为他庚辰、壬辰两个魁罡在中间，就可以有所成了，就可以功成名就。晚年不能够完全退休，为什么？因为有寅卯辰在时支，就算退休之后，也会有兼职。如果简批，这个样子就算是交代了。
<p>那么通常批在以前的十行纸上，就算批出去了。这种是从魁罡批起。同样这个八字，用另外一种批法，不从魁罡批，从伤官印来批。
<p>本造日时拱卯，会成伤官格，批八字只讲答案，不讲理论的，譬如说我们知道他生在辰月，用甲为调候，刚才的批法是魁罡，现在从格局调候来讲。甲是调候，寅卯辰就是调候，所以他的格局就是调候，也是一样批法。三十岁以前就可以有成，刚才讲的魁罡有成，是因为他的才智有人欣赏，现在讲他三十岁有成，因为有调候，有多机会。通根在时支，寅卯辰三会木，天干没有甲，只是在地支的好，人家看不见，但是有实实在在的权力。在天干的好，人家看得见。
<p>那么我举个例子讲，譬如说我们收到很普通的公文，上面有财政局局长某某某，可能局长根本就不知道，就他几个秘书在搞的。所以，职权就几个秘书有实权的，但秘书名字没有列上的。局长章盖在上面的，局长自己不知道。所以出天干的人，人家知道。不出天干、在地支的人，是有实权的。这个是属于内勤，有实权，实权一样可以赚得到钱。
<p>下面就讲到偏印了，偏印也是格，不谈魁罡，魁罡摆在最后。那么就从他母亲谈，年上偏印，妈妈不掌权，这个家庭就是有点问题。根据这个讲，他的家运不是很稳定的一个家庭，他得不到家里很多钱。
<p>然后给他一个总结。这个八字是全阳，八字全阳的人心直口快，容易得罪小人。第二呢，有个卯字在，都知道卯酉冲，但他八字没有酉，申子辰见酉为桃花，他没有桃花，但拱个卯字在，我们一般说桃花逢冲是大家都看得见的。但是此命造是属于暗冲的，外人是不知道的。这个人并不见得是会有那种感情上的麻烦，即使大家不知道，我们也会跟他说，你一度有异性之困扰。
<p>我们内行讲这些例子是样板。批给对方看，对方看了之后，就根据句子里所说的话，联想起来对你发问。总而言之，记住从日主拉到格局、或者调候、或者神煞、或者冲刑，哪一种都可以。能写出个十行八行，这就批出去了。
<p>但是批八字不光是这个的啊！还有大运、还有流年。真正困难的还是大运、流年，像照文字批批八字，古代的读书人差不多都会，没什么困难。那么一般性会客，你至少把今年流年讲一讲，甚至讲两、三年，或者多少讲点过去、未来之事。那就不是命高低了，是运气的了。
<p>刚才说了，批那么多，讲了一辈子了，但他不会年年一样的啦！当他四十岁以后同他家里有什么关系呢？一点关系都没有。所以有这种细节呢，就在谈流年。
<p>比如这个八字的大运？
<p>庚午  
庚辰  
壬辰  
壬寅  
大运：辛巳，壬午，癸未，甲申，乙酉，丙戌，丁亥  
通常我们只写六步大运，那就六十年了。这个起运，各位都懂的，但是各位可能会问，比如五岁起运，那三岁、两岁怎么算呢？要不要看大运？基本上要算，就算第一步运。不过一般人都不考虑这些，因为太小了。两三岁的小孩，谈什么运气，不过必要的时候，还是要看的，尤其是不正常的小孩。什么叫不正常的小孩，比如有位小姐她没有结婚，跟一位有钱人在一起，生小孩出来，这个小孩是吉凶两个阶段啊！如果拿不到这个男方的钱，那就是坏命，拿得到钱，那就是好命。那不就直接牵连到他妈妈了嘛！所以对这种小孩的幼年流年，还特别重要了。流年、大运完全讲刑冲合会，故此，我怕各位一下子背不够熟，身边要准备两份资料，一份六十甲子表，按流年谈，一年一个干支，第二呢！准备一份刑冲合会表，先把大运同八字本身天干地支，在刑冲合会方面作一个桥梁。
<p>他第一步运辛巳，庚午年的，庚午年一岁了，两岁就是辛未，两岁就有事了，大运同流年在一条线上，那他只有两岁，谈什么吉凶祸福呢！所以我们就联想到他是偏印格，他家里本来就不很稳定，辛未再过去是壬申。这个未字啊，同拱这个巳，就拉出巳午未出来，辛未一个未字，太岁是庚午，庚午、庚辰拱巳，拉出巳午未，是火，日主是水，水克火为财，如果这个八字已经三十岁，我会论为女人的。但他只有两三岁，所以这个就只论为他家里走好运。一出生第二年，就替家里带来好运，到底是给爸爸带来好运、还是给妈妈带来好运，都可以。
<p>三岁是壬申年、辛巳大运、生在寅时，形成寅巳申三刑。八字一个字、大运一个字、流年一个字，拉出来的三合三会、三刑，拉出来的吉凶就是当年流年之吉凶。如果八字三合财，管四十五年，流年三合财只管一年。那么这个寅巳申牵连出三刑，他只有三岁，一定不是他的事。所以说纯理论上讲：他家里是有钱的，三刑呢？搞是非了。是非同财不相干。那么这要不要谈呢？两三岁的事情呢？如果是从他妈妈来的，如果他妈妈的对象正好不是正常婚姻的，是跟有钱的一个男人非婚生子，那么这个小孩子保得住？保不住？能不能留在妈妈身边？就以壬申年来做决定。庚午、辛未、壬申，第二年是可以拿点钱的，第二年就有是非出来。
<p>庚午、辛未、壬申、癸酉、甲戌、乙亥……乙亥年还是在辛巳运里边，入了天罗地网，天罗是戌亥，地网是辰巳，叫天罗地网。以我个人对这个八字的判断，这个小孩子三岁以后就有很大的变动，天罗地网我们说是在劫难逃。那么小的孩子吉凶不过是家务事，这个变化，那么我只讲了四年，各位有没有体会，也就是我以前对大家一再建议：刑冲合会要背的很熟。背不熟，你没有办法每一年、每一年讲这个冲刑的厉害关系。
<p>而且这个八字很特别，通常不是每一年都有刑冲合会的，有时十年、八年都没有，他都全部集中到幼年去了。那么幼年如果他八字本身命稳的，我们就解释为他生病了嘛！如果他八字本身不稳的，就解释他这个家属之间有事，那么我们把他距离拉远一点，太小，我们把他讲得大一点。五岁辛巳运、十五岁壬午运、二十五岁癸未运，二十五岁癸未运，无论男女都有很多事可谈的。譬如我们说：走好了，或者走坏运了。那么癸未运里面，虽然是长大了，推论法同小孩子一样，这个未字，要同八字拉上去，这个癸未同辛未论法一样，辛未年是三会巳午未，只是一年，两岁的时候，癸未运的未字，拉到年月拱这个巳，加上年支午，也是三会巳午未，这个叫十年财运。那么十年财运，看几岁了，他是二十五到三十五，十年财运，有多少财呢？天干我们也要看，他是癸未运，癸是劫财，劫财坐财运，这十年中间，他拿到的钱最多只有一半。这是指钱，总比没有好啊！除了大格局讲荣华富贵，一般性讲十年财运，对他就很有帮助的了，而且正是年龄。
<p>但有个麻烦事，就是我时常跟大家讲的，妻财同宫啊！钱财同女人是同一条规则，二十五岁到三十五岁，正是感情纠纷最容易发生的时候，因此我们对他就有个建议：你只要不卷进感情的纠纷，保证你十年好运！从二十五到三十五，足够叫一个人事业稳定的了。那么这十年运气是财运，他不会每天都会有财吧！这就要看流年啦！譬如他二十六岁，乙未流年，乙未同癸未大运，重点都是这个未字，乙未也是巳午未会财，那么是大运同流年同论的啦！所以最好的一年就是刚交过运的第二年，乙未年。
<p>各位听我讲的时候不要贪快，要慢慢来体会规则！因为你会看三年，三十年你都会看。你看不出一年，没有一年你会看。所以算命除了八字本身之外，首重今年流年或者去年，要看这两年中间有没有三合、三刑。我刚才讲了，辛未年、乙未年、癸未运，那么为什么都说他财运呢？他本身有个架构在，所以以运同命谁重要？命啊！它基本架构是庚午、庚辰，中间拱了个巳，巳午先半会在八字上，所以我们看到这个八字，先不要谈别的了，立刻就知道，每隔十二年就会走运一年，只要是未年，管它什么未年，他都有财。这是讲对方八字的本身啦！所以对我讲呢，就是他来的什么时候？他每逢午年来就是我走运了，那一定是巳午啦！明年他就走运，一算就知道。所以他命本身是提供出你运程之架构，运程是要配上你这个命本身，两者相辅相成。
<p>再过去呢！乙未、丙申、丁酉二十八岁，他是在那个三合财里边的，但是丁酉八字本身日主壬辰，丁壬合、辰酉合，又是双六合，所以在十年运里边，二十六岁固然好运，二十八岁更好！是这个双六合，两个成果来论，丁酉年成就来的大，有结果。前面那个是只有好处、没有坏处，为什么中间会有坏事呢？各位再仔细看，刑冲合会要全面兼顾，因为他八字日时拱个卯字在，卯酉冲的啦！有暗冲。双合流年、三合财运，带住一个暗冲，那么在好事中间，会一样暗中吃亏，总归来讲还是好的。
<p>我谈他的八字，引到大运、引到流年，虽然只讲了三五年，只要花时间下去，三十年、五十年都是一样，那么根据有经验的统计，这个八字既已拱了巳、卯了，每逢未年，十二年就有一年，是财运！同样，他巳亥冲的，每逢亥年就是坏流年。拱了个卯字在，每逢酉年就是坏流年。根据这句话重新组合一次，你十二年中間，一定有一年好流年、两年坏流年。变成我们这一行的行话了，三比二啊！两件好事，就有一件坏事。
<p>这是命理本身冲刑结构的架子在，这个人不可能太平一辈子的，也不可能好一辈子的，不管你做到再大的官，有一百亿以上的钱，也是一样。所以命理是初步看出他的吉凶祸福，第二步是看出组合规则，一生太平、不太平，或者好命、不好命两回事的。一个上班的公务员月薪三万块可以一辈子没事，一个有几十亿的人三年两头都有事。那么我以这个八字散到流年上，看八字这个经过，大概只有一年就够了。
<p>看流年可能要三年。因为它兼顾的太多了，现看出它本身这个结构，然后再看大运、流年带上来，固定之刑冲合会之年龄。
<p>比如我说丙戌大运，不谈什么十神，也不谈什么调候，辰戌冲，先冲月日两柱，后面的卯戌合，就这么两句话，答案已经出来了，先冲后合，随便什么纰漏，十年之中雷大雨小，各位有没有看到？如果辰戌冲在后面的，那么先好、后坏了。要多看八字，多学经验，取其重点来谈。那么就可以得到书本以外的经验，有句话，师父领进门，修行在个人。但是真正八字要看得出来，要靠自己细心。这里虽然只举一个例子，一百个例子都是一样的。你会看三年，就能看三十年。
<p>那么刚才讲的是流年分开谈，有些人来问八字，他倒不是问今年或是明年的吉凶。比如三十几岁的人来问：我什么时候可以发达？或者五十几岁人的来问，他以前发达过，他问我还有没有机会再起来呢？
<p>这个倒不需要在流年上看，要在大运上看。一个人要发达，靠一个流年是不够的，只有一年嘛！除非你中彩票啊！所以事业要成功，至少要五年的啦！最好的运，就是大运本身同四柱有双合！这个不是每个人都能有的，合得早，没用。合得迟，又晚了不行，譬如这个八字乙酉大运，同庚辰天干地支双合的，这个人一生起步之成功点是在乙酉运。这个人真正的事业点是在四十五岁，如果他四十岁时来问我，我会对他这样讲：你人生还没有开始哪！四十五岁才开始。那有人一辈子好到底的呢？因为有这个十年，就无所谓了，你有三家公司或者有六家公司，没有什么大差别啦！前面这一两家最难。因为乙酉同庚辰是双合的。
<p>那么再过来丙戌大运就不对头了。丙克庚、辰戌冲，壬丙冲、辰戌冲，冲的厉害，但是这个冲是他成功以后的冲，不是成功以前的冲，如果这个人来问我，在丙戌运五十几岁的时候，已经有了三家公司了，现在焦头烂额，他来问我：我还能不能恢复像以前一样好的运气呢？这个大概不是每一个人都可以的。对这个八字讲呢？有的！还有一步老运，这步老运就是丁亥运。各位花十秒时间想想，原因是在哪里呢？还是双六合，壬寅时嘛！丁壬合、寅亥合。这句话就牵连出一个题目，譬如说，寅时、卯时拿不准，对八字财官印讲，寅时、卯时是时支，十神的问题啦！
<p>但是如果这个八字寅时或卯时就不一样了，如果卯时就不会有双六合的命了。所以，往往差一个时辰，算命结果会差很多。也可能没有什么差别，他没凑上三合、三刑这个问题在，所以丁亥还有一步运，也是双六合。那么有的可以东山再起，有的不能。如果这个八字没有丁亥这步运双合的，或者他不是生在壬寅时的，在乙酉运的时候，我就会劝他了，成了以后就要退休了，不要再搞下去了。搞下去你就会败。
<p>那么丁亥运以后还要不要算呢，当然也可以算了，因为普通算命啊，到七八十岁也就可以的啦！那么你说丁亥，虽然是双六合，那么好在什么地方呢？是老年当选立法委员呢？还是去做生意了呢？就要由十神来决定了。水克火为财，这是走财运。丁亥运呢？双六合，天干是什么呢？水生木，伤官双六合，两种好坏不同，前面是间接的，是靠人家帮你成功的。后边丁亥运呢？是直接的。你自己就有好运，所以讲运同流年不一样，当事人听的是一个希望，流年倒是真正是你眼前所遭遇到的事。也就是随便聊一聊，你看我什么时候走好运啊？就是要看这个的。你问我今年运气好不好？只看流年就可以了。那么一个八字是如此论，一百个八字也是这样论啦！完全就靠刑冲合会来分散或集中，在每个重点上去论。</p>
`,

 GL:`<h1>干禄 </h1>
<p>干禄就是我们在十二生旺库之临官位，临官就是禄。就刚刚好，也不刚，也不柔。所以算命喜欢禄，不喜欢刃，刃是过刚，一杯水拿出来，都满出来了，你怎么喝呢？禄不是，八分，任何事情他都照应该的标准打个折扣。所以命坐禄的人，不卑不亢，不会自己损失利益，也不会开价开高到令人感觉这个人很贪心。如果年上坐禄比肩看，对父亲不利，因为你谈不上有志气。月上坐禄二十七八岁会有很多理想，但不過分，我想做個經理、我想怎麼樣，不過分。自坐到中年才有理想。時支坐祿比如甲日寅時，晚年才有志氣。那麼各位有沒有看到很多朋友，年輕時一大堆理論，晚年啊，什麼理論都沒有了。有些人年輕時一點出息都沒有，四十歲過後見解很多，這就是他的命，祿旺坐在哪裡，坐在後面，就晚年。那我順帶說一句，如果八字祿刃，干祿同羊刃統統沒有，那麼這個人怎麼樣呢？什麼也不想，我想各位也看到過，你問他想什麼，他什麼也不想，有棟房子吃飽飯就好了。這也蠻太平的啊！祿跟刃啊，是講你個人的一種理想。</p>
`,
 WCGR:`<h1>文昌貴人 </h1>
<p>文昌贵人，大概只能给男人用了，文昌一看就知道了，书读得好，譬如男人五个博士不是更好了吗？女人就不是好事。那么暂且我不谈，现在少了，古代社会多，我个人体会到一个女人，如果有两个博士就很麻烦，很难嫁啦！妳要找两个博士的男人，不好找了。所以女人普普通通什么大学毕业，国中都没有关系啦！所以文昌贵人是对男人，希望书读得好，你命带文昌考得到好学校，等等。贵人就是前面是好的，后面好不好另当别论了，我们也见过好朋友、好部下翻脸的，你栽培的人反你的，这另当别论啦！</p>

 GJ1QGJ:`<h1>格局 (1)取格局 </h1>
<p>在以前所讲的十神定位的内容，听起来每一个十神都有它的特色，这个特色的范围就是规定的亲属、时效、性格，等于是画先描一个轮廓，不能够详细谈命理，那么在这一段时间，最主要的还是要各位把四组规则清楚，那就是刑冲合会、六亲代表、十神生克、五行禄跟绝。那么到现在，我想各位已经有了命理的基础，就可以进入真正的论命这个阶段。
<p>十神定位只能算是常识，那么正式论命的阶段呢，一个八字有八个字、天干地支，我们也知道八字有五行，但算命不是用五行算的，是用十神算的。十神之产生，就是日主五行对天干地支七个单元彼此间的生出、生入所产生的比肩、劫财、食神、伤官；等，那么个别讲就是十神定位，合在一起讲呢，那就不一样了。
<p>日主只有一个五行了，比如甲乙就是木、丙丁就是火，那其他三个天干、四个地支就不知道是什么了，那七个所有五行都可能有的啦！十天干、十二个地支，那么在没讲到取格之前，就发现里面有一个不协调的问题就是天干有十个，地支却有十二个，十个对十二个怎么个对法呢？必须取出一个统一的管道，在子平法里面的统一管道，就是把地支变成十天干，这个我们就叫做支藏天干。我们都知道子就是癸、丑就是癸辛己。
<p>编出这套规则当然有全套的理论，目前我们可以不要去管这些，只照答案去对，一个八字天干，日主对三个天干，取三种十神，十二个地支每个地支里面都有支藏天干，也各有各的十神，那么就产生出一个问题出来了，有的天干有、地支也有。有的天干有、地支没有，那么就从这个地方开始作进一步的讨论，天干由于地支之间产生新的术语，叫做天透地藏。天干有甲、地支也有甲，叫地藏，地支有甲、天干也有甲，叫透，以天干讲这叫藏，以地支讲这叫透，合在一起讲叫天透地藏。
<p>那么天透地藏不过两个字而已，在命理中间带出以前的时效讲呢，十神定位的六亲时效，就另一种含义出来了，既然是天透地藏，就算你在一柱里面，也有十五年的时效。譬如月柱地支透在月干，十六到三十岁，月柱地支透在时干，十六岁到六十岁，时间很长啊！内容怎么样，倒暂时慢慢谈了，一件事情十六岁到六十岁都影响你，我看就影响你一辈子了。
<p>那么这种时效问题呢，我们就称之为格，不谈吉凶，只谈它的范围，这也是我们普通人平时讲话：有没有人格？有没有格调？人格同格调都不是一天形成的，时间很长的。这就是取格。任何一个八字，你要讲出一个格，这个格是代表他一生啊！讲夫妻钱财只是你人生之一部分，那么取格呢？这个天透地藏就够资格取格，这个格好坏另当别论。
<p>先讲成格的条件啦！譬如我们现在看到《子平基础概要》四十六页（第十三版），有个八字： 癸巳 庚申 壬子 戊申 如果照我们以前方式看，只讲天干什么，找他的时间、六亲，那么天干有正印或者有什么，地支有没有？这个八字天干有癸，壬子下面又有一个癸，这是天透地藏啦！癸通根了，这个癸是日主的劫财，年上劫财通到日支，这个劫财，这个十神定位里边是可以用的。但是取格局呢，要日主以外的五行，这个劫财从六亲方面讲是克妻的，同事业无关的，劫财也是破财的，破财是一种现象与事业无关。所以算命里这个格局，同日主相同的没有格局，没有比肩格、没有劫财格，只有其他八种是有的：食神、伤官、正官、七杀、正印、偏印、正财、偏财，所以这个劫财通根呢，不成格局，只是一种现象。
<p>那么在这里你们就体会到，在十神定位里讲到的不是荣华富贵，只是一种现象。你没有钱破财同你有钱破财，对破财讲是一样的。那么劫财是没有格的。天干有个庚字，地支里面有没有庚呢？有，申里面有戊庚壬，它有两个申，年柱巳里面是戊丙庚，也有申，这就天透地藏了。所以这个金生水是偏印，偏印什么性质，这慢慢谈，这个八字就成偏印格了。
<p>那么后面还有个戊呢，土克水是七杀，也是一样，看那个支藏天干有没有戊？申里边有戊，巳里边也有戊，那么偏印同七杀地支边都有根，这个八字就变成有两个格局啦！是偏印格、又是七杀格。那怎么算呢？这个时候我们还是要讲年限了，年上、月上偏印或者时上偏印格，按年龄算了。论格局，年上最不值钱，因为你根本就没有事业，所以月上偏印格说明这个人在三十岁以前偏印格为主，四十五岁以前是七杀格为主，吉凶祸福可以慢慢谈。
<p>谈格局的吉凶祸福很细腻的，比十神定位细得多了，现在所讲的要认识这个八字什么格局？所以这个八字讲有偏印格同七杀格两个格局。那么，大家都看到偏印同七杀都有通根到时支，所以这个人虽然有两个格局，这两件行业之间有关系，不过轻重而已。既然通根到时支，这个人不会退休的。时支是人生之晚年，格局是人的事业，事业有成没有成？或者你要做多久？这个是两回事。有很多人来问我八字，他根本不是问吉凶祸福的，他只是问要不要退休？退休之后要不要从事这个、那个？以这个阶段就可以决定的，如果格局通根到时支的，你的工作事业可以换来换去，但是不会退休。这就是取格局，这叫偏印格同七杀格。各位看到批出的命书，头一个就是先批你什么格局的，这是取格。格局就没有十神那么简单。我们再看第二个例子： 甲辰 辛巳 甲辰 壬辰 日主辛，天干有壬，金生水，我生者伤官，地支有没有壬呢？没有。天干有甲，金克木为正财，地支有没有甲呢？也没有！那么八字就是天不透、地不藏了，按道理讲是没有格的，不像刚才的天透地藏很整齐的，在没有格的情形下，在取格局裹边另外有一条规则，叫四见，四见用五行讲，天干裹有壬，辰裹有癸，癸不是壬，但壬癸都是水，那么天干一个壬、三个辰裹有三个癸，壬癸加起来四个水了，四见只要透出天干的，也可以取格，那么金生水就变成我生者为食神、伤官，这是伤官格。同刚才取的天透地藏性质就完全不一样了，是杂拼的。
<p>我举个例子讲吧，譬如我卖泡泡糖、卖玉兰花，不一定我是卖什么的，过两天我又去卖奖券，听起来一样都不行，但总合起来讲呢，是直销商这总不错吧。卖玉兰花、泡泡糖也可以赚很多钱的，也许比一个公务员的薪水还多哪！钱多、钱少是另外一回事，如果像四见拼起来这种格局，就是杂七杂八拼凑起来的啦！除了谈吉凶祸福之外，我们还是可以谈年限的，你的格局天干透在年——伤官，这个时支辰里面它有个癸，食伤在十神里面是不一样的，就五行讲是一样的，所以这个人一辈子到晚年，他的行业同家属、童年啊，一定有关，这个叫通根，什么干拉过来，就把时效拉过来了。
<p>再详细讲解，格局从年通到时，以事实上讲，年上你七岁，哪有什么事业？时支有事业的，因为你通根到年，这个年并不代表是年限，而是代表你的事业同你年轻时有关。凡是一种通到时的格局，都是同家里有关，不管你是帮家里赚钱，或是败家里钱，那慢谈，这件事情啊，就是年时通根的时效问题。四见的格局，同那个天透地藏的格局不一样的，时效是一样的，你通到哪里都是占据这个位置。
<p>乙亥 甲戌 壬辰 庚戌 这个八字我们在十神定位章节里拿出来做过例子，不过那个时候讲的不是格局，只是从六亲时效讲。那么我们现在相同的八字，从格局看，日主自己五行是水，年上是己，土克水，在十神上讲这个是年上正官，光凭这句话，从十神定位就可以说他的家庭出身最起码有一栋房子在，因为财官印是好事情嘛！那么第二个是讲壬见甲是食神，对女命讲是小孩，那她才二十几岁谈小孩太早，就不提了。那么庚呢？壬见庚是偏印，个别解释法是说你晚年的艺术气质。这里是讲十神定位，现在我们谈的是一生事业，她是干哪一行的？什么时候开始干的？这个是讲格局。
<p>你看那个己，四个支藏天干里边都没有。所以正官就通不了根，首先讲就不是正官格了。那么连带十神定位讲，你年上正官只到七岁半了，长大以后，你家里是同你没关系的。第二个甲，年上是有的，可以算为食神格，不过这个格局是没有什么用处的，因为年支透到月干，你太年轻了。也就是说十五岁到二十二岁，那是食神格。
<p>如果照事实上来解释，这个人在念大学的时候，我要怎么样、我要怎么样，一大堆意见，二十二岁一过没有啦！那么时上是庚，地支也没有。单单就天透地藏，只有一个格食神格，失之太早，其它的呢？都不存在，那怎么办呢？就第三种取格的方法，刚才第一种天透地藏，第二种四见，那么这个八字怎么办呢？就混在一起，庚辛混在一起，就是偏印坐正印了，马马虎虎算印格了。一个八字说人家没有格听起来不太好的啊！
<p>如果四柱没有格的人，是没有定性的，一会儿这样、一会儿那样。如果完全没有格的人，年上正印就是正印性格，时上伤官就是时上伤官性格，没有定性。这个八字勉强算是印格，但我们要知道这个印格同真偏印、真正印不同，偏印坐正印，又正又偏，是混的，有点杂了。怎么个杂法呢？举个例子：比如一个大学教授，你在大学教书不就好了嘛！但他还兼到补习班去教书。大学教授是正印，补习班是偏印，这也没什么不对啦！就两种市场。那偏印也可以兼正印，譬如我们看到庙前面卖香烛，兼差的啦！有的庙不卖，有的庙卖。或者中药房也卖西药。有钱、没钱另外一回事，他的性质变了。那既然在时支，还是那么讲了，不能退休了。但是天干是偏印，地支正印，有点轻重之分，六十岁以前是偏印为主，六十岁以后正印为主，但还是兼在一起啦！
<p>现在知道取格已经有三种了，第一种是天透地藏，第二种是四见，第三种是阴阳相见，勉勉强强来取格。我现在只是讲取格的公式，没有谈细节。因为天透地藏，不一定在同一柱的，也可以好几个格的了。还有第四种，不必天透地藏，也不必四见，而是完全讲地支三合、三会。那么既然讲到合会，我就顺便解释一下，寅午戌三合火就是生旺库。那么亥子丑三会水，就是气偏一方，那么力量就很大的，足够超过天透地藏。以下这个八字： 乙丑 乙亥 丙子 戊子 各位看，天不透地藏，明显的。但是地支亥子丑三会水，三会就等向天透地藏，还超过。三会力量很大。那么三会水，对日主讲，日主是丙，水克火为官杀，所以这个八字就是七杀格。那么合会啊！三合同三会力量相同，但气质上不同。
<p>三合是生旺库，三会是气偏一方，简单讲三合是霸道，譬如你管人，有十二个人，只要管住中间三个最厉害的就可以了，大家都听你的啦！有一点霸道。三会是王道，气偏一方，三个连在一起。这就王道。我再举个例子，我拿薪水为了吃饭，但是工作我是真不喜欢，但不干就没薪水钱了，不得不干啦！这叫霸道。王道不是，我倒不一定为了薪水，这工作本身，我就非常喜欢了。有钱，更好！这是王道。至于哪种行业的王道、霸道，慢慢讲了。
<p>这个叫普通格的了，格局并不是只有这四种方式、八种格局了，还有别的，叫特别格，以后会讲到。譬如魁罡格、金神格了。等于说你有特别通行证，有特别的规则。格局在哪里，就是他的事业在什么地那么不谈吉凶祸福，以人之情常可以推论他这一生怎样度过的。
<p>举个例子，从月柱地支透到時柱天干，不管你是正官格、七杀格，从十二岁起一直到六十岁，我们以人之常情来讲啊，未免工作时间太长了吧！一个人做事十五年大概就差不多了，那么以这个性质来判断那个人是个劳碌命。好的程度也比人家慢啊！那么这个就是时效中间。反过来，月柱地支透到月柱天干，总共就是十五年，前面几年没有用，还很小，十几岁啦！又好像少年得志，后面又不灵。比较恰当一点的，就是日主地支透到月柱天干，那么这二十</p>

 GJ2RZQR:`<h1>格局(2)日主強弱 </h1>
<p>那么现在这个单元，普通话来讲，就是分强弱。讲的细节一点，我们叫十二生旺库，这个十二是分为十二等分，生旺库不是子平术语，是五行家的术语，子平不是独立的，是根据五行学来的。这个生旺库是讲五行的，譬如三合就是生旺库，寅午戌三合火，长生在寅，旺在午，库在戌，五行讲生旺库。那么到子平，分的更详细了，十二等分。
<p>在《子平基础概要》第三十四页（第十三版）里有一份十二生旺库表，这张表在算命里是非常重要的，比如一碗饭，很小的一碗，很大的一碗，要差十倍啊！所以讲这个是强弱，又叫轻重。譬如官杀是先生，有官杀只代表有先生，先生好坏不在此列。那么怎么分强弱呢？先从十干分起，甲乙丙丁，甲日主自坐可以坐六个地支：子寅辰午申戌。引可以十二个都有了，什么叫做引？甲没有甲丑，但可以生在丑年、丑月，这叫引，就自己拉到别的地支叫引，自己对自己的地支叫坐，大家对这几个字要知道。譬如我举个例子，引到时支是讲晚年，引到月支是青年。
<p>强弱分作两个范围讲，第一谈日主在算命讲身强。日主就是我，也叫身，也叫日干。算命很讲究身强，日主主要强，比如甲木生在寅月，东方木甲乙卯木，那就很有志气，我要怎么、怎么样，你有志气不一定办得到的，格局也要强，所以身强、格强，这个人就有前途了。如果身弱、格强，环境很好，他不想要干事的啦！我都见过，升官有的大家抢，有的叫他去都不去，让给人家好了，身弱不能托财官。那么这是一个概念。那我不管日主也好，其他天干也好，总而言之就是十个天干了，那你看这个表，我举例子讲，甲见寅是临官位，甲见申是绝位，临官这两个字在算命术语也叫禄，也就是我要你们背的甲禄在寅、绝在申，要背，最强的与最弱的要记熟，其他中间的背不出来没关系，禄绝要背熟，最重要的是禄跟绝。
<p>十二生旺库最早讲的是十天干，真正用的时候不是十天干了，是讲十神。除了日主以外还是十天干，就是讲十神，引到你的格局，引到你的六亲，旺跟绝，分十二等分，特别要讲清楚的是生旺库，生是长生，生生不息，将来好坏不谈，现在总是生生不息，是有前途。这个禄跟帝旺就已经成了中年，举个例子，年上偏财坐长生，偏财是你老爸坐长生，你的家运会一步一步往上升，你不一定是偏财格啊！如果你偏财坐临官，你在幼年的时候，你家里已经是到了巅峰了，多少钱不谈。如果你偏财坐库，那么你家里只是守成，库是有的了，已经成了，这就不要干什么了。举个例子你爸爸干什么的？什么都不干，已经退休了，那就是库了嘛！他有退休金在的。
<p>那么这个生旺库在十神里、事业里边，统统可以解释出来。那么真正可以用到的是禄跟绝，一个日主比如甲申日，甲绝在申，这人在中年时随便你格局好与坏，他都没什么意愿啊！所以人这个意愿同志气是天生的，有人根本就不想发财，有人非要几千万不可，这就是身强、身弱的问题。那么在古人讲命理，首重身强，这是文人之谈了。小年纪，我要中进士、要中状元，中得到中不到是一回事？就算中不到，你也要立这个志向！这是清朝考试制度，现在又有点不一样了，譬如我想要两亿，这个不容易办得到的了，反而把自己累坏了。

 TH:`<h1>桃花 </h1>

<p>男命伤官见官，在比较深一点的命书要有个比喻，伤官见官好比强盗遇到警察了，那很糟糕的，正官、伤官最好不要见面。这个讲正官啊，女命的范围占最大，那么在女人讲，年上正官不谈夫妻的，只讲家里出身好。月上正官三十岁之前不论是好、是坏，都不能成定论。那么时支正官、时干正官，这是指晚年，那么这个人如果来，已经超过四十五岁以上的了，那恭喜了，不管前面遭遇过多少事，时干正官同时支正官，人生晚年之归宿了。
<p>有很多女士已经离婚的或者死先生的，问我晚年有没有感情生活，会不会孤独？如果你时柱有官杀在 了，一定有的了，至于有没有名份，那另当别论了，那要按你八字全局论了。那根据我所看八字的经验，只要超过五十岁以上的女命，不太重视那张纸的啦！那么我讲这个正官连男命带出女命，那么正官、七杀对男命来讲是儿子，那一谈到儿子，就犯了我们算命上的一个忌讳，我们很少谈人家小孩子好坏的，怕人家听了不舒服。
<p>所以关于这个，我们是谈夫妻的，小孩子好坏都是讲几句客气话的，子女也是天命啊，它分有没有？以及好不好？也就是我以前同大家讲的，三不谈啊！就接触到人性最核心的问题。
<p>不过我们要知道，官杀是男命的小孩。如果女命五行不全，没有官杀，例如甲日主四柱缺金，我会对那位女士明讲这句话，这是为她好，不要结婚，在一起就好啦！如果男命四柱没有官杀，这就不能讲了，因为触到人性根本的核心问题啊！那么正官，我们就讲到这里。</p>

 ZC:`<h1>正财 </h1>
<p>这节讲的是正财，八字都有正偏，尤其主流的财官印，正财、偏财、正印、偏印。那么正偏是讲它那个过程，正财格的人一板一眼的，例如我举个例子，譬如说八月节，香港来台湾卖的奇华月饼，卖光就拉倒了，不会为了少数人再来多做一点的。那么偏财格赶快再做啊！尽量卖。那么正财格的人，为人端正，倒不是指法律问题、人格问题啦！处事啊一板一眼的，不管他再有钱，有几个亿，也不会去买劳斯莱斯的，皮鞋最多三双，就是一种简朴、端正，但是有个缺点，就是很乏味，一板一眼的那种生活，端正简朴能管钱。不会钱多了，马上就松起来，这是他的性格。
<p>在六亲方面，正财就是太太、正妻。偏财是偏妻。那么这个还是按照一般性十神分类，先从性格、再说六亲，然后到年限。比如说正财在年，是家里有钱，这个年上正财和年上偏财就有一点不一样了，譬如你老爸做股票有钱的，那是偏财。如果你老爸是开百货公司，那是正财，都有钱，但财源不一样。那么正财是怕比肩的，偏财也怕比肩，但正财遇到比肩偏财遇到比肩情形不一样。正财遇到比肩是慢慢倒、慢慢倒的。比如说做股票吧！正财他本来不做股票的，如果去做，譬如他有十块钱，最多只做两块，赔了本再来两块，一点点来，好像一棵树倒下来，缓缓缓缓倒。
<p>那偏财就不一样，就十块钱一下都摆进去，甚至再借十块钱来做的，成败就一次。所以正财格局不可能一夜之间发达，也不可能一天之内倒光。所以在人生情趣上，正财格是比较乏味的，年年差不多的。偏财格的过程比较精彩，那么年干只要是财官印的，正财、正官、偏财、正印的都是好家庭，好到什么程度呢？用十神定位是没办法讲的，要用别的办法衡量。但是用句简单的话来讲，称他为书香门第、知书达理、起码有一栋房子，这是不会有问题的。
<p>那么人生之吉凶祸福，就跟著年限走、就跟住四柱走，那么年限正财到了年支，年干、年支对普通人来说是没有什么差别的，六七岁同十三四岁没什么大影响了，最多只是说你的出身高与低，最多这个，真正发生人生影响的是从月柱开始。
<p>所以算命以月令为决定你吉凶之第一步，也就是二十五岁到三十岁左右。那么月干是偏财，也就是说三十岁以前，就有点你自己的钱财了，那么讲到财要生克化一起谈的。比如说年干比劫、年支正财，月上比劫那就不妙了，那你家运要败了嘛！一者可以解释为家运败，二者也可以解释为你同家里不和，你十六岁之后和十六岁之前你的人生处境就不一样。
<p>那么一旦到月支呢？那就到三十岁啰！那么月支正财，到底解释为财还是解释为妻子？还是解释为女人呢？那么要用人之常情来谈。什么叫人之常情？也就是我们一般牲所说的，三十岁的男的，他能有多少钱嘛！就算他老爸有钱，也不会多给你的。所以说凡是八字上三十岁以前在月支的不论正偏财，都以女人为优先。那么月上正财指太太。偏财就不是太太了，这个妻子的名位，要分古代同现代不同的背景来谈的。民国二十年以前社会封闭，婚姻就是结婚了嘛！没什么大家在一起的，没有这种事。现在解释的正财，你结婚也罢，不结婚也罢，一张结婚证书倒不是最重要的，你就是个女朋友，他对你也等同是自己的妻子一样，有其实在的实质情形。那么月上是妻，财官在年月，对命理上讲不太重要，尤其在年，出生高低没什么关系。
<p>真正重点要过了月柱之后，自坐，就到了三十岁到四十五岁了，所以八字如果一旦有冲刑，最怕的就是月日冲，冲的力量是一样的，譬如我打你一拳，打在手背上没有什么关系，打在眼睛上这问题就大了。年月如果冲，子午冲、卯酉冲，这是指你三十岁以前，通常都是指家运不好，所以才影响你；只有极少数的跟家长谈不来，或是自己是不良少年，花头很多的。最怕是日月冲，日月冲里面也是三十年啊！
<p>十六岁到四十五岁，那么到底什么是为优先的呢？这就讲十神了。
<p>比如说你月柱是财、正财，一旦遇到冲，最明显的就是女人和钱财方面的问题。如果你是七杀逢冲，那都是小人啊！所以冲刑的重点要以月柱和日柱所坐的十神来代表，比如自坐正财——戊子日，就是自坐正财，那是最稳健的一个组合，日支本来就是妻宫之位，那么你又坐个正财，可以解释为夫妻恩爱，但是不可以冲，一冲的话，也会发生别的问题。那自坐正财能发财吗？不会的，因为十神定位是针对普通阶层讲的，日支管三十一岁到四十五岁，各位可以随便想想，这十五年中间，不发生任何意外情况，想必一栋房子就有了，对人生是非常重要，尤其过了四十五岁，人生观稳重，不像以前年轻的时候会随着环境浮动，这是日支坐正财的特点。时干坐正财指四十六岁大概到六十岁，也不算太晚，那么这段时间要不要看做事业呢？要根据具体命主的情况来看。
<p>有很多公务员的朋友来问我：你看我要不要退休？如果他的格局不在时柱的，我就劝他退休了，他格局在时柱的，可以多拖几年嘛！那么这是时支坐正财，这就好坏两论了。时支是六十五岁以后了，一个人到六十五岁以后才有第一个一百万，是有点来得迟了一点。不过从好地方想，总比没有好。所以时支正财啊！也恭喜他命长，晚年有一个好运，可惜的是三十岁给你一百万和六十岁给你一百万，差得很远啊！那么这是时支正财。在算命裹面，它有种天道循环性，时支好，前面一定是不好的啦！如果前面财旺，后面一定是不好了。天道没有前面好，一直好到底，也没有一直坏到底的，都没有的。那么这两种情况，哪一种是为理想的呢？不是我们论命的人谈的，是以你来宾为主。
<p>如果先生只有三十岁，时上坐正财，我根本就不提这个事的啦！还有三十年哪！提它干什么。如果这个人已经就五十几岁了，那我就对他说了：恭喜你了，晚年非但有钱，还有个美好的家庭。那么这个是讲那个性格、年限。时支这个财，所有十天干都差不多的，男命重在钱，女命重在夫子。那么这个唯独正财有一个很特别的条例，只有它才有的，正财格的人个性很急、很急躁，你跟他讲话啰嗦、他没有兴趣听的，你简单跟他讲了就好了，所以正财格的人性格很急，伤官格的人很骄，带比肩的什么都好好、好好、好好！正财格性子急。
<p>那么正财、正印，各有它不同之中的相同，正财、正官、正印三者合起来有一样东西完全一样，就是财官印的人不乱花钱的，这是说他坏处了，从好处讲花大钱、不花小钱的，你跟正财格的人说，卖东西给你两千块，他听都不听的，你说两百万，他会听一下啦！他花大钱、不花小钱。各位也看到社会上很多人，小钱很计较，大钱就不计较了。有的相反，那么这就是财官印格者花大钱不花小钱之人也。给人家初步印象就叫小气。他那个部下向他借一万块他不借的，随便晚上请客十万他花的啦！就是那种花大、不花小，这个是正财性格。
<p>正财，现在可以把它放宽一下，正财成格，天干又带偏财那怎么办？偏财成格、天干也带正财，也就是混起来了。我以前讲正印就是正印，偏印就是偏印，正财、偏财也分开谈，现在我们可以把它连起来：地支是正财，天干正偏财都有，那么变成两种差事了。两种差事都有，所以职业不纯了嘛！那么职业不纯的范围，譬如说，有人在学校里教书，不只是教书了，有的人还到补习班去上课、兼职。我看多了，本行之外还兼一点其他差事。甚至于说中药房本来是卖中药的，还卖起维他命了，这就杂了。所以遇到正偏财混的人，我们就讲：你不是干一行的。不是指换来换去啊！同一行换来换去这个不算的。譬如我在台北教书，高雄也是教书，这是同一行。
<p>正偏财混杂的人，他们喜欢多管闲事。比如我看到一个学校的老师，他还管起了福利社的事情，这就是典型的偏财表现。第二种情况是正财和偏财混杂的，我们经常能看到很多人做兼职，主业做一行，副业又做另一行。正偏财混杂还有一种虚张声势的表现，比如我看到一家办公室门口挂了四个招牌，四个招牌都是他的，内容也大同小异，他就是喜欢摆这种排场，名片拿出来头衔一大堆，这就是正偏财混杂的表现！这是在讲事业方面的情况。
<p>谈到女性时，正财与偏财混杂的情况也是如此！有些人拥有女友却无人知晓，若是正偏财混杂的，则众人皆知。我曾亲眼目睹他的正室与偏房相处融洽，亲密无间！通常正室与偏房是不相往来的。因此正偏财混杂于天干，家庭纠纷相对较少，这也算是一个优点。那么究竟谁先谁后呢？也是有区分的！正财在前、偏财在后，则是先娶妻后有情人；若偏财在前、正财在后，则情人可以见到妻子。这个决定权在于时支，比如我们所说的出生时辰，时支主宰着人生的晚年，无论你命带正财还是偏财，只要时支坐比肩或羊刃的，统统都会化为乌有。
<p>那么前面不管你比肩、劫财再多，你时支有财的，晚年一定有。
<p>那到底是正财好？还是偏财好？我们是没有标准的，因人而异，不过我们站在男人的角度讲，不公平的啊！也不合理的，最好是时支偏财，因为一样有伴侣陪着你，她还不要你结婚啊！那你说有点违反传统是不是？并不，因为我从事这行年代久了，我知道凡是五、六十岁以上的夫妻就算死掉一个，跟另外的对象在一起了，也不能结婚，为什么？财产问题？子女问题？一结婚就麻烦大了，这房子怎么分嘛！所以時支偏財對男人，比較容易處理。
<p>但是有一件事情就需要谈到有没有这个命啊！这得过七十岁以后了嘛！七十岁之前还未必用得到。时支，妻财子禄寿五件事情，人生只要得到一样，就不算亏本了，你有一个好太太未必有钱！或者你有过几亿，或者你活一百岁，三样只能拿一样。
<p>那么这个正财比偏财事情要简单得多，那么现在我们讲的是正偏财。那么正偏印也是一样的，正印就是正印，偏印就是偏印，正偏印一起混，那么就有点像我们前面讲的兼差的老师了，在大学上课，又跑补习班上课，两种差事混在一起。而且这两种有点不一样，正是固定的，偏哪！没什么固定，就好像说开百货公司一个月营业额多少钱，这是正财。卖古董的，古董突然之间卖得好贵，这是偏财，也是偏印，大家要从这个地方去体会。但是真正发大财的是偏财，不是横财。
<p>正财这一段，各位听到这里大概已经体会到了，正印、正财比较少一点，偏印、偏财比较多一点。那么就稳定讲，正的稳定，讲成就高的话，偏的成就高，但是非多。成功的人是非越多、成功越大。不过对普通人讲呢！安稳一点就算了，那么还是正财、正印为主！那么正财就讲到这个地方就告一段落啊！</p>

 BJ:`<h1>比肩 </h1>
<p>现在，我把十神分为十个单位，每个单位具体为各位进行解释。当你对十个十神都了解之后，整个八字你就都了解了，一共就那十个字，我首先讲比肩。比肩在《子平基础概要》的第一至三页（第十三版）。我们算命时谈论吉凶祸福，尤其是从事五术文化的人，特别在意一件事，那就是算命到底准不准？我对别人说的话，自己能不能相信呢？你凭什么道理去论断别人一生的妻财子禄寿等祸福呢？八个字能涵盖那么多内容吗？这也是我们讲课的主要目的，要从根源讲起。比肩只是两个字，哪会有那么多吉凶祸福呢？所以我认为这既是学术，也是实务，接下来为各位解释比肩。
<p>首先，比肩的产生是指日主与八字天干地支相同，这种情况就叫做比肩。什么叫做相同呢？如果日主是甲，遇到甲就是比肩。不管是在年柱、月柱、日柱、时柱，或者是在地支。甲遇见甲是比肩，乙遇见乙是比肩，丙遇见丙是比肩，依此类推。那么这里就产生了一种人情哲学方面的思想，这就是和自己一样了嘛！和自己一样就是比肩。属于同性，那么以人之常情来说，同性怎么样呢？同性相斥啦！男生和男生在一起，女生和女生在一起，就不如男生和女生在一起谈得来。同性相斥是人性。那么运用在命理上该怎么解释呢？也就是相互排斥。它排斥谁呢？排斥它自己。所以命带比肩的人讨厌自己。他总是觉得自己昨天做的事情不对，事情做出去了就会想自己有没有搞错？那么这种想法一旦体现在人身上，就决定了他的性格。一切吉凶从同性相斥开始。那么既然是在五术界这一行里的人，当然思考得会更细致。
<p>同性相斥首先会发生什么事呢？讨厌自己。讨厌自己就会后悔，后悔是个人的感受，对处理事情就不一样了。假如这个人问我，改行好不好？如果他命带比肩，我就会说：行，不但要改行，不过你还是不会发财，那是另外一回事了。 所以同性的表征：第一个就是没有持久性。包括很多老板找我算命，他算的不是他自己的吉凶祸福，他算的是重要干部的人选，来问我这个人能不能用呢？如果带比肩的人，他最多跟你三年，没什么理由的。所以头一个就是同性相斥，性格上他不会长久。 第二个，随之而来就是生克问题了。比劫生食伤、克财！这样一来，要是单独来讲就容易，我说比劫克财、财克印、印克食伤，人都晕乎乎的了。现在只单独讲比劫克财，那就好办了嘛！那么研究比肩至少要三天，把这句话背熟就行。带比肩的人不把钱当回事，钱花光了怎么办呢？没关系，明天又会有啦！爱散财，对钱看得不重。而且财又代表女人啊！

 LY3:`<h1>流月 -3 </h1>
<p>所以论八字的几种法则，每一种都有它的有用处，没有大小之分啦，完全决定在对方之意愿，但是在上课的时候，我们可以平等的看，照本宣科，八字本身也看、大运也看、流年也看、流月也看，通通能看之下，至于用哪一种？因人而异，那么几种就像那厨房里油盐酱醋，通通要有啦！
<p>现在就要举真正的实例，从八字本身讲起，都要讲到每一步大运，通常讲六步运，妻财子禄寿分开谈，这也就是细批终身之标准。然后谈流年，流年只能作个样板，因为太长了，一本命书四、五十页啊，甚至于六、七十页。那么前面这一段加起来，大概是五到十页，因为你能写两年流年，就能写二十年流年的啦！那么，在最后一节课时，我把它批成一份命书，把所有理论一条条这个讲下去，这连批带讲了。在这个阶段之前，我们只讲不批，讲个次序。
<p>那么现在我们就举个例子，这例子在《女命详解．女命通会合订本》里也有，那么我们不照书来念，这个八字辛卯、丙申、戊申、壬子，天干地支都写好的，包括十神、大运全部有的，那么要讲她夫财子禄，要讲她每步大运以及流年，现在就等于说她不必问，问的话是我只照重点来答，我把她当作教材来谈。这八个字，各位要记得这个八股批命书啊！有个一定的范围，就好比炒菜，头一件怎么样？把火先烧热啦，再摆点油，后面再其他文章来了的啦！八字头个最重要的题目，我们以前举过一个例子的，那时候没讲到流月，现在我们就把它讲得更具体些，头一个就分辨日主是什么五行，日主五行就是你的性格，就你的嗜好，不论你有钱、没有钱，你的性格不会变，倒霉的时候，喜欢吃辣的，发了财以后，还是喜欢吃辣的，喜欢红的，一辈子都喜欢红的，这是日主五行。
<p>这是戊日主，戊日主的五行一看，我们就联想到以前所讲的十天干喜忌，戊土是城墙土、厚土，或者河边的堤防土，准备人家冲的，在伦理方面解释是信，很有信用，那么有信用，不一定能成功。没有信用，也可以成功喔！信用是他一个主题，那么戊要什么呢？就我以前所讲的：一个山就一定要有树，光秃秃的山怎么行呢？那么知道这个人需要群众，不是你有很多部下，譬如我开自助餐的，那不是靠群众吗。我卖钻石的，就不靠群众了，那还得了啊！围一大堆人来。
<p>所以一棵树扎在土上面，能扎多深？最多二十丈已经算很远啦！所以这个呢不是讲长期生意的，而是固定的一种型态，那么好命？坏命呢？先从坏命看，先看会不会是坏命，不要先去看他是不是好命，为什么呢？好命人很少，普通命多，那么所以头一个就看他五行全不全？并不一定真按照我这个次序做的，总之都要考虑到哪个方便就从哪一个着手。
<p>如果是丙日主，这个人成功失败都在因为他有礼貌，如果是金日主不问成败，管闲事、讲义气。水日主自我标榜。土日主很守信。这是它一个性质，五行全不全为什么要优先看呢？不论男女最怕缺掉最重要的一行，男命怕缺妻财，女命怕缺丈夫就是官杀。如果一个八字男命缺妻财，你怎么讲都没用的啦！如果夫妻不好、钱不够用，一辈子都很伤脑筋。女人也是一样，四柱无官杀，那是没有婚姻的，那么就包括支藏天干是在内啦！你看金木水火土，这个八字里面有没有呢，只要有就可以，夫妻处不好，同没有夫妻两回事情，先要有，一看这个八字日主属土的，很稳重的。五行全的，那么再下就看有没有冲刑？有没有合会？一带冲，好比坐在汽车上写字，你怎么写，笔都会歪出去的，根本就不能写什么的啦！
<p>那么看这个八字，卯申、申子没有冲，那么这个人一生不会有太长久的灾难，不代表他是好命，这第一个，第二个就讲合了，在这个八字里面，又有新的东西补充上去啊！我们古人讲：活到老，学不了啊！我现在还是有需要学习的地方，譬如说八字你们一看：丙辛合，很好懂，年月双合，下面的卯跟申哪，初看是没什么关系的，但是研究算命三年以上的人就知道啊，卯申也是合的，那书上面没那一条啊？这就是天干代地支合，乙禄在卯、庚禄在申，天干乙庚可以合，所以地支卯申也可以合，这个叫取代啊！那么这个八字就是天干、地支明合、暗合，明合大家都知道的，暗合就是好处一样有啦，但是是暗的，我举一个不恰当的譬喻，比较好懂。譬如我想送钱给你，我不能那么送，我请你来打麻将，假装输钱给你，这就暗合了！暗合对你有好处的，但不是明讲，拐弯抹角的啊！那么既然是年月明合、暗合了，那个八字吉凶就来了，你三十岁以前很有人缘，很有人缘并不代表多少千万、多少百万的，有人缘总是对你有帮助的啊！所以说这个八字，三十岁之前很通顺，顺到什么程度？那么就要用我最早讲命理这个人之常情啊，这有限的啦，三十岁以前能有几个钱？不可能发财的啦！最多也不过是少年得志，那么这个是照年月分的。如果照我以前的讲法，怎么对你讲呢？要看你是几岁？我来讲的啦！那么算命一定要分清楚，是男的、还是女的，男女双方人生立场不同，那么这个是女的，女的是以丈夫为第一啦！戊日主以甲乙为夫，这是根据初级的十神定位讲的，既然批八字了，我讲过的都要引用，戊日主以甲为日主喜忌的，甲是七杀，乙是正官，对夫星讲甲乙都一样的，对日主喜忌讲，就不一样。戊日主的喜是用甲七杀为夫的，那么这个八字没有甲，只有乙，那么论夫星要用两段论的，有钱？沒有錢？是一個層次，喜不喜歡？又是一個層次。
<p>戊日主如果以甲为夫的，对象是她所喜欢的，哪怕夫妻俩一起摆个地摊，也很恩爱。如果你现在是用乙为夫了，那不是她日主所喜欢的，但是她还是可以跟他过一辈子的。那条件问题了，就是夫星旺不旺了。那么这八字已经摆明是没有日主喜忌了，只剩一个乙了，那么到底是旺是不旺呢？卯就是乙，那么就要用那个禄跟绝了，木绝在申酉，这讲条件啰，甲绝在申，乙绝在酉，申酉对她讲都是夫绝，所以说这个女的她的对象，不会有大问题，但条件不高啦！月柱丙申，二十二岁开始，就是夫坐绝的，那么日柱戊申也是夫坐绝的，《女命详解·女命通论合订本》书里讲的土猴，自坐夫绝，那么是讲条件啦！
<p>我们也看到社会上很有钱的夫妻闹得一塌糊涂，我也看到夫妻俩一起卖报纸，撑把雨伞，也很恩爱，我看五六年了，都在卖报纸，虽然没有发财，也很好。所以这个呢！男的条件不高，但是很谈得来、很投缘，为什么说是投缘呢？各位以三十秒时间来想想，问题是卯申合，答案出于暗合，夫星乙卯，卯申合，夫星合在夫宫，一直合到四十五岁，都是卯申合，没什么怨言，标准的嫁鸡随鸡，嫁狗随狗，要一直到四十五岁才为止。那么现在我们谈的是八字，不是谈大运，大运另外再谈，好运可以干扰你，坏运也可以是叫你坏的喔！只要你来的是时候，譬如就婚姻讲，大运最好是二十岁到五十岁啦！其它时间好，没什么用处。那么一看从出生就很有人缘，结婚之后，没什么凶险，收入大概现在三万五到五万块吧！一直到四十五岁。
<p>那晚年又怎么样了呢？那时上是偏财，时支是正财，壬子财旺之位，所以这个命不谈大运流年，只从八字上讲，四十五岁以后就会有钱了。通常算命只问你有钱没有钱？钱哪里来不是很具体的，因为中间有些个人之私德，不好问的。最多分个士农工商，有时候还分不清，大致上可以分成正财、偏财，那么这个八字时上是偏财，她是女人，所以不能解释为女人帮你忙啊！偏财就是意外之所得，那么那个八字四十五岁以前，无冲无刑、太太平平，是很标准的良家妇女。
<p>会不会搞外遇？不会，为什么不会？这个八字申子辰见酉为桃花，八字没有酉，所以不带桃花，那么不带桃花，大运、流年可以来桃花的啦！因为她本身有卯，卯酉冲的，就算遇上桃花，也会给冲掉，那么连带了卯在年支冲桃花，表示这个人的性格，十几岁就很排斥这男女之间乱的啦！那么这个偏财呢？就从人之常情来衡量，譬如她开家美容院，那是偏财，我不晓得女人洗个头好多钱？或者是真正的美容化妆又多少钱？随便多讲五千、一万都可以的，这是偏财。
<p>假定说她医学院毕业的，那是医生，以前是倒霉医生，四十五岁之后，那就走运啦！时支是正财，就变稳定了，就算开医院，她自己也不做医生啦！做老板啦！收收钱就好了。那么说这个八字本身解释，就是这样子了。四十五岁以前，丈夫都没有办法，四十五岁以后，是她因她丈夫来的钱呢？还是靠她自己来的钱呢？还是靠小孩来的钱呢？要在大运上去看，总之晚年有钱是对的。那你说这个人最多会有好多钱呢？不会上亿的，因为她没有调候用神、也没日主喜忌，只不过是财官当令。那么批这个八字的时候还要加一点点场面话，譬如说戊日主，支藏天干有没有戊？申——戊庚壬，她有两个戊，就是强嘛、有自信。这个人十六岁到四十五岁，很有自信，有没有钱同自信无关的，她命好，有没有自信也会有钱的。命不好，有没有自信更没用，有志气也没用。但是我们受了古代文人的一种传统影响，要有志气，管它成不成啦！我有志气，就有一种很体面的话啦，一直流传到现在。
<p>对现在讲她有点主见，那么就要讲它什么格局的啦！上年辛伤官，地支没有伤官，伤官不成格，第二个丙字是偏印，地支没有丙，偏印也不成格。那么剩最后一个壬子，申里面有戊庚壬，所以她是偏财格。那我刚才照字面上个别谈的，就是到四十五岁前都没有办法，四十五岁以后有办法了。
<p>那么你再细想一下，她十六岁就会想发财？三十岁起也想发财？不过到四十五岁才发财，或这人从来就没有想过要发财，莫名其妙四十五岁有钱了，这三种她是哪一种？月支就有偏财，她以前不管她丈夫干什么的，从二十几岁就种下根了，只是做不起来，跌跌爬爬。根通到月支、日支，最后成功是在四十五岁以后。因此就把以前三十年的条件就拉高了，因为她有通根在那个地方，不过做不成罢了，那么从格局上讲是偏财格。
<p>那么连带就是十神定位要面所讲这个条件啦！偏财格是个孝女，偏财格很低的，不带比劫不会破产的。这我们看是看得那么多，但用不着讲那么多的，好比就我们教做菜，并不真正拿把秤来秤秤，几克糖、几克盐的，是讲个大概。</p>

 LY4:`<h1>流月 -4 </h1>
<p>八字看完之后，那么就要看大运了，第一步运丁酉运，年纪还小，辛卯、丙申双六合，丁酉同年柱双冲，丁酉运里面遇到戌年，申酉戌三会西方金，冲卯，那这是指流年。单单讲丁酉运冲年柱十年，立刻就把辛卯同丙申的双合处处降低了。就算你家运好，也在好的中间会发生故障啊！到底家运变坏还是她自己生病，那个就是慢慢谈啊！这变成细批终身了，厚厚一本。连我都要搞一个月。那么我现在只讲大运，不管流年也不管命高低，命再高，也是冲的了，如果命坏的，越冲越坏，那么好在算命对三十岁以前不太重视的，还年轻嘛！
<p>第二步戊戌运，戊戌还没到戌年，懂点事啦！戊戌同年柱辛卯、同月柱丙申没有关系。戊戌日主对女命有过二十个八字以上的经验，就懂得女命在未婚以前三合伤官的前一年，就会遇到对象，伤官是指小孩，没有男朋友来小孩呢？那么她是逢冲的，如果这个小姐在二十三岁以前就有男朋友，一有了小孩，就会搞出很多麻烦事情出来了。但我们不会跟她讲，因为是人家私人的问题，她不问，我们是不答的，我们知道会有这个情形。伤官逢冲，冲十年，十年中间对这个小姐讲，真正有用的只有两三年，二十三岁以前结婚不太可能，最多做做朋友。
<p>下一步运己亥，也是一样这个论法，己亥对八字没有双冲双合，我们要把三合三会要带进去，譬如说未年三合亥卯未会官杀，对她讲是她先生啊，她最标准的结婚年是未年，这种话如果我摆到清朝算命是讲得通的，现在不一定啦！但她会遇到对象绝对是真的，会不会结婚呢？这是法律问题。
<p>己亥大运与时支子，遇到丑年三会水，土克水为财，所以在己亥运这个十年里面，有两年好流年，一年是会夫，一年是会财，那三十岁起走这两个好流年，走得很恰当的啦！尽管戊申日主是自坐夫绝的，那两年流年一样是好年，因为你既然坐了夫绝了，流年随便怎么好，流年一过，就没有了。所以夫绝的从来没有过，或者有过而搞不好，决定是在流年。
<p>那么当己亥大运过了之后，对这个八字讲，就是她最好的岁月到了，所以现在的运气就对她很重要，下一步运是庚子运，庚子运对四柱并没有双冲、双合的，但是这个子，有经验的一看就知道子就是癸，癸就是财地。大运财地到了。但她本身的财运要四十五岁才到，她现在庚子财运就提早到了，那么大运是八字同流年中间的桥梁，中间辰年会合出申子辰，这十年运里面，有两年是会财地的，大运是财，流年也是财，故此她的钱就会提前一点到，不必到四十五岁。
<p>然后呢中间有一个不好的情况存在，也就是她有个子卯刑，庚子子卯刑，子卯刑是无礼之刑，大运刑到年柱去，这就是代表跟她的家长、长辈、过去的旧人，就她讲话态度有不和谐的地方出来了，无礼刑是个人性问题，可以随便谈谈不列为主题。
<p>那么下一步是辛丑运，这个女人就有变化了，辛丑同辛卯中间，拱了一个寅字，本身没有吉凶的，要把所有道理带进去。头一个：拱了寅就寅申冲了，所以拱这个寅，都是寅申冲，这就等同把你四十几岁以前的想法，都要推翻的啦！那么第二个：寅是甲，是她的日主喜忌，她本来没有日主喜忌的，在这步运里面有她的看法，有她的理想了，就把过去的想法统统推翻掉，推翻是好是坏呢？不能做定论。看你命后面是好是坏，后面是好，你推翻了变好；后面是坏，你推翻了变坏，因为我们知道后面是好的，后面是财，所以拱这个寅字，牵连出两个流年——辰年是三合会寅卯辰，既是调候、又是日主喜忌，这个寅同申是寅巳申三刑，所以中间有一年大好，有一年大坏，这个格调就拉到流年去了。对她大运本身讲，它只是代表人一生观忽然之间改变了，难怪她后面会有钱，开始有她的理想、有她的志趣了。
<p>大运是从月柱排出来的，月柱倒冲大运叫做冲提大运，壬寅运冲丙申月柱，每个人大概在六十几岁就会发生很大的人生观的转变。而她本命呢？就壬子时啊！一直走到她生命终止的那一天都一样的，那么壬寅冲提运过了之后呢？人生最后一个字是时柱地支，时柱地支是人生最后之归宿，所以最好是不要日时双冲，那么时支坐财旺，财旺的钱多，日主旺的想法很多，所以说这个八字是平生没吃过什么大苦，只不过到四十几岁庚子运之后，就走运了。那么晚年有钱，那么你问是不是很恩爱啊？这倒不见得。有钱同恩爱两回事的，夫妻恩爱要官杀旺，不要财旺，官杀旺未必有钱，丈夫同妳谈得来，财旺有钱。究竟是哪个比较好，那是个人生观。
<p>下次我就要举出一个八字，连八字、带大运、带流年，不但嘴上说还要用笔批，怎么批法？批和讲有点不一样的，比如我到县政府去找县长讲什么、什么，我是在讲的喔！如果县长说你补张公文来，那个公文就和我讲的不一样了，公文有公文的格式的。
<p>所以我下次呢，就有一个最具体的模式，连讲带批，八字、大运、流年可以很完整的讲清楚，流年只举两年就够了，因为一年有十二个月，各位研究到现在都知道批一个流月，同批一年的流年一样费事，我再举例子，你就懂了。你到银行去领钱，领一百块同领一百万手续一样的，因为它还是要经过那么多道公式下来，那么今天我所讲的流月，以及八字呢，到这里告一段落，我们就进入下次用笔批的方式来做最完美的一个说明。</p>

 YSQR1:`<h1>用神 强弱 -1 </h1>
<p>那么以前所讲的一切有关于子平法的规则是属于常识性的，凡研究命理必须知道四个规则，就是刑冲合会、十神生克、六亲代表、十干禄绝，这是常识。懂了这些常识之后，任何一个八字大概六成是不会有问题的。六成以上就越来越困难了。那现在所讲的是属于第二个阶段的。子平命理分为三个阶段，第一个阶段是我们所讲的常识，第二个阶段是命理本身的历史，同它法规之组合，所以属于研究人士，第三个阶段属于实务，实务就是面对客人谈话，也就是专业人士了。那么现在所讲的是属于历史、理论转变之过程。
<p>大概是在东汉末年才开始有算命，一直到宋朝为止，算命的方式，都是用纳音五行。五代末年北宋初年有个人叫徐子平，他发明了四柱推命法，就是我们现在讲的子平法，据说他写了本书叫《用神经》，这本书现在已经失传了，那么《用神经》里边所讲的内容就是现在算命规则的始祖。
<p>那么论命同一般社会学问一样，它有大周期和小周期，小周期是六十年，譬如我们现在马路上流行的衣服，六十年就流行法不一样了，大周期是三百年，我们现在所处的时代，以子平法来讲正好是大小周期刚刚轮到循环点，一般性学命理的人中百分之八十，一旦到了就是我以前所讲的常识完全了解之后，就停在这里下不去了，就变成一种拿不出一种标准的规则，而延伸下去，这个问题是发生在小周期。那么我教命理几十年了，自从两岸开放探亲以来，大陆上很多同道也都跟我谈论命理问题，那么我们今天所研究的命理，虽然是说从东汉时期就有的，实在在研究呢，就是最近六十年来所流行的方法，这个小周期在台湾讲，六十年来命理没有断过，不过它现在有很小的范围，台湾有算命最早只能推算到郑成功的时期，所以最早的算命方法是属于福建系统的，漳州、泉州还带一点点客家系统。那么后来日本人在台湾的时候是日据时代，也有五十几岁年了，日据时代的命理就同我们这个有点不一样了，那么留存下来的，大概是比较偏重数学方面。
<p>这个两百多年来，漳州、泉州文化，到一九四五年日本人走了，台湾一些大的书商就到上海去买书，因为交通方便，买了一堆的书，就是今天的《三命通会》、《渊海子平》……等等，就那时候来的，一直到现在就没有加过任何东西，始终在这个圈圈里。这是台湾这边。那么在原有大陆算命的比台湾宽得多了，东北有东北系统，广东有广东系统，各有各的系统，但因为当时交通不方便，譬如上海离千里很有名，你再有名，也不过是江浙两省，那么所以每个地方都有它特别的系统，无法全盘了解。那么到现在最近十年来，有发生根本上的改变，为什么呢？就是现在有传真、有影印、有网络，很容易做到将各地方专长汇集在一起。
<p>那么就拿我个人讲，我一向就知道《造化元钥》是个抄本，徐乐吾就是注解这个抄本，但我从来没见过真正的抄本是什么样子。直到十年以前，因为有了影印、网络，一百年以上的世家留存下来的旧书、旧稿子都影印出来了，令我们大开眼界，那么多新的资料就传过来，以最近六十年来，如果学命理把十神定位学完之后，根据过去之习惯就讲学用神、讲身强、身弱、谈喜忌。虽然是只有六个字啊！可以搞十年、二十年的，弄得没有正确的下文。那么现在有那么多的资料，可以把它重新整理过，最好的资料就是徐子平写的《用神经》，这本书是没有了，只剩下书的名字还在《三命通会》里，那么现在我们研究命理是一九四九年开始的。至于用神一词是从明朝初年开始的。我们谈的用神是今天我们谈的喜忌用神。原来的用神到底什么意思呢？我们也没认真去探讨，故此，在学术方面正好是到该整理的时候。那么《用神经》以前，大家都知道算命是用纳音五行算的，也就是甲子乙丑海中金，用年跟时来算，不是用日主来算，那么我很好奇了，他们到底怎么算的？明朝初年讲的用神……什么叫用神？现在我们依据历史文化，向各位做一个说明。用神最早不是河图五行，河图五行是甲乙木、丙丁火，用神从年柱纳音五行起，年为主、时为配，那么月令是叫用。
<p>什么叫用呢？我们解释有用、没有用，但是算命以通俗讲，不过是人间的妻财子禄寿，对文化来讲那就不一样，不过是天时、地利、人和，所以《三命通会》叫做三命，就是天元、地元、人元，以月为主，才有那冲提大运，故用神从月上出来，就以月为主，月就是天，那么我们抬头看看天，什么都看不到，一片虚空，等到我们能够感觉到这个天，我们能感觉到天什么呢？只有两种：春夏秋冬，还有白天晚上，这是我们真正能够体会到的天之不同。那么有这两个天啊！就转变到算命来了，你生在春天、夏天、秋天还是冬天，那就是调候用神，至于白天、晚上，子平不太擅长这个方面。命书上是有的，具体公式是没有的。
<p>我举个很普通的例子，当笑话听好了，子年出生的，老鼠怎么活动啊？晚上活动。所以属鼠的人要晚上出生，他才有活动力。白天出生的老鼠，他没有活动力。这其中一种比喻啊！但是子午并不重视这一方面，它重视在月。那么月是抽象的了，几月、几月，正月和五月有什么不一样啊？那么在子午里边，就把月作为基础，怎么来取这个用？那么这个月就地支啦！十二个地支，就包括我们现在子午算命，大家都知道子就是癸、寅就是甲丙戊，但是我们的用法，同当初用法不一样，我们的用法要换成十神，比肩、食神、劫财、伤官，透出天干，用正官格、七杀格，原始没有这个字。
<p>有首《用神经》里边的口诀，我念两句给大家做个例子。立春戊土五朝荣，十日丙火见初生，立春戊土五朝荣，如果你的命都知道，过年不是讲正月初一，是讲立春。立春到惊蛰三十天，立春戊土五朝荣，如果你出生在立春前面五天，这个寅字当戊看啊！十日丙火见初生，第六天到十五天寅字当丙火看，这两种看法就同今天子午算法就不一样了。如果前面五天戊透出来，就以戊为用。用神，最早的用就是以这个戊为用，也就是调候用神之前身，那么出生在第六天到第十五天，丙为用，你如果天干透出丙了，这个命就高得多了。那么这个是最早的用神，只不过是天干，没有地支，没有十神。
<p>那么现在却搞成天干、地支乱用了，因为它失去了原来规则，那么最早的用神是以天干透出来的叫用。那么这个用，没有流行多久，不过一百年就没有了。为什么就没有了呢？就他们自己几个元老意见不同，你说立春月甲丙戊，有的说甲丙己，有的说是五天，有的说是七天，所以这个命理从明朝初年以来，第一次感受到混乱而停止的，就是支藏天干值日几天的问题，弄的没有下文了。那么没多久，大慨在明正德年间，正德年间就是我们现在唱的电影、京戏的游龙戏凤，就那个时候，那么就有一批原来搞择日的，现在我们择日、算命混在一起了，以前不是的，算命是算命，择日是择日，一批搞择日又懂算命的用京房易的办法，就把比肩、劫财、食神、伤官带到支藏天干里来了，没有择日这个问题了。就照我生者食神、伤官……就今天所用的那个十神透出天干，这个用就变成格了，就变成格局了。用神就是格局了。
<p>一直到清朝《子平真诠》完全就照这个规则来了，那么支藏天干透出就是格，那么引用萧吉的十二生旺，就发现强弱的问题来了。也就是我在基础规则里面请各位一定要背的，甲禄在寅、绝在申了。从明朝正德年间，就开始有我们现在算命的这一套规则出来了。纳音五行完全退休，没有了，支藏天干值日几天也没有了，虽然是没有，在《三命通会》里面还是有记录的，可以证明这件事情。《三命通会》是明朝万历年间的书，离开正德年间大概五十到一百年之间。
<p>当时那个算命方法同现在算命还是有点不同的，怎么不同呢？那时候月令为第一优先，因为它是天时嘛！调候用神从月令出来，格局以月为第一优先，然后再转变成不一定要月了，天透地藏就可以了。这个主流思想，整个今天子平结构所完成的，完全是《京房易》的思想移过来的，如果各位有《古今图书集成》这本书，我们在黄金策里面，就看到很多、很多资料，我研究子平四十年以上，今天我们所流行的子平，是不完备的，怎么叫不完备呢？没有谁故意把它漏掉，就是当初节引《京房易》过来的时候，没有全部节引过来，节引六七成是有了。那么这是讲它的演变过程，纯粹理论性的历史问题。
<p>那么其次要讲文化了。谁研究命理啊？只有三种人：第一种就是大家都看见了，全世界都有命相馆，那是商业行为，也是民俗文化；第二种是大学教授、中医师或者宗教家，做研究，把这命理阴阳五行看成是一种宇宙之规则，人能懂的宇宙规则，那种是业余的啦！就像《子平真诠》、《三命通会》的作者，就是这种了，他们都是两榜进士，不会去开命相馆的，他研究这个东西，目的只是去探讨人生这个规则啦！
<p>他在探讨什么呢？我简单地说，大家就明白了。七杀你可以解释为灾星也好，性格暴躁也罢，这都是第三层的吉凶祸福。读书人不是这样考虑的，七杀，就像我们的do re mi fa so la si do，没有人能唱出第八个音，逢七就绝，他就是在探讨这个问题。因此产生了所谓的天奇、地奇、人奇等等，这些吉凶祸福就出现了。他从核心理论上来探讨，或者包括《黄帝内经》、六元五行，把人当作一个宇宙来看。男人二八一十六岁懂事，八八六十四岁就老了。女人呢，二七一十四岁懂事，七七四十九岁就开始衰老。有一种平均天命出现，这是第二种。
<p>第三种就更不是了，谈到第三种啊！不管你信还是不信，它都牵连到史前文化了，研究史前文化的都是哲学家了，根本连理论都不想谈的了，他只研究这核心思想。
<p>那么现在一些初级研究命理的，不需要研究那么深，我就是把它做个介绍，譬如说，任何一位读过易经的人，一六水、二七火、三八木、四九金，五行生克——金生水、水生木……等等，各位要知道明朝皇帝一十六位，每一代皇帝名字都是五行相生的。朱洪武他是水，儿子朱棣是木，一直到明思宗最后一个皇帝都是五行相生的。你看皇帝会信到这样一个程度，那么关于这一段呢！可以看看我编的《用神经》。史观》写得很详细。
<p>那么我现在回归来讲，为什么是一六水啊？这两万年以前，我们的老祖先一天到晚都没事，坐在山顶上，就看日月星辰在转，初一同初六水星在北方，初二跟初七火星在南方，初三跟初八木星在东方……。你看那时候的人要花多少时间？才能记录得出这五颗星旋转这个世界。那么各位就问我了，那他怎么知道初一的啊？初一怎么定的？又没有文字。我们古人叫史前文明，连我都有一点相信，你把它叫做外太空也罢，叫祂神也罢，确实是有一种超级神明，祂在边上看顾我们、帮我们忙。初一很容易定的，你们每个月是不是看到第一天看到月亮圆啊！一点点半圆，你第一天看到月亮成一条，很微小一条线，那天就是初三了，永远不会错的，倒退两天就可以。那我们怎么会知道呢，这我相信是外太空人或者什么的超级神明……。
<p>那么这我谈的是命理，如果你不把根本的哲学思想搞清楚，你就会产生一种困扰，是不是胡说八道的啊？是不是乱撞的啊？它不会的，它有它整套规则的。那很好奇了，那他为什么告诉人呢，为什么不去对狗讲呢？为什么不对猫讲呢？这个答案啊，命理是没有，答案是在《黄帝内经》「素问」里有阐述，「素问」也是讲阴阳五行的，也是讲甲乙丙丁，同样讲河洛数，那么素问之中它讲啊！地球上生命、文化啊！一共有六十几次，现在多少？在第几次也搞不清楚，一共有六十几次，猫了、狗了、龙了、蛇了，动物无其数。
<p>《黄帝内经》告诉我们只有五种动物能够体会到地球以外的规则，第一种是龙，现在我们看不见龙。只有蛇，那就是恐龙时代，第二种是凤，现在是鸟，也不晓得什么时候了，第三种是龟，譬如我们卜卦用龟壳是吧？这是非常悠久的历史文化了，龟曾经统治过世界的。第四种是麒麟有四个角，我们也没见过麒麟，反正猫、狗都归麒麟啦！最后一种是裸，就是人啦！人没有毛、没有鳞、没有壳，只有这五种动物可以通灵。
<p>这部分各位信不信所谓的，我只是依据阴阳五行这来源，分哲学、分科学，当职业看，这大三元、中三元、小三元。春秋时代以前的，那是讲完全是哲学的，汉朝、唐朝讲学问的，譬如京房易汉学、杨太玄、邵康节等等完全讲学问，宋朝以后就变了人元。为什么我花这么多时间来解释这个东西呢？我在五术圈里面四十年以上，我过去有很深厚的一种感触了，上到哲学家，清廉的一毛钱都不要的，中到大学教授专家，学富五车，偶尔谈谈八字风水，也随便人家送几个算了，下到各位都看见的，历代以来多少麻烦烦事事情，妖言惑众的，那怎么会这样子呢？我以前有高低之分，现在不会了，那是人元、地元、天元，天元看阴阳五行，是宇宙的规则；地元看阴阳五行，是宇宙中人间能了解的法则。人元看阴阳五行，那是一种服务业、是一种行业了，和学问没有关系了。所以三者呢，都平等对待。
<p>我把这个介绍过之后，我们就可以从任何角度谈阴阳五行，当然我们还是要拉回来谈实际的。现在毕竟是人元时代，人元时代什么东西都是一种五行，有它的商机。只要符合天时、地利、人和就可以的。讲到命理本身，就是你一种果，如果不关心走运不走运算什么命！所以动机就是以自我中心来的，所以在一切学问讲完之后，还是要回归到一个合理的知识，就是清朝王船山先生讲的天理之至正，就是人欲之大公。什么叫天理？看不见的！人欲之大公，是最公平的，人的欲望就是天理，要吃饱饭，要有地方住，这就是天理了嘛！那么我们拉回来讲，拉到明朝这个成化年间游龙戏凤那个年代，纳音五行已经过去了，支藏天干改了，改到现在我们这个支藏天干了，规则是改了，思想没有动啊！怎么叫思想没有动？
<p>各位在最早研究命理的时候，我就给各位介绍了，年柱管一到十五岁，月柱管十六到三十岁，日柱管三十一到四十五岁，时柱从四十六一直到死。我那时候并没有讲原理，照那么背就好了。如果你一定要问那个原理谁规定的啊？不是子平规定的，明朝以前的纳音五行它就规定了，年为本，时为结束，算法同现在不一样。我们现在没有办法拿出来整套纳音五行的算法，但多少还是可以拿出一点，但是我们讲到，正官引到月、引到时旺不旺？这是我们现在用语，我举个纳音五行的例子，比如生在午年，午就是马。大家都知道，那你生在辰时，照纳音五行讲，马化龙驹啊！马变龙了，这就很好的命，年时拉过来。从纳音五行就开始，纳音五行转到子平来，中间整个过程将近两三百年，那么老规则还是引到这个时支来。
<p>那我現在講的是歷史之文化，那麼現在講呢，歸到實際了，管它什麼歷史文化多少年，不管啦！來算命的人到底归多少类，方式也不一样，解释也不同。譬如说破财，各位一定能体会到，几乎没有一个人听到这两个字不怕的，然后呢！我换个人讲，譬如说选立法委员，他怕破财吗？他不怕，这种事本来就是破财嘛！那么所以是官员算命、中等社会算命同庶民算命，或者是到极限的啊！什么叫极限呢？就是武侠小说上讲的：饿死也是死，犯法也是死，那这个人看法完全不一样了，因为这个人的立场不同。所以今天我们谈命理不是只有妻财子禄寿，至于明理规则的人，他每种规则都是有指定的，但他尊重大多数，所谓大多数啊！以现在讲啊，一个月薪水三万块到七万块，所以我们研究命理是以这个层次为标准，一旦越开比这个高或者比这个低，论公式就不一样。
<p>我对我的门生或者同道讲起来，当他懂了那个基础规则之后，我特别提醒他，你对人家论命千万不可以用你自己的身份标准立场去看他，因为你是你、他是他。我都是举例子的啊！有个人借了钱、标会，想办法去选举，你说划得来划不来？不能用你的方式看，要以当事人的角度来看。你幸运地遇到一个好丈夫了，一生没有大麻烦，那你的伦理观念就会比较重。如果一个女人，连续碰到五六个坏男人，那她的看法就不一样。所以这个奇正相胜，论命谈妻财子禄寿，要以每个人的背景不同而不同。
<p>那么这就只讲原则了，实务论命还不止这个，还要往下更细了。一个报纸上登的最引人注目的人，这人在十七八岁的时候，跟你我一样，怎么会变成这个样子呢？同样一个人时代不同，看法不同。那么这句话呢，要引用到我刚才讲的——算命是讲你的阶级层次。我现在把它更缩小了，只论现在。我不管你是干什么的，你过去有钱、没有钱？我同你谈话只谈现在，你现在的社会背景，就是真正现在的你。那么这个三个层次谈下来，也就是问事了，也是流年了，也就是我们一般性的论命了。那在思想问题，你能体会到，那就好办了。那我们就谈点实质问题了。
<p>今天我们谈用神、讲格局、讲强弱，对研究的同道讲，这六个字可以叫他十年都出不去，你只能拿得准一点点，大概三成是有把握的。所以在那么多命理中间，不管你研究深、研究浅，我先把最可靠的话对大家讲。譬如有人问我，你能算出人什么时间死吗？生死是有天数的，但它不是绝对的。生死不是讲时间的，我有个比喻，你带一口袋钱出去，花光你就回来了。怎么花呢？可以花一个钟头，也可以花五个钟头，所以生死就是你福气没有了。你乱吃乱喝，用的太多，就会折福。如果你省吃省用，那么寿命就长。在算命里面三件事为主：福禄寿，一个有钱、一个做官、一个长命，三样你能拿一样，就不虚此生了。
<p>那么在算命几十种、几十个、几百个、几千种规则当中，我们用哪些公式一分钟之内就把这个八字百分之六十勾勒出来？这是为最重要的一件事情，不要东想西想了，什么叫东想西想呢？比如有人问我，子午冲会发生什么？那你讲在哪里冲啊？年月冲主十六岁到三十岁，大运流年冲不过十年啦！流年冲八字不过一年啦！你就是讲一年讲得出来，你也讲不出内容啊！你要确定它内容是在哪里？要考虑天干、要考虑地支，是财冲？官冲？食伤冲？还是桃花冲、驿马冲？你把这个搞清楚之后，还要选就一件事情了，这个人几岁了？什么年月？什么时间最为重要啊？譬如八十岁冲，当然健康第一了。你如果小孩子冲，冲到年，他也没什么事业，那是家里要倒霉的啦？所以这种东西需要连锁带上去之后才有结论。但是双冲是一组规则，重大规则之一种，所以看八字第一个上手要看有没有双冲！包括好命在内，如果你有双冲，就不太太平。那么至于讲那好命、坏命，我多带几句题外话了。
<p>我们中国人一向都劝人家要留德，做了好事也要有德，你做了好事没有德，也是不行的。这个德，普通讲了。那么对穷苦人马虎点讲就是赚钱啊！有了钱，就留下后路了。德同福气有什么关系呢？我有一个最简单的例子，大家就了解了，譬如说明朝末年的皇帝叫崇祯，还有一个李自成，我们称他流寇。这里是在法律上谈的，所谓成王败寇啊！
<p>如果单独来讲啊，崇祯皇帝的福气同李自成比，我看也差不多，说不定李自成他还比崇祯皇帝多一点。爱怎么干、就怎么干，问题就差在德了嘛！你祖德好的就是皇帝了，祖德不好，他一样做好事、一样拜佛、一样念经，就变成李自成这样子来了，那么这是一个比喻。也就是说，你做好事功德绝对不会落空！你做人一切、一切也不会落空，两样合在一起了。那么刚才第一条，最重要上手的八字看有没有双冲，没什么纳音五行、没什么用神、没什么格局。一逢冲，全部都归于没有。那么至于说冲在哪里，那么以人来论，就照以前那个十神定位讲的，时间到、六亲到、性格到什么的。
<p>第二个，要讲究合。合有六合，有三合。我们尽量讲不要分派系，不要分年的，譬如年是甲子，大运是己丑，甲子、己丑合，这双六合，如果没有牵连到其他的冲合在内，十年好运！所以讲到运，我上上次为大家特别讲清楚的。没有运真正这个东西的，是一种感受。这个感受呢，分上流社会同普通社会，上流社会的好事，叫心想事成，一般性社会这个好运只是你比以前好一点。那么我们仔细点，清朝这个好运，他讲什么呢？他不会想做皇帝的了，他只想中进士。譬如说某一个人你走运，他就问我，我这个走运到底能有多少成功啊？这话呢，如果客气话，随便讲几句，乱讲的：哎呀！你有两亿啊！真正好运是什么？就是你的心想事成。你平时想什么都能够完成。那么我时常用这种话对来宾谈话了，有人问我：你看我适不适合做很大的生意？什么叫很大的生意呢？上千万、几个亿、二十几亿？那我就用个话跟他讲了，你不要回答我啊！你问你自己，你最多只能有多少钱？你就是那么多钱！不会比这个多了。这就是运啦！普通人讲运，就是比以前好一点。
<p>那么这里有个差别，大运合八字的，或者流年合八字的，或者流年合大运的，有时候我跟朋友讲，明年你要走运了，他反问我一句：这运从哪里来？还是老朋友帮忙，还是新朋友帮忙，这个事情我也没有想到，他反问我啦！这个差别，就在那冲合的位置，大运或者流年同八字双合，譬如八字有甲子，大运有己丑，双六合，十年都是旧的事情。什么叫旧的事情呢？本来就有己丑的，还是那批老人，如果流年合八字呢？也是旧的事情，不过只有一年。凡是冲合，直接对八字来的，都是旧的事情，不论是好是坏。譬如流年合八字，我就跟他讲了：这个人是你认识的老朋友。以前也谈过这事情，以前谈不成，今年谈成了。
<p>如果流年合大运，不是合八字啊！甲子大运、己丑流年，流年合大运，那是新的事情。所以合在四柱合来合去，要分新旧！大运、流年对八字是旧的事情，流年对大运不论冲合都是新的事情。那么流年冲大运我们会提醒他：小心啊！你会遇到一件意想不到的事情。如果流年冲八字，讲法就不一样了：明年你犯冲，有什么问题早点解决啊！譬如现在讲十一月，那还有一个半月的时间不要拖过去啊！万一说你解决不了，你心里要有个准备，还要拖一年。这就是我们对来宾的建议。这种建议并不是吉凶之过程，事实是讲他的过程。因为来来去去问我们事情，一半以上都没有讲真正内容的，譬如说我最近很不好，他并没有说他什么不好的啦！如果他问我：我最近被人家倒债，很不好，怎么办？这时我们回答他完全不一样。那么这是冲合，在四柱里面非常关键。这很单纯的冲合了，实际它可以两个冲，也可以两个合的了。甲子、己丑很单纯的合了。如果你八字里有两个甲子不就争合了吗？争合，我个人觉得争合比双冲还要伤脑筋。
<p>我有一个朋友，他说没有人能骗到我的钱，只有朋友才能够骗到我的钱。交情嘛！争合比冲还要伤脑筋，双冲可以翻脸，争合不能翻脸，譬如三个股东合作生意，那就麻烦大了，经常就发生争合之事了。双冲也可以争冲啊！譬如甲子、庚午双冲，你两个甲子，那就争冲了，解释法就不一样了。争合是我们三股力量搞在一起，不平衡了，争冲呢？反而就无所谓的，怎么叫无所谓呢？譬如我身上泼了墨水，是双冲，我已经冲的了嘛！你再泼点墨水上来，不过还是如此了，多了一道而已。所以冲不怕再冲，合怕再合。好事情不要第三者介入，坏事情再来几段都没有关系啊！反正就那么回事了，债多不愁啊！
<p>所以第一组，大家必须牢牢记清的是冲合问题。冲合同用神强弱格局没有关系，所以我们要避免有争论的理论和没有争论的理论，尽量使用没有争论的。譬如说我们到了餐厅里，他们就问我了，你不吃什么啊？譬如说鳝糊面，很多人他不吃的，就先问一下。算命也一样，那么你怕忌讳这件事情，你就要问出真相来。那你问我明年运气好不好，这随便问的了，你问我跟人合作好不好？就不同了。这就是一个专门问题了，有针对性了，合作好不好？不是赚钱不赚钱的了，包括赚钱在内也有不好的了。所以这组我们先讲这些，明白它的历史规则，分类不同，慢慢谈，先谈我们其中相同的。
<p>那么用神这两个字，倒不是子平法提出来的，用神是韩非子提出来的，韩非子说：圣人之用神也静，众人之用神也躁。一个精神的意思。圣人很安静的，普通人蹦蹦跳跳的。那这个意思带到命理上的用神。八个字在四柱里面有十神，样样都有，真正重要的那一个叫做有用之神。命理有用神开始到现在，算起来将近有七百年，中间可分作三个阶段。
<p>现在以果论因，用神有三个混乱期：第一个混乱期就是我刚才讲的，支藏天干配到二十四节气当中，每个天干占几天，这就是支藏天干是代用神，还是照纳音五行算的，不过这个支透出天干就有用神了。格局就高了，这段时间不到一百年。因为由纳音五行转变到河图五行，大凡有关民族文化之事，这不是可下命令的，要慢慢的自然形成。所以这一百年中间讲用神，基本上失败的。
<p>但是有记录在《用神经》的，《三命通会》就明明白白提到《用神经》。之后就另外一本新书出来了，叫《子平总论》，这本书在《三命通会》里也有，不过这本书也没留下来，就变成很多抄本，这个抄本是很有特色的产物，印刷不方便没地方买，就抄一抄，那就越简单越好，抄漏了，或者把自己的意见加进去。那些抄本就在民间风行一时。那譬如我们后来知道的《造化元鉴》、《栏江网》统统是抄本，抄谁的呢？就是《用神经》、《子平总论》，没有全部抄，古人叫文抄公，专门抄书，我出钱你给我抄，要你抄哪段，就抄哪段。所以每种抄本都有重点上的不同。所以现在研究《用神经》同《子平总论》就有不少是从抄本上去研究的。现在至少还有五种以上的抄本，藉影印方便，有电脑啊，传播得非常广。
<p>第一阶段《用神经》因为值日不对头，各人有各人讲法，没落了。
<p>第二阶段，地支藏天干的规则出来了，就是现在的子藏癸、丑藏己癸辛……，出来之后又受到值日这个系统的影响——比肩、劫财、食神、伤官、正官为夫、正财为妻……，那为什么《京房易》的十神系统会兴起呢？因为整个民间老百姓真正用神煞得地做官的人很少，反倒是夫妻啊！油盐柴米这种事情多，所以在民间普及的都是探求财官的流派。然后在知识分子阶层呢！还是采用神煞派。他们讲究的还是要做官啊！人数尽管少，统治整个文化的还是在文人手里。那么这种第二次兴起的呢？
<p>我们今天所以能体会得到就是《三命通会》里面讲的用为格。譬如甲申，甲日主生在酉月，我们知道酉就是辛，那么它已经不用以前那套值日法，值日不要了，直接用十神来。辛就是正官，那就是正官格啦！透出天干极限，强度是极限。以前用神只讲有没有，并没有讲多与少。现在你把十神代入六亲，就发生强弱了。譬如辛禄在酉，夫旺，透到月支十五年；若透到时支，一直到晚年。并没有讲多少。现在在你把十神代入六亲，那你出生二十几岁一直到五十岁，都是你先生掌权的，你一点意见都没有。那就发生出生活上平衡点之倾斜了。你又不能太弱，这个正官为夫，有与没有？旺不旺是两回事。那么用神意思就变质了嘛！用神本来是说甲人生在寅月，有没有透戊，透戊就是好命，没谈细节的。现在变成地支，换成临官位，再换成神位，用就改为格局了。用神同格局这两个字，在明代万历年间混在一起了。你讲用也好，讲格也好，好像字是相同一个字。讲内容呢，并不一样。这个用透出天干，如果月支透到时支，四十年的时间，左右你一生的，管它是好是坏，以它为用的，如果是正官，那么正官影响你一生。如果是财，以财为用。如果是食伤，食伤为用。</p>

 YSQR2:`<h1>用神 强弱 -2 </h1>
<p>这个用本来讲是有用没有用，现在变成使用多久了，能用三十年的，管它是什么，都左右你一生。那么原来这个用啊，就好比我拜托人家讲句好话，有用啊！听听，现在变成不是好话了，一支毛笔你用三十年，一部汽车你用三十年，变成使用之期了。那就有点变了。尤其贵族社会同平民大有不同。贵族是不大讲究时间的，比如我中了进士，我上去就是进士了，我一辈子都是进士，就我死还是进士了。只问你够得上、够不上的了。那老百姓就不是了。你不是进士，你今天赚钱，明天不一定赚钱的了，你今天夫妻和好，不代表五年以后还和好。这个用，要讲究持久了。不持久，谈不上用了。所以用神在明朝成化年间到万历年间就变了。这就是用神第一次混乱。
<p>那么从万历年以后，又发生变化了。发生变化的原因还是要从成化年间讲起，那时透出天干只有一个字，丙甲戊，透一个甲或者透一个丙有用，现在你不指定这个字有用，透出天干就是格局，那它有三个地支在，三个天干都可以透出来啊！就变成一个格、两个格、三个格了。本来只一个用的，一个用变一个格，好懂的了，现在三个一起出来，变成三个格了。那三个格中间自己就要讲究平衡，就产生强弱了。所以从万历年间之后，就产生格与格之间的平衡，用与用之间的平衡，那么强弱就分作两种讲法了。
<p>第一种日主同格局的强弱，就是我们现在还在讲的那套，日主强、格局强。
<p>第二种呢，两个格、三个格，或者一个格。不管你是一二三，最后要合并为一个格，就变成格局之用了。譬如原本你是食伤格，又是财格，成两个格了，食伤要生财的，等于财格。七杀格、印格，两个格，七杀生印的，就变成一个格了。那么这是相生的，两个变一个很容易。相克的格麻烦了，财克印，两个格怎么办？就我上次讲的找个通关的——财生官杀、官杀生印。就是三个格并为一个格。那么就变成格之用，不是有用没用的用，格能够成用，只是刚刚说你这个格局没有出问题，好比我拿支毛笔来，还可以写字，可以用，不是你那个毛笔是什么了不起的毛笔，就跟当初的用啊！差得天同地了。那么三个格里面，或者两个格里面怎么调停法呢？各有各的看法了。
<p>所以从《三命通会》开始，就是万历年间，然后之后的明思宗崇祯、清朝顺治、康熙。战乱期间没有人分析这种事的，等到乾隆、雍正之后天下太平了。那么文人就来注重这个事情，用在那个地方，你讲你的我讲我的，也将近一百多年了。一直到清朝乾隆年间，沈孝瞻跟任铁樵，他们出来表示意见了。两个人表达方法不一样，因为他们两个人就造成用神的第二次混乱，也即是现在研究命理只能谈个大概，不能谈细的，原因在哪里呢？沈孝瞻是进士、做官的，他就把过去明朝子平的问题稍加改动，拿出来用。
<p>他非常清楚用神起源是支藏天干、值日，哪一天值日就是哪一天有用。转变成透出天干，这叫格，正官格、七杀格，以十神带进去，取消支藏天干。
<p>所以沈孝瞻从这个地方下手，一刀切掉，财官当令以前的，他完全不提，直接就以甲以辛为正官格，正官格就为用。又到现在几百年了，认为格局就是用了吗？根本就没有支藏天干这个问题了。除非你真在研究的人才重视的。沈孝瞻就把这个切掉。他并不讲为什么切，他所提出的观点叫做成败救应，就是现在的调候用神、病药用神。八个格的顺逆是他定出来的。两个格变成一个格，不是中间通关，就是归到后面一个格，但他并没有如此讲。那沈孝瞻为什么不写清楚呢？这个是天意啊！《子平真诠》在当时不是一本书，是沈孝瞻自己一篇笔记、记录啊！他做官的，又不干这一行，这行人也没有来往，是他的心得。
<p>那么又不是他自己拿出去出版的，他去世之后，这东西流传到谁手里呢？叫胡空甫，是位师爷，清朝做官，师爷虽然不是官，也很有一点搞头的。胡空甫认为沈孝瞻写这篇文章，连名字都没有的，那么他认为写的不错，他给定个名字叫《子平真诠》，加了一点、减了一点，我们现在拿不清楚，他到底加了些什么？到底减了些什么？他所提出的财官印顺生，财生官杀、官杀生印，通关用神是他提出来的。或者财与比劫，财生官杀、官杀克比劫，反制过去。他并没有调候用神、病药用神这两个词句，并没有。他提出这个方式，那用神就变了。本来从支藏天干值日哪一天，这个叫用神，你命就好了，转变为支藏天干改为十神，财官印出了天干以后这叫格局，格局就是用神，到沈孝赡就变成格与格之间就摆不平了，变成格之用了。先把格局搞定，然后再谈日主同格局之间。那么这段就是子平的第二次混乱。
<p>那么混乱之下呢，附带着，第二种啊有点变质，譬如说最早的支藏天干，甲以戊为用，甲以丙为用，用五行的啦！天干的啦！等到出天干呢？正官为用，以财为用，变成十神了。那到底用天干还是用十神，或是混用，甲见辛，你说辛为用可以，你说正官为用也可以。就变成有的用天干、有的用十神？那么到后来更乱了。辛就是金了，天干也不用了，干脆五行为用了。所以第二次混乱，沈孝瞻看得非常清楚，所以一刀切断，支藏天干值日根本不提，现在很少有人知道这个支藏天干的问题。
<p>第二，月令当令即是格，透出天干是极限。在过去的格强身弱，那么其他地方透出来就是外格。沈孝赡是提到这里为止。那么后人就根据他的，到后来又搞出别的麻烦出来。所以第二次的困难之处，就发生在月令当令为格，透出为格。这个问题还不是现在的困难，现在的困难又是另外一个原因——文化的原因。
<p>各位要知道，清朝的教育水准同今天根本不能相提并论，我教的学生里大学毕业的平常得很，我现在在八十二岁了，我十几岁的时候，我的同学小学毕业后，中学都不念了，去做生意去了。他说读书有什么用处？看懂报纸、能写封信就可以了。所以以前识字的人不多，不比我们现在大量看书。这是第一个原因。第二个原因是六十年以前西医很少，整个大陆都以中医为多，普普通通老百姓，又相信中医，又相信日子好不好，对这六十甲子有很深的印象，不像我们现在对六十甲子模糊地搞不清楚，他们先天对六十甲子、阴阳五行比我们要清楚得多。所以那时候学命理比现在简单多。
<p>第三种，就讲命理方式不同，比如说一个中医，不用问的啦！他一定把六十甲子背的很熟的，不然他怎么讲寒暖呢？那么今天你讲命理，谁一上来就会背六十甲子呢？没有，除非我规定你去背啊！所以现在学命理的先天条件就不如过去，就很慢，特别是六十甲子不熟、五行也不熟，过程就慢。甲禄在寅、辛禄在酉，是正官格，起码你要听得懂这几句话。你必须先会背临官同绝，不会背就搞不清楚，搞不清楚怎么办呢？天透地藏就算了，不管旺弱了，只要天干有，地支有就可以了。如此以来的，就失去强弱的标准了。
<p>所以三个阶段啊！第一个阶段是支藏天干之值日，透出来就是用神，那么到了成化年间支藏天干不要值日了，换成十神，比肩、劫财、食神、伤官当令这个字就是格局，以正官为用、以七杀为用，十神叫用，用同格局就拉起来。等到万历年间，可以透三个的，那不是一个实格啦！要解决一到三这个问题，这是格为用，所以这些问题在用神上就大伤脑筋，因为你谈用神强弱，同实务论命没有什么关系。同实务论命为什么没什么关系呢？譬如普通人问你：我什么时候走运？或者一个立法委员来问我：能不能当选？完全不同。但是以普通人讲问的事情就不需要谈强弱的啦！只讲有没有而已。那么现在我把用神先讲清楚，有用之神变成格局之用，变成几个格，怎么样调停它——就是通关用神。
<p>但对后人来说，能研究通沈孝瞻的书的人本就不多，如果真能把沈孝瞻思想中的成败救应完全研究透彻，它会产生一种错觉。成败救应原本是讲一个格、两个格、三个格，格局之间的调停，成败之用，他误以为这就是子平之用。格局调停之后，后边还有呢！吉凶祸福还没搞清楚呢，譬如炒个菜，三个人讨论，他说红烧，一个要清炖，另一个要炸，等到统一意见决定清炖了，一句话啊！这鱼并没有清炖好啊！要另外去做的了。所以，他把三个格局调停之用，误以为子平就是三个格局来调停，把它缩得很小。那么关于用这个方面，大致就是如此。
<p>在寅，庚申月七杀，庚禄在申，这叫身杀两停。日主跟格局比较强弱比较单纯。如果两个格就不一样了。两个格来比，双方更不同了，日主弱、格局强，大家都知道的，史话叫做身弱不能托财官。日主弱，就是各位能背的支藏天干之后，就明白的啦！日主天干有甲，地支没有甲，叫做日主无根，日主无根的叫日主弱强在他们怎么解释法呢？身旺无依啊，你强有什么用，想发财，想干什么、什么啦！嘴巴讲讲啦！无法讲把别人听，只能讲给自己听，所以一开价就开过头，同根本就不敢开价，都是算命里的两大弱点。听起来蛮有道理的，但仔细一想啊，这贵族思想，一个读书人家里边对小孩子的要求，是讲究志气的，要中进士、要读好书，怎样、怎样，就算做不成经师，总比那根本想都不敢想的要强，那是没出息。这一种家庭，在全人类不到两成，普普通通的都是一般性上下班的。
<p>房子的，倒还是不少了。所以身强是个口头禅，并没有实际价值。那么接触到一般性的名利中间，只要不冲不刑、格局不要坏，也就是可以了。所以强的问题，头一个是日主跟格局比，第二是格局同格局比，强的会去生弱的，强的会吞并掉弱的，变成双道比。那么这一组呢，就搞成现在乱成这个样子，一个日主同两三个格局比，克泄交加啊！又是食神格，又是七杀格，七杀要克日主，叫克，日主生食神叫泄，叫做克泄交加，身很弱。其实克泄交加，不需要啦！食神克七杀只有克没有泄，那么这个问题啊，强弱这个问题，要专门来讨论。那么这是讲得很抽象的理论。强弱有一件事倒是非常好用的，大家都会用的，那不是格局了。谈六亲没那么麻烦问题。
<p>比如说女命，正官为夫，甲日主生不管在哪一个月，都以辛为夫，辛禄在酉，生在酉月、就是夫旺的了。那么你问，到底有多旺？大家嘴巴不讲，心里有数，大概两栋房子没问题。夫是旺了，谈得来谈不来呢？一个夫？还是两个夫呢？那是另当别论了。所以是在六亲边边谈旺弱，很明显、也很好用。谈荣华富贵、谈强弱就复杂了，太抽象。比如说我了解一个人，这个女人离过三次婚，我很容易就体会她的心情，如果你把这个官不当夫星看，当正官格来看，遇到伤官，她失败过两次，我就不太容易理解了。把官位丢掉之后会怎么样？我们都会用人之常情来谈这个事，我做过县长下来了，管它干什么，总有几个钱，我会这样想的。
<p>那么有钱的女人同有钱人结了婚，我不会想一定是有钱的，所以判断力根据人性之自然就变得模糊了，所以强弱这个问题用在六亲是最好的，一用到格局就很难。这我们要谈实际人生，不要说县长了，科长都不是每个人可以干得到的！夫妻呢？全世界都有的，就算你没有结婚，你一辈子总有过异性朋友吧！就很好了。所以我们在普通论命，在强弱方面不要用到格局，而要用到六亲。尤其是我特别倾向中流社会。
<p>那么在普通百姓中间，身体强壮与否就不是重点了，不是说有志气就能当大官，不谈这个问题。你丈夫强不强？你妻子强不强？孩子强不强？这种强不是只有你才能做到的，有两栋房子的人多的是，孩子大学毕业很乖的也多的是。这才是真正切身的强弱问题。
<p>所以我把用神強弱分開講，然後最近六十年來對強弱看法，又產生第三種混亂。怎麼叫混亂呢？它把強弱比成爲重量，譬如甲祿在寅最重，甲絕在申最輕，那麼你把十二地支分成十二等分，上砝碼要稱稱看，又中間有些地方只能講出最強、最弱，沒有規定，是你自己想的了。創這個概念的人他也沒有規定，譬如我請問你，甲在沐浴或者甲在胎怎麼強弱法？他也講不出來，他只講得出最強最弱，其他就自己比照。那麼就變得砝碼就沒有標準了，完全從量方面來看，忽略了質，質就是性質。
<p>研究命理的人都知道通根、长生、禄、帝旺等概念。你可以把它们当作砝码来计算，一两、二两慢慢称量，这是一种方法。那么对于普通人来说，身强太过了，没有那么多的官职给你做，他讲的是过程，也就是我现在特别向同道解释生旺库的时候，从质量上来讲，比如甲木通根在亥，甲木长生于亥，它有根基，当然不弱了。那么甲禄在寅，你有寅木，就把它解释成临官位比长生位要强，这样说可以，你没有办法真正比较出来的，这个三千万，那个两千五百万，是说不清楚的。
<p>所以从质的方面去看，如果坐长生的人欣欣向荣，不管有钱没有钱，都有那种冲劲！什么都想干，失败十次、八次他都提得出劲，这是讲过程。至于他能赚多少钱呢？这是人生观问题，我不认为钱太多是好事噢！，钱太多有时会带麻烦的。那么你问我，那你到底说个数字听听啊！根据我的经验，三千万就好了。三千万不是你赚到三千万，你先在银行里摆三千万就够了，不要再去争什么事情了。那么三千万以内的，就随便你开三家店也好，怎么努力也好，都是长生，长生就是欣欣向荣！不断是在制造。那如果甲禄在寅，坐临官位，那是守成。怎么叫做守成呢？譬如说，你爸爸开家店，已经经营得蛮好的了，交把你，这就守成了。但不见得你爸爸是有店交给你的啊！那么也就是说，你跟个老板，从员工做起，一直做到副经理，那么老板说，总经理让给他，那时候那家店已经非常稳定了，你叫他去开拓创造，他不行的。你拿几千万让他去开店，不行的，一定垮台，他不是长生位的，他是禄位。
<p>我有时候讲笑话哦！人家都笑，我在马路上看新装修的一个店，很大的一个店，我在边上看，光那个装修啊，恐怕就要一千万了。我怎么想呢？如果我有一千万，我还去开什么店啊！因为我不是长生位啊！他们就会。因为这个长生位的，不管他有多少钱，他还是要冲。如果临官位的呢？只能守成。一看他上班的公司快要倒了的，他都不去了的，因为大公司里面，职位虽然很低，钱很少，但很有保障。这就是临官位。
<p>帝旺位啊！天道旺到极点，就要衰了，那么以我的个性讲，你开公司要倒了，找我接手，我一定不干的。帝旺位的人就不同了，把缺点修正过来，就很能赚钱的。他专门接管那种摇摇欲坠的，把它拼起来，这是过程问题。
<p>库是守成的。如果命带库的人，他的守，守多少呢？并没有讲钱多少了，譬如说我举个例子，很多朋友退休了，有的退休按月拿钱，他不会感觉钱不够的，稳稳定定他就过了后半生。有些人拿去做生意，搞光了。也可以冲出去。如果坐库的人他不会冲，也不会什么改变，就守住这些。那我是讲公务员了，假定说是一个爸爸开家店，近几十年了，譬如台北有一家日本饭店，门口挂个招牌成立于一九五0年，六十多年了。并不是什么大饭店啦！每天都这样子过，他觉得他的子子孙孙就守住这个地方。所以生旺库，与其解释他的份量为主，不如解释为过程。
<p>如果日主無根的人，我剛才講的三種條件恐怕都難。想衝也沒有本錢衝，想接管店也沒有份，連守都難。那麼這個生旺庫，用在身強、身弱，以及在用神都一樣。就普通人講，強跟弱就是生旺庫，用到六親遠比用到榮華富貴爲好。
<p>所以我对现在初学命理之人说，不要受到书上的例子误导，比如你买本《造化元钥》来，现在最流行的《造化元钥》是徐乐吾写的，他认识很多大官，里边孙中山、袁世凯、曾国藩。那么你把那种八字想成普通人的八字来研究，就不切实际了。所以论命要实实在在、脚踏实地，以中产阶级为主。
<p>那么就是不知道你对钱财怎么看，我认为有两栋房子就可以啦！夫妻和谐、子女健康，各得其所，这才是美满人生！因为单边偏出去的，特别有钱或者特别有权，那就有他另外的苦恼了。那么现在我讲的强弱是最近六十年所讲的强弱，因为它没有了解用神之过程，六亲强弱最明显，日主强弱是第二。日主强，心很高；日主弱，他确实是不太想做什么事的。什么事都以安居乐业为考量，那个你不能把他解释为没出息，应该看成是安分守己比较恰当。
<p>那么这个强弱过了之后，就有句话啦！不晓得大家听过没？过去不谈，我们现在还能做些什么？就是我在所存残余抄本经典里面看，还能再发掘出些什么东西，弥补以前所不足的？尤其现在写命书，同清代写命书完全不同，印刷方便，出版迅速，可以有比较客观的立场，多研究古人这个遗留文化。所以当用神、强弱讲过之后，真正对命理有所帮助的，就是我们要细细探讨的，哪一些是没有被挖掘出来的东西，可以重新再认真整理一下，那么才真正是对现在的读书有所帮助的。
<p>我刚才讲的强弱重点是摆在整个过程，因为业余研究命理的，对身强身弱还有用神，陷入很伤脑筋的情境，我把这个解释完之后，然后把它拉回来到实用。身强、身弱、中间的可以不去考虑，我们要考身强、强到什么地步，叫做孤旺无依了。身弱、弱到什么情形，才是身弱不能托财官，这两句话，我们以实际人生来解释，说孤旺无依真正意思是全世界只有你自己，谁都不如你，谁你都看不起，谁也不理你，什么你也不能做，就变得孤旺无依。这个当然非常不理想。
<p>另一种就是身弱，弱得没出息，那就没关系了，一直到怎么样，身弱不能托财官啊！我曾经见过一些人，身上摆不得一万块钱的，非要花光不可，这就身弱到低于普通标准太远了。我记得有一次上课，我问同学：我说我一辈子没上过班，同社会接触少，我真不知道，钱啊！到底谁算有？谁算没有？我就问他们：你们认为一百万算不算钱啦？结果有一位老同学很熟的，他说：我连五万都没有啊！他已经三十几岁的人啦！从来身上没有摆过五万块钱的。这对我来说很难想像啊！那这就是身弱不能托财官了。
<p>所以这两种我们应该要避免啊！也不要把自己吹得全世界只有我才了不起啊！我见过一些狂人，去上班，没两天就不上了，问他怎么不上，他说：老板他够资格用我吗？这个话讲得太过离谱，扯太远了。弱到像我刚才讲的，身上没摆超过五万块，整个社会我是不了解啦！我总感觉好像未免有点太刻苦一点了。那怎么才会变成这样子的呢？
<p>我就理论上讲，我们用命理讲的啦！还是讲强弱，那么扶日主的十神只有五个：比劫禄刃印。如果一个八字出来，比肩、劫财、临官、帝旺、正印这五样你都有。这个就是孤旺无依了，甚至于可以推论为凶终。两人吵架：你敢杀我吗？就会惹祸。这就比劫禄刃印会齐的，这个人确实是一无所成，讲话完全自不量力。反过来呢？弱到连起码条件都办不到的。身弱不能托财官这句话普通人解释是这样的，你不会有钱，就算有几个钱，不是给人家倒掉就是生病。这是普通解释。
<p>那么身弱不能托财官第一个条件就怕日主无根。如日主是甲，支藏天干没有甲叫四柱无根。《神峰通考》把日主无根归成一个系统，叫做无根系，一旦到地支完全没有根了，比劫禄刃印全都没有，就是无根了，那会不会招凶呢？或者只是穷呢？差别就是月令有没有财官当令，比如甲日主四个地支一个甲都没有，叫日主无根，当然我可以确定这个人不会想去做县长的。那会不会倒霉呢？不一定的，在《神峰通考》里面叫四柱无根，它没讲冲刑，应该把冲刑带进去的。八字不能带冲刑，带冲刑，是你自己找的；如果不带冲刑，是命运所造成。那到底会发生多大的祸害呢？它有句话讲：财杀当令，只要对研究八字的有一年以上的经验就一定懂的，甲日主的财是午，巳、午月财当令。他的官是申酉，甲日主四柱无根，不要生在巳、午月、七、八月，那生在这四个月呢？那你会惹祸。
<p>我用个比较好懂的比喻，我们出门第一个条件要干什么，身上要带钱，对不对？带多带少无所谓，总归要带一点吧。你日主无根，遇到财杀当令，你出门没带钱，你不过没惹到事，路上碰到打翻人家摊子，撞烂人家东西要赔钱。那财杀当令会有什么结果？那就闯祸了。所以日主无根，不可以财杀当令，十个天干统一样，财是日主所克的，杀是日主克你的，财杀当令是最重的一种负担。所以日主无根，财杀不当令，只是我们讲默默无闻啊！
<p>我认识一个人，真正有这个人的，他二十几岁在电力公司做雇员，一直做到五十几岁退休，拿了点退休金，刚开放探亲，回他大陆老家买个小房子，就这样过一辈子，也没有家，从不出纰漏。他的花费就几个同事，每个礼拜天，因为他广东人啊，所以饮茶，吃吃点心，一辈子就这样。听起来很乏味啊！我是暗中想，这倒也是真很有福气。
<p>那么日主无根就是这样，不要财杀当令，财杀当令你会惹祸的。那么身强，比劫禄刃印全，这会送命的，送命就是车祸等意外之灾。所以强弱在中间就好商量了，好比一个班一百人，我只要管前面三位、后面三位就可以了，中间高高低低讲不清的，充数的啦！今天我所讲的就是用神、强弱，这是从命理之背景讲过来的，那么现在呢，真正谈命的，这些都是口头语谈的，研究八字的人他说你身弱，我说他身强，你说用金，他说用火，扯了半天最后不了了之，这是业余人士的特点和习惯了，从业的不会。
<p>从业的他是真正看八字，不讲这个了。为什么从业好谈呢，从业的面对普通人嘛！我有时候讲笑话，普通人一个，他想骗也骗不到，人家不相信他啊！闯祸他不敢杀人，那他有什么大吉大凶啊？就平平常 常一般性啊！给人家倒掉小钱，挣点小外快了，谈来谈去都是一些小事情。那么这一节呢，完全是以《用神经》和《子平总论》的内容开演出来的，我这样讲是介绍个重点，用神有《用神经》的补遗啊，各位在研究方面可以慢慢去看看这个细节。这节就讲到这个地方。</p>
`,
 FXZBHY:`<h1>發行者編後語 </h1>
<p>本书之成书是根据二〇一一年录制之「梁湘润子平概论全集」教学光盘之字幕稿，编辑成书，原先因梁老先生口误而删除的部分，和同道间流通的抄腾讲义中遗漏的部分，也予增补入书内。阅读此书，就如亲聆梁老先生授课。
<p>「梁湘润子平概论全集」是梁老先生的台湾得力弟子——菩得人本公司刘昌宪董事长和张容俊总经理夫妇出资、为梁老先生录制的一套循序渐进之影音教学光盘，是以影集的制作水准，精心剪辑、加以配乐、有中文字幕的视频。
<p>并在影片录制之三年后，得梁老先生北京得力弟子——郭伟和韩笑夫妇大力协助下，于二〇一四年正式应市。慨因同道尚无尊重著作权的概念，盗版光碟及视频不知凡几，正版作品却乏人问津，行卯出版社欲以贩售光盘营收以刘董事长和张总经理之名捐助两地弱势的心愿迟迟无法实现……。</p>
`,
 SS:`<h1>神煞 </h1>
<p>这个算命啊，除了以前讲的十神定位只能算是常识。最简单的算命有两种：第一种用刑冲合会算命，上次我们讲那个短命的用的就是冲刑。比如说今年流年冲，犯太岁了，管你什么命都是有麻烦的。所以刑冲合会算命是最容易的，大家都口头上讲啦！我犯冲了怎么、怎么……这些口头语。第二种容易算命的就是用神煞算命，神煞不是出于子平的，神煞早就有了，神煞是属于择日法，选日子叫择日。人生讲吉凶祸福最早是算卦，后来是择日，然后是阳宅，最后才是算命。算命是东汉末年以后才有的，所以神煞系统已经在了。
<p>那么什么叫神煞呢？神煞是一种特色，同命好坏无关了。譬如我们讲桃花、贵人、驿马，不会算命的人，也都知道这些名词，它是一种现象，没有真的吉凶祸福。吉凶祸福要连下去算的。譬如我们讲你命带桃花，当笑话讲了。有很多男女关系、很乱的这种现象。你论到实际情形就不同了，桃花可以叫你身败名裂，也可以叫你人财两得的。桃花也可以变夫妻的了，也可以变露水因缘的，这种细节就要深谈。神煞很多、很多，在《协纪辨方书》里有几百个，但子平只选出来大概二十几个。子平法比较严谨，首先我把那个神煞的意思同各位介绍一下。那么书上的意思同你解释出来的意思，可能有所不同。那么我一个一个为大家做一个解释。这个比较轻松的，不要背的，你只要知道五行生克就可以了。
<p>《子平基础概要》书上第三十一至三十三页神煞表（第十三版），它边上怎么讲，你就怎么讲，它写年柱地支就从年柱地支查，月柱地支就从月柱地支查。</p>
`,
 SSJL:`<h1>神煞举例 </h1>
<p>我现在所讲的神煞，都是照字面讲的，并没有讲吉凶祸福。各位有没有想，桃花可以人财两得，包括坐牢。做过官的人坐过牢不是没有的，坐过牢后来当选民意代表的，多得很啊！什么神煞都可以吉、都可以凶，譬如说华盖，好像什么跑到庙里去做义工什么的，那大庙的主持他也是华盖。这个像四十年以前已经往生的白圣法师、南亭法师，他们都可以见总统的，那也是华盖。这华盖就可凶、可吉。
<p>所以我们论命不在乎神煞本身的意思，你驿马也罢，桃花也罢，华盖也好，什么也好，包括贵人在内，不是讲你当时，而是讲你最后的结果，这才是我们论命的重点。以桃花来讲，大家懂的，好懂的，我做个譬喻，写在这个表上，大家就了解了。所以我们论命，不怕你坐桃花，不怕你坐亡劫，要看你最后。
<p>神煞最怕一件事情，各位要记清楚，就怕神煞这个五行克你日主。现在有个例子，戌日卯时，带桃花，不管你什么格，不管十神定位怎么定法，你命带桃花是不假了。那么这个桃花带来是人财两得？还是人财两失？就看你什么日主天干了。上面有例子写得很清楚，譬如甲戌日见卯为桃花，卯就是乙了。干支五行一定要熟。
<p>那么我还可以提早讲一句话，算命啊，一个八字拿出来，你要了解这个八字吉凶祸福，你只有多少时间？最多只有两分钟，你说两分钟很快，不是，两个人相对两分钟不讲话，时间就很长啊！如果你两分钟之内看不出吉凶祸福，你再看下去，两个钟头你也看不出来。所以必须在两分钟之内把十神、六亲、刑冲、神煞都要了解到，那是完全靠你对四柱规则，这点非常重要。因为很多人学命理，三年五载甚至于十年，他同我谈话什么道理都会讲，一个八字拿给他，他不会讲，因为他的速度不够。坐在你面前两分钟讲不出一句话，就不像一个行家了。
<p>那么我们再把话拉回桃花讲，寅午戌见卯为桃花，第一件事情要确定，桃花的五行是什么？是木。
<p>第二，看日主，甲戌，甲也是木，就是平等的啦！那么这个人谈恋爱男女呢，不管是夫妻、男女朋友，他平等对待你了。妳对他表示好，他也不会装糊涂，也不会对妳特别有好处，也不会虐待妳，平平常常。这是同我桃花，叫平等相处，非常公平。你对我不好，我也对妳不好。你对我好，我也会对妳好，但不会好过头，完全合乎正常。这第一个。
<p>第二个，如果不是甲戌，是丙戌了，一样是戌见卯为桃花，不过日主换了丙，是火，桃花木生火，你说把她推掉，不容易啊！所以这个人的桃花呢！他不好色，但是很多很多机会，就好像二、三十年以前邵氏电影公司的导演，很多想当明星的啊，会喜欢跟他交朋友。就是桃花生你，那就是人家来找你的啦！所以我对这个人，不会责备他，希望他自己有个分寸。
<p>如果日主换成戊戌日，还是桃花，但五行不一样了，桃花克日主那就糟糕了，你这一生中问，随便遇到哪个女的都要倒霉了。为什么倒霉？没有理由，就是你天生那一副人家一看就可以欺负你的样子。所以最怕煞克你，一克你的话，不管什么都不行。这种桃花就非常糟糕。破财、赔了钱，还被人骂。
<p>再换个字，庚戌，见卯也是桃花，又不同了，是金克木，桃花被我所克，听起来怪怪的，说要就要、说不要就不要，能那么简单吗？你说不要，人家肯吗，对方也会肯，因为你有这个命，听起来很无情是不是，说不要就不要了嘛！但是站在当事人讲，桃花对他来讲，根本就不构成麻烦，我想各位也见过有人随时可以不要的啊！贵人克我呢，这个人他是帮过我忙，今天让我做这个事、明天叫我干那个事，逢人就讲，如果没有他哪有我今天呢，把他压得死死的，被贵人所克。还有贵人生我，这个很少的啦！比如打电话给你，缺不缺钱用？不用给你点头寸啊？或者问你了，你现在这个差事可以吗？不喜欢的话我给你换一个。这个很少，但也不是没有。
<p>所以神煞的吉凶，我刚才所解释的是一种现象，吉凶祸福在这里。譬如有些客户问我，不是问升官发财，他已经很大事业了，但他身边最重要的人，他要问过我才敢用。这个人我授大权给他，他会忠心我吗？他会谢谢我吗？如果对方这个人是我克贵人，他不会谢你的。如果对方八字是贵人生他的，只有你帮他的忙。那么这种事情呢，算命，我就跟那些成功的人，算他身边的人，第一手主管，就是他的秘书对他，不是要他帮忙，他也是不要算运气好坏，只是能不能用得到忠心的人。那么这个同荣华富贵无关了，同妻财子禄寿一点关系都没有，那么这个就是贵人。
<p>我再举个例子，我想三个例子下来，各位就能体会到了。最坏是亡神、劫煞，是非啊！第一种同我亡劫，亡劫的五行同日主相同，这种会怎样呢？一些年轻的朋友聊天，他们怎么讲，没事不惹事，有事不怕事，就他们绝对不去惹麻烦，真有事，我也不怕，平等相待。第二种亡劫生你，那你身边都是是非人嘛！你坐在家里都会有闲事惹上身的。第三种我生亡劫，你自己本身就是是非了，到处去管那些闲事。第四种亡劫你，那就坏了，你是输家，是非把你压在下边，一点办法没有。第五种是好的，我克亡劫，哪怕坐了牢，因坐个牢你很大好处，为我所克。
<p>所有神煞单讲利害关系，最好是为我所克，那不可能统统被你克的啦！如果选一样、两样讲，我所克的桃花对你讲没有利害关系，如果被神煞所克，哪怕是贵人，都有啰嗦。那么你说到底哪种好？这就不是我谈话的范围了，以你当事人的角度谈了。就像我们讲故事一样，朱洪武杀了那么多人，恩人太多，没办法报了。那么这个神煞之吉凶是讲克不克我。那么这个神煞呢，一样，克不克我，也要连带着在四柱上哪一柱？在年柱是幼年，通常吉凶祸福年上是不谈的，最多捧场了，噢！你书香门第了，你家里好有办法：一种门面话。
<p>第一个讲年限，第二个讲十神。譬如我们讲正财是太太，这个讲十神定位了，如果把神煞拉进去就不同了，正财坐七克，那你的是非是从女人来的。如果官杀坐七克，对女人讲，那是你先生给你带来的。比劫坐七克，你自己花钱去找麻烦来的，这是坏的，好的统统一样啦！
<p>比如比劫坐贵人，这个贵人要请客、要送礼的啊！你没有礼物去，那个贵人他不来的。如果财坐贵人，那对男人讲是好事，你那个贵人是从女人来的，这话不好讲，靠女人，不好听，不过讲得客气一点，你最好做女人的生意，女人服装等等，这意思就是朝那个方向指过去。
<p>那么这个全部神煞带住在内了，现在我举个例子，《子平基础概要》五十页（第十三版），这个八字在书上本来是用来教取格局的，我现在把它神煞、冲刑都写进去。
<p>正官 乙亥 食神 甲戌 偏印 壬辰
<p>第一，日支辰，申子辰亡神在亥，年支亥为亡神。亡神就是迷迷糊糊的。年为小孩子嘛！最多是他要吃什么，买了他又不吃了。
<p>第二，日元壬水，干禄在年支。建禄，有自信，根本都没用，有点顽固。
<p>第三，年上正官，可以说这个人出生家里至少一栋房子。
<p>第四，年支亥，亥子丑孤辰为寅、寡宿为戌，月时为寡宿，两个寡宿，这是他私人之事，男女关系，寡宿可以解释为不论男女，对孤寡他们都一样的，就算我分的男怕孤、女怕寡也还是孤寡啦！不管你怎么解释，总是一个人嘛！但这里面你们要注意了，辰戌冲，有没有看到？后面辰戌冲，寡宿带冲，死一个太太，或者离婚一个太太，这种现象，它有原因的，没有离之前是吵吵闹闹，搞得非常不开心，那么死了之后，他怎么讲啊，讲自私的话啊！死了还好哩，省得麻烦哪！
<p>这个冲，固然是年月对冲，十六到三十岁，寡宿带冲，分手的话，你很不开心的，那你问到底几次？没有次数，有一次算一次，因为这涵盖在十五年之内啊！那么到底婚姻在哪一年？那讲流年的，这是另跟你讲，这个是金兰酱油，这个是味全味精，算命就是这样一点一点进去的。
<p>第五，上面有甲己合，不知道你们能不能背，背公式只是甲己合，一点点吉凶都没有的。在这里解释不同了，食神合正官，那么头一个，年上正官，正官带合，这个好处可以延伸到月柱上来，这个天干合是七年半，在月柱上讲可以管到二十二岁，一过了二十二岁，下面就辰戌冲了，合的效果就没有了。
<p>如果她是个女人，在年限上讲一样的，男女一样。在十神讲就不一样了，这个因为男命食神是没有六亲关系的，女命有的。
<p>女命食神是什么？食伤代表子女。正官代表丈夫。孩子和丈夫相合，丈夫在前，孩子在后，这要怎么解释呢？普通人解释不了，但行家算命时有一种解释方法，怎么解释呢？各位有没有见过这种情况，结婚前夫妻很恩爱，一结婚后就只顾孩子，不要丈夫了！我打个比方说个笑话，半夜叫丈夫起来泡奶粉啊！如果离婚，一定要孩子，丈夫可以不要。
<p>那么我举到这个例子，如果以这个标准来算命，那可就深了，连家务事都算得进去啦！包括离婚怎么离法它都算在内了，所以一层、一层就往下伸。日月辰戌冲。那么后面还有一个辰戌，那不就完了嘛！
<p>前面寡冲，后面寡又冲，如果你以美满人生看，那是非常糟糕。如果你以那种起码的条件讲，你没有，怎么能算呢？先要在一起，才会有死啊！才会有分手啊！那么还有比你更糟糕的，他根本就没有的啦！娶都娶不到的了，还谈什么分手呢？故此，一个命高与低，同样一个八字，相同的情况，要对不同的条件来谈，所以这个程度，辰戌两个冲，如果对他本身来讲，三十岁以后一直是带冲的，至于他命好坏，他食神可以生财的，你说是是非非，这辈子是离不了的。
<p>第六，各位看这个八字，时上是个偏印，偏印是艺术，如果单独以十神定位讲，这个人有艺术性格，性情怪怪的。全盘就不一样了，他经过那么多冲刑之下，人生观有点消极了，不是玩个性了，而带点悟道这个性质了，谈起话来，什么都无所谓啦！看开点算了。我讲的八字并不是教各位算命，而是我把前面所讲过的，一起拉起来，做一个活动性的讲解，这是一种也等于是初步练习看八字。
<p>第七，年支为亥，大耗为辰午。所以这个八字认真讲，除了出身好一点，并不太平，那么这是举个例子，这样讲到这里呢？还没有算讲完，什么叫完满呢？比如说，天干是正财，我们先假设财是好事，财总没有坏事，那到底多少钱？是多、是少啊？没讲到这一点，如果讲到这一点，就要讲到强跟弱，必须要背这四组规则，第一组我让各位背的是刑冲合会，第二组讲六亲代表，正官是先生，正财是太太，合的时候不是甲己合了，变成食神合正官，六亲合了。第三组呢，一直到现在还没讲到，就是前面要背的十二生旺库，禄绝。
<p>比如说你有十二个部下，你要能讲得出最能干的是谁？最差劲是谁？第一名跟第二名要知道。讲禄绝呢？它是把十天干分成十二等分，譬如钞票，百元钞、五十元钞、二十元钞、十元钞、五元钞只有五种，但是是十天干分成十二种，我把最强的、最弱的并起来讲。这一段就归到另外一段，叫强跟弱了，譬如我给你点钱，开张支票给你，五百元也是一张支票，五亿也是一张支票，那么这个归于强弱的问题，就归到下一个段落。
<p>这个段落就是神煞、六亲、年限、冲刑，神煞单独同日主之生克，这五组关联拉起来。在算命里头，冲刑、神煞就可以单独算命啦！对普通人就可以单独算命，尤其讲你性格，你带华盖，譬如有人专门到庙里面住几天的怎么样，华盖生你，你生华盖，你去找它嘛！和尚跑来找你捐款，你很客气招待，这华盖在生你了。我犯华盖，我不信这个邪啊！华盖克你，自己饭都不够吃，还把线捐到庙里头去了。
<p>再举个例子，给大家做个解释，就是《子平基础概要》五十二页（第十三版），另外一个八字。
<p>偏财 乙酉 正官 丙戌 天月德 正官 辛酉
<p>各位有没有发觉到，每一个八字排出来都差不多的，就这个八字嘛！比劫、食神、伤官，转来转去，什么吉凶祸福都看不出来。只要把四组公式套上去，把神煞带上去，就看出吉凶祸福了。这个八字很明显的，你看天干偏财、正官，门面就非常漂亮。年上偏财，家里有钱的，财官，财官印是没有坏的，再怎么差劲也不能论坏。最多是虚场面。虚场面也是好的。那么我们谈的不是先从十神谈起，我们先从神煞谈起。这个八字在年柱上带红艳，在十五岁之前谈不上红艳，就不谈了。如果真带红艳，算命上也不列为主题，桃花还有点话可以谈啦！红艳谈内心自作多情，你同它有什么好谈的。
<p>干禄就是有志气，那么在年柱，这些东西都是魔话了，小孩子最多很倔强，这个月时正官倒是真的，虽然不是神煞，也可以顺便看一下，出生书香门第，那么正官这个丙字，正官很平常啦！谁都可以有啊，但是这个八字的丙是天月德贵人，月上、时上都有天月德贵人，那个在天干的天月德贵人有个好处，在天干谁都看得见。
<p>比如说，我讲个笑话啦！不是真的啊！某个人他跟王永庆是同学，你说他会穷吗？也许他真穷，没人会相信的了，你跟他是同学，这个贵人，谁都知道的了。那么有时候我们聊天：某某银行总经理不是你的同学吗？是啊！一定有办法的啦！那不见得。摆在天上是明的，谁都知道，谁帮你忙，大家猜猜看都知道了，一定是谁啊！，好事！如果单独谈，月上有同时上有，那当然时上有比月上有还要有效了，晚年嘛！四十六岁以后正好有一个，而且这个天德贵人，到底你帮我？还是我帮你呢？这里面就有个新的规则出来了，丙辛合，大家有没有看见，丙辛合，所以算命一上手，就要会背刑冲合会，你会背了，可能还不会算，如果你不会背，根本谈不上会不会算命。
<p>丙辛合，在五行讲，丙辛合水，那你是背五行合，在这个地方解释法不一样，丙辛合，就是正官带合，也是贵人带合，带合就在年限上可以拉过去，两个贵人一起带合，在年限上是讲这个人从十六岁一直到六十岁都有天月德贵人的，那么各位要随时记得我讲的三到，第一到就是时间到，第二到就是六亲到。
<p>如果这是个女命，正官代表她的丈夫，那么她的丈夫会很体贴、很有办法，这是讲六亲关系。那么讲那个过程又不一样了。比如举个例子，我经常问女孩子，妳愿意嫁给一个月挣三万块钱、对妳非常忠实的先生呢，还是嫁给一个月挣一百万、但不一定每天回家的先生？妳要哪一种啊？不一定啊！穷人就是想要有钱的，有钱人就是想要忠心的啦！所以在于夫星带合，就是妳的先生和别人共用了嘛！正官带合了，他既能和妳合，也可以和别人合。那么这是讨论夫星。现在这个命不知道是男是女，只是举个例子。那么丙辛合从贵人讲，就是一辈子都有贵人在帮妳忙的。
<p>那时候支申，申是亡神，亡神就是做事迷迷糊糊的，那我们不能这样子讲的，前前后后这样讲，一个八字只要有它的特色，有个优点也就可以的啦！晚年是没有以前那么好，那么是这个亡神，下面还有一条申酉戌，在刑冲合会里边讲申酉戌三会西方金，光讲这个金是没有用的，金要与日主比的，日主是辛金，那么三会金，又变成什么了？比劫嘛！五行相同。
<p>所以这个八字本身地支就是坐比劫的，一直都是败财的，那么我现在把他暂时比成是女人，比较好又带亡神，这个红鸾是自作多情，我时常电视上看，一个外国明星来，好多粉丝跑去机场去接他，什么意思都没有，就好热闹而已，这个就是红鸾。那么这个八字没有冲的，只有合。
<p>那么举这么两个例子出来，大家不可能就会算命，但是可以提醒各位一件事情，各位明白刑冲、会合、克出、克入的重要性。天月德贵人带合，亡神是金，申就是金，同日主一样，他虽然迷迷糊糊，不至于太离谱。地支申酉戌会金，这个人一辈子都在暗中败财，这个财从哪里来的，就是从贵人那里来的。表面有钱来，如果拿到又没有钱，都漏掉了。
<p>如果是个男命，除了破财之外，还要加克妻，比劫克妻嘛！他有贵人，他也克妻。克妻的话，不一定讲死掉，会bye-bye啦！从年轻一直到老，酉戌、酉申统统一样的，他随时都可以分手，最起码谈不来，一辈子谈不来。所以对男命来说是婚姻大不理想，钱财也漏得厉害。对女命讲，婚姻也是糟糕，比男命更糟糕的，男命不过bye-bye算了，她有点扯不清了。现在假如说这个是女的问我，她先生有外遇，什么时候可以了结啊？没有用的，就算了结了，还会再有的，妳命中就是带住争了啊！如果她是个小三，跟了人家，她说我分手之后会不会有一个更好的啊？不会，还是一样的，不过换个人罢了。如果这样可不可以对她明讲呢？不能啊！因为人家是来找安慰的！所以各位研究命理到现在，体会到有一件事情，就是我对那些研究久的业余的算命讲，你要想知道你自己的命，说句老实话，除非你自己会，否则很难了解自己的真相！
<p>所以我两个八字举出来，倒不是在意你马上会算命，你会深深体会到，刑冲合会、六亲代表、十神生克、年限四柱这些的重要性。所以这个算命讲究三到：时间到、六亲到、性格到，我以前认识一个打拳的人，功夫非常好，我问他，功夫怎样才能练得好，他说：三到，眼到、心到、手到。眼睛一看八字下去，立刻时间、六亲、性格一起到，到了这个境界，就算你开始可以看八字。但是要到这个条件之前，还是奉劝各位要背熟，背可以讲理论，也可以不讲理论，理论不通没有关系，不会背就不行，就好像开电灯了，按对就可以了，电路可以不必研究。
<p>那么我举出这两个例子，大家应该对刑冲合会会看重的，那么这节就讲到这儿，下面是讲强弱，强弱就是说好坏，什么叫好，先生好，一个月给我十万块？还是一个月给我一千万，都是好啊！这就分强弱、分格局。男人讲你好命，头一个讲的都是好命，第二讲那士农工商，你是哪一行？行行出状元。这就越分越细了嘛！那么下次就要讲格局，讲强弱，还要带出五行性，五行本身有它的性质在的啊！今天就到此为止。</p>

 HYS:`<h1>紅豔煞 </h1>
