 YR:`<h1>羊刃 </h1>
<p>就是刀弓，阴阳的阳是指日主，甲丙戊庚壬是阳，乙丁己辛癸是阴，甲是木，最旺的木，甲遇到卯是最旺，叫羊刃。丙日主遇到午月是最旺。戊这一条呢！五行有特别规定，火土同生同旺，丙火旺在午，戊土也旺在午。庚在酉为强金，壬旺在子。命带羊刃的人，就是带劫财，劫财就是羊刃，羊刃就是劫财，性很刚的。破财是一回事，性刚又是一回事。譬如说我算命，说你什么时候发大财，很难啊！说你个性很强、很刚，很容易啊！这用神煞算的。那么甲日主生在卯年，年支主十五岁以前，他有什么性格，没有啊！这个羊刃就直接照劫财解释了，劫财克财，对你老爸不利，性格不谈。
<p>如果生在卯月，甲人卯月，三十岁以前，年轻人不懂事，骄傲得不得了，同时也有破财的性格，也对老爸不利，也对女人不利，自己太骄傲，这种情形最怕是女人啦！三十岁以前你是最好的岁月，如果玩个性玩过度，对女性是大不妙的啦！那么自坐，譬如说丙午日自坐羊刃，按道理是一样的，同老爸不相干，那么这个人的性格跟着年龄走，到了四十岁了，天性自然就会慢慢稳重起来，就没那么冲动了，夫妻吵吵架难免的了，但还不至于搞出很大的麻烦。时上羊刃呢？晚年你性很刚，因为受了年龄这个问题啊，慢慢知道有点收敛啦！所以时上羊刃，我们倒不从这方面解释啦！从哪里解释呢？这个人不服老，他虽然不至于去干涉人家的事情，至少不肯放弃权力。这种事怎么还不来问问我呢？问问我，我可以给你出点主意啊！或者他去干涉人家。这个叫不服老！若我跟他讲不服老，听起来不好听，讲得客气一点：很难退休啦！就算退休了，还用电话来指挥。
<p>所以羊刃这个东西，就是性刚不服老。命带羊刃，你就把他解释成为劫财一样就是了，不过是在地支，劫财是在天干，有什么不一样呢？在天干的劫财，你一讲话人家马上就知道，这个人很精明、不好相处。如果羊刃呢是在地支，你初看看不出来的，你同他谈正经之事就感觉到了，没那么好商量啊！那么廖时上羊刃的人，我们都感觉到他不服老，晚年太辛苦了，样样都要管。年纪轻的，同父母谈不来，中年夫妻谈不来，晚年同小孩也谈不来。他意见很多，这个叫羊刃。</p>

 HG:`<h1>華蓋 </h1>

 DLBSHSGD:`<h1>道裂变术，合术归道——《梁湘润著作集》总序 </h1>
<p>梁湘润原名梁天驹，曾用法名释清觉，生于一九三〇年的上海，一九九四年渡台，并在台湾岛上度过了大半个人生，于二〇一三年逝于台北，享寿八十四。
<p>梁湘润的一生，于宗教界和命理界均多有建树——“道裂变术，合术归道”这八个字可以说是他一生思想的总括。梁湘润自二十岁起开始以佛教僧人的身份活动，至四十余岁投身命理研究，最终成为一代命理大家，并保持了很长一段时间亦僧亦术的身份。而终其一生，梁湘润都没有停止对佛学的钻研，并以佛教居士的身份主持吉祥精舍并持续撰写佛学著作。
<p>梁湘润相信“山、医、命、卜、相”五术源自于太上的道，并且人们与这道体的关系是以文明为载体展开的。梁湘润的著作中既包含有大量整理“数术”文献的工作，又有超越意义上的、追求形上本体与注重宗教解脱的另一个面向。梁湘润思想始终在这两极之中辩证地发展着，只执一端者实难以窥见梁湘润思想的全貌。
<p>上世纪的七十年代起，梁湘润在台湾撰写过一系列的五术基础教材并深获好评。八十年代起，梁湘润深化子平学的理论基础，整理了余春台的用神学说、沈孝瞻的格局学说、滴天髓的强弱学说和金不换大运流年学说。在台湾，梁湘润以其流年论命的心法著称，其命学主张至今在台湾有着深远的影响。《子平基础概要》印刷了数万余本，在台湾的命理界可谓人手一本。梁湘润更考证古书中所列的八字命式，考据当代论命技法（请参阅梁著：《渊海喜忌随笔》、《古今星相见闻录》），首开命理研究之先河。
<p>九十年代后，梁湘润将其对于中华禄命文化的史观与想法写成专书。适逢两岸开放交流、港台五术文化回流中国之际，梁湘润此时的著作以学科史的方式整理子平法，提出了“子平母法”主张，引领两岸子平研究之风潮。
<p>行卯出版社此刻将梁湘润先生的著作进行整理，结成《梁湘润著作集》系列丛书。并分为“教材系列”、“理论研究系列”、“古籍注释系列”，以利命学研究者选读。是为序。
<p>行卯出版社长 梁翰
<p>写于乙未年 台湾·台北</p>`,
 SSSG:`<h1>食神、伤官 </h1>
<p>那么这一节讲食神，单独讲是食神，从五行讲我生者食神、伤官是连着的。我克者为财，克我者为官杀，我生者为食伤，是日主所生的五行。甲日主丙是食神，丁是伤官，同性食神、异性伤官，这是产生的五行规则，在性格方面完全不同。
<p>在六亲方面，食伤对男人来说是没有意义的，没有这个六亲，对女人来说食神、伤官就是小孩。到底食神是儿子还是伤官是儿子呢？理论上是有的，不过在实际算命等于白讲，中国人重男轻女，管他是男是女都说是男的了，所以只说是小孩子就是了。那么我生者为食伤，他不是财官印啊，他也不是做官，也不是钱财，也不是印，它变成中间一种附带了，什么是附带呢？印克食伤，印可以克食伤了，食伤又去克正官，食伤克官杀，它变得克来、克去中间一个桥梁了，变得成事不足、败事有余了，或者成败模棱两可了。
<p>比如印格遇到食伤，印倒没有关系对女命来讲，对小孩就很不利了，所以女命就很怕印啦！那么伤官克官了，所以女命对食伤也怕了，它克妳先生。这听起来很复杂，那我把它讲的简单一点，女人结了婚以后，一大半时间都分给小孩了，讲笑话，叫先生泡奶粉，这就食伤克正官了，克妳的先生了，因为有了小孩，小孩为主了。我们看到很多女人离婚，有的是争钱，有的是争小孩，这就看食伤在她八字上份量有多重了。
<p>一般性算命，只算你有没有小孩，那么多一点算命的呢，小孩有没有出息？这两句话还不如第一句话比较真一点，你问小孩有没有出息？多少有人情啦！所以女命夫与子，夫是第一位，小孩是第二位。那么怕没有小孩，就是五行怕缺食伤，怕没有先生，就是五行怕缺官杀，那么这是笼统一起论的。
<p>如果谈性格，不是的。食神、伤官都能生财，它自己不是财，所以你的八字缺食神跟伤官，那不是变得没有财了吗？不是的，它能生财，譬如讲，我现在是代理商，我没有钱的啦！但我有奶粉啊，那帮你卖，我代理某一个股票什么的，食伤生财是代理商，不需要你自己去做什么。那么食神跟伤官也不一样，食神在性格上是属于非常厚道的人，算命有两种人长寿，一种是偏财，你看他乱花钱，他无所谓的，他没压力。第二种就是食神格的人，厚道。因为人厚道，所以就长命。
<p>所以食神又叫寿星！那么厚道到什么程度呢？不是把你家里钱统统送光，他的厚道是这样子的，如果你问我借钱，我当然也希望你还的了，但是我先想，你问我借十万块，我会先想到的，如果你不还我怎么办呢？无所谓。所以对食神格的人讲，他的钱如果一拿出去，他可以不要的，还不无所谓。我们也看到过这样人，人家问他借钱，一般性讲讨债是吧！食神格不会，他非但不会讨债，还会安慰你，你欠人家的钱，先去处理啊！欠我的钱慢来，没有关系的。甚至于说，明明讨债了，不但债没讨到，还又借点给人家。这个就是食神格，他有那种性格厚道。
<p>但他不慷慨，跟偏财不一样，他平时算东西并不慷慨，一遇到事到临头，他就宽厚。所以食神格为人宽厚。那么他的财是间接的财，也等于说是代理商，这个代理商很多种的，譬如不带冲刑的代理商，代理克林奶粉什么、什么的，如果你带冲刑的代理商，那就收回扣、围标这种来的。算命不论过程的，只论有没有。所以食神格在女命是谓小孩。
<p>每逢食神受克，食神怕印，对男命来说，如果你食神格遇到印，就直接解释为健康问题了。食神代表长寿，所以食神格遇到偏印，就解释为健康出问题，不是钱财问题，不解释为破财。比如我们有时候算命，有人会说，我身体一直都不太好，这跟财印就没关系了。那么如果女命食伤格遇到印，也不解释为钱财，直接解释为小孩。这两种解释法与常情不符啊，但如果你细想一下，倒是对的。你问一个女人，钱重要还是儿子重要呢？当然是儿子重要。你问一个男人，健康重要还是钱重要呢？当然是健康重要。所以食神格不谈事业的，只谈子女以及健康。那么这两个问题，既然不属于钱财了，食神在年或者伤官在年，跟父母是没关系的，那么小时候也没什么性格可谈的，不过食神是属于厚道的。
<p>那么食神、伤官第一个条件，就是八字要有财，伤官才能够去生财。大概我们的解释法，自己不会赚钱的，但很会帮人家赚钱，间接的这种帮忙。那么食神是制七杀的，印是克它的，不管谁克谁，食神制杀或者印克食伤，每逢遇到相制的，不要在同一柱里面，譬如天干比肩、地支财，天干财、地支印，天干食神、地支官杀，八字都不喜欢这种组合，不管你什么格在同一柱里面上下相制，这个十五年都太平不了，因为两种不同的性格在一柱里面啊！那么我们也见过很多人十年、八年都在上下下、起起伏伏，都不稳定，就同一柱，这已经不是一个十神，每一种十神讲法都一样的。那么这是第一种。
<p>第二种解释法，两种混在一起的，譬如天干食神、地支伤官，天干正财、地支偏财，天干正官、地支七杀，那么唯独官杀混起来最严重，因为是女命的关系。正财同偏财混在一起，对男性讲没有什么关系，男女关系搞乱一点无所谓的。那么食神同伤官混在一起的呢，天干伤官我们也不是坏事讲了，当作好事讲了，儿子、女儿都有啊！这个是解释法，每一种解释法都要照人之常情来对待、去解释。现在讲的是食神，大家记住了，食神是健康长寿的，食神讲口福的。譬如说有人有钱，不见得他懂吃，有人没有钱却很懂吃，都有机会可以吃。这是讲口福、讲长寿。食神格如果不带财的，这个八字是没用的。那么这是食神。
<p>女命最怕印，因为印克食伤，如果食神代表小孩子要有办法，按年月日时四柱来分，一个女人能够见到你的儿子有办法，总得四十五岁以上啦！所以这要看时柱，女命时柱食神旺，可以得子女之福，这个福不一定是钱，子女对你很孝顺很听话，就是你的福。伤官同食神都是我生的，算命是不喜欢七杀的，也不喜欢伤官，七杀是是非，就算你有钱，也是是非。
<p>那么伤官坏在哪里？骄，很有才学，骄，讲话不留余地。伤官那个骄，同劫财羊刃的骄不同，劫财就是讲话随便，他什么东西嘛……如何如何。伤官他真正有料，有料而会遭嫉妒，没有料你光骄，人家讨厌你讲大话管闲事啊！伤官格他真正有料的，人家真正忌惮他的。他倒不是随便跟你讲着玩的，他真有一套的，所以伤官格骄。
<p>那么伤官格有一种统计，各位可以把这三句话记住：年上伤官，父母不全。年干有伤官，同你父母处不好的。月上伤官，兄弟相残。这个兄弟包括同事在内。时上伤官，子孙不良。所以伤官格只能讲你个人之成绩，带正官格的伤官格多是很寡恩、没有什么恩义。用了你二十年，我更有办法了，不用你了，随时可以把人家踢走，人情都可以抛掉。但是讲成就感，他确实有成就的。所以算命里面，真正高格局的不是正官格。倒是七杀格、伤官格真正成就大的人很多。我们以朋友的立场，同事业之成就不能相提并论。讲事业成就，头一个绝对要有是非，第二个少谈交情，这是成功的条件。
<p>那么十神任何一种都有它的优点，也都有它的缺点，那么对伤官来讲最大的缺点是骄，而有才学。那么论命的动机是吉凶，不是我来讲的，而且当事人，他所希望是什么，那么以总平均讲，伤官的败在骄，我讲的败不是失败，为人这个失败，你做高官赚大钱背后大家都骂你，也是因为骄。
<p>伤官格的骄同羊刃的骄不一样，羊刃就是讲劫财，羊刃的骄是讲大话，看不起这个、瞧不起那个，伤官他是真正有料的。一个没料的人讲大话，人家不怕你的了，就是看不起你罢了。有料的人讲大话，不一样了，那是个竞争的对手啊！所以伤官怀才，会引起人家的嫉妒，处人很难处。就算那个上级老板欣赏你，这是你的前途很稳，但是你与同事之间，事后会惹很多很多是非。而且事实上，有很多话，实在不需要讲的啦！
<p>我见过一些人，人家请他来做事啦！他倒过头说人家设计图不好，怎么、怎么样，倒过头来指挥人家。所以伤官格是败在骄，这个骄不只事业啦！包括亲属在内也不好。伤官格的骄是露在脸上的，看不起的脸色，一点都不知道遮掩，所以这是伤官格的骄。伤官格要成功要伤官生财，有调候也照样能成功。那么各位如果朝远的想……成功的人不见得善终啊！这个人有没有成功是一件事，能不能善后又是另外一回事啦！那普通人讲，我成功就好了，管它怎么善后呢！这是一般性的讲法。那么这就是伤官的骄。
<p>食神、伤官这两个十神，在命理中是处于配角的位置，因为它们本身不是财官印，这一点倒比较好理解。在命理的范畴里，也并不完全讲吉凶祸福，因为毕竟好命的人占少数。而性格和六亲关系，反而占了相当大的比重，尤其是伤官和食神这两种性格是完全相反的。
<p>在命理中，除了吉凶祸福以外，还有个不成文的规定，就是过程的辛苦与否。每个人都希望成功当然好，最好过程简单一点。除了吉凶祸福以外，杀格的人，心里就有点戒惧。那么伤官格是骄傲、有才学，而杀格呢？他就不怕是非，很容易把自己卷进是非里面。因此伤官和七杀，除了吉凶祸福以外，就变成很麻烦的代名词，就算成功过程还是很啰嗦的。
<p>那么食神和正财、正官就显得很厚道、很太平，这讲的是过程。至于成与败，那倒不是一个伤官或者一个七杀可以决定的。所以在八字上一提到伤官、七杀，不管它成不成格，就直接认为这个人一生是非很多，又遭人嫉妒。就算成格，也是很累的那种。至于有钱没钱，关键在于伤官能不能生财？你八字、大运有没有财？伤官不生财，虽巧亦贫，你再有学问，也没什么大成就。
<p>那么论命要讲人之常情的，什么叫人之常情？比如说时上伤官旺，理论上讲那是你晚年小孩有办法，但是要考虑一个问题，你小孩有办法，不代表你先生也有办法啊！那么是男、是女也包括在内，所以以六亲、事业、年限三种都要分别讲。这种观念让人家一看到食神，就认为是厚道人，就算没有钱也满太平的。
<p>伤官很有才学啦！但会得罪人，会遭嫉了，就算你成功了，也有很多小人在你身边。那么格局最好不要通到时支，时支这个字也不要冲，这是你的晚年，晚年太平点比较好，也不要劳累。
<p>那么现在讲那个十神，从开始第一节讲起一直到现在，都是单独讲的，好比伤官在年、伤官在月、伤官在时、自坐年时等，是这样子讲的。那么十个都了解之后，就合在一起了，我不一定讲正官，也不一定讲伤官，看你八字上四柱怎么排列，各位也都体会到——人生一辈子不是一样的，晚年辛苦，早年很享福；或者早年很辛苦，晚年很好。有的人三十几岁以前脾气坏，到了晚年修养很好，有的正好相反。这种变，不是他在变，而是八字上比肩、食神、伤官排列组合不同，譬如年上财、时上比劫，那么年轻时很节省，晚年就大花钱了。如果年上比劫、时上正财，年轻时钱不当回事，晚年把钱看重了。所以人生的变化是根据十神在你八字位置上讲的。那么每个人都有这个早中晚，都有好的时间、坏的时间，天道很公平的。有句俗话，讨饭的也有三年好运！
<p>从开始讲十神，到现在是个别讲，那么讲这个过程啊，不代表教会你算命，那么一点资料是不够的，讲这个时间，从听懂一直到会，根据我的经验，大概要一个月时间，这一个月时间除了听懂十神之外，真正的重点是要各位把这四组规则要背熟，就是冲刑、合会、六亲代表、十神生克，这四组规则背熟才是开始，十神定位就讲到这里为止。</p>

 YM:`<h1>驛馬 </h1>
<p>驿马这两个字，是大家都知道的，会动啊！分很多种的，好命人坐飞机世界各地去旅游。坏命人譬如说发传单那种，很辛苦。那么这个动呢？一种形态问题，在算命的时候要考虑到，一是时间问题，譬如驿马在年，那你不过是个小孩子，你怎么能动呢？一定是家里父母动。所以年上驿马，解释为幼年动。月上驿马或时上驿马都是讲年限，如果到时上，六十岁以后还要动，如果你不是特别好的命运，就是很不理想的环境了。这是时效问题。
<p>二是性格问题，带驿马的人坐不住，有人坐在办公室里就可以赚钱，有的人你不出去就不会有钱，所以这个驿马就跟你生财赚钱这个环境来谈。另外一种解释法呢，驿马跟六亲，六亲就是神煞，譬如正官坐驿马，对男人讲是官位坐驿马，对女人讲是先生坐了驿马，正官坐驿马你的对象就东奔西跑，我特别再补充一句，论命讲的事同一般人所想的事有点不同，普通人想那个正官是先生，那么正常化是如此了，但论命里正官不一定是先生，只要是你的对象都是正官，那么也就是说你先生也罢，男朋友也罢，朋友也罢，不管怎么样，他老是会动的。至于说动的有结果没结果？那是另当别论。
<p>所以驿马是讲究动。那么正财坐驿马，拿钞票讲你不动，钱就不来，你的钱都是跑来跑去的。如果照六亲讲，正财是太太，那么太太也在跑来跑去了。那么就两种解释法了，一个正常的家庭，你的太太是很勤快的，扫完地、擦玻璃，然后就洗厨房，很勤快。如果从坏地方讲，整天不在家，天天在外面跑。
<p>那么总平均讲，第一种比较多了，理家务事比较多。再说驿马逢冲，我现在讲的冲是冲十神了，通常指 天干，天干正财、地支有驿马，天干正官、地支有驿马，所以命带冲的人，驿马一冲不得了，快马加鞭， 冲得更厉害。就驿马讲就是动得更厉害，刚刚坐下来，一个电话又要出去。</p>
`,
   
        };

        // 渲染导航
        function renderNav() {
            const container = document.getElementById('navContainer');
            container.innerHTML = navData.map((group, index) => `
                <div class="nav-group ${index === 0 ? 'active' : ''}" data-index="${index}">
                    <div class="group-title" onclick="toggleGroup(${index})">
                        <span>${group.group}</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="group-content">
                        ${group.items.map(item => `
                            <button class="nav-btn" 
                                    onclick="showContent('${item.key}', '${item.title}')" 
                                    data-key="${item.key}" 
                                    data-title="${item.title}">
                                ${item.title}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // 手风琴切换
        function toggleGroup(index) {
            document.querySelectorAll('.nav-group').forEach((group, i) => {
                if (i === index) {
                    group.classList.toggle('active');
                } else {
                    group.classList.remove('active');
                }
            });
        }

        // 侧边栏开关
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const hamburger = document.getElementById('hamburgerBtn');
            const overlay = document.getElementById('overlay');
            
            sidebar.classList.toggle('open');
            hamburger.classList.toggle('active');
            overlay.classList.toggle('show');
            
            document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
        }
    // ============ 显示内容 ============
   
        // 显示内容
        function showContent(key, title) {
            const contentArea = document.getElementById('contentArea');
            
            contentArea.innerHTML = contents[key] || `
                <h1>${title}</h1>
                <p>该章节内容暂未录入...</p>
                <p>这是一个测试内容，用于验证滚动功能是否正常。</p>
                ${'<p>测试滚动内容：命理学是中国传统文化的重要组成部分，包括八字、紫微斗数、奇门遁甲等多种术数。其中八字命理以人出生的年月日时四柱干支来推断命运。</p>'.repeat(30)}
            `;
            
            document.getElementById('pageTitle').textContent = title;
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.key === key);
            });
            
            // 移动端：关闭侧边栏后滚动到顶部
            if (window.innerWidth <= 768) {
                toggleSidebar();
                document.getElementById('contentArea').scrollTop = 0;
            }
        }

        // 搜索功能
        function searchItems(keyword) {
            const lowerKeyword = keyword.toLowerCase().trim();
            
            document.querySelectorAll('.nav-group').forEach((group, i) => {
                const btns = group.querySelectorAll('.nav-btn');
                let hasMatch = false;
                
                btns.forEach(btn => {
                    const match = btn.dataset.title.toLowerCase().includes(lowerKeyword);
                    btn.style.display = match ? 'block' : 'none';
                    btn.classList.toggle('highlight', match && lowerKeyword);
                    if (match) hasMatch = true;
                });
                
                group.style.display = hasMatch || !lowerKeyword ? 'block' : 'none';
                if (hasMatch) group.classList.add('active');
                else if (!lowerKeyword && i === 0) group.classList.add('active');
                else if (!lowerKeyword) group.classList.remove('active');
            });
        }

        // 初始化
        renderNav();
        showContent('STGXJ1', '(1)十天干喜忌-1');

        // 窗口大小改变时重置
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('hamburgerBtn').classList.remove('active');
                document.getElementById('overlay').classList.remove('show');
                document.body.style.overflow = '';
            }
