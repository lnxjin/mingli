            STGXJ1:`<h1>(1)十天干喜忌-1 </h1>
<p>女士结婚以后，虽然我们讲先生、小孩是一样的，但是对实际人生讲会有偏向的，有的会偏向先生，有的会偏向小孩，有的会偏向娘家，有的喜欢跑剧，有的喜欢搞什么。为什么会这样子呢？这就是日主喜忌了。这个同夫妻好坏又是另外一回事情了，这个男女命都通用。
<p>所以我们对于一般性算命啊，我们内心先有个底牌的，十全十美的命本来就很少，而那种性格上的差异倒是每个人都有。所以谈中等命反而从十天干喜忌来的。谅她先生也不会做县长，想必她家里也不是穷得没饭吃，把这个两头拿开之后还剩什么？还不是人生生活习惯！那么就要从十天干喜忌讲起，男女通用的，它是根据五行性而决定的。
<p>先讲甲。甲不离庚，我们算命时一看到甲日主，不会先看妳夫星旺什么什么的，先看有没有庚。夫星旺、财旺，妳先生好有钱，那很难的了。但庚是妳喜忌，如果妳有庚，妳可以做妳自己喜欢的事情，如果妳没有庚，一辈子妳都做妳不喜欢的事情，但可能会很有钱啊！那么为什么要甲不离庚呢？这就是五行性了。不管妳是一棵大树，或者一棵小树，只要是树，就必须
<p>那么庚字呢？我再连带以女命的立场把它讲得细一点。庚是女命是什么呢？庚是七杀，辛是正官。
<p>如果甲日主天干透出庚出来，这叫七杀为夫。照我以前的解释法，女命用七杀为夫，你喜欢被人家管，你认为你先生要有两套，我才佩服你，什么我都请问你，生活在被动里。生在秋天，庚禄在申，你先生有办法。现在解释法就不一样，你还是用正官或者七杀为夫，如果你以庚为夫，是日主所喜的，你喜欢他。如果你辛为夫呢，不是你喜欢的。现在我请问一位女士，你愿意嫁给一个很谈不来的人，只是他有钱，你愿意吗？如果用辛为夫的，她可以。如果这个八字没有辛只有庚的，她办不到。如果谈不来，你让我跟他，不可能！因为这日主之喜忌，所以用正官、用七杀谁为夫？一旦触了日主喜忌，就会牵连到她性格问题，那么这就是甲不离庚。

<p>丁是人间火，就像美国的壁炉，丁火要靠什么呢？要靠木头烧的，所以丁日主一定要有甲，甲不过是正印，如果丁日主的正印格那成就可就大了，也是他喜欢做的。如果不是你日主所喜的，只不过是度度生活而已。所以，甲不离庚，乙不离癸，丙不离壬，丁不离甲。每一个天干都有一个字搭配住它，所以人生并不是只讲钱就可以的，要合乎你的性格。我也见过很多夫妻，条件很好却要离婚，谈不来。嘴已讲是钱第一啦！实实实在在还是谈得来比较重要，彼此五行相合。

<p>辛，辛跟庚不一样，庚是普普通通我们讲的一把刀那种金，辛金是钗钏金，女人挂在身上的链子，一种首饰，这种金不可以用火来烧的，要怎么样呢？要特别的一种药水，就擦银粉、银水啦！所以金啊，辛金要用壬，慢慢洗，如果辛金没有壬水，一生也过得很乏味。
<p>那么最后还剩两个字，壬水同癸水不一样，壬水是冲奔水，是长江黄河，看起来很伟大，有个根本原因，它有个源头，要想让它发水，壬水离不开辛，癸水是静水，很平静的水。水它都讲究水源，水大、水小都没有关系只要水源，这是十个天干本身的喜忌，然后再带住刚才讲过的财官食伤印一起论，这样子就比以前的论法精彩多了。那么现在我再举个例子，就把十天干喜忌带入以前所讲的一起论。
<p>《女命详解，女命通会合订本》二四六页有个八字，我们现在解释这个八字比以前更宽，更像专业讲八字。
<p>丁丑  
壬子  
辛巳  
丙申  

日主是辛，这个八字是古人批的，结果很糟糕的，这个八字是自杀了。不是穷的自杀，感情搞得太乱了。这个八字如果叫我们来看，包括十神定位、刑冲合会，包括十天干喜忌一起看。我一条条分开同各位解释。
<p>丁壬合，子丑合，这个是冲刑合会范畴的，天干地支双六合。辛巳、丙申也是合。女命里面本来就忌讳四柱带合的，合多必贱，从懂事开始，这个人一直到死，谁都谈得来，人缘好得不得了，对女命讲那不是糟糕得很吗？绝不是拿个菜篮车买菜那种。这个是第一个，冲合问题，合太多同冲太多对女命讲，合比冲还糟糕，男命怕冲，女命怕合。
<p>第二个，辛金，她的丈夫是什么呢？丙丁是夫，年上是丁，时干是丙，虽然是官杀混杂，但还没什么关系，因为拉扯的时间太远了。那么我们以丙夫来讲，丙辛合，本来辛巳、丙申就双六合的，一直到了晚年还是很有人缘，而且她先生也带合。那么这个就是先生带合了，她的男人就不单纯了。那么这个男人合不合适？那是另外的问题。就是到底有钱没有钱呢？你把夫星引到月上来，子月，丙绝在亥，先生的条件是不佳的。如果引到日支，辛巳日夫星是旺的。丙旺在巳，但是巳申合，所以这个八字最大的缺点，就是四柱带合。夫星坐绝。那么辛日主主要用壬，要用水来擦的。辛金就我讲的钗钏金啦！女人身上的链子，不能用火来烧的，她有壬字，所以她倒还可以自由决定跟谁在一起。所以这个八字，古人批出来是自杀的，感情失败而自杀。死在哪一年那是流年问题。再举第二个八字。
<p>(《女命详解·女命通会合订本》二四八页)
戊子
戊午
癸酉
戊午
每逢讲八字，一方面就提供新的理论出来，因为单独讲理论东跳西跳很乱，在八字里带出来，比较容易了解。每一个八字都有它的特色。这个八字最大的特色，倒还不是财官印，你把支藏天干一起看下去，五行不全，缺一样，缺木，就是食伤，一个女命如果没有食神、伤官，就代表没有小孩，很严重的一件事情！这人没有小孩。然后看八字本身了，癸日主天干三个正官，戊癸合、争合，那比刚才讲的两个双合厉害多了，两个争合已经四十五年了，三个争合，一辈子啦！不是先生管妳，就是妳在抢人家先生，一辈子都在争合！
<p>那么算命另外一句话：官多不贵，财多不富，不喜欢财官多，统统在天干，统统露在外面，太明显。
<p>那第一个关键就是没有食伤、没有小孩，第二个就是争夫。还有第三个：子午冲，从一岁冲到三十岁什么都不顺，这个八字只有一个优点是癸水生在午月，水克火为财，有钱，不缺钱。那她时支也是子午时，晚年也有钱，这个女人她不缺钱财、没有小孩、先生争来争去，谁都知道她家庭生活非常不好，那么这个对女人讲，就算不好命里唯一可以安慰的就是有几个钱。那么这种看法，除了流年以外，基本上看女命，大致上就是如此。
<p>今天这一节所讲的是喜忌，那么喜忌在八字里面，理论方面属于非常重要的一环，以前所讲的日主、格局、用神都有喜忌，每一种喜忌都不同。一个用神格局是八字本身的，你一生出来就有那种性质在，就是不平衡，要靠大运流年把它搞平衡了，或者搞平衡过度，讲究中庸。这个就是喜忌，不管你六亲或者事业、性格都一样。
<p>那么喜忌在它自己的单元里面，也分作三个单元，第一种是日主喜忌就出生哪一天的天干，这个最明显的就是一个人的性格，每个人都有性格的，江山易改，秉性难移啊！性格根本就不能变，只有顺跟逆，顺你的时候就舒服点，逆你的时候就不舒服。这是日主的性格。第二种呢是格局喜忌，就是我们以前讲过的正官格、七杀格，这是个名字了，其真正意义，除了你日主之外的七个字，多数的五行，等于开会时少数服从多数，连日主都要迁就这个喜忌，譬如天冷多穿点衣服，夏天吹吹冷气。这就是格局喜忌了。
<p>第三种喜忌是调候喜忌，这个调候是讲天时的啦！比如说我们现在有冷气、有瓦斯，一百年前根本就没有这种东西，怎么算命也算不到这两个行业里边。譬如清朝有考进士，现在没有，只有高考。所以谈命理必须遵照先天的客观因素，准确的认知那三种差别。我们现在先讲的是日主喜忌。</p>

 STGXJ2:`<h1>(1)十天干喜忌-2 </h1>
<p>日主喜忌——如果人一旦生活安定了，他就体会到金钱不是最重要的啦！愉快才是最重要的。吃菜也是一样，不是一万块的菜最好吃，而是你最喜欢的菜最好吃。这就搞出喜忌出来了，因此我们就看到有些有钱人生活很痛苦，有些拿三万块的日子倒很舒服，这就是日主喜忌这个关联。如果要把它说的具体详细，就是什么东西令你舒服呢？钞票可以令你舒服，家属可以令你舒服，你的职业可以令你舒服，健康也一样，统统可以影响你。
<p>那么讲喜忌呢？是用十天干做代表，有了这个天干之后，再把它化成以前我们讲的十神定位，我们以前讲十神定位或者女命，是最起码的一种命理，也就是很庸俗的，吃饱饭、有钱就是好命，有家就是好命，不离婚就是好婚姻，是比较笼统的讲法。现在要深一层，就要谈喜忌。
<p>那么出生日主有十个天干，每一个天干都有它自身之喜忌，喜忌之决定是来自天时，按照自然性，不是以那个得失它来论，得失是根据那个自然性而来的，也就是我们讲三元论命——天时、地利、人和，甲日主，甲不离庚，庚就是金，一块木头，你没锯下来之前是一棵树，我们都看到秋天剪树木，锯下来之后做木材，都看到工厂里边的木匠，一块木头如果要成材，不管你摆着观赏也好，做桌子、椅子也罢，你就离不开剪锯。所以甲不离庚。如果没有庚呢？那一棵树没什么意思的，就满山满谷那个树啊！对人讲就没有意义。所以甲日主没有庚这个字，把它浓缩到人生观来讲，这个人就是没经过修剪过的，根本就没用。随便拿块木头来，不能做椅子、也不能做桌子。这个人啊，很任性，没有修养。这是甲不离庚。那有了庚了，也不见得是好。所以谈喜忌啊，没有喜是绝对不行，有了喜，也不一定行。一块木头你把它锯下来了，你不锯是不行啦！你锯下来不见得是锯得对的啦！你做桌子、做椅子各有各的讲法啦！它有它的规则啦！所以甲不离庚首先是讲性情。
<p>那么各位研究命理到现在，已经明白到命理不是单条公式走的，任何一句话都牵连到四条公式的，首先讲金，有与没有？连下来了。我们想到火克金。如果一个甲日主天干有三个庚、三个丙，不管你有庚、没有庚，这种压制就太厉害了。那么有了庚，他是有点理想，这压制都太厉害啊，客观环境不许可，这种搞不成是后天因素，你完全没有庚是先天因素，又连住至少四组啊！复杂起来，不只四组，甲不离庚，要有庚。
<p>第二个不能见丙太多，火克金，把它压住的啊！那么第二个其他关联，带不带冲刑合会，乙庚合，如果你八字有乙的，你就算有庚，乙庚它合走了，也等于起不了作用，各位有没有听到小说书上讲的，人在江湖，身不由己啊，你想那么做，但人情世故逼得你没有办法，弄得你没有志气了，这就是庚带合。那么这一点还不够，有了庚了，地支可以冲的、可以刑的，一带冲刑，你纵然有理想，这个过程是非常艰辛。
<p>所以，不管你讲喜忌、讲格局、讲六亲，都要把以前讲的十神定位统统要并进去，要一眼知晓，三四个答案都要同时到。这样子就可以看八字了、可以谈吉凶，而且还要讲求速度，你听我这样讲十分钟，如果看八字，没有十分钟的，一个会论命的人，当一个八字到他手，他真正能用脑筋的时间最多只有两分钟，如果你两分钟还不开口，你同来宾对坐，那会感到很尴尬。所以这个速度要非常快，一定要靠平时熟练，我刚才讲那个庚，只是讲到刑冲合会，这是四组公式里的一组，并不是全部。
<p>那么说人家影响你，大家都细细想一想，能给谁影响啊，我们普通讲啦！拿钞票给你了，见钱开眼受影响，这是第一种。第二种呢，朋友、老板交代的，人情影响，你女朋友对你讲什么、什么事情了，感情影响。那么这种东西带住六亲了，那么大家看：甲日主用庚，第一组刑冲合会，现在要拉到六亲来，庚对甲是什么六亲？七杀，对女命讲是什么呢？先生！如果这个甲日主用七杀为夫，或者用辛为夫，在十神定位里面是完全一样的，只要夫坐旺就好了，这个答案就是先生有钱，不跟你离婚，就算好的先生了嘛！你们谈得来谈不来，这个不相干的。
<p>如果讲到喜忌就不一样啦！如果甲日主，庚出天干，它有日主喜忌，那么她心甘情愿的啦！听她先生的话。她认为女人根本就不应该有什么想法，听先生就对了。管他对错。买个东西都问先生，是在不答应，她都不会买。这个就是庚这个关系啦！坐旺、不坐旺，就是妳有没有钱？妳听不听他的？在于庚的时候日主喜忌。这个小姐不管她的对象是有钱？没有钱？如果不是她服气的人，她不会嫁给他的啦！有个比喻不一定恰当啊！譬如我们看到报纸很多篮球明星，好多粉丝迷他，篮球明星不是做生意的，打打球而已，怎么会那么多人迷呢？对那个迷他的人就是迷他了，这就是庚了，不管你干什么，一定要她佩服的。那么这个是从六亲上讲。
<p>所以大家要根据我所讲的，很短的时间里，要把这个人条件高低、生态环境、她自己的个性要同时连贯，连贯到以后是不是就可以了呢？还不够的，因为对方是个人，你是为她服务，还必须符合她的意愿才能完成一个谈谈八字的艺术。那么刚才讲庚啦！如果她没有庚只有辛，她没有日主喜忌，辛也是她先生，那么这个小姐她希望嫁有钱人，这是人之常情了，爸爸让我嫁可以，谁让我嫁，我都可以啦！只要是家里人讲，甚至家里欠人家钱叫她嫁给他，她也干的啦！因为她没有什么立场的。只是人之常情，希望对方条件好一点！那么这种比照起来，有的时候不大合理的，合不合理要因人而异，这叫甲不离庚。甲日主八字如果没有庚，随便你格局再好、调候再好，他可以很有钱，很成功，但是他的事业不是他喜欢的。也就是我们说干一行、怨一行啦！我们所看到的干一行怨一行，都是失败的啦！搞不起来的。也有很多，他并不失败啦！
<p>比如说我举个例子，某种关系，在大公司里面大单位里面挂个董事，根本什么事都不要做的，开会举个手就好了，你想这个日子是不是过得很闪啊！那么这就是讲甲不离庚！为什么用庚来代表，它是根据五行性，五行性的透法有两种，一种照自然性来透露，一种叫植物性或者矿物性，也是自然性。甲它用植物性，用一棵树来比喻，第一个叫甲不离庚。像我们看八字头一个要注意有没有日主喜忌，可以套到任何算命的范畴里边去。
<p>比如一个人问我，你看我转行好不好？很平常的一句话，如果这个人甲日主没有庚的，他根本无所谓的，随时可以转行，一年可以转两三次，至于转了之后有钱、没钱是另外一回事，那是强弱问题。如果他有庚的，那就不一样了，他可以选择现在不赚钱的那行，他喜欢，要转行一定要转他自己喜欢的，否则他不会动。各位体会这个意思啊，答案要根据对方问你的，你自己来套进去。
<p>乙日主，也是木，这个甲木我们把它想成一棵大树，乙木我们解释为花草，就是盆景，最多是香蕉树，没有很深的根。那么花草第一需要什么呢？太阳，一个盆景需要两样东西：日光照到，别忘了浇水。阳光是什么？就是丙，丙就是食神了。水是什么？印啦！壬癸水啦！食神格同印。如果乙日主这个八字正好成为食神格，或者正好印格，那这个人就真是适得其所了，想读医学院、考取医生、想做商人就能满他的愿。
<p>火和水并不代表什么，只代表一个概念，你只要有火就够了。所以甲日主和乙日主的成功过程不一样，因为这个人来真正问命，真正问明年赚不赚钱？很少啊，问的都是我该从事哪一行？退休好不好？大多都是问过程的，尤其是父母问关于孩子的问题，他们也不敢相信自己的儿子将来会当县长，都是问什么呢？他将来会从事哪一行？我应该从哪方面去培养他？这就是我们根据他的八字来给出建议。
<p>大家想想啊，他并没有问他儿子将来会不会做立法委员啊！只是个志向啊！那么乙日主，很柔的木，那么柔的木，我们要联想得负责一点，也不是复杂，而是多层次一点。我们以前讲财官印，统统一样，如果你不仔细想，人生只有八种吗？你也正财格，他也正财格，那就一样了吗？不可能的啦！因为以前没有分得那么细，以前讲正财格、正官格、什么格，只要旺，大概答案就是一千万，并没有包括你是干哪一行？你有没有兴趣？舒不舒服？没有包括这些事情在内的，现在要包括这些在内了。
<p>乙日主是柔弱的木性，我们讲生克制化时，它能去克制别人吗？我们说木克土，但若你的树根只有一点点，怎么能去克制别人呢？根本无力克制。它也承受不了别人的克制，金克木，一刀就能把你切断！不像大树啊！大树修剪枝条没关系！这两句话讲的是植物的特性，但算命不谈植物性，要从实际演变为真正的吉凶祸福。你无法克制别人，在格局上就表现为财格无效。我克者为财，你管不了女人，也没什么自主能力。若是问你，派你去上海的大公司，可以吗？你是没意见的，要我怎么办，我就怎么办。根本没办法，因为他确实无力克制别人。又受不了别人的克制，稍有点风吹草动就会辞职不干。那这个人就毫无前途了吗？不是。各有各的用法！这就是讲喜忌了。
<p>比如我们以前讲十神定位，财是财格，食伤生财，人家帮你忙。印是印格，官杀生印，你会遇到大人物，这是初级的。现在就不是，不能用财，但可以食伤生财！自己不能去管，我交给人家管那就可以了，人家很多麻烦事来找我，我没有办法，那么有官杀生印，印生比劫。所以乙日主的人，也就是现在说怎么样呢？什么都不管，统统交给人家就好了，你自己管一管，反而糟糕！那么各位细想一下，你们一定也认识很多成功的人，就是这两种人：一种是什么都不管，统统交给人家，天下太平！一种呢，什么都一把抓，一点小事都要问我，也管得天下太平。两种不同的过程，能与不能成，不是过程，而是我讲那个日主喜忌。
<p>那么甲乙都是木，当我们把它分别解释之后，别忘了，木本身是讲仁慈的，仁这个本性不要忘掉。他成功也在仁，失败也在仁。我们讲不要用大题目来讲仁义礼智信，用很小的题目来讲好啦！心软啊！我记得有些直销商来跟我学命理，他倒不是算人家吉凶祸福，他学这个人性。各位有没有想过卖东西，谁比较容易买东西？甲乙日主的人，你销售的机会高！他不好意思拒绝啦！这个仁。那么我们时常讲笑话啦！甚至包括问谁借钱容易借得到，有钱人不见得借给你，老朋友不一定借给你，肯借钱专门有一种人，这就是五行性了。这我们顺便记住，甲乙是仁，这个人成功也是仁，失败也是仁。那么木这一部分呢。对于天干喜忌来说告一段落了。</p>

 STGXJ3:`<h1>(1)十天干喜忌-3 </h1>
<p>我们刚才讲，十天干用天时、地利代表，甲乙木是长在地上的，太阳就不同了，丙叫太阳光，丁
我们叫灯烛火，这两个一大一小不成比例啊！所谓太阳光就是自然的光，自然的火，灯烛火就是人工的火，以前没有瓦斯，拿几个木柴烧一烧的。现在的区别处，丙就是自然火，丁就是人工火。

<p>再过去就是庚了，庚辛都是金，在我们命理里面解释这个庚金叫顽金，从清朝起一直到现在，都把他比喻成生铁，所谓生铁、熟铁很少人分的，我小的时候还有分的啦！生铁掉到地上会断的，生铁一定要火炼的。所以庚日主的人一定要有火。那火有丙丁火，这个也要分五行性。丙是太阳火是暖冬的，丁是人间火是炼金的。譬如我们生在冬天，要用火来调候，那都是讲丙火。丙火暖冬！所以只要有一点温度就可以了。丁火不是，丁火是炼金的，几百度、上千度。所以庚日主先天就要火来炼，那火炼金同金克木大不同啊！金克木不过剪刀来剪几下，锯子最多锯你十分钟。火炼金不是啊，只要改变你的形状，就要炼一次，叫强火炼金。
<p>所以金日主的人，天生就不怕麻烦，有了麻烦也不一定成，他就是那种不怕麻烦的，甚至自己找麻烦的人！那么庚日主主要想好命，天干地支一定要有丁，丁是什么呢？正官。阴阳相制，炼金恰到好处，火太厉害了，把你熔掉了。所以庚日主一定要有丁！而且是个非常辛苦的命，很累的，不论你官大、官小，都是一种非常艰辛的路程！那么既然是用了丁，还是老规矩，怕另外一个字妨害他了，妨碍它的只有两个字了，一个是克你的、一个是合你的。克就是癸水了，合就是壬水了，都是水。所以你有了壬，或者有了癸，你有志气，最后会做不成。如果没有壬癸水，也没有丁，他根本就不想做了。这是叫日主喜忌。庚日主的八字不少，各位不要以为全世界的八字都是一样多的，那不是，它有时代性的，某个时代金人多，某个时代火人多，有他另外的周期性。现在讲金日 主的相当多，金日 主最大的特色就是讲义气，管闲事。
<p>那么辛金同庚金不一样，辛金在命书上定位是柔金，我们叫钗钏金，女人身上那个首饰，链子或首饰，也是金，那种金就不可以拿火来炼的。要怎么办呢？拿水洗一洗！所以辛金是不用火的，用火就适得其反，要用壬水。那么辛金用壬水，它永远都维持干干净净那种装饰品，如果你没有壬水，时间久了就会脏，看不出什么东西来。那么一样是讲忌神，忌神是照五行生克来的啦！那土克水、丁壬合，那么用五行解释呢？也解释为实际情形，就是己土污金。辛日主用壬，壬水遇到己土，遇到己土把水搞混了，这杯水就不能喝了，把水搞混了！那么辛日主用壬，也怕己，这个水不是解释为喝的，污金啊！就普通首饰里边上边抹点粉、抹点烂泥也看不见了嘛！
<p>把它搞脏，变得不值钱了。这句话如果比喻到实际人生来讲也很有学问啦！人家看不出来，污金啦！把你人才埋没了，所以辛日主一定要壬，怕己、怕丁。克过来的这个忌神，是直接伤你。如果合过来的忌神，那是人情，给朋友拉住，亲戚拖住了，或者不好意思了；种种原因，合过来的是人情，所以八字上还不怕冲，怕被合。被冲是很明显的，一被合，就变得不主动了。那么还剩两个字。壬癸是水，壬水在五行定义上叫冲奔之水，像长江、黄河是流动的，小到淡水河等等，不是一盆水、也不是一壶水，那么既然是冲奔之水，它最怕什么东西？最怕没有水源啊！流一阵子后面没有水了，那不是干掉了吗！所以壬水头一个需要就是要辛金，辛金的原因是发源，金生水。那么你这个水源就可以源源不绝！庚辛金是讲究义气的，壬癸水是讲究智慧的。
<p>壬水这种智慧，主动性的，会压人的。怎么压人呢？他直接去干扰人家了，你怎么不先问问我呢？你这样做怎么能行呢？人家没问他，他会出主意，聪明流露在外。壬日主的个性是讲究智慧的，一看就看得出这人很聪明。至于能成、不能成？不在于这个，关键在于辛。有辛金能发你源，那你可以一直流下去。在命理中间，讲的最多的即是水跟火，因为五行讲究水火既济，命理根据五行，五行根据八卦，天时、地利、人和，水火最讲究。
<p>除了十神之外，另外有它一套自己的公式。刚才讲丙火，没有讲到它的五行性，现在同水并到一起。算命裹讲到火，除了用神、格局、调候等等之外，还有一句话，同这些完全没有关系，叫火不西奔。什么叫火不西奔？太阳不就朝西走的？一到西就夕阳西下了。这个西在算命里怎么解释法呢？就是申酉。所以丙日主不要生在申酉月，不要生在申酉时。那么申酉这两个字，在十神讲是财，那火不西奔，如果你火日主生在申酉月、时，这人啊！夕阳无限好，只是近黄昏，有一段好日子，但很短，那么就是很可惜了。这叫火不西奔。
<p>那么水也有五行上的另外一个规则，壬水在流动的时候要有堤坝、水库，不让它乱奔。在五行性上讲，就水不东流。我们大家都知道一句话：大江东去，统统没有了。那么大江东去在命理上就壬水生在春天寅卯月，或者生在寅卯时，大江东去就把你所有的东西统统冲光。所以关于水火就这两条是不在十神定位里边的以外的规则。这个在选日子，剖腹产选日子都要考虑。比如正月选剖腹产日子，我们不会选壬日主，那就大江东去了。那么在这两条以外，壬是冲奔水，流动的，一定要挡住它，不挡住它就乱冲了。那什么东西挡住他呢？戊土。壬日主你这个人聪明、冲动做事，要有个分寸，八字必须有戊土，如果没有戊土，那就乱用聪明，横冲直撞，搞些啰嗦事出来。所以壬日主一定要有戊土，没有戊土就是失控的动力。那么相反也是一样的啦！戊土怕甲，木克土，又怕戊癸合，还是怕这两个字。如果没有戊，就根本没有成就。如果有了戊，遇到两个忌神来了呢？做到一半就做不成，受了种种干扰做不成。我们算命不用跟他说为什么做不成，只要跟他说做不成就是了。
<p>一个日主有喜忌的，比如壬日主带戊的，你问我开店做什么好？我都认同。如果你戊癸合，喜神被合，我就会劝他自己不要做老板，不要自己主动去搞什么，那会做出很多麻烦事来。人生生活过得太平，不一定要做老板的。有些副手日子过得也很舒服。这是给他一种建议。那么壬日主的人，我们会劝他，你的意见不要让人知道，人家会怕你的，因为你很聪明嘛！庚日主的人，我们会劝他少管闲事，不要什么都看顺眼。那么唯独木火日，不大好劝啊！我不能劝他，唉！良心不能太好啊！这话不好劝的。
<p>癸水，在看日主五行的时候，非常容易了解对方这个个性，壬呢！动来动去，坐都坐不住。癸不是，癸譬喻为大海水，倒不是真那个太平洋啊！就等于说现在比较像样的西湖啊！平平稳稳一望无际、没有波澜，这种水是大海水。发明命理这个人，他有高度丰富之想像力，很平常一种天时、地利、人和，他可以把它想成听起来很有道理的一种人生观。凡是癸日主的人，大海水第一个优点是什么啊？里面什么都有，鸡鸭鱼虾啊什么都有，他动都不动的，里面十条鱼与一百条鱼都一样。
<p>那么壬癸日主都是讲智慧的，这两人的智慧表现不一样，癸日主是很静的，壬日主让人感觉才智过人、有过人的味道。癸日主不会，他只会让你感觉到我不是那么好欺负的，我都知道啊！一种他不逼人的感受。那么除了他深藏很多东西，都在水底里看不见，他另外有个特色，就是非常能适应环境，壬日主不是，壬是冲破环境、改变环境，癸为什么能适应环境呢？譬如你拿个茶杯，舀杯水，这杯水啊是圆的，你拿木盒子把水舀起来就变成方的啦！你摆点糖下去，就变甜了，放点盐下去就变咸了，根本无所谓了。
<p>所以癸日主非常能适应环境，做公关是最好的，他可以同对方配合得天衣无缝，看不出一点勉强。有好处当然就有坏处，对他自己讲成功是好处，旁观者看就是根本没立场了嘛！随着环境变的啦！哪一种都没关系的，只要能成功。那么癸水只讲那性格，那什么是他所喜的呢？那么他同壬日主有一条相同的，譬如长江在巴颜喀拉山有水源，那么日月潭也有水源，阳水冲得太厉害了，要挡住它，怕它闯祸；阴水没什么冲劲，怕它来源不够。所以癸日主的人，一定要有庚，没有庚，也要有辛，庚同辛在十神解释起来是印，所以十天干喜忌里边，十神没什么意思，并不代表什么格局问题，只取五行。所以癸日主一定要有庚辛，湖水最怕什么，最怕干掉了，有金能生水，最怕烂泥太多，把它堵死了。所以癸水怕淤积太多，一旦干掉了这个水性就没有了。
<p>根据这个十天干喜忌，他把一个人的生命，比喻成宇宙中的一种大自然，或者一种物质，以他的生态来决定吉凶。所以用命理彻底的五行眼光看人，也不过是一棵树、一棵草，有水、有光你就欣欣向荣，就是我们讲的升官发财啊！那么它是根据这样子比喻过来的。那么我现在讲的十天干喜忌，是现在最流行的一种，喜跟忌不是平行的，先谈喜后谈忌。这个忌啊！虽然不理想，最多事情不成，我们用人情常理讲，努力十年、二十年白做，当然是很倒霉啊！这是喜中之忌，白做。那么还有一种讲法的，就是拦江网他们讲的，拦江网是个抄本，他是依照《用神经》节抄一部分，那么拦江网的抄本它讲的喜忌跟我刚才讲的喜忌不一样的，那是讲你努力出去之后，按你的辛勤所做要有成，那是讲法相反，你现有不好的，然后再取消掉这个不好，先忌后喜。
<p>如果从刚才讲喜忌，有成有败，或者有成不败。如果现在照拦江网喜忌讲那不是了。好比说，我们山上掘个树根回来，没用的东西，但我是个雕刻家，我可以顺着它的高高低低，把它刻成一条龙，或者刻成一个什么，把它废物利用，忌中变喜。也就是说使用自己的弱点，把它变好。譬如说有一种通俗的说法——傻人有傻福，笨人有笨人的好处。笨本来不是好事，把它使用在好事去，就是先忌后喜，有这个忌字，你就根本成不了气候，那我还是验证一下。

<p>依据这个十天干喜忌，他把一个人的生命，譬喻到宇宙中间的一种大自然，或者一种物质，以他的生态来决定吉凶。所以用命理彻底的五行眼光看人，也不过是一棵树、一棵草，有水、有光你就欣欣向荣，就是我们讲的升官发财啊！那么它是根据这样子比喻过来的。那么我现在讲的十天干喜忌，是现在最流行的一种，喜跟忌不是平行的，先谈喜后谈忌。这个忌啊！虽然不理想，最多事情不成，我们用人情常理讲，努力十年、二十年白做，当然是很倒霉啊！这是喜中之忌，白做。那么另外一种讲法的，就是拦江网他们讲的，拦江网是个抄本，他是依照《用神经》节抄一部分，那么拦江网的抄本它讲的喜忌跟我刚才讲的喜忌不一样的，那个是讲你努力出去之后，按你的辛勤所做要有成，那个是讲法相反，你现有不好的，然后再取消掉这个不好，先忌后喜。</p>

STGXJ5:`<h1>(1)十天干喜忌-5 </h1>
<p>如果从刚才讲喜忌，有成有败，或者有成不败。如果现在照拦江网喜忌讲那不是了。好比说，我们山上掘个树根回来，没用的东西，但我是个雕刻家，我可以顺着它的高高低低，把它刻成一条龙，或者刻成一个什么，把它废物利用，忌中变喜。也就是说使用自己的弱点，把它变好。譬如说有一种通俗的说法——傻人有傻福，笨人有笨人的好处。笨本来不是好事，把它使用在好事去，就是先忌后喜，有这个忌字，你就根本成不了气候，那我还是验证一下。
<p>还是甲日，刚才从好地方讲，甲要见庚，把木头削一削，没有庚就很难造就了。现在先讲忌，甲日主最怕什么东西呢？它有个忌神先出来了，就金太多，三合金透，你拿剪刀剪得一片树叶都没有了，那不如不剪了，这就是忌。你把它剪成这个样子，好比一棵树把它斩断，连根都没有，那还有什么木头呢！所以甲日主头一个忌讳就是三合金又透金，就一点办法都没有。好比你锯木头，不锯不行，你把它锯坏了，只好拿去烧火了，这是忌三合金又透金。为什么栏江网会讲到这一方面去呢？因为我刚才讲的喜忌都是以天透地藏为主的、从格局讲的，天干有、地支有。
<p>栏江网它另外包括一个含义，包括三合、三会、三合三会在刑冲合会里讲得很清楚的，三合三会也取格的，地支三合管四十五年啊！你再透个天干，就断你一辈子了。因此说甲日主最怕会金又透金、做社会人！乍听很文雅啦！也就这个意思，根本没有东西可以谈的啦！这当然是很少遇到这种八字呢，只有一个办法可以用，不一定修道，专家、专才啊！不求名、也不求利，只发展他自己这个专长。他什么也不想，第一个三合金又透金，第二个怕三会水透水，把它给漂走了。一个把它克散掉了，一个把它漂走了。
<p>所以我们看命算八字，要从最好的和最坏的两个方面去看，中间就无所谓了。一是你能够成功，一是你根本不可能做什么事业的。那么中间一段怎么办呢？就分开来取了。那么就是我时常讲的——妻财子禄寿不能圆满啦！有一样就不赔本啦！那么甲日主一起讲了，好的地方讲，甲要有庚。坏的地方讲，不要遇到三会金透金、三会水透水，如果你这两条拿住了，只要是甲日主的八字，最高、最低的，就可以有分寸了。
<p>乙日主我刚才讲要丙癸，没有丙癸，什么木头都生不起来。那么它怕什么东西呢？它怕丁！丁是火啦！你太阳照照它是可以的，水浇浇它是可以的，如果你拿去生火，火炉啊，那么小的木头，一进去就没有了。所以乙日主最怕丁啊！丁是消耗它自己最厉害啦！这个怕丁同喜丙癸是不一样的，你换了丙癸，你事业做不成，还是有机会的。没什么倒大霉，白做。如果乙日主有了丁的话呢，整个就消耗掉了，等于是没用！
<p>丙日主呢，刚才讲要壬。丙日主最怕什么东西？怕会金透金，也就是刚才讲的火不西奔，金就是西方，会金透金，夕阳西下，一点点时间啊！好比袁世凯做了几天皇帝，时间很短，是非常可惜的事情。
<p>丁日主要用甲，那么甲是木生火，但丁是很柔的灯烛火，你想湿的木头它能烧得起来吗。所以丁日主如果水一旺，根本烧不起的，湿木不生火啊！所以丁啊，最怕湿木，就是冬天的木头，湿木根本就烧不起来啦！这也就是我们建议人家，最好的与最坏的，将来读什么书，学什么东西。
<p>戊土日主呢，刚才讲是需要木的！山上要有树，要有太阳，最怕什么呢？它怕湿的烂泥，泥土，这个水啊，淹到树根啦！那就是山也一点办法都没有了。怕湿泥，湿泥就是亥子丑，泥就是土。那么现在我们算命不算这种事情了，闲谈是可以的，不知道各位有没有听到草莓这个名词，什么都不想的，识不识书完全无所谓的啦！就是这一类。问题是你好家庭、坏家庭而已，他根本就不想的啦！不是那种想做而失败的，完全不可同日而语。那么这个戊土。
<p>己日主，我们刚才讲过要太阳曝晒，要有点水，我讲的水是癸水啊，烂泥上面浇点水。己土最怕什么？最怕壬水来，自来水不断的流，把泥都冲掉了。所以己土，壬水一出干，你根本都没有了。这是先忌后喜，前面所讲的是先喜后忌。当我们看一个八字的时候，除非对方有主题先问出来，否则的话，我们先以对方他生态之极限要看出来，士农工商的？还是自己努力的？这是靠贵人的？还是他根本都不想做的，或者不适合做的，这个范围要给它勾出来。我们才能给他有点建议的，要怎么建议呢？
<p>那么这个庚，我们庚金是讲一块铁了，铁要火来炼的，就是已经成金啦！那么真正金最怕的是什么呢？倒不是这个了，怎么样，埋在砾砂里根本就掘不出来。这土厚埋金啊！庚金一旦土多，连炼的机会都没有了，完全埋掉了。叫土厚埋金。如果天干戊己土特别多，不好办了。什么财官都没有，那你土厚埋金算倒霉也不见得，只不过是没出息而已。所以各位把这个三组分清楚，日主有喜的，是你成功的方式。喜中遇到忌了，方式对了，中间失败了。现在讲那个忌，他根本就不是那个料，譬如土厚埋金，谁知道他有没有这个学问啊！有时候我讲笑话，普通讲通大楼管理员我都不敢小看他，其中有大才，那谁知道呢？这就是人才之埋没！他并不是凶，如果遭到凶灾之事，那下次再讲，凶灾同这个不一样啊！
<p>壬呢，辛是要壬的。壬怕己，壬刚才我讲过，要土来挡它，壬水忌讳的是己土。台北那个北门堤防我没有去看过啊，我想堤防一定很高的，你拿几个沙包来可不可以啊？不太管用。己土只是沙包，倒是可以挡门前水，挡大水是不行的啦！
<p>癸呢，这一条呢，同刚才讲是差不多了，癸水要庚辛生，最怕干掉，现在讲呢也是干掉，先天的。
<p>丙丁戊己很多，那么这个就是十天干喜忌。先喜后忌或者先忌后喜，这是讲成功与不能成功之过程，真正大坏命，不是这一节，是在后面的章节，我可以事先同各位讲，一个人穷，什么叫穷，我今天穷，我不是刷卡啊！银行那个房子贷款你都付不出了。三个月付不出，它就扣掉了。如果到了这个地步那就很惨了。或者说，这个便当钱都成问题了。不是一天、三个月都是这样，这只是断断续续穷而已，可也会让人感到锥心的苦。那另外一种呢？不是一年半载，而是一辈子大都这个样子，如果穷到这种程度，那真叫穷。那么有些小姐，相亲啊，拿男朋友八字给我看，她也并不想男朋友什么荣华富贵，要多少钱，有多少钱，她不想的，她只问一句话：能不能一辈子温饱？也就房贷不会发生问题，生活吃饭钱没有问题？银行摆多少钱，那不重要，大家感情好了，这个起码条件，下次我们就区分出这一条，穷不可以穷到刚才讲的那么糟糕，十年、二十年。这个叫贫。
<p>现在是没有的啦！清朝有贫贱凶恶，因为清朝有奴隶、有丫鬟，贱啊！现在没有的啦！凶恶是有的，凶恶同贫贱是不同的，凶恶的人，他未必贫贱，我随便举个例子，打打架、闹闹事的人，很多小人，他不见得没有钱的。没有钱的人，他可能是什么事都没有，从来不吵架，太太平平。那么凶恶同贫贱怎么区分法？这在普通算命，很少算这个的，因为来的都是普通人，如果是特殊人物，那是不一样的啦！
<p>那么今天讲十天干喜忌，喜忌并不是只有这一种，以前讲过格局喜忌、用神喜忌，今天是十天干喜忌。下次讲五行喜忌。</p>

 WXXJ1:`<h1>(2)五行喜忌-1 </h1>
<p>那么现在我们再连下去的喜忌就是五行喜忌，这个范围要宽得多了，讲十天干、用神、格局都是算命的，算命天干、地支、十神是用五行，五行就不一定是算命。五行包括数字、颜色，甚至于天地万物。所以说："跳出三界外，不在五行中。"因此谈到五行喜忌，算命只是其中的一部分。譬如我们讲水，子平讲只不过壬癸亥子水，就没什么讲的了。你拿五行喜忌来就不是的了，五行讲一六水阳数，各位可以联想起现在拜神，前面摆几杯水啊？都是单数的，这就是五行喜忌了。单数就是阳，但是呢，阳又不一定是单数，有各式各样很多数字可以拉扯取代的，所以讲到五行喜忌，范围就要拉远一点，甲乙丙丁要同五行拉在一起讲。
<p>甲乙丙丁同五行统一这个时代是黄帝时代，三皇五帝、黄帝以前没有甲乙丙丁，只录制数字，那么喜忌就拉到易经边边来了，易经各位都知道周易，但算命比它要宽一点。夏商周易经都不同的，一个叫归藏易，归藏易是讲究图案的，比如我们现在世界上有太多看不懂的图案，都属于归藏易。第二是连山易是讲数字的。
<p>子平不太讲数字，但命理中确实有数字的概念，各位有没有听说过吉祥数字？无论是汽车牌照还是电话号码，都有所谓的吉祥数字，通俗点说，就像买六合彩时选的幸运数字一样，这些数字也有五行的喜忌。另外，医、卜、命三者同源，自黄帝时代以来，祭祀、治病、算命都是由古代的祭司来完成的，医、卜、命同源合在一起就称为五行喜忌。五行喜忌包含甲乙丙丁等元素，但不一定非要用甲乙丙丁来表示，比如我们在台湾花钱，市面上流通的是新台币，你拿美元在市面上就不太方便使用。如果我们跟团出国旅游，到香港要付港币，到美国要付美元，不过得算一下，汇率换算成台币是多少钱？
<p>这就是五行取代了，钱币取代了。
<p>文天祥有句话：天地有正气，杂然赋流形。正气就是天道——金木水火土，任何东西都有金木水火土，那么我现在讲五行喜忌只借用一本书，大家都能通用的，这本书是隋朝萧吉写的《五行大义》，他是梁武帝的哥哥，这本书不是为算命写的，是为五行而写的。那么把范围缩小一点，缩到同命理有关。
<p>普通算命只讲答案，不讲理论，有学问的人算命答案无所谓的，他关心理论，譬如说曾国藩、纪晓岚他们都信命的，他不在乎官能做多久，而是尊重它的道理。我现在先举一条大家听一下，那没人不懂的，小孩子都懂的。拿把刀不就把萝卜头撇掉了嘛！但《五行大义》里面讲就不同了。为什么不能克金啊，金为什么能克木？它意思就是精胜散！精啊！精密，可以赢散的，五个人团结一致可以打败五十个人的，能够用到兵法的。五行不只是算命啊！金克木是精胜散，这话太抽象了，我把它讲得通俗一点。
<p>比如金日主，金克木为财，他的钱是什么钱？精胜散，一个iPhone手机并非人能用，大家群众都跟着它走，这金克木它是精胜散。它提出一种东西，可以管很多很多的，《五行大义》讲的精胜散。那么如果用到夫妻之间来了，金克木为妻，那他管教太太怎么管呢？他只管个精，管钱也是一样，只问会计我还有好多钱？其他不问了，家眷、太太、大事情，我知道就好了，这个叫精胜散，这就是五行之喜忌。
<p>那木克土就不一样了，木怎么能克得到土？不过就是棵树，树根它抓住这个土，现在我把它比成人间之事来了，木克土为妻财，木日主的土是太太，他抓住她了，下午去哪里了？明天去哪里了？能抓多远呢？你想想看一个树根能有多远？我看不会超过五十丈了，他抓只抓小事。大事不抓的。所以木克土他是抓住你。那么换成钱财也是一样，就是老顾客嘛！我就抓住那几个熟人，一行以外我也干不了，所以木日主赚钱，它的性质就这样子，你叫他做什么保险公司拉客，他一点办法都没有的，因为他不是那种五行。所以木克土为财，它只抓个表面，永不放手，天天在一起，但是他抓得不深。
<p>那么再换一种：土克水为财，当然不一样，每种五行性都不一样，每一对夫妻、每一种生意都不一样都受五行控制，一盆水泼到烂泥里面，你还能看到水吗？没有。为什么水一下就没有了呢？因为土有包容性，一包容就没事了，这就是土克水了，就我们普通讲话，不理他就好了，让他发发牢骚、讲几句就没事了。有的人不是的，越讲话越多的。包容可以消减很多事情，精也可以散掉很多事情。那木克土，打卡啊！随时来抽查一下，这都是人生之百态。那么土克水因为它能够包容，就把它消减掉了，你讲我当没听见，骂我当没事。
<p>第二个层次，就包括支藏天干内五行全不全。只要有就好了，多少慢慢再谈。这个八字，金木水火土五行俱全，如果缺一行，那么就照六亲为第一优先，譬如女命最怕缺正官、七杀，那是没有丈夫了。男命怕没有财，一生都留不住钱。如果高命一点的人，就要考虑有没有日主喜忌以及调候。这个对人生讲不是绝对必要的，人不一定成功的，也不需要谈什么理想，那么这个八字既然是五行全的，我们就不朝这个方向去考虑了。
<p>第三个层次，就是看有没有冲刑合会。冲刑与合会一样重要。比如说，有三个人来找你麻烦，固然不理想，如果三个朋友一起请你吃饭，那也是个麻烦事。到底去哪一家呢？所以都不能太多。这个八字一看，冲是没有的，合会又包括拱的，譬如壬辰日、壬寅时三会寅卯辰，中间拱一个卯，表面是没有的，实际是有的。既然拱出寅卯辰了，这就成格局了。水生木为伤官，是伤官格。这个八字天干有庚偏印，地支没有的。然后庚午、庚辰，拱了一个巳，巳是戊丙庚。因为拱那个巳里边有庚，偏印也成格。故此这个八字是没有冲、而有合，合的中间合出两个格，前边是偏印格，后边是伤官格。
<p>在沒有談吉凶之前，就把這個命造分爲前後兩段，三十歲以前是偏印，三十歲以後是傷官。到底哪個重要呢？這個不是先來後到的。前面拱出來是三十歲，以人之常情，三十歲是成不了什麼大事的，只是說前面這段白做。後面的三十歲以後一直到老，才是他生活之重心。這就看出了兩端，是人生之階段。
<p>那水克火为财，水不一定能灭掉火的，水火是相对的，水火在于多与少的，这条规则就是我们人间最普遍使用的那条规则，你钱多、你人多，我就听你的，这个就是最普通的法则。但是钱多，不一定赚钱的，人多不一定赢的。那么这个是水克火，就是众胜寡，多赢少，这是五行性。
<p>火克金为财呢，这是极限，火炼金到了某个温度，金就完了。你们很多人做官的批公文啊！一百五十份公文批完了，他根本都没心思看的了，就乱批了。超过人的负荷极限就没用的了。
<p>所以兵法上作战就使用相生相胜这个东西。五万人可以胜十万，一个很宁静的人可以赢过很烦恼的人，这是五行相胜。用在兵法或是一般性人算命也可以，不过我们普通人算命，谈妻财子禄寿很通俗的，命理很高深的理由，用到最通俗的妻财子禄寿中间。像徐子平那种圣人，他根本不关心我们明年升官发财，而是透过那种每个人所关心之事，才能把那种规则留下来，用心良苦。
<p>那么讲到这里为止呢，还是属于命理的五行喜忌。我们把它放宽一点，放大到《五行大义》，因为子平只用天干地支，没有用其他东西，最多还用两样东西，甲乙是木、木是东方、木是春天，最多再加一个颜色——青。那四种在算命里面时常互相代用。譬如说火克金为财，不把它比成钱财，比成感情、女朋友、对象，相亲不成了，那怎么办呢？但一般算命不管这种闲事的，如果你谈到五行大义了就不同了，金日主木固然是为财了，木不一定是甲乙啦！东方就是木，青的颜色也是木，那人家问怎么办啊？那就牵连到这个问题上来了，基本上是不管这个闲事的，譬如说一个土日主的女性，确有其人的，她的男朋友在日本，三个月都没有消息，来问我了，问题的表面是问男朋友什么时候有消息？会不会就此就没有消息了，主题就是这样问了，问到一半，怎么办？
<p>就从命理这个五行、干支五行放大到那个颜色，木克土为夫，就天干地支讲，甲乙是她先生，拿十神讲正官、七杀是她先生，反过来扩大了，东方是你先生，有时候我们跟人家讲：你缘在东方，也就是根据这样子讲的，你的未来的对象是在美国，也就是根据五行的方向带进去了，颜色是青的。那么这个话当然有点是安慰人的话了，我就又劝她了，有没有和他合影的照片啊？如果有的话，就摆在东方，不要轻生啊！如果她信神的，就求菩萨保佑，除了香烛以外还有什么东西？还有水果。还有那个盆子的颜色都不一样了，你如果讲刚才那个对象，用大五行带进去喜忌了，当然是用青色的茶杯、青色的水果等等，那包括时间啦！东方木寅卯的时间上头柱香了。
<p>我讲这个话，包括连山易、归藏易，大五行，不完全是算命的了，这个阴阳五行一放宽起来，就很宽了。十天干喜忌、格局喜忌只是讲你个人，你讲大五行它被取代了，怎么叫取代呢？譬如你欠我钱十万块，没有十万块怎么办啊？那搬东西嘛！名表、汽车变成抵押品了，那么一用到抵押品起来，这就不是每个人都愿意的啦！这叫奇正相胜。
<p>很多人求子心切，一位女性命主属木日主，木能生火，孩子代表火属性。如果从天干地支来看对应的是丙丁、巳午，但若用大五行理论来推算就不同了。首先南方属火，我们通常会建议她在南方摆放两件婴儿衣物，这就是大五行的应用。现在我先举个实例，暂不直接讲解《五行大义》，先做个引子：在甲乙丙丁这些常规天干之外，还能通过什么方式获取五行信息呢？
<p>最合理的就是时间与空间？再下去，那可多了。所以你看密宗里面的供品它是一定的，哪个手指、哪个酒杯都有规定。
<p>印度的五行他们叫五大，在这个地球上讲究相克，不讲究相生的，天下只有相争没有相让，人生在世荣华富贵争得你死我活，没有让来让去的。所以五个手指，佛教叫五大，我们叫五行。那么它次序是这样子的，从小指——土克水、水克火、火克金、金克木。随便一拿，五行就出来了。佛教里面打手印就是五行。不过手印它不是讲你人间吉凶，它宽泛了，它包括修道在内啦！一样可以缩小到小的地方来。
<p>比如你这样拿，或者这样拿，完全不一样的。或是小酒杯摆在上面这样拿的。
<p>不要以为随便拿的，这个不是的。这里面有规定的，因为它是宗教，我们不去解释内容了，那么我今天所讲的这个五行喜忌，用这一点点短的开场白，把命理的甲乙丙丁同妻财子禄直接连贯到颜色、方向，这个子平可以通用的，如果再往宽延伸，子平就不行了，要用《五行大义》。《五行大义》不是算命的书，当然算命是根据《五行大义》建立的。我们以前讲的强弱、十二生旺库就是萧吉定的，萧吉是隋朝时候的人，那么包括医家五行都遵照他的。因为五行一放宽，就不是吉凶祸福了，包括医家、修道、静坐、风水通通是在内的。那么其他具体的呢？我下次再讲，用《五行大义》来讲。各位可以买得到这本书，它不是算命书，是属于哲学方面的书。萧吉是做官的，是隋文帝的国师，学问相当好。那今天我讲阴阳五行，是从子平的阴阳五行初步连贯到《五行大义》的五行，下次就以《五行大义》为主，以《黄帝内经》为次，把它放宽，就有很多变通的办法可以产生。
<p>现在还是继续讲五行喜忌，命理是根据天干地支，天干地支又是根据五行，五行是根据阴阳学说，而普通一般性所谈的算命，就是妻财子禄寿，事到临头有不如意之事情，就谈谈眼前之事，什么讨债讨不回来的，做生意赔本的……等等。
<p>但是人生广义之吉凶倒并不是在于紧急之事，而是一生之过程。谈一生之过程，那就要讲五行了。五行同干支吉凶有什么不一样呢？我以宗教家的立场，把它们做个区别。佛教时常讲菩萨保佑，保佑什么啊？不是只保佑你发财，发财当然也包括在内，宗教家讲的吉凶祸福也就是算命里面最核心的问题，那么在五行家讲叫四大吉祥。吉祥啊！在算命讲妻财子禄寿，那么这个妻财子禄寿要建立在四大吉祥之中才能成立。
<p>那什么叫四大吉祥呢？就是我们一般人看到一个人他并不信命，他信菩萨，包括基督教讲神保佑你，保佑什么？就是四大吉祥。第一个吉祥就是息灾。把所有一切的灾难都停下来。那阴阳五行同算命是包括全人类的，在黄帝时代的君王，他自己没什么倒霉之事啦！他怕什么呢？怕三年不下雨、怕黄河决堤，就需要息灾。息灾对我们普通人来讲就是不顺手的事马上停止，尽管可大可小啊！息灾是四大吉祥的第一。第二吉祥叫增福，下面把息灾和增福散开来讲，钱财是钱财，打官司是打官司，把它分开了，以四大吉祥连在一起，什么叫增福呢？譬如我们看小说书上讲，风调雨顺、国泰民安、五谷丰登，那现在普通人讲就不要失业，要有差事、待遇高一点，叫增福。第三吉祥叫长命。长寿，非但不生病，还希望命长一点，这是人生基本之愿望。第四吉祥叫敬爱。这就讲家务了。一个非常有钱的人，夫妻间得一塌糊涂，不能算是吉祥。所以宗教佛家，包括密宗里祈求的种种平安，是指这四个事情。</p>

 WXXJ2:`<h1>(2)五行喜忌-2 </h1>
<p>算命呢，讲升官发财，听起来格调小了一点，四大吉祥范围就宽了一点。算命同五行不一样，算命是检查身体，你命好？命不好？这是讲个答案。你性情好、修养好也是个答案，并没有讲如何处理得安善一点，那么要处理它的话，不是甲乙丙丁可以解决的，要用五行。五行也就是算命讲的中和、用神、调候了，是很抽象的讲一种吉凶答案，那么如果五行喜忌就宽了，包括三皇五帝以前，连那个马路上商店都没有的时候，就有四大吉祥了，只要有人、只要有家属就有那种情形在。那么两者有什么不同呢？一个是讲答案，一个讲过程。
<p>那么在历史上讲起来，三皇时代老百姓都在拜、拜天和求神，问问会不会下雨？到后来复杂一点，问个人前途、地位……等等，这种代表方式，就是用五行的方法讲，算命就是这里的方法之一。所以必须要三者合一叫医命卜同源。医就是看病，命就是谈吉凶祸福，卜是只问一件事。它们的根本思想是相同的，那么在没有分开健康、钱财之前，它们是合为一体的。
<p>现在我们可以用双方都能理解的语句来说，算命只有一千多年，中医三千年以上，荣华富贵倒没有哪！人会生病倒是真的。我们现在讲一个趣话：人死得，穷不得喔！这太现实了。那么这个以医来讲，我们讲健康，一般普通人没有什么重要的事情，没有大祸临头，他第一关心的就是健康了，一天到晚哼哼哈哈，生病了，有钱都没用的啦！健康就是五行，就是医。那么医的五行同算命五行不一样。算命五行的吉凶祸福，是用天干地支克出、克入算出来的，是后天五行。譬如说赚钱，没有大家都赚钱的，有赚就一定有赔钱的。选择能当选，就有不当选的。
<p>医家不一样，医家可以全世界大家都很健康，统统不生病。所以医家五行讲究相生，命家五行讲究相克，那什么相生呢？它不用天干、地支来，那么各位关心到自己的健康，你能不能算到我的病什么时候好？这个算法是很低的，叫他根本不生病才是最高的！
<p>那么算命算你什么时候好？什么时候坏？也可以的，这比较霸道了。譬如说我们照医家五行，现在最流行的肝病，肝病在算命没有规定它属于哪一种五行的，是《黄帝内经》规定——肝属木。那么也可以用算命的五行，甲禄在寅、绝在申，如果你春天的肝病，又不过是上午不舒服，就寅卯时了，在医家五行讲那是很轻的，无所谓了。如果你秋天的肝病，下午三五点钟发作的，那就重了，木绝在申。谈这个是果了，不是因，它不是说我不要得肝病，已经有了肝病，这个病会加重了或者病会好一点，这是谈果。
<p>所以五行喜忌呢，它包括谈因，那么算命用甲乙丙丁来代表的，五行不一定要甲乙丙丁的，五行可以用六气来代表的，冷暖湿燥，譬如酸甜苦辣。我们问一个人：你喜欢吃什么菜？喜欢吃什么味道？一句闲话，但这句闲话霎头就决定你的健康，譬如说我们都懂的，吃的太甜会发肿，那么做减肥生意的人就把这句话当生意做啦！怎么样吃肥噢？不吃甜的，怎么、怎么的。那么医家五行讲的就详细一点了，大家都吃一样的东西，全家人的伙食是一样的，我假设十个人吃一样的东西，十个人的健康会不一样的，这个会有胃病，那个有肺病，那个什么病都没有。为什么一样的生活条件，会有不同的结果呢？这就是五行喜忌了。各位有没有想到这个问题？我提醒各位，譬如说你把饭吃下去，胃消化好了，那么大家都知道这种常识，血管把营养送到各部门啦！再问下去，就是它怎么送法？什么要送到肝脏，什么要去做头发，什么要去做指甲？譬如我们要漂亮点，那就皮肤了，输送管道如果发生问题，你皮肤能好吗？那管道是什么呢？这就今天我要谈的五行喜忌。
<p>输送管道不是甲乙丙丁，不是金木水火，而是酸甜苦辣咸、红黄蓝白黑，那是另外一个系统，根据你这个味道，决定朝哪个方向走。譬如说吃咸的多了，那么在五行它叫水，对身体健康它叫肾脏，吃多了你肾脏就有问题。所以我们日常吃东西啊！讲不出个细节，知道有影响，那么这个讲金木水火土，吃咸、吃甜，如此这样解释法还不够专业。喔！我不吃咸，那阴阳五行只有咸吗？当然还有别的方法了，在算命讲咸是水，方向是北、颜色是黑、那么我可以建议你床铺不要摆在北面，不要穿黑色衣服……等等，这已经是到最后没有办法时说的了。我现在说得比较具体一点，讲咸是不够的，咸是什么，咸是水。
<p>那么，一般人去庙里拜拜，有很多人问我关于算命的事情，比如求财、求婚姻，他们信神啊！他们说每天都在拜拜，有用吗？每个人都在对神讲话，祂根本没听到，只是你的一番诚意而已啦！那你要让祂听到怎么办呢？要有渠道来的啦！有人就问我，拿什么东西来供奉呢？比如前几天就有人问我了，他很需要用一部分钱，向自己借钱，把他未来的钱借过来啦！银行在哪里？银行不在你家里，银行在你的生命库里面。
<p>那么钱是什么东西呢？也是五行，他就问我：那买什么东西拜？我说鸡鸭肉香蕉苹果，就诚心讲是统统一样的啦！它们都有五行。我现在分开为大家做一个比喻。譬如我们说水是咸的，现在我们不讲咸，哪里去找那么多咸的呢？
<p>第一种里边有籽的，这就是水。譬如水梨籽很小的，因为我不是专家，我对水果也没什么兴趣，把它拿出来代表水，《五行大义》上讲水梨就是水，你就不拿健康讲，譬如日主是土，土克水为财，你命中有财最好了，命中没有，那你要找水来！你把自来水搬来都没有用，矿泉水也没用，你如果用水梨供神，这个管道就通了，这就是五行喜忌，这个是一个有籽的梨。
<p>第二种里边有核的。譬如我们吃桃子，里边不是核啊！很大的核，那么它又是一种五行啦！
<p>第三种它有房子的，它不是外面真的一栋房子，譬如橘子外边有皮、里边有籽，那就两种五行了。所以供品，供橘子、供桃子或者水梨，不一样。
<p>还有一种有芒的、有刺的，那么以这个水果的形状，就分成金木水火土了，那普通人看它这个金木水火土没什么意思的，但是五行家来看就有意思了。算命用不到这样一个层次，在《五行大义》用得到。各位看小说看到啊！皇帝前面听说是一百道菜，反正是几十道菜，是不会有问题的。皇帝只有一个人啦！摆那么多菜是干什么？这就钦天监为他设计好了。你吃什么东西，五行俱全，摆在什么方位，都有一定之规定。因为皇帝是很有权势的人，什么都有啦！就怕生病，就怕死了。那这个事情只有钦天监按照五行才办得到。所以皇帝有一百道菜，吃水果，皇帝吃不吃另外一回事，如果有水梨的话一定摆在北方，皇帝手摸不上，太监替皇帝拿过来，所以贵族人家一个普通生活起居，都完全遵照五行来算的。包括一个盆子，我不要讲太复杂，大家好懂些，还是用水梨做比喻，水梨是水，土克水。那么一个水梨拿什么样的容器、盆子来盛呢？土是黄的，当然不可以用黄的，要用不克它的颜色，因此讲增福、息灾、敬爱等等，就要用五行喜忌。
<p>算命是已经到发生问题了，五行喜忌是没有发生问题之前，那就一定就可以吗？至少可以减少很多灾害。所有古代帝王都很相信阴阳五行，包括历代帝王。明朝帝王最信了。譬如说我们现在的姓名学，我倒不是介绍你们名字怎么算，而是拿明朝做个比喻。朱洪武大家都知道的，明太祖三点水，他的儿子，朱棣，木字旁，水生木、木生火、火生土，十二代皇帝，一直到最后的朱由检，他属木，就是崇祯皇帝，上吊死掉了，越是成功的人啊！越信这个。完全是事先防范，不是在事后。那么这是讲了五行喜忌，如果是好人家、生活安定的人，谈八字谈敬神，这叫祈福。要平安，这就祈福，这就是医命卜祭，最早就是祭。
<p>那么根据这个，还有颜色，还有就是最近二十年来流行玉啊！挂块玉、水晶什么的，有能量，这科学讲的能量，那么不要说现在啦！古代也有这种说法，古代也有那个用到五行，那么这个红的、黄的、绿的或者黑的、白的，每一种玉石都有它的五行。所以就把五行喜忌列表在天干喜忌之后，也就是提供给各位，没有事、防范事，要透过五行方式，不一定要天干、地支，那这样子呢！可以包括满足各位之愿望。算命求妻财禄，这不是很麻烦的事情，麻烦的事情不是钱财，我一生所感觉到的钱财倒不是很重要的事情，很有钱的人，他没有儿子，这件事情不好搞啦！譬如一个人病重，叫他不死很难，人总会死的。譬如说，我只想争取三天时间，为什么呢，我好办点后事，可以交代一点事啊！那么一个人发生车祸量过去了，他没醒过来，亲友来问：能不能醒过来，只要五分钟，对他家属有极大之影响。这种事情就不是算命能算出来的，就要用五行。所以，我讲这段不是属于算命的主流，但也是算命里面一定会遇到的问题，所以我就为大家介绍一下，这是出自《五行大义》，同时也包括《黄帝内经》。
<p>那这是属于五行，我再随便讲一点点，比这五行喜忌还要深一点的，五行归阴阳的，阴阳不是白天、晚上，也不是男人、女人，各位如果是佛教徒，都知道绕佛怎么绕的，从右绕的，走方的，所有庙宇统统一样。那既然绕佛，那随便绕好了嘛！爱怎么走、怎么走，为什么这样子规定呢？这也是吉凶祸福，也是喜忌，但它不是五行喜忌，是阴阳喜忌。阴阳喜忌就是顺时针相生，逆时针相克。你要天下太平就要顺时针相生，穿件衣服先左、先右都不一样的。那么讲到顺时针相生，想到一个笑话比喻。各位一定有打麻将的吧，洗牌怎么洗？顺时针洗和逆时针洗不一样的。洗牌就知道打牌这个人的个性啊！所以这是阴阳喜忌。后面那个是五行喜忌，然后到天干地支喜忌。所以有关喜忌这个部分，到这个地方就告一段落。
<p>这个并不是真正算命啊，而是在算命的时候，一定离不开这个范围的，因为光谈升官发财两句话就谈完了。那尤其是敬爱，敬爱是家务事，譬如说普通人，家务事是很烦人的，这夫妻包括男女这个关系啊！那么敬爱又是五行方式之一种，就这么求，说家泰则安，家泰就是家务事，那么我把这个喜忌呢，大致上格局喜忌、十神喜忌、天干喜忌、调候喜忌、五行喜忌，大致上做一个介绍。这个介绍完了之后，就要回到我们算命最通俗的吉凶祸福。那么现在讲的就是运气，运气是一个单元。
<p>大家都知道运气好不好，一谈到运气，在命理中有两派，其实不是派啦！看法不一样，我请问各位：命要紧？还是运要紧啊？命、运好像都要紧，若两选一呢？我举个例子说，拿清朝讲，恭亲王生个小孩，算都不用算了，一辈子吃香喝辣，他可能什么都不会，好命一点不假，这是好命啊！那么我们拿曾国藩做比喻，他有多少生死患难啊！成在太平天国，那是运气。他不是天生就是好命的，那这个怎么算呢？是命好？还是运好呢？在命书中间，不讲你个人成就，命好是第一，饭桶也没有关系，只要我有个有钱的老爸，草莓族也无所谓，这只是很通俗的讲法。如果讲成就，那要讲运！包括命书边的沈孝瞻《子平真诠》，等等，都重视运。你没有这步运，普通人就上不去。
<p>那既然讲到运了，就要分细节，福禄寿三样有一样就算可以了。那么这个运就要分好几个单元讲了，就我上次简单的说过，最简单的运程是讲冲刑，大运同八字双冲、双合。运跟流年不一样，流年管一年，大运管十年，听起来十年很长，但是真正对人有用的能有多少时间呢？我想不过三十岁到六十岁，只有三步运。三十岁以前的运气再好，没有什么用，还是小孩子，而且讲命理要顺天道，少年得志非但不好，还论坏哪！花早开，就早谢，二十几岁成功，没有一个能够坚持到底的，因为失之太早。六十岁以后成功，能有几个姜太公啊？这就失之太迟。就在这三十年中间，你有好运，那是最恰当的。那么这个运是讲本身好运？还是坏运？
<p>但是运离不开流年，十年那么长的岁月，你不可能每一年都好的啦！就算十年坏运也不可能十年都倒霉。所以观念上讲运是很重要的，落到普通人身上，虽然是讲运气，那么对普通人讲，能走二十年好走的还少、很少，我讲过的只有两三个，那当然可以有几十亿啊！这个运也同我们刚才讲喜忌一样，你样。因为成功失败的来源不同，受了那个、那些条件限制，说起来太啰嗦了。我现在以一种既通用於业余，也是算命真正实际上操作的——运气流年，重点其实是在流年。
<p>说到这儿呢！各位从开始研究命理到现在，我想至少有六个月，也就是我最早提醒各位一定要熟背刑冲合会、十神生克。尤其是流年特别重在刑冲合会。它是活性的。我在没有具体讲流年之前举个例子，譬如说金日主，地支亥卯未三合木，金克木为财，这叫三合财，这好懂，你既然三合财就是财格了，管四十五年，不管你从幼年起或者到老年止，四十五年中问就算有中断，也占了相当大的比例。这个人大概不会缺钱的。那如果流年就不行了，一样亥卯未，一样是金日主，大运有个卯、流年有个未，八字有个亥，这样子三合财，只管一年，就这一年你走财运。亥卯未，随便八字卯、大运未、流年亥，随便怎么排，这叫三合财。
<p>所以在看流年、大运的时候，不在八字本身，从流年基本看，那么这个叫三合，包括三刑等等在内，都是分开来看的。那么当然八字本身年月日时是分开的，这个也有旺、也有衰，讲到这个，在后面会引用真正的八字出来做例子。</p>

 QS:`<h1>七殺 </h1>
<p>这节讲的是七杀，七杀同正官对男命是分开讲的，对女命讲是合在一起讲的。真正好命对男命讲，是七杀格同财格，机会最高。那么是非也多一点。七杀格同正官听起来好像克我者为官杀，但是两个性格完全不一样。问题就发生在阳制阳、阴制阴，好比一个男老师到女校去上课，统统是女生，他会比较客气。如果一个男老师到男校去上课就会比较严格，不知不觉就会产生出那种问题来。所以七杀格本身先天就是带是非的。凡是七杀格的人本身都是有是非的，要求比较严一点。甚至于说七杀就代表是非了。
<p>好命的人不一定要有是非，是非也不一定能带来好命。算命有些不成文的规定，一个伤官、一个七杀，都被解释成小人，很啰嗦了。那么七杀格这个人，对男命来说好管闲事，看不顺眼就会替人家打抱不平。对女命来说她喜欢她所佩服的男人，当然有钱是最好了。那么这个七杀的本身呢，带有小人这个意思在，那么七杀既然是好像是蛮厉害的，所以必须要有东西制服它。正官格是不要伤官的，七杀格正好相反，一定要制服。那么要食神制，七杀格如果没有食神就会做过了头，闲事管过了头，所以七杀没有食神制，我们叫七杀无制啊！这个人一点修养都没有，乱来的。要有食神制就刚中有柔了。所以七杀一定要有食神制。
<p>分配在四柱年限，解释法同财官不一样，年上正官、正印都是好命。书上讲年上七杀早年一场凶。不是出生在贫寒之家，就是跟家里搞不好。所以每逢看到年干七杀之人不是穷不穷的问题，贫困之家他也未必能够安分的啦！这幼年很啰嗦，算命最怕年上七杀，如果你一遇到年上七杀，通常都要完全靠自己，又敢冲。年上比劫只是家里没有钱，年上七杀不是钱不钱的问题而是不安份。有了钱也不行，也未必同家里谈得来。所以说年上七杀，早年一场凶。
<p>如果月上七杀，十几岁就很会闹事。譬如说，我们说年月都是正官是好事，年月都是正财也是好事，问题不过是钱多、钱少罢了，总是好事。如果年月都是七杀，这个人是个轻浮好闹事的人，从小就是闹事，所以七杀格在年月一样好事都没有。但是以全局来看年轻会闹事的人，将来成功的机会还最多了，问题是搭配得好不好。算命也不是只讲你前面，也就我们讲英雄不论当年勇，好汉不论出身低。但是年月七杀在天干明见，这个人必然有很多啰嗦，也没有钱。那么直接就代表他的家庭幼年背景很不一样，这个叫年上七杀。
<p>如果年月支都是七杀或是天干地支都是七杀。七杀是克日主的，不可以克得太近了。就好比你的小孩做功课，你不好站在边上盯着，走远一点，看着他做就好了。那么月上七杀靠得日主太近了，会把日主克得抬不起头来。所以当十神定位讲到某一个段落的时候，就要牵连到日主的强弱问题，日主甲乙遇寅卯它是强，遇到申酉它是弱，这是另外一个专门的题目。在这里稍微提一下，官杀克日主克得太厉害，各位有没有见过，有钱他不会用啊！就是身太弱了嘛！命好，但他不会用。
<p>那么，男命要身强，女命要身弱。既然官杀在月上当令，就显得日主弱了。日主弱，变得有福不会享。我举个例子：在戏上看一个夫人啊，后面站了四个丫鬟，请问夫人什么、什么事，她不知道，反而去问丫鬟。那就变得有福不会享了。所以月上七杀格，这个人给七杀压得喘不过气来。
<p>那么自己坐七杀呢？七杀跟别的十神有很多相同和不同之处，比如刚才第一条就是年上七杀早年一场凶，自坐七杀，在算命里面有一句话叫做天元坐杀，日主就是天元了，七杀克日主的，你日主下面坐了七杀，就等于说你骑了只老虎，随时都怕老虎来咬你，所以天元坐杀的人疑神疑鬼，随时都怕有什么大难临头。别人讲话都不相信的，人很聪明，这就是天元坐杀。天元坐杀的女命对自己先生一天到晚疑神疑鬼、怕东怕西的，尤其在中年之时，叫天元坐杀。
<p>那时干坐杀呢？别的格局都嫌运，唯独七杀格它不嫌运，他五十几岁了，人完全成熟了，社会上外面，不管再有什么压力来给他，他都能够应付得很自然，所以七杀格要在时柱。如果在年柱，受你的幼年家庭的不良影响。如果在年月代表你青年时期举止轻浮，如果自坐七杀，疑神疑鬼，对人家不信任。
<p>如果时干七杀成格刚好，那就为人稳重，也不怕处理难的事情。如果时支七杀呢，没有什么用处的了。
<p>對男命講，沒什麼用處，因爲時支是晚年。
<p>我现在所讲的基本上是男命为主。那正官、七杀反而不是男命为主了，而是女命为主了。女命用七杀，这个人她选男人的第一个条件，要令她佩服，不管干什么的，拿两套给我看看，打我骂我都可以。
<p>她喜欢人家打她骂她了，还像一个男人。那么这个官杀连一起的就不一样，女命解释七杀同正官一起来，是专门一个题目，现在我们就讲简单的题目，譬如说正官坐正官、七杀坐七杀在月柱上很平常，这个就不代表福气了，正官坐正官就是夫星坐夫星一定会离婚的。七杀坐七杀，夫星重叠，这在算命上，最怕这个东西，如果官坐官、杀坐杀主离婚。那么财坐财呢？因为社会文化不同，离婚对男人讲算不了什么，或者有一两个女人也无所谓。那么女命是最忌讳的，我以男人很客观的立场去体会她的心情了，一个女人在三十岁之前就离婚了，是什么样的呢？我们也在细细想，谈不来、不离，或者真离掉，这对女性本身的感受是会不同的。
<p>所以女命很怕正官坐正官、七杀坐七杀。但这个固然不理想，还不是最坏的。就怕正官坐七杀，七杀坐正官，如果这种情形，完全不照吉凶祸福钱财谈的了，七杀同正官，一个是明夫，一个是暗夫，正会不会出纰漏？另当别论，男女搞乱了不一定出事故，出事故是另当别论。还有冲、刑种种问题在，但事实上，我所亲眼见过的，结婚以后还同结婚以前的男朋友有来往的，但是也没什么大事。一件事情如果做到神不知鬼不觉的，或者大家都知道也无所谓，这是她的命，不能完全照法律问题来谈的。所以正官坐七杀，七杀坐正官，不好搞，会搞出很多啰嗦的事情出来。
<p>比如说，天干一个正官一个七杀，形成官杀混杂，离婚再嫁或者没有结婚又分手，大家都看得见。现在命理已经讲过好几次了，第几节了，应该可以联想懂得天干地支的换用。什么叫换用，一块美金三十块台币，三十块台币就是一块美金，天干就是甲乙丙丁戊己庚辛壬癸，甲就是寅，乙就是卯，把它倒过来看，寅就是甲，卯就是乙，那么一个天干官杀混杂的八字。比如天干甲乙官杀混杂，地支寅卯也是官杀混杂，在天干人家知道，在地支人家不知道。那么算命不会谈人家不知道之事了，只是我们明白这里边有隐情。
<p>那么我刚才说，时上正财，以前的章节里面讲过，时上偏财晚年有钱，前面有没有管啊，那么一个女命，如果时上时支坐正官，或者时支坐七杀，解释是不一样的，以相同的解释法，她晚年不会孤独，从细节方面去解释，坐正官的，妳有个很体贴的人。那么时支坐七杀呢，妳会有一个妳很敬佩的人，会不会很有钱呢！有钱没有钱不在这里论的，这个大概起码条件是有的，至少普通条件了。什么是普通条件呢？我的标准也不是很标准了，大家拿来作参考了，七万块一个月这个平均标准讲。如果你这个男人特别有钱，并不是讲那个东方甲乙寅卯木的，高等条件它讲究调候，今天我们不讲调候，只是讲正官、七杀引到时支，妳是晚年有的，如果地支上官杀混杂的，是人家不知道，只有妳知道。那么对女命讲可以合在一起讲，因为它就是天星。
<p>那么再往上连下去，就牵连到那个生克关联了，官杀生什么？官杀生印、印生比劫这种念法是依据公式的，如果对女命讲就不一样了，官杀生印、印生比劫，官杀是你先生了，先生透过这个印来生我了，所以官杀带印的人，你的先生非常体贴你，那么同钱无关的，不代表拿几个亿给你，他帮你扫地、洗衣服。官杀生印、印生比劫。先生很体贴你，那么透出这个印。如果没有这个印呢？官杀直接克你，讲话大声大气的。另外一种呢，财生官杀，官杀是克日主的，中间没有印，没有有体贴这个情形啊！
<p>所以我们算命很怕财杀连在一起，财生杀，杀克日主，如果拿来用算命的话讲，财生杀是杀攻身，攻身就是克日主，有什么缺点呢，我们拿钱来讲，财生杀，杀攻身，杀是是非，这是非从哪里来的呢，因钱来的，就是财杀在一起，在算命里很忌讳的。不是说没有钱，穷人怕没有钱，有钱人怕是非。如果拿男女关系讲，财生杀、杀攻身，对男人讲，财是女人，女人去生那个是非，是非来克我，所以这个是财杀在一起，你那个女人给你带来很多麻烦来，你的钱是是非钱。
<p>如果从女人的立场来讲，也不好，杀是你的先生，财生杀、杀攻身，你的先生要靠钱来维持的，我们也见过的，要女的帮男的，女的要帮男的调头寸，或者男的拿了女的支票是怎么样的啊，说的好听是帮夫运，这就是财杀、杀攻身。所以七杀最怕遇到财了，财格也怕遇到七杀。
<p>那么算命有两种立场：一种就是有没有钱，穷人算命，另一种是讲过程，不缺钱、也不缺女人，会不会带麻烦呢？那中流社会算命比较多啊，中流社会算命比较多，那么财生杀、杀攻身这一条，七杀格这个是很重要的，至于说天干官杀混杂，就看地支有没有根了，天干有甲、地支有寅，那么会维持很久，如果没有根，维持不久。我们一般性所见过社会上之男女关系，也可三天就散，也可二十年不散，也不一定有婚姻关系的。这就看通根、不通根，通根就讲年限，这个月上同这个时上。
<p>那么财官印大致都在一起的几节都有讲过，现在稍微延伸一点，在过去所有讲课中间不管财官印，通常都是以一千万做标准，要超过一千万不是财官印，要靠调候。譬如说我们都知道水克火为官，比如我是丙日主，天干有水了，那是官杀，生在冬天。正在亥子，地支只要有亥子的，夫就旺了，就可以有一千万，想要有几亿要讲调候的。那么到底什么叫调候，真正高命人才讲调候，普通人讲财官，那么我举个例子给大家听听。比如说生长在夏天，不管你金木水火土，生在夏天你八字没有水可以吗？当然不行啦！这不是金木水火土的问题了，也不是克入克出的问题了，根本就不能生存了嘛！这就是失调！就根本不可能成功，如果有了调候，譬如甲日生在冬天，冬天一定要太阳来照照，就一定需要火了，你有火就是得到调候，这是第一个讲有没有调候？
<p>第二个讲调候从哪里来？这个就讲十神了，比如我刚才讲，丙日主用水是夫，克我者为夫，如果你生长在夏天，正好要用水了嘛！生在春天，或是生在冬天，一样是水为夫，你最多只有一千万，如果你生长在夏天，夏天一定要用水调候的，水又是你的先生，又是调候，这就可以有几千万以上的啊！我再重复一次，这里牵连到亿万、千万，男女都一样的，生长在夏天、冬天，夏天一定要用水，冬天一定要有火，这就是是调候。至于跟火是你的正官、七杀、食神、伤官呢，这是另当别论的，如果正好是你先生、你的夫星，那么你的好处，就从你先生而来。
<p>所以算命里有句话，叫金冷水清，要丙丁。就是金日主生在冬天，好冷啊！那你八字要有丙丁，这个丙丁就是你的夫了。所以我们算命一旦讲到女命的时候，不是只问你先生有钱、没有钱？有钱不见得幸福，要又有钱又和谐，种种条件合起来，就一定要带调候。那么一个女命，你要嫁个好先生，如果你的标准普通人只有一千万，财官当令就可以了，如果千万以上就是要调候。
<p>那么你就连带问下去了，有钱就能谈得来吗？这里面就发生一点，不见得每个人都能同意的，那个有钱人的夫妻，同普通人的夫妻人生观是不一样的。我举个例子，每个女人，她都不喜欢先生在外面有女人的，皇帝是不是可以啊？可以的。因为条件高到极点了，所以在算命里面，同平民、同做官的、同公侯算的命是不一样的。普通老百姓一夫一妻，县太爷不是的，他一妻一妾。巡抚大人一妻两妾，妻妾是代表身份的，不是代表好色。
<p>所以我们算命是要分人的，算有调候高命的这些天人，就算先生有点什么，不是我们常情所谈的事情发生，她也认为是正常的，那么就能和平相处了。我这个讲法不是每个人都认同的，但以全面算命讲，还是能够行得通的。所以一定要讲调候。那么我有时也问人家、问同学了，你说一个人辛劳而得好呢？还是不劳而获好呢？你辛辛苦苦赚一千万，随随便便就弄三千万，谁好呢？这是见仁见智了啊！所以讲高命一定要调候，大家有没有体会，尤其是夏天跟冬天的最明显，要得天时。譬如一盆兰花你不喜欢它，一百块也不值，你喜欢它可以卖五十万。这就是得天时、得调候！
<p>那么我把正官、七杀这两节课合在一起讲，初步讲到一个女命，如果认真讲女命，那就复杂得多，留待讲食神、伤官以后再来讲。比如说我们什么叫复杂呢，离婚，婚姻不好，是离婚呢？还是死别？你说重婚，嫁两次还是嫁五次啊？算五次，五个男人身份都一样吗？这个就分到细节来了。就完全是在女命来了。我们也看过离婚以后又再复合的。有的则是一离，彼此不见面。所以这里面细节多得很。所以说问命，如果就是问你先生有钱、没有钱，这个简单了，如果人家问细节就很复杂了。那么有的人只要有钱就可以。有的人有钱也未必是可以的，这就是细节了。关键讲来讲去，都是五行生克这个旺跟绝。
<p>那么还剩下两个细节，食神跟伤官，留待下一节里面再来讲。</p>

 SX1:`<h1>三刑 -1 </h1>
<p>三刑是非，那么如果各位在初学一下子分不清楚，丑戌未三刑是什么个刑，巳酉丑三会是什么财官印，一下子分不出来，可以从宽处理。怎么叫从宽处理？你说他有变那不会错了吧。好也是变，坏也是变，尤其这个三刑，命带三刑的人四十五年，很挑剔的。流年一年三刑，也是无事生非！所以在流年三刑同命带三刑，那流年重得多了。譬如说我在房间里，根本就没有冷气，也就惯了，如果突然之间，一下子停电没有冷气了，这就特别不好受。所以三刑在流年上呢，也要为各位做个性质上的介绍。
<p>三刑就是子卯刑，丑戌未三刑，寅巳申三刑，不管怎么讲都是不好，带上什么神煞什么六亲，就把他父母兄弟都拉进去，带上什么神煞桃花、驿马，也拉到刑里面去，那么这是有代表性的。
<p>另一种就叫刑这个本身，子卯刑叫无礼刑，没有礼貌。没有礼貌不是我跟你讲话没有礼貌，比这个严重多了。比如说人家跟你借钱，一万块，你一万块很温和地交到人家手里，不够再来拿，或者甩在桌子上，我算是饿狗了，下次不要来找我。这个态度完全不一样了嘛！无礼刑就是一件事情，纵然人家帮你，也因为你这个态度而惹来的祸叫做无礼刑，讲话很不客气。说得再好听了，也就是我们怎么讲呢？口恶心善，你心善口恶，人家也不理你，不接受你。这是第一刑子卯刑，无礼刑。
<p>第二，丑戌未三刑叫无恩之刑，八字上有个戌，大运是己丑大运，遇到未年，那一年就犯三刑了，除了六亲神煞不谈，它本身叫做无恩之刑。我举个例子，有些老板他私人请客吃饭，十万、八万不当回事的，朝他借薪水看看，到会计处去，多借一个月都不行。这是小人物了，如果大人物，军长以上、厅长以下，于普通人讲，这个人跟了你二十年，今天你做到中将以上的大官了，他再饭桶吧！你也给他弄个闲差事过过了。但无恩之刑不是，不管你跟他多少年，他不会破例来照顾你。这叫无恩之刑。我看了很多，有一些夫妻搞不好的，自己花钱乱花，太太家用钱一个月一万五千块，多一块都没有。

<p>打麻将我们也都看到过了，五个人打，轮班，这就是伏吟了，你多一个出来嘛他本来已经有了，你多一个出来，为什么不好呢？不问你好命、坏命，你四柱有一柱重复出来，这会变什么啊？失去平衡了嘛！马上他就不平衡了。金木水火土就倾斜了。所以伏吟、反吟统算是坏事。反吟是把你冲乱掉，伏吟是挤得你失去平衡。癸巳年是伏吟，辛卯年逢冲是坏流年，壬辰年好流年，后年又是坏流年。所以现在讲到流年八字，零零碎碎有很多不成文的条文会出来了。这是经验之谈，看不到也不算大错，看得到是更好。每逢流年遇到两坏夹一好，例如今年坏流年、明年好流年、后年又是坏流年，这个时候好流年就没有了。
<p>好比冰箱东西拿出来，还没退冻，就又拿进去了。反过来，两好夹一坏，坏流年也没有了。因为他刚刚有一点坏，就已经度过去了。所以两坏夹一好，两好夹一坏，中间这一年取消。不完全按一年年讲的，最多不过稍微停顿一下，所以流年遇到这种条例，或者遇到大运交替之时，解释法就又松了。就好像我们到火车站去买火车票，正好交替，售票的不理你，你也没有办法了。所以这个随时随地在基本的规则之下，都会提供出一点经验之谈。经验之谈不是法定之内的，看得到最好，看不到分开谈，一年好、一年坏、一年好，也可以，也不算你错，只是计算得就没有那么周到。
<p>所以这个八字就按最标准的次序来谈，目前我们把大运定位为流年同八字中间的桥梁，寅巳申、丑戌未、申子辰，刑中可以带合，本来有三合的遇到三刑流年，本来三刑的遇到三合流年，中间可以互相交叉。这就可以分出每一年高低的层次。那么至于现在讲的，比刚才讲的多了一点点，叫做标准答案。所以在讲流年的时候，要加强刑冲合会；谈家务私事要加强十神生克。问先生，不管钱财；问太太，不管寿命。
<p>在流年只讲刑冲合会，因为流年没有实质，只有感受，你去年赚一万，今年赚三万，走运！那你去年赚十万，今年赚七万，倒霉！流年是一种感受，那么千言万语，还是我讲命理开始的第一句话，要背，背不熟是很麻烦的。希望能以两三个月的时间，把它背熟透。</p>
`,
 WXTWL:`<h1>五行同五伦 </h1>
<p>在正式讲解命理之前，先谈另一个概念——五行与五伦的对应关系。木、金、火、水、土分别对应仁、义、礼、智、信。许多老板常问我关于高层人事的问题，比如董事长选择总经理，或总经理挑选贴身秘书时的潜在关联。他们询问的并非商业决策（这些商场事务本就不需问我），也不是算命能否带来财运（他们未必相信这点），而是担心所选之人是否会无意间受到自身命理的影响。
<p>这正是我们运用五行推算合伙人能否公平相处的原理：
<p>甲乙属木，木主仁德。成也仁慈，败也仁慈
<p>丙丁属火，火主礼制。成败皆系于礼
<p>戊己属土，土主诚信。但过分守信反易自缚
<p>庚辛属金，金主义气。常大包大揽
<p>壬癸属水，水主智慧
<p>举例说明五行相克：若你属木（主仁），木克土（主信）。假设土属性者欠你钱，依"信"的本性他必会偿还。但作为木属性的你，可能因仁心而豁免债务——这不是对方施仁，而是五行中木克土的天然制约。
<p>土克水，土是讲信用的，水是讲智慧的，智慧讲的天花乱坠，遇到土的人没用，钱拿来之后，其余什么都不谈啦！那么水克火，我看你鞠躬是不是？给你鞠躬，普通人感觉都很礼貌，水人不是了，你给他鞠躬，他认为你很奸诈了，礼多必诈了。火克金，礼貌对金最有用的，金讲义气的，是很讲义气的人，他不怕你打架、不怕你厉害，就怕一样，怕你有礼貌。
<p>我们看《水浒传》，天大的事情，只要对方下跪认错，什么事都没有了。这个叫五行相克。那如果一个金的老板，遇到丙的伙计，那倒过头了，老板给伙计管掉了，他要毕恭毕敬！他说什么老板都信他！所以两个合伙做事，我们叫一物制一物，没有谁是不被制约的！所以有些夫妻在内，处得非常不好，就是不离婚，就是五行相克这个原因。我顺便把这个提出来，算命并不完全是讲吉凶祸福的，那么这个五行相克，大家相处朋友，很多人问我：我和这个人合作好不好？如果你是金、他是火，他制住你了，他并没有来管你啊！一举一动随便一句话、递一根香烟，他都认为你对他有好感。这个就是五行性的问题。
<p>那么最后面呢，我会开讲大运，阳男阴女、阴男阳女会举几个例子。看八字本身高的不多了，看大运，哪几步好运？哪几步坏运？先来评一下。下次我会在大运上选点题目做个介绍！</p>
`,
 PY:`<h1>偏印 </h1>
<p>前面讲的是比肩跟劫财，那么比肩、劫财的本身是没有格的，譬如我们说正官格、七杀格，没有比格局、劫财格。格之所以能存在，要跟日主以外的才能搭配成格。日主是木，甲乙之木是比肩、劫财。现在我们讲的是印。算命里面有价值的就是财官印了。都有正偏之分的。那么印呢？就是生我者为印。如果日主是木，水就是印。日主是水，金就是印。那么水有两个，甲日主遇到壬水，阳对阳，阳水生阳木，这个叫偏印。
<p>阴阳五行讲究的是阴阳相生，要有情；同性相生，效果就差很多。偏印是同性相生，阳水生阳木，阴水生阴木，同性相生就没有什么力。我试着讲个比喻，你们就当笑话听了。男生问男生借钱，不好借，女生问男生借钱，比较容易借。因为阴阳相生。那么这个偏印跟正印的不同之处，用个比较好懂的比喻，偏印是我的一条水管，那边一开水来，水就流到我这边来，这叫正印。
<p>偏印就像一根水管，但这根水管被什么东西给扭住了，水流不过来，一下子冲过来又像喷涌而出，很不稳定！一会儿没有、一会儿有，这就叫偏印。所以偏印格的人性格孤僻，女人最怕偏印格，她人并不坏，就是个性沉闷，很难有好的婚姻。因为过于含蓄，导致很多事情都不方便，比如你问她有没有意见？她说没意见，其实她是有意见的，那她为什么说没意见！她认为这还用我说吗？你看看不就知道了嘛！其实别人真的看不出来，她就以为别人看得出来，这样就会让很多人觉得你架子大，高高在上。羊刃格的人，他是真的看不起你，带劫财的他是真的看不起你啊！偏印格的人不是这样，他一副爱理不理的态度，你拿东西给他，别人会谢谢你，如果给了偏印格的人，他好像谢又好像不谢那种爱理不理的样子。这就吃了大亏了，根本看不出他对你是好是坏。另外还有个缺点，比如讲话很简短，比正常人讲话要少一半，光是这点，别人就以为你架子大了。
<p>另外还有个缺点，就是讲话带刺，刺又不是骂你。带劫财的他会直接瞧不起你，偏印格的他不是。
<p>我有时候打个比方，比如说太太是偏印格的，她过生日，先生买个蛋糕送给她，要是正常情况下会说谢谢，但偏印格的人不会，她反而会怎么说呢？"你还记得今天是我生日啊！"这种话说出来就把整个气氛都搞砸了。那么这是第一个缺点。
<p>第二个缺点，背后好讲闲话。比肩是失之过松，劫财是把自己看得太高。偏印呢，根本不关她的事也批评。譬如去参加一个朋友的婚礼，那么像我们都是恭喜、恭喜的，偏印格的不是了，她把人家夫妻品头论足，批评一大堆，甚至说如果是我的话，我就不会嫁给他！这当然是闲话一句了，一年、两年、三年，不断是在这样子讲啊！那么人家就看妳的啦！那你到底又能挑一个什么样的对象呢？讲话讲太多，往往就怎么样呢？偷偷摸摸、人不知鬼不觉，随便就同一个男人在一起，因为她那个男人还没有她以前批评的那个男人好哪！因此婚姻往往都会搞成这种情形出来。
<p>所以偏印格最好的行业是什么呢？教书、医生或者我们这个行业。每逢偏印格，我们都鼓励她，要自我谋生啊！她不可能相夫教子这种伦理，她有这个心啊，因为她的个性，就搞成那种人家感觉她好大的架子。偏印格尤其输不起面子上的事情，那么这是偏印的本质，最不利是女命。它对女命最重要还有一件事情是在五行生剋之中，印剋食伤啊！比劫是剋财的，印剋食伤。食伤是什么？食伤对女命讲是小孩，那女命偏印格对小孩是很不利的啦！所以说女命偏印格自己性格不好，又得不到家庭上的温暖，对小孩子又不利。那么一般人就问了，哪个母亲不爱小孩呢？怎么会不利小孩呢？
<p>偏印格的人并非不喜欢小孩，只是不喜欢照顾小孩。偶尔叫来聊聊天、抱一抱还行，但要整天伺候孩子就会觉得很烦。甚至有的在孩子还没结婚时就先声明：“以后你们结婚都搬出去住，别在家里吵！”这样一来，晚年就会变得孤独。在清朝时，女子讲究三从四德：未婚从父，已婚从夫，夫死从子。像这样（把孩子赶出去）的偏印格，晚年要怎么过呢？
<p>虽然现在时代不同了，但我每逢遇到偏印格的人都会建议她们学一门专长。比如去高科技公司工作，或是当教员。我也常劝她们学学美发、美容，这样就不怕老了，晚年生活也有保障。同时，这种艺术性格的人最适合去佛光山、慈济功德会这类地方，很对她们的胃口。她们就是喜欢那种热闹的气氛，并不是跟星云法师有什么交情。她们跟你也没什么感情，就是单纯喜欢那个氛围，天天往佛光山、慈济跑。
<p>那么说偏印格称之为格，天干有偏印、地支有偏印就叫偏印格了。那么天干有比肩，地支有比肩，这不叫比肩格，因为它同日主同一五行。那么你既然偏印成格的人，在算命里面，有两种八字最容易算，算命同我们做功课一样啊！有的很好算，有的很难算，碰碰你运气，那么偏印格同偏财格，属于最容易算的，一眼就看得出是好命、是坏命，偏印是艺术，艺术不值钱的。比肩、劫财只有败财，他钱怎么来的，他不管的。偏印是艺术性格，那么所以我在第一次讲《子平基础概要》的时候，我就讲了，一定要懂得十神生剋，就好比在講比劫，我們知道比劫剋財，所以非常重要。那麼印剋食傷，剋子女。那誰剋印呢？財剋印！財剋印。
<p>那么这个偏印是艺术性格，偏印格你要命好，只有两个条件就是要带天月德贵人和偏财。比如说你做生意，失败三次成功了，失败九次成功了，到底失败九次会让人很累的。艺术也是一样的，到四十岁都没人理你，忽然之间人家就来挺你，艺术之成功不是做生意啊！莫名其妙，所以偏印格讲究两样东西，首先要有偏财，偏财同正财不一样，如果单单讲偏财，是单独讲的，现在是讲偏印格用偏财，我们所解释的偏财怎么解释？赌钱、奖金、外快钱嘛！吗，这叫偏财。真正的偏财什么意思呢？你讲不出明天赚多少钱，这个叫偏财。还有另外一种财叫做举人财，人家拿钱给你做生意，这叫做偏财了，这是最合理的解释法，那么一般性都把他讲成横财了嘛！赌钱的钱。
<p>偏印一定要用偏财，不可用正财，这话怎么讲呢？譬如我是电影歌星，你请我，拍电影那些是艺术家啦！那么跟你讲了，一个钟头两千块，那不就完了嘛！耍大牌，我先给你两百万，你什么时候有空，随便你什么时候来，这样子总可以的。一幅画，画是没有价值的，倒霉的画家，譬如那些街头画家，三百块一幅都没人买的。这种也是艺术啊！那张大千就不同了，你先送十万块给他，他还不一定给你画哪！所以一定要偏财！不能开价！一开价，艺术就不值钱。这是说要偏财。假定一个古董两百块没人要，两百万他还不卖了哪！这就是偏财。
<p>讲得很清楚。那么既然讲到偏印，就顺便把贵人同各位解释一下，不管会不会算命，那么你们都听过贵人这两个字是吧！贵人有四种贵人，第一种叫做天乙贵人，天乙贵人是救难的。小则你房租钱不够了，人家拿你三万块付房租。大一点，你明天差三百万要跳票了，人家拿三百万给你了，这救难的啊！没什么用处的。另外一种叫文昌贵人，大家有没有听到过，文昌贵人管读书的。譬如你问我儿子聪不聪明？会不会读书？这叫文昌贵人。
<p>还有两种贵人，那个叫做天德、月德。天德与月德就不一样了，是增福。那个才真正是贵人啊！人家主动问你的啦！要不要拿两千万去做生意啊！这种好事很少。所以天德贵人要看你老爸的啦！一个小姐她爸爸有钱，她谁也不用羡慕的啦！你先生有钱也不用羡慕！所以偏印格要有贵人，四种不同，那譬如说你有天乙贵人，我看到你好可，画摆在那没人买啊！管我要不要，拿三块捧捧你的场啊！这是天乙贵人，还算好了。文昌贵人更没用了，我明天如果日报给你写一篇专栏，捧捧你的场。天月德那就不是的啦！他会因为有你的画挂在我的家里，我是脸上生光啊！譬如张大千给我题那个招牌了，所以说偏印格如果没有天月德贵人，没有天乙贵人，就算你才高八斗都没有用的！街头画家！听说像梵谷那些就很倒楣的！
<p>偏印讲艺术，我把它比作歌星或画家，这是从世俗角度来说的！反过来讲，艺术的范围可就广了，高至张大千这样的大家，低到马路上跳八家将、七爷、八爷的，那也是艺术。包括僧道中人，星云法师也是偏印的。如果你在僧道宗教领域里讲，你带有天月德贵人，连大官都会跑来皈依你。但如果你没有贵人，我们在马路上常见到的，托钵化缘的僧人，那也是艺术啊！坐在马路边打坐。那么说，女命最好不要入偏印格，不过偏印格如果研究我这行（命理），倒是个很好的人才啊！所以偏印格是指你的性格，至于说你好命、坏命，与性格完全没有关系，完全取决于偏财以及天月德贵人。所以我们看，即使带冲也没关系，带冲意味着人生跌宕起伏，只要你成格，有那个贵人最终能成功。如果你没有贵人，没有偏财，就算不冲也没用。比如我们常笑话文人，大年初一帮人家写春联啊！那就没办法了，这就是偏印的性格。
<p>在六亲方面讲，大不利。所以一个八字天干三个偏印的，算都不用算，根本都没有亲情。印克食伤，把小孩克掉。你如果在天干三个偏印，任谁都看出来这个怪怪的。那么偏印在六亲边还有个代表，她不是妈妈是后母，如果你年上偏印大麻烦了，你妈妈没有权的。现在算命同清朝算命大不同。现在算命都是小家庭，就算大家庭，最多一代，很少三代挤在一起的。那清朝不一样，第一是大家庭，而且有妻妾制度的。男人算命倒不是谈荣华富贵了，先谈父母怎么样，你兄弟姐妹怎么样，你的妈妈，你是大房、大娘所生的，或是三姨太所生的，或是六姨太所生的，那你身价就完全不同！
<p>如果年柱有偏印，代表你是偏房所生，那么偏房的家境当然要好，没钱怎么会有偏房呢？所以这种说法已经不同了，现在就不适用了。现在我每次对从事这行的同学都特别交代：年柱有偏印就不要提这个问题了，以现在的文化来看，我们都知道，有很多女孩子，她原来的男朋友相处不好，结果别的男朋友来接替他的位置啊！也就忍了嘛！这种事情你何必去谈她的家务事呢？所以说年柱有偏印我们就不提了。但我书上是写了。
<p>至于说人之常情，这个人他来找我，那么多的事情，我当然不会样样同他回答的了，你问我，关心什么我才谈什么了，这才是人之常情。这个是比较自私的。所以说这个年上偏印，不利母亲。那么这就是以时间到是为定义。《子平基础概要》书上二百七十二页（第十三版），偏印在月上当令，譬如丁日主生在卯月，东方甲乙寅卯木，这叫当令，令就是月令，也就是你们背的那个公式，东方甲乙寅卯木，南方丙丁巳午火，西方庚辛申酉金，北方壬癸亥子水。
<p>它在月令上当令，偏印当令，他几岁啊？还是三到吗，三十岁以前。他谈艺术，在我们看你谈什么艺术，你不过是讲一些小孩子话嘛！我在电影上，我看过，老爸很有钱的，他儿子说，他不喜欢这个东西，你只要给我两百坪坪地，我喜欢种花了。这就是讲那种幼稚话，艺术性的话。也就是家里老爸很有钱，事业交给他，他不要。他要去搞他自己那个弹钢琴，要学音乐。另一类人就是以印的特征为职业。譬如三十几岁就是喜欢搞那种抽象的这个东西，那最好的是做牧师、出家是很好的，没有家累，去做牧师，去做文化，去教书。

 PC:`<h1>偏財 </h1>
<p>那么现在这个单元是讲偏财，财官印三种中间，印是属于最简单的，同钱财是没有直接关系的，所以偏印如果没有偏财不会好，正印没有官杀也不会好，因为它是一种兴趣、清高、学问。那么讲到财就不一样了，财直接就是钱啊！清高、不清高不重要了。那么财分作正财、偏财，为什么上课我都是先讲偏财，财再讲正财呢？偏都是同性相对的，叫做偏，譬如说偏印，阳对阳、阴对阴，生克都一样的。这个偏财，就是我克的财，同性相克的财，那么偏官是七杀，那么在格局方面它是属于逆用的，真正好命的人还是偏的啦！
<p>偏财同那个七杀、偏官。这个偏，不是指你做人很偏，我举个例子大家就懂了。譬如说一个人去同人家讨债，男生去问女生讨债，这就有点使不上力了，阴阳相对，他有人情在，客客气气的，不好翻脸啊！如果男人问男人讨债，女人问女人讨债，这效果绝对不同，这个是偏嘛！偏不是人格正与偏，这是同性相斥啊，没什么客气的。所以正财格的人，你问他要多少钱，我们随便讲两千万就好了，如果偏财格的人，你问他要多少钱，这钱还怕多嘛！越多越好！这就叫韩信将兵。所以讲偏财比正财有讲头，那偏印也比正印有讲头，正财、正官、正印都是规规矩矩来的，没什么大变化。那么我现在就讲偏财。
<p>首先我们把它当钱来讲，那么偏财这两个字，如果我们照普通的解释，他会想到什么地方去？六合彩、大乐透、赌钱，这个偏财不是横财啦！这个偏财这个意思在命理中间的规定，他有一种特别的定义。第一个定义：自由职业。我要做就做，我不做就不做，这个叫偏财。第二个定义：讲不出明天会赚多少钱，譬如上班的人他可以说今天上班明天就不上班吗？不可以的啦！如果做股票就可以，我爱做就做、不爱做就不做，这个就可以。那么偏财他没有办法预计讲得出明天赚多少钱，譬如我开电影院那是正财，全部客满了，那就没有了嘛！没有站票啊！那如果我做股票，那怎么能讲得出明天赚多少钱呢？就没有办法预计你明天赚多少钱。还有第三个特色：正财将本求利，包括那些上市的最大的公司，我想利润大概不过十分之一啦！
<p>那么那个偏财的利润根本就没有一个标准，我请问一颗钻石卖多少钱啊，多报五十万好像也很平常。一个皮包卖六万块也可以，六千块也可以，这就是偏财。另外就是第四个特征：众人财，比如我自己拿五十万摆个摊，或者我问人家借五十万来做，这就有正偏财之分别了，正财是自己的钱，偏财是众人的财。那么你说谁有这么好事，人家拿钱来给你做生意呢？偏财他就有这种命。这众人财，这四种是这一个归类于偏财。那分到实际上行业上来讲，偏财不一定做股票的，譬如说医生，他怎么知道明天来几个病人呢？他不知道。来个病人感冒三百块、开刀三万块。他也搞不清楚是怎么样的收入，类似这个就叫偏财。那么教书、学校老师就属正财。补习班就不大一样啦！所以分这个细节，要自己区分的。这里首先讲财这个部分。
<p>接着讲个性。我个人呢，比较喜欢同偏财格的人谈话，不是他有钱的问题，偏财格很豪爽，什么事都嘻嘻哈哈的，把他讲的很不好，他也无所谓，一笑了之。那么这个他就有那种爽快、不计较这种习惯。譬如说我们一个朋友，吵了架，以后再谈生意，如果拿正印格来讲，根本一辈子都不能来往，如果偏财格就无所谓了。就算什么恩怨，只要现在我们谈的这个事情彼此有好处，那就可以继续交往。
<p>所以偏财格的人慷慨、量大，同带比肩、劫财的正好相反。比肩会后悔，他不会后悔。譬如说，带比肩、劫财的你骗了他，他下次就不同你来往了。偏财格的无所谓了，就事论事，谈什么事就是什么事，他不会后悔。你倒了我的钱，如果正财格是把你看成仇人的，偏财格最多下次不来往嘛！所以很量大。这两种特性就是别的格局所不具备的。还有一种特色，就是一般人如果破了产，想要再爬起来，几乎是不可能的，只有偏财格可以，失败九次，还可以再成功。因为敢赌、敢于孤注一掷。
<p>这是我所说的偏财格在财务方面的性格特征。但偏财格并不只有这一种表现！
<p>偏财最明显的是偏妻，就是小三！那么命带偏财的人，那就有女人。那你说这个人私生活荒唐吗？不是的。真正的麻烦出在他手头太松，因为你手头松，在某种场合里头，接近女人的机会就多了，所以是偏妻、小三。那么会影响这个人大的啊！讲到偏财，我顺便把偏财同桃花之差别为大家讲讲。桃花是逢场作戏，过了就算了。偏财不一样的，偏财对这个女人有情感的，分手之后，如果问他再要钱他还是会给你的。所以我有时对女客讲说桃花不重要，怕的是偏财啊！偏妻的话，那就麻烦了。这个是简单的讲一下。那么这一段是讲他那个基本性格，用到算命是不够细腻的。现在我分成细节来对大家谈。
<p>第一，关于财星的排列，如果正财、偏财都出现在天干，比如天干有三个偏财，并不代表这个人很有钱。他的钱财别人都能看得见，和其他情况差不多，就像天干有三个偏印，一看就觉得这个人古里古怪的。天干有很多印星的，一看就知道这个人这也不干、那也不干的。如果天干有三个财星，就算没有钱，你也会认为他有钱，不知道各位有没有体会到。有一种人把所有的钱都借给别人了，别人还会说你怎么可能只有这么一点钱呢？别人不相信，高估你啊，把你高估了！有优点，也有缺点，充充面子是好事，反过来真要你做，你没有这个实力啊！这是看起来高，这叫做浮。
<p>所以算命讲财要藏、不要露，财要在地支边，不要浮在天干。最多天干出一个就好了。天干财多的人，最大的缺点，人家都说你有，要借钱先找你，那么还有一点就是口没遮拦。财是女人，如果你不露，你有三个、五个，人家不知道，你一出天干，非但人家知道，他自己也不忌讳，摆在嘴上讲。所以说排列这个位置，天干同地支先区分出来，然后四柱也要分开来。
<p>偏财在六亲边，代表一个是小妾、一个是爸爸。对女人讲就是父亲。这个小妾，不是真的叫你娶回去的才叫小妾，反正夫妻以外的男女关系都叫偏财。如果偏财在年，这个不会解释小妾，十五岁以前代表你爸爸有办法。所以我们在帮人家小孩子选择剖腹生产的日子尽量是年上偏财的组合。那么人家拜托我们帮选择小孩子剖腹生产的时间，他是有动机的了，就是他不讲，我们也看得出来，他是希望小孩子一辈子平平稳稳好，或者对他家运有没有帮助这就不一样了。如果站在我不管你小孩子以后怎么样，他一出生前面七年半你家里会走运，那就要取年上偏财。
<p>我们拿今年做例子，今年辛卯，丁日主的人就是年上偏财。那只管前半段，那么年上偏财主家运好，家运好只有七年半，如果超过七年半怎么办呢？就要讲究通根。时支、年支、月支有没有根了，能通得下来的，时间就长。这个就是头一个在年上偏财是指父亲，年支偏财也以此类推。我想各位听到现在，对年限问题都搞得很清楚了。年一到十五岁，地支就是八到十五岁，如果在年上那么就是你七八岁以前家运就会好了。如果反过来，就把以前的话重新并在一起讲，如果年上比肩、劫财，那就对老爸不利了嘛！如果年支比肩、劫财，小孩子到七八岁家运就要败了。那么这个在我们为人家小孩子选剖腹产的日子，到底怎么选法，我们是没意见的，要照当事人的意愿来选的。

<p>如果月支是偏财，那解释法不一样，月支偏财二十二岁到三十岁，这个年龄他已经成熟了，那么一个偏财管三件事情：老爸、女朋友、钱财，平时讲都很重要，但在三十岁以前你问他谁最重要，那根据我的经验，一定是女朋友排在第一了，年龄条件他都有那么三十岁之前。
<p>根据我们对命理的经验，人之成功最快都要三十六岁以后，三十六岁以前成功，非但不是好事，恐怕还会惹祸。因为命理不能违背自然规则，花早开一定会早谢，少年得志，嘴巴说说罢了，事实并不是那么好。所以在这一段时间，我们都很含蓄的劝他：不要早婚，早婚没用的。这个是月支，另外一种排法就是自坐偏财，丁酉日，酉就是辛，自坐偏财，偏财不出天干的啊！就是他有錢是在里面的。讲钱财，人家知道与不知道，根本就没有关系，这是你自己的钱。然后男女关系就不一样啦！日坐这个地支啊，以后在讲女命的时候会专门讲，月令地支是夫宫，日主地支叫妻宫，所以孔子讲：男三十而立。那你妻宫的位置你坐了个偏财，那就不对了嘛！妻宫应该坐正财，那么如果自坐偏妻，这个就解释法就不一样了，不是指他外面有女人，也就是说女人、不是太太的女人在替他当权。这种情形是非常多的。譬如说有点钱的男人，财务大权在女秘书手里，或者他住在外面的女人家里还比自己家里时间多，这叫做自坐偏财。这个吉凶只要不带冲没有什么关系的。

<p>我随便夸张一点点讲，譬如时上偏财，我只说是你晚年还有女人啦！如果你时上正财就不一样啊，正财是太太啦！那不是糟糕了嘛！那前面的太太怎么办啊？一定会有事的啦！所以在算命里面，有的是该说，有点是不该说，所以我们在论命的时候，是遵照佛家之规定，佛家怎么讲呢？不问不答！你不问我，我不回答你。不是小气，怕干扰到你的情绪。譬如一个二十几岁的小姐，她拿男人的八字来问我，一个是时上偏财，一个时上正财，两个都不缺钱，但偏财的多一点，如果站在女人立场、太太的立场讲，当然要选正财的啦！安分得多了。如果是偏财，难保她的位置啊！这个是题外话。当各位把十神定位每一组都完全搞清楚，就把命分作八个阶段，七年半，七年半啊！这已经够了，同业余谈命完全够了。那么偏财还有很多特色： 第一个，偏财不计较小钱，你叫他买东西，他不会问你一定要多少钱、多少钱之内啊，他不会这样子。这个不计较小钱。被人家骗了，当无所谓、量大。所以这种人很有人缘，你同偏财格交往，要他走运，你欠他钱他不会告你的，除非公事上面的财务，他最多下次不来往算了。这个是第一个，不斤斤计较于小事情。
<p>第二个，凭直觉，他不会仔细想的，他高兴就可以了，他有个最大的特点，就希望人家捧他。比如说家长会会长，放鞭炮欢迎，等会儿找他捐钱，他就写大数字出来了。他最大的缺点，就是欢喜捧他，一捧他，处理事情就不照常规来处理了。还有呢，这种偏财格的人，讲话夸张的啊！什么事情都没问题，所以偏财格时常会失败，关键是你最后一次是成、是败啦！所以偏财格，根据十神生克讲，最怕时支是比劫、羊刃，那就会倒掉的。如果不是时支羊刃，起起伏伏很正常啦！
<p>他这个两大特色，就是一会儿有，一会儿没有，一会儿就边上女朋友多，这个是他的特色，能不能到终局，关键看时支，时支不要比劫、羊刃就还是可以的。所以如果月上偏财，也嫌年纪太轻了，最好时上，晚年哪！可以拉得长一点。这个是讲偏财！男命这个特色——慷慨。

<p>那么他还有一点，他不亏待人，尤其小钱，做生意他可能给你倒大帐，小事不会。譬如我派你到高雄去办事，如果正财格的人呢，就不是喔！飞机票多少钱？旅馆多少钱一天？大概好多钱啦！他算好来的。偏财格不是，先拿十万块去，不够你先垫，你拿账单给他，他看都不看，跟他做事，是非常好的。那么你拿账单上去，如果你拿给正财人看啊！他真一笔笔慢慢看的。偏财不看的啦！他只看总数的，总共是多少。
<p>所以偏财格呢！他走运的时候跟他，那就真是你也走运啊！但是偏财格有个特色，就是平时你根本看不出他寒酸不够这一面，如果一旦露出来了，那就不得了了，退票不会一张了，五十张一起来的啦！所以偏财格就有那种特色。那么另外就是他的女人多，也并不是因为他有钱的关系，而是态度问题，譬如送礼给小姐，如果小姐不理他，人家就不送第二次的啦！而偏财格无所谓啦！白送一次下次还是照送。他请你吃饭，半真半假，妳说去，他就陪妳去了，妳说不去只当笑话。他越是那种无所谓，这个机会就多啦！

 BGXJ1ZGG:`<h1>八格喜忌(1)正官格 </h1>
<p>我首先讲正官格，它属于顺用的第一个格。
<p>一谈到格局就分强弱、分喜忌，讲用神，这三个字是命理上最主流的学问。什么叫用神？有用之神。譬如正官格本身就是用神，用神不可以伤，所以正官格第一个就怕伤官，这句话老生常谈了，伤官见官为祸百端，正官格有伤官的人，你的理想、作为都会给自己惹祸。就算你做得成官，也会搞很多麻烦的事情。所以头一个忌伤官。
<p>第二个忌讳是官杀混杂。那么在女命里边最忌官杀混杂，但是男女命不同，女命忌官杀混杂是因为夫星的关系，明夫、暗夫，男命忌官杀混杂怕克制日主太过了。正官、七杀都是克日主的，官杀一起出来在天干，就把日主克制太过了，会变得怎么样呢？怕事啦！船头怕风，船尾怕鬼，很容易被人家欺负，别说没机会，有机会也胆小的很，不喜欢这样。因为命理基本上是讲荣华富贵的，说得难听点，宁可荣华富贵倒霉啊，都不要太太平平的出不了头，这是它的基本理论。至于个人取舍，那是你个人的基本性格。所以官杀混杂一起出天干，这个人好怕事，什么都不敢做主，那怎么能做事哪！还没做生意，那赔本怎么办？处处都是悲观思想。所以不要官杀混杂。
<p>正官的第三怕什么呢？怕正官带合，就是天干五合，甲己合、乙庚合、丙辛合、丁壬合、戊癸合。那么正官格局一带合，职权不能独立了。我是做官的、也有职权，我要干什么、就干什么嘛！什么事都不能做主，还问我有什么价值？这个官就做不大了嘛！所以正官带合，权不能集中。各位不要拿自己的八字来想命理啊，你可能不想做官啊，想做官的还不少呢！那个选县长，他当选了县长他一定希望自己当市长。所以正官不可以带合，不要说乡长，一个科长你的权都不能个人家分！一带合的话，没有权了，空位子。
<p>第四，正官不可以冲，格局不可以冲。记得以前讲刑冲合会的时候，我就提到过，年月逢冲只冲三十年，三十岁过去了就不冲了。如果十神逢冲、正官冲，冲女命的先生。如果格局逢冲那不是，你一冲了格局，就冲到你的事业，只要你做事业，你都逢冲！正官格带冲的人，一辈子都是啰啰嗦嗦、是是非非、祸起萧墙。我认识有一位警察局长，他的部下派出所所长出问题了，他就跟着官位掉了，同他一点关系都没有的啦！其中有很多内幕，我不了解的，比如固定经营三百万，正好遇到大游行什么的，根本不够，你一逢冲，专门遇到那种很麻烦的事情。
<p>还有第五项，日主不可以弱。八字一定日主要有根，没有根的话呢，你坐上去也不想坐。所以顺用的格局里面，他有五个喜、五个忌，譬如说不见伤官是喜，见了伤官是忌；官不带冲是喜，官带了冲就是忌。所以命讲喜忌，一样是正官格，一样是身官两停，你一带冲、一带合就不一样了。所以我听到一些做官的人跟我讲了，他说我的个性根本就不适合做官，就是那个冲合太多了，没有办法，你命是正官格还是要做官。那么这就是正官格基本五个条件。现在我们讲的是命理啊，纸上谈兵的，每一方面都要想周到，想周到了，会不会算命呢？那就要讲经验。根据我刚才讲的一个正官格不见伤官、二官杀不混杂，三官不带合，四不带冲，五日主强。到哪里找这种正官格呢？根本就没有，这是标准版。
<p>本是正官格又见伤官，或者有冲合的，这有病啊！所以命里面有病方为贵，把病医好了，不就行了嘛！就好比我们开矿，里面直接掘出金子出来，是没有的，是一大堆矿砂，慢慢熬、慢慢炼，炼出来的。八字也是一样，有忌神、有病，那怎么办呢？靠大运、流年把坏的那个东西弄走、合走，这就好了嘛！所以以前我们讲八字、大运、流年从坏地方讲，你很好的正官格，它带个伤官来冲你一下，冲坏了。反过来也可以。伤官见官，大运把伤官合走，明明坏的没有了，十年好运啊！这是细节问题，有病了怎么办呢？就找药啰！所以这讲究病药，是属于用神方面，在我再解释的时候，各位如果不能背十神生克就有些麻烦，会背就会很容易。
<p>第一：正官遇到伤官，伤官是病，把伤官弄走就好了。还有个办法就是大运走财运，这个财不是钞票，是十神啊！伤官生财、财生官，伤官会去生那个财，财再生官，这就把伤官弄掉了，这叫通关用神。通关用神是讲合，比如我跟某个人是冤家，那怎么办呢？找一个两人都认识的，请他吃饭，因他而讲和。所以八字正官遇到伤官，要走财运，这个财当然也是钱财了。主要是伤官生财、财生官，在这步运里边就不是伤官见官啦！那如果没有财怎么办呢？再一个办法——用印。官生印、印克伤官。也同我们正常做朋友一样的，我同你不和，请人来讲和，请不到怎么办呢？我找个比你更厉害的压住你。这叫病药用神。当然用通关用神比较好了。所以伤官见官就两个办法，一个用财通关叫通关用神，一个用官生印、印克伤官叫病药用神，这就把伤官取消掉了。
<p>第二，那官杀混杂怎么办呢？这条就跟女命差不多了，合杀留官不就好了嘛！甲见辛是正官、见庚是七杀，乙庚合，大运走乙运，把庚合走，这不就好了嘛！我用个很不恰当的比喻，你带一个女朋友逛街，半路上遇到另外一个女朋友怎么办？管它怎么办，弄走一个就算了嘛！这个比喻很不恰当啊！就合杀留官，把七杀合走就可以了。那么命理都有解决方法的，没有天生的好命，八字出来古古怪怪的，就看大运、流年有没有正好有这个十神可以把坏的弄走，反过来也一样，你没有伤官、也没有七杀，但你走两步运，一步伤官、一步七杀，那不是把你自己搞坏了嘛！
<p>第三，官不可以带合，这一条倒不是很严重了，官带合是你的主权被人家合走了，那么我退一步讲，我们没权，县长当当也可以嘛！权交给人家，我挂挂名也不错。所以带合这件事情并不是严重之事，除非你是很有志气的人。
<p>第四，官星被冲，就要靠其他天干来合。比如甲木见辛金为正官，丁火克辛金，正官被冲了，那就把丁火弄走不就好了吗？谁能合丁火呢？丁壬相合，大运有个壬水把丁火合住那就好了。日主无根，大运有根那就好了。
<p>所以这就是讲命理，你有没有这步运？有没有坏运、好运？真正算命单理论上讲，现在就开始进入命理了！那我讲了三个，前边都是做官的了，虽然是伤官见官，官做不成了，他不见得没有钱的，他有钱、没钱还是另外看这个财的。他的格局虽然是正官格，如果四柱没有财啊，这个官做的也没有什么意思的，清官、孤官无辅，不带财的话，清官没有钱，或者是冷板凳，想要也要不到。如果伤官见官，麻烦多得不得了，那他有财啊！尽管是麻烦，钱还是有的。
<p>那么伤官见到底发生什么事？再往下研究才能知道。
<p>第一个，职位上老出麻烦，那还算轻的啦！
<p>第二个，出错，差事搞掉。那么我稍微讲得细一点点，譬如正官格却伤官见官，三十岁到四十岁，差事掉了，四十岁过后，大运没有伤官了，你还是可以再回来的，所以这是要看年限的，你五、六十岁把差事掉了，就回不来了。最严重的，那就麻烦了，既是伤官见官，又带三刑、六冲，那就可能要坐牢的啦！那是轻重问题，还要有细节的。
<p>单单讲正官格怎么标准用法就是如此。不可以见伤官，官不可合，不可以见七杀，不可以带冲刑，日主主要有根。如果犯了这个毛病，要用病药用神、通关用神、合克来处理。这个到底发生什么事情，要看你在哪步大运？有没有带刑冲合会？如果不带，只是职位上的事情，如果带上去是可大可小的。这是我讲的格局里边的第一个格。
<p>其实八个格你只要把正官格彻底弄清楚了，也就懂了，统统一样的，不过换几个字罢了。那么这是格局顺用，这是出于沈孝瞻写的《子平真诠》。那么你研究十神定位，用不着买很多书的，如果真正研究命理，至少五本书：第一本是《子平真诠》，第二本是《三命通会》，第三本是《渊海髓》，第四本是《神峰通考》，第五本是《渊海子平》。这五本书是算命里面最主要的五本书。这个正官格回去要仔细体会一下，我们以前讲十神生克是讲六亲，现在是讲格局，正官是先生，一旦成正官格，就同先生没有关系。
<p>刚才讲的正官格是拿最标准的正官格来讲的，就是天透地藏，月柱天干正官、月支地支正官，那么这种正官格除了吉凶祸福之外，还有年限的。这三十岁以前的，如果拿现在讲，是没有什么用处的，三十岁你能做什么官啊？如果清朝，二十几岁就可以中进士的，那是少年得志啊！太好了。通根代表你的时效，如果月柱地支有正官，天干透到时柱正官，也是正官格，那么其时效是二十几岁起一直透到五十几岁左右，这种正官格，荣华富贵也好？倒霉也好？都是过程，他的时效性二十几岁一直可以做到五十岁，这是很正常的。
<p>那么除了讲你荣华富贵以外，还要讲你的年限，这一直通上去。再假设日主坐正官，日支有正官透到时干正官，一样是正官格，但时间不对，这个人要到三十多岁以后才有官做的，也是做到五十几岁，那么我讲这个官啊！并不是完全是指县长，清朝的官比较严格，官吏、官吏，一般人都是吏啊！比如师爷那些都是吏，那么也许可能一直都是公务员，到三十几岁才升到高级主管，那如果反过来，年干正官，根在哪里呢？月支也有、时支也有，有两个根了，这种解释法要照人之常情。
<p>我时常在十神定位时提到，谈命理一定要符合人之常情，年上正官不会做官了，你还小嘛！你根通到月支、时支的，你做官的来源同家里有关的。根通月支二十几岁，虽然你的官位同家里有关系，但是你通到时支的，可以在月令这段时间是并不受你家里影响的，你自己做你自己的，到时支这个正官，还是同你家属有关系。那么从好地方讲，你做官做的很久啦！从坏处讲，不能退休啦！任何格局通到时支的，都不能退休。不是说形式上不能退休，公务员都有年限的都要退休，像格局通到时支，你纵然不需要上班，但还是有事情管。这是通根的问题。
<p>还有一个根、两个根、三个根、四个根，四个根年月地支都有，这个叫多根，天干有正官，四个地支都有正官，命理五行它讲究中庸，不要太多、不要太少、也不要太偏，正官两个就够了，三个就多了，所谓官多不贵、财多不富。我也见过一些人，什么官他都认识，但什么事也办不了。你请什么人，他头头是道，就是官太多了。如果地支四个官的人，就等于说很善交际，谁都认识，但办不出事。如果正官统统在天干呢？那么谁都看得到、知道他同官有关系，但是，也办不了事。
<p>那我举一个例子好了，有个人他跟孙中山是同学，你说他有没有办法呢？一般人认为他肯定有办法的，其实未必的，因为他摆个样子，人家就认为他有办法，事实上他没有办法。所以格局它首先要分出病药之外，还要讲多根，或者通通浮在天干，还有那个统统是在地支，这个要区分开的。那么这个是连带住讲的。还要补充一句，我刚才讲的日主强是讲根，根是五种，强只一种，其实扶日主的是比劫禄刃印，天干比劫跟日主相同的五行，叫得朋，得到朋友。丙日主，天干有丙丁，你得朋，它是扶日主的。这种扶法要知道比肩克财的啊！虽然它帮助你但会破财、妨妻的。
<p>祿就是临官，就是我刚才讲的有根，甲禄在寅、乙禄在卯，这个不也是比肩吗？怎么它不破财、不妨妻呢？因为它在地支，人家不知道，不知道就算没有。刃就是羊刃，神煞里边那个羊刃，在天干叫劫财，在地支叫羊刃，也是帮身的。最后有个正印，印生日主，都是扶身的。
<p>哪种扶法扶出来是不一样的，那正官格要日主强，刚才说只要有根，这是最标准的答案，如果你用比肩、劫财、羊刃来扶身，可以的，都要克财！就是正官格都要破财，那个正官格破财同普通人破财不一样，普通人破财是被骗掉了，正官格破财大概是交际应酬花掉了。那么你用印的话，官要生印，印现在补充的就是刚才讲日主要有根，再讲到比劫禄刃印，各位这一段听起来很文绉绉的、很学理化，整个命理学理论就是在这里。其他理论都是散的，只有这个格局理论成体系。读书人讲命理都是根据这个讲的。那么讲格局的不大谈六亲，谈六亲的不大讲格局，为什么两者不谈呢？这是身份问题，做大官的人，在清朝七品以上，那就是《三国演义》上讲的了，大丈夫何患无妻啊，谈什么妻子啊！一定有的嘛！哪怕没钱，那不是做官人谈的。那等到没办法做官的，就只好谈谈妻财子禄寿啦！夫妻合不合啊？有没有给人家倒掉钱啊？
<p>所以谈格局的不大谈六亲，这是身份问题。你真正算命，十个里面没一个是谈格局的。虽然估人类之少数，但我们一定要懂，不懂的话没有办法向上流社会算命，譬如我们对破财这两个字讲，谁都破财，还有一夫两妻好麻烦，那么你说我要竞选立法委员的，他不会怕破财的啦！这一定花钱的。所以品味不同，现在我们讲的是格局，清朝正统的两榜进士，他们那个命是用这个方式算的。</p>
`,
 BGXJ2CG:`<h1>八格喜忌(2)财格 </h1>
<p>刚才这一节讲的是正官，虽然有八种格局，原理都是举一反三的。现在讲的是财格。正财、偏财在六亲、在性格是有所不同的，但是在格局上那是一样的，都是属于顺用。也就是说：财是不可以反剋的。所谓反剋，就照十神定位讲的比劫剋财。
<p>所以财格，第一个最忌讳比劫。这要附带说明一下，普通的财星就十神定位的那个财，遇到比劫是破财，一旦成了财格遇到比劫，那就不是破财了，要破产了！那么这个财星，对男女关系讲不过分手，如果财格遇到比劫的话，那因男女关系同事业整个失败，所以格局牵连到人之一生。所以那个在六亲方面同格局方面是有所不同的。
<p>第二，正官怕官杀混杂，财格不怕正偏财混杂，因为是人之常情，因为人并不怕钱多，所以财格没有正偏财混杂这一条，最多财多身弱，赚钱多了，是非来了，有官非破财。那么财怕合，那你钱就变得不自由了，财格带合，他的钱都不在身上，在什么公司，在什么不动产，动都不能动。这叫财带合，财不自由。
<p>第三，财格怕冲。财带冲也等于破格，这种同正官格的比照方式完全一样，只要背得出十神生克，只要懂一个正官格，就通通懂了。
<p>第四，财格也要日主强。日主强，还是比劫禄刃印，但依照生克的观念就不同了，正官格你有比劫，是你只做官、没有钱，财格用比劫来扶身就不是了，正好破格，所以财格没有比劫来扶身的。羊刃也是一样，等同劫财，财格怕遇到羊刃，要破产的，晚年要败的。那么只能用禄。所以临官位对任何一种格局都能用，刚好。也就是甲禄在寅、乙禄在卯，命里面的强最喜欢的就是用禄。印呢？财克印了，印是清高了，那么财格带印的人，你就会沾上不清高这个味道，说得简单一点，譬如一个大学教授到补习班上课，当然无关要紧的啦！但听起来好像就没有教授那种清高。所以财格带印的人，失去一点清高的味道。那么一个财格，又不遇比劫，财也不合，也不冲，正好是临官，哪有那么巧啊！
<p>那遇到忌神怎么办呢？就要用神来救了，还是同正官格一样的，财格如果遇到比劫要用通关用神，比劫生食伤，食伤生财。食神、伤官是参与比劫中间的通关用神。各位再联想正官格，正官遇到伤官，用财通关。通关用神就是两个相克中间的那个十神。由它来相生，就不克了。如果没有这个通关用神呢，就用财生官杀，官杀克比劫，用官杀来克住比劫，这就是病药用神。
<p>那座财带合，同官带合一样，虽然不理想，倒不会惹出大祸，最多是没有钱，到银行去房子抵押一下，啰嗦一点。那么要日主强，只能用禄。这比劫禄刃印五种扶日主，按格局喜忌有所不同，性格上也有所不同。本来应该在十神定位讲，那时候怕各位刚听命理，不能听太复杂的。比肩、劫财扶身好像三夹板，格局要承受福气的，甲木在寅临官位，是块厚木板。你如果没有临官位，比劫来，是二十块三夹板，你当时上面摆个重东西是一样的，过了两三个月不动，三夹板会弯。厚木板不会弯！所以比劫扶身的人，没有长性，容易变，就是这个原因，它不是厚木板。
<p>用印扶身，借助人家力量，板又不厚，下边用棍子顶住。印是借人家的力量，不是你自己的力量，板子一拿走你就没有办法了。如果讲效果，当时效果是一样的，时间久了，就不同了。所以比劫扶身效果很短，禄的效果比较长，印的效果是借助人家的力量。这里顺便提醒大家比劫禄刃印不同之处。</p>
`,
 BGXJ3ZYG:`<h1>八格喜忌(3)正印格 </h1>
<p>那么财格过完了，就是正印格，正印格是生日主的，什么格局都要日主强，只有正印格不需要强。印就生你。那么印格怕什么呢？很早十神生克讲，财克印。那么财对男人讲，既是钱财又是女人，怎么可以没有财呢？对女人讲也一样的，钱财总是真的嘛！印格一带财它就克格局了，为了也有财、也不克格局，那么就还是用通关用神，财生官杀，官杀生印。所以印格八字一定要有官杀，我们看八字习惯性都是这样子的。
<p>首先看有没有官杀，没有官杀只是普通文人。一有官杀掌权的。这个钱呢，也因为你的地位拿的很合法，所以印一定要官杀。那么印怕合、怕冲，所有格局统统一样的，冲比合严重多了。唯独正印格没有怕日主弱这一条，印可以生日主的，那么比财官要简单多了。</p>
`,
 BGXJ4SSG:`<h1>八格喜忌(4)食神格 </h1>
<p>顺用的第四个格局是食神格。我在十神定位时讲过的，食神格与伤官格有相同之倾向，它自己是没用的，食伤要去生财，这是喜！单独食神格，如果没有财的，只是为人厚道。食神格不怕比劫克财，怕印克食神，因为它是顺用，食神遇到印就破格。食神所生的财，遇到比劫克财了，这个不怕。所以食神不怕比劫，只怕印来克它。这是食神格的喜忌同财官印就有一点点不一样。那么顺用的就这么四个。
<p>食神如果遇到印怎么办呢？还是通关，印生比劫，比劫生食伤，用比劫来通关。通关用神在命理上用的最多，讲和啊！两个相克，找个中间大家都认识的人来调停。
<p>顺用的是四个格局，逆用的也是四个格局，虽然讲的是逆用，实际上顺逆两用，逆用的格局比顺用的格局高。</p>
`,
 BGXJ5QSG:`<h1>八格喜忌(5)七殺格 </h1>
<p>最有名的第一个就是七杀格，所谓正官格同七杀格，七杀格比较好用，正官格是不能反克的，七杀格是克与不克都可以。那么谁克七杀呢？食神制杀！所以七杀格遇到食神，叫七杀有制。怎么叫顺用呢？杀生印，印生身。七杀格遇到印了，叫做杀印相生，有这种术语。在算命里面非常有名的，譬如伤官见官了，身杀两停了，食神制杀：朗朗上口。研究一两年的人，对这种句子都是熟悉的不得了。那么顺用就是杀印相生。
<p>那么还有一种，只有七杀格具备的，叫身杀两停。日主在临官位，七杀也在临官位。甲禄在寅、庚禄在申，身杀两停，刚好。身杀两停在格局里边算是比较短途的用途，贵而不久，大概有三几年好运，然后就没有了，但总比没有好！这叫身杀两停。
<p>七杀格第四种：羊刃驾杀。这个在讲官杀混杂的时候讲过了，七杀一定要日主的羊刃位，正官只要日主的临官位就可以了。七杀格总共只有四种用法：食神制杀逆用的，身杀两停均等，羊刃驾杀均等，杀印相生顺用。这四种随便哪一种都可以有平常人高一点的福禄。</p>
`,
 BGXJ6PYG:`<h1>八格喜忌(6)偏印格 </h1>
<p>七杀格逆用之外，就是偏印格了。偏印格在十神定位里面，性格方面都有具体的解释，偏印格属于逆用的，只有用偏财才可以。那么除此之外，都没有办法，逆用只要找到克它的就可以了。那么是不是同时要兼顾格局不带合、日主要强、格局不带冲，这是统统一样的，顺用、逆用八种格局一样的，不能冲，不能合，日主要强，统统包括在内。所以八种格局八种用法，我们认真归类起来讲呢，还是依据十神生克，不过把它分成可克与不可克两类而已！</p>
`,
 BGXJ7SGG:`<h1>八格喜忌(7)傷官格 </h1>
<p>那么伤官格是逆用的，伤官格同食神格连在一起的，食伤生财，两个都要的。食神不生财没有用，伤官不生财也没有用。但食神不能见印，见印就破格。伤官可以见印，因为它是逆用的。关于顺用、逆用，普通研究命理的人，甚至花费一两年时间，都还有点搞不清楚。那么各位根据我所讲的话，比照住这个十神生克表来对照，就明白它的原理。</p>
`,
 BGXJ8YRG:`<h1>八格喜忌(8)羊刃格 </h1>
<p>羊刃格是归于特别格。特别格有两种：羊刃格和建禄格。是根据统计，甲人生在寅月，临官位、身强叫建禄格。甲人生卯月，也是身强，叫羊刃格。甲木天干对这两个地支基本上都是身强，只要有财官就可以了，所以归类为羊刃格。既然羊刃格了，只要有七杀就是好命，用财格不行，羊刃克财，用官格你要超过官能承担的，用印格不需要，印是扶身的，不需要羊刃再来扶身。
<p>那么这个八个格，按照它道理讲，该顺则顺，该逆则逆，统统可以荣华富贵。顺用搞成逆用是贫贱，逆用搞成顺用一样是贫贱。那么总共只有八个格，各位想想看，人类就只有八种人类吗？不只啊，不只。这个八种格是基础。
<p>所以命理很难懂、很难学，它不会一个格一个格来，有时会两三个格一起出来的，就是调停它，最后一个到底是什么，这个调停法要专门讲。天透地藏取格，天干有地支也有。另外一种取法呢，三合三会取格，格跟局是分开的，天透地藏叫做格，三合三会叫做局，格局格局，局面大不大，格调高不高……。所谓局的格局，全部是逆用的，因为它人数够多，譬如甲见巳酉丑三会金局，就是三会七杀，那克我者为官杀，如果一旦是巳酉丑就做七杀格局，三合三会的格局是逆用的，没有顺用的。譬如庚见寅午戌，火克金也是七杀格。那么甲见申子辰三合水，水生木，是印格，也是偏印格。所以地支三合三会的格局全部归于逆用，所以沈孝瞻说的该顺则顺，该逆则逆，整本《子平真诠》讲的就是一格两格、三格交叉混合使用，完全是以格来用。
<p>这命理随着年代多少有一点变化，那么我们现在的命理受清代的影响最深，大致上我们中国人三百年礼乐就会改变，那么清代同明代的理论差别在哪里呢？格局顺逆是一样的，唯独清代加重了一条叫调候用神。调候用神就是以月令为主啊！清代认为你格局再好，包括财官印绶，最多只有一千万，一千万对一个普通的老百姓来讲，大概是一个成功的科长，一生拿了薪水没有乱用掉，退休之后拿到退休俸，没遇到什么倒债之类的事。
<p>如果你想要有一千万以上存款，那就要用调候用神了，要得天时啦！我们中国人讲小富由俭，大富由天。天在哪里啊？看不见。时机、机会，那么调候用神怎么选呢？用月令来选。我普通叫天，抬头看看天，什么都没有啊？我们能够感觉到的，感觉到什么叫天哪！人能感觉到了天，就春夏秋冬、白天、晚上了，这是我们知道的天。春夏秋冬就是月令了，那么调候用神呢，现在留存只有一般，就是夏天冬天，以及辰戌月三月、九月这很稳定的。那么你甲日生在夏天，你有癸水；甲日生在冬天，你有丁火，那你就得调候用神，那你就可以千万以上了。
<p>如果格局正好是你的调候，你的成功还是从事业成功来的，如果格局同调候不同，你的成功不是你这行业里来的。凡是生在辰月同戌月的，调候用神是甲。所以根据现在习惯性的讲算命，来宾一来，知道他是高等人，我就直接先看调候用神。如果普通人，我们就看格局。调候带到六亲，这个六亲一定帮你忙。譬如说女命庚日主生在冬天，用丙丁调候，丙丁正是她的先生，她的福气完全是从她先生那里来的。不管她发生什么事情，都由先生那边来的。那么调候用神、格局用神，我现在介绍的是一个大概，那么除了普通格以外，我们有几个特别格琅琅上口：建禄格、羊刃格，是归类的。
<p>另外还有几个特别格经常见到：三奇，就是天奇、地奇、人奇，我们遇到那种格都说他是好命，这种好命不是什么大成就，譬如射马爷是靠公主的，当然就是好命了嘛！也可以说不是自己努力的，这是见仁见智啊！
<p>第一种叫天奇，有公式的，天干有甲戊庚三个字在叫天奇。为什么凭这三个字就是好命呢？因为甲戊庚三个天干的天乙贵人都是丑未，所以力量就加重了。比普通个天乙贵人要高多了。譬如一个公务员在办公室里，他的好朋友老同事，打电话跟他讲，有件事请你帮忙啊！那就要帮忙了。一回到家里来，太太也讲了，某某人这件事一定要帮忙。两个人讲了。过一会，他老长官电话又来了，三个人交代了，就是三奇啊！贵人力量是三倍。而且更厉害的，三柱管四十五年，这个力量加重三倍，时效又长，这个人一辈子不会有问题的。这是天上三奇。
<p>第二种叫地奇，天干有乙丙丁这三个字。奇门遁甲也有三奇，也是乙丙丁，为什么这三个字是三奇呢？他们互相保护，乙辛冲、丙辛合，丙庚克、乙庚合，没有冲的啦！冲到一个字，另外一个字就把冲的字合走了，人生在世一辈子都不遇到冲，这就很幸运的啦！我们都是做事做到一半，遇到冲就受阻了，所以乙丙丁的优点就是根本没有冲刑，这叫地奇。
<p>第三种叫人奇，壬癸辛这三个字看似毫无关联，实则蕴含哲学思想。哲学讲天地冲刑皆为七位数字，冲必在第七位，就像我们唱歌只有1234567七个音阶，没有第八个音，这叫绝位！壬癸辛正是第七位之后的字。只要命盘中另一个字也在壬癸辛之列，此人便超脱劫数之外，纵使飞机失事也能幸免于难——因为所有劫数都限于七位数之内。若八字排盘出现庚及以上天干，则仍在劫数之中。这并非子平术，而是源自五行学说。
<p>诸位须知，自三皇五帝以来，帝王每年冬至必行祭天。何时祭天？冬至后第一个辛日。庚辛者，劫后余生也！五千年前祭天就需避开这七字，故壬癸辛被奉为三奇。真正精通命理者，识得此三奇格者凤毛麟角。这般好命格，非指坐拥数亿资产的大老板，而是指那些生活舒坦安稳、不求个人成就却实实在在福泽绵长之人，此乃真三奇。
<p>另一个呢，再介绍魁罡格，天罡地魁就是辰戌。那么就四天，庚辰、庚戌、壬辰、戊戌，出生在这四天的人叫魁罡格，它有个特色：四个魁罡性格又有所不同。庚辰、庚戌是金魁罡，非常公益、好管闲事，水魁罡有攻击性，会骂人打人，土魁罡闷闷的不讲话，四种魁罡，可以用四个字代表：通情达理，你坐在他前边，你眉毛一动，他都知道你想什么，但读书不一定聪明啊！他瞭解人性，通情达理，非常正义，在清朝这要做御史，监察官啊！但是魁罡怕一件事，就是怕冲。譬如庚辰、庚戌，一冲那就变成古人讲的：三教九流之士了，所以这几个特别格。
<p>那个女命入三奇格没关系，女命不宜入魁罡格，一入魁罡格，没有一个女的会有好婚姻，为什么道理呢？她讲话语句令人感到她完全看透你的心了，会令男人感到怕。所以女命魁罡做事业相当好。魁罡不能冲，魁罡有个条件，要日主带住，比如日主庚戌，那就是魁罡，月上是庚辰是双魁罡，年时再带，三四个魁罡都可以，但第一个条件必须日主先是魁罡。从前人家魁罡不能吃牛肉啊，这我没意见啊！这是地方民俗风化，反正魁罡不能冲，一冲的话，好管闲事给自己惹很多麻烦出来。女命千万不能是魁罡。
<p>这几个是特别格，统计出来的特别格，另外还有两种是特别格，不是统计的啦！我只说大概，就清一色，都是木、统统是木，没第二种，全木局。火全部是火了，全火局。那全木局是不是可以带一种别的五行？水木，水能生木，好像也是一种，看起来是两种，这是从格。有时真从，有时假从。从格比较不容易看的清楚，但是从格在算命里边并不列入主流，因为格局方面有此一说，算命讲究荣华富贵的，八字五行的理论基本是两条原则，不可太清，也不可太混，太清则无鱼。所以命书讲，甲曲直、丙炎上，纯木局、纯火局，官高克妻而不富。太清了。你八字冲刑太重了，就太混了。太混同太清，五行都不喜欢。那么中间有点毛病又不太严重，靠用神、格局、生克制化把它搞平均了，就是好命。
<p>今天讲了八个格局的用法规则，但是仅知道这八个格的人，通常不会算命的，什么道理呢，只能谈命高低，是不是好命？那么论命的人只要听到好命就可以的吗？不是，头一个，百分之七十的人都不是好命，普通人多，高命的人就很少。第二个，一个好命你不讲细节？就算不讲细节吧，好到什么时候止啊？
<p>你讲不出来。这个要带上流年，带上流年那就复杂啦！那么现在同以前全部所讲的都是八字的基础，一定要懂的，统统懂了、或者能背了，那就是看八字之开始。
<p>开始就从同样一个八字中的财、子、禄、寿等细节逐一讲解。首先从八字本身入手，分析五行是否齐全，再分别讨论妻、财、子、禄、寿这五项内容。接着根据你的大运走势，详细分析六步大运每一步的情况。或者以你三十、四十年的流年为例，指出哪些年份存在三刑、六冲、三合等关系，又有哪些年份既无冲也无合，将这些情况分类整理出来，就能形成一本完整的命书。大家都知道有"大流年"或"细批终身"这样的批命方式！不过普通人算命不需要那么详尽，看一两年流年就足够了。所有详细的推算规则都是基于之前讲解过的所有原理，如果各位不能熟练掌握十神生克、刑冲合会等基础知识，推算起来会很吃力。虽然道理能听懂，但真正要算起来就困难了。</p>
`,
 BGXJ:`<h1>八格喜忌 </h1>
<p>那么现在这一节讲的是格局。格局就是我们以前讲的取格再连下去。以前只是讲天透地藏取什么格，三合三会是什么格，这是讲格局怎么取，并没有讲格局的内容。每个人似乎都有格局，什么格局都可以令人荣华富贵，什么格局都可以没有用。我举个例子，一个人成功不是问你在学校读什么系，你是工商系照样失败，读法律系也可以成功，读的系跟你成功不相干。
<p>什么格取出来，是取的方法，你也正官格，他也正官格，两个人差得天同地啊！所以，格局能成功有它的规则，正官格怎么用法，七杀格怎么用法，你用对了什么格都可以成功，你用错了什么格都可以失败。就像我们讲笑话的，男怕选错行，女怕嫁错郎。那就是你格局不照规则上来就不会成功，譬如说我们讲正官格好了，单单讲正官格，不谈吉凶祸福，它代表这个人性格很温和、很端正、用钱很节省、也不骄，这种品德还是可以的，但这个同成功一点关系都没有。正官格做公务员也很好，公务员也可以一辈子坐写字台，也可以升到处长、厅长，你要他命好坏，那就要区别的。
<p>格局在沈孝瞻《子平真诠》里一共分成八个格：正官格、七杀格、食神格、正印格、偏印格、财格、伤官格，八个格有八个格的用法，八个格里面又分为顺用、逆用两种。所谓顺用，不可以克的，就是正官格不可以见伤官。逆用的七杀格反而需要克，需要食神制。这是一个基本的组合，听格局啊要有耐心，一般人所谓懂命理不懂命理就是你讲得清、讲不清格局的用法。你如果讲得清，八个格局顺用、逆用，大家都认为你懂命理，你说不清楚，就是你没下过功夫，包括我在现在这一节，以前所讲的全部在内，只是常识不是命理，命是讲道理的有个系统的。
<p>首先我讲了格局两个字在五行上的关联，就日主以外的五行，日主没有格的，日主是比肩、劫财、三合三会。大多数意见了，我是主席，我开会嘛！我听谁的？听大家的意见，所以日主同格局要配好。那么在没有讲吉凶之前，一个做主席的日主，八字之主，我一定要有能力，我能够做得了主，我同你配合，不会到我完全不能配合。
<p>所以算命讲究的日主要强，这个强，强到什么程度呢？要同格局成正此。那么在研究命理的人同普通人讲，解释身强为志气。这个强字，也就是我们背熟的东方甲乙寅卯木，甲乙日主有寅卯就有自己的根了，天干在地支叫做根，日主有根，你就有自己的立场，如果没有根，就没有自己的立场了。做一个主席，固然是要尊重每一个人的意见，但他不是通融通融你们的，最后的决定权在他的。所以身强可以托财官，身弱不能托财官。
<p>随便你什么格，财官印，如果日主无根，在人性上讲没有什么立场，从福气上讲，根本就不想什么。那么我退一步讲，不想什么不也挺好吗？那不就太太平平就没事了嘛！但是在清朝，文人社会不是这样讲的，从小就立志要中进士，要考取什么、什么官啊！也就是我们听人家讲笑话了，不管是真是假，这个人说两千万算得了什么！不管他真有、还是没有，他讲得出这种话，是身强啊！有人讲，我一日三餐，一个月给我五万块就够了，这就身弱了。
<p>至于身强、身弱是好是坏不能单独讲，就你所开的价，同你客观条件刚刚好就可以了。客观条件就是格局，日主在临官位，格局也在临官位，那么这个人谈的理想以及愿望，同你客观环境差不多的，如果格局位很高，日主没有根，那么这个人不会争。我见过很多了，上面叫他升，他都不爱、不要，嫌烦啊！得罪人干什么！就是所谓身弱不能托财官，身强可以托财官。讲的话不是宗教的话，是讲人情上的话。那么一般性的都要求身强，说的简单一点，要求日主要有根，天干有甲、地支要有甲。是最起码的条件，那么有了根不见得好命，格局有格局的用法。</p>
`,
 JSWS:`<h1>劫煞、亡神 </h1>
<p>劫煞同亡神这两个结盟，外行人看看就感觉到不对头了，都是坏事。什么叫劫煞，在劫难逃了。不是冤家不对头，这就是在劫难逃。不是你犯的错误，莫名其妙撞上那种很不理想的事情。劫煞重者可坐牢，轻的话不过是是是非非的问题。在子平里没有算人家坐牢这一条的，只有说你有官非什么什么的。
<p>亡神指的是这个人迷迷糊糊，举个例子，他做股票的，还没到交易所之前，他准备是买国泰，结果到了交易所，听几个人讲，马上买别的了。没有主见，三个人一说就变了，本来想出去做件事，路上遇到朋友一拉，去看电影了。老是发生那种迷迷糊糊的事。亡神就是忘掉你自己，本来是在讲什么。所以在算命神煞里边是最不理想的就是亡神、劫煞，有想不到的意外灾难出来。那么在年限上呢，还是老规矩，年是一到十五岁，最怕时柱，年纪越大闯祸越多，尤其做官很怕这个东西。我认识一些做官的，部下出个纰漏，他就跟着垮台，同他一点关系都没有，祸起萧墙，那真是在劫难逃啊！</p>

 JC:`<h1>劫财 </h1>
<p>现在我们讲第二个十神，叫做劫财。比肩、劫财都是与日主相同的，甲见甲为比肩，甲见乙为劫财，差别就在于阴性、阳性，同性是比肩，异性是劫财。甲丙戊庚壬为阳，乙丁己辛癸为阴。一听比肩、劫财这两个词啊！不就是要破财了吗？因为比劫都是克财的。但实际上完全不一样！所以我们只要一看你的八字，就知道你的个性，甚至会影响我跟你说话的态度。 如果你是带比肩的，我随便怎么讲都没有关系，譬如说到他很差劲啊！他也一笑了之，不会计较的。带劫财的就完全不一样。劫财在地支叫羊刃，这个留在以后格局时说，在地支为羊刃，在天干为劫财。那么两个都是克财，为什么完全不一样呢？因为五行性不同，比肩的特色是同性，同性怎么样呢？相斥啊！异性怎么样啊？大家都懂的，异性相吸了。那么他同谁吸呢？带比肩的人讨厌自己，带劫财的人喜欢自己！那是怎么喜欢法呢？也就是我刚才讲的，命带比肩的人不管做什么事，他会首先想到是不是我自己搞错了，那么我昨天这样讲话是不是不对啊！
<p>带劫财的相反，他跟任何人相处，除非你拿出证据来，一切都是我对！他绝对不会怀疑自己不对，它阴阳五行的力量在保护自己。包括昨天决定的事情，坚持到底。这个态度啊！除阴阳相吸。他与人相处，明明是男人，也像小姐初次见到客人一样，客气中间有戒心，随时都在防你来干什么。你今天来是什么意思啊？他就有那种性格出来了。他遇到一般性没有厉害关系的时候，他像个小姐处在男士的社会之中，对每个人都客气，敏感得很。
<p>这种人各位大概也有见过，十种神煞，十种性格。以哪种性格就决定了你这个人的吉凶祸福，所以我给带劫财的人和带比肩的人算命时，讲话的态度完全不一样。给带比肩的人算命我畅所欲言，给带劫财的人算命就不是这样了。也有很多人，现在我不会遇到这种事了，以前有过！因为我讲错话了，人家就说：“怎么啦？我只是参考一下而已啦！我也不是很信命啦！”就是这种人，他对什么事都怀有这种怀疑之心。那么刚才说得太抽象了，具体论命要实实在在讲出人家实际人生方面的事情。劫财在《子平基础概要》这本书里（一二四页，第十三版），列有九条特别的性格。 第一条，谦虚之中带有傲气，是有架子的啊！说话很客气，会说“请坐”“喝茶”。带比肩的绝对不会这样啊！会嘻嘻哈哈的，把你当作自己人。谦虚之中带着骄气，这骄气就是看不起你啊！有距离感！
<p>第二条，情理分开。譬如说有个朋友拿了张名片来给你，那名片上也是你的朋友，他某某人介绍我来。如果是带比肩的拿了这个名片啊，就好像真的他的朋友来了，马上请坐喝茶、嘻嘻哈哈的。带劫财你不是的，喔！我知道了，他就问你了：有什么事啊？事情对头，朋友交情在。一听不对头，这张名片你白拿了。
<p>第三条、先关注细节，再考虑全局。比如说有个朋友来找你，说想请你投资一起做个生意，当事人对这位朋友是信任的，不会怀疑对方是来骗自己的。但他还是会先问：“需要投资多少钱？”对方回答：“三百万。”然后他会问：“我出三百万能赚多少钱？”要是你说能赚一百万，那他可能会听听具体细节。要是你说不一定，赚得多大家就多赚，赚得少大家就少赚，那他就不会继续谈了，他一定要先确保自己能赚钱，才会去听细节，不会说先试试看。他投资就是为了赚钱，你不能帮他赚钱，那投资还有什么意义呢？这就是这种人的特点，这样的人生观。
<p>第四条、不尚空谈。譬如我给你买东西，便宜点啊！以后我多介绍客人给你。这话对他讲没有用的，空谈没用。我发了财，谢谢你啊！这种话对他一点用都没有的。不尚空谈。
<p>第五条、坚持到底。什么叫坚持到底呢？我当初对你怎么讲的，就怎么样。我想起一件事情，报纸上登的，一个太太请了木匠来修门，修到后来木匠把屋主太太一斧头劈死了。听起来不通啊，其实就是这样的。屋主太太叫你修门要修到怎么样，木匠也答应了，结果怎么样都修不到她的理想，她就不给钱啊！当初说的是，不是修成这个样子嘛！这会惹大祸的。当初怎么样讲就是怎么样。我也见过我学生的女儿，帖子都发出去了，到结婚那天她取消了。你答应我这件事，你没做啊！那普通人说，等结了婚以后再办嘛！她不行，哎呀！那个没错，其实发帖子她不来。所以带劫财的有这种现象。
<p>第六条，有理想，但缺乏协调性。譬如我们三个人合作开个餐厅，到半路上，他们说好像我们大家每人再加一点钱增资吗！结果他不干了。这不是钱的问题，当初我们怎么讲的嘛！他没有协调性，斤斤计较小事。那么如果你的朋友来吃饭，算便宜点一次可以，第二次他就讲话了，谁都一样。所以这个没有协调性，就是这个道理。
<p>第七条，随时改变立场。有一种相反的情况出现时，他可以突然改变自己的主意。例如我和你还有另外一个人一起商量，每人拿出一千万合作做生意，大家都谈好了，对方回去抵押房子，但还没签字。那个带有劫财的人回来后说他不干了。这也没错！只要在没签字之前，他随时可以反悔。你把房子抵押了之类的，那是你的事，他有自己的决定权。
<p>第八条，尊重现实，不怕别人说闲话。我们都怕别人在背后指指点点，心里不舒服，可他不怕。就是好坏我自己做主，你爱怎么说就怎么说，你说你的，他就当没事儿。
<p>第九条：不留情面。这类人的性格特点是——在他们认为重要的事情上，不会顾及他人的面子。所谓“重大之事”，并不一定是天大的事，只要在他心里觉得重要，他就会不留情面地表达自己的意见，哪怕在第三者面前也毫不顾忌。比如我见过一个人，借钱给别人，约定好什么时候去要回。到了那天，对方说“现在没有，改天吧”。这种事本来很常见，可这个人当场破口大骂，说“我当初借钱给你是瞎了眼了”等等，完全不顾对方面子，尤其是还有人在场时。这种性格也会反映在夫妻相处中。吵架时，他可能会把过往的旧事一股脑翻出来，毫不保留，最终很可能引发出人意料的灾祸。劫财在这一点上也有非常负面的影响，对当事人是十分不利的。
<p>这九条性格特点，足以决定一个人一辈子的生活方式。我相信，我只需讲两条，你也见过带比肩的人，也见过带劫财的人。比肩破财是零零散散地破，比如他身上有一千块，我向他借五百块，他会借，即便自己没钱也会去借来给我。但要是和他谈正事，比如凑两百万来投资做生意，他就不干了，他担心万一赔了怎么办。而带劫财的人就不同，他敢把房子抵押出去做一笔生意，他坚信一定会赚钱。刚才说的这九条，乍一听让人心里不太舒服，对吧？其实这个人本质是个好人，是绝佳的下属，却是糟糕的老板。要是你和他共事，那可就惨了，打卡晚两分钟他都会骂你。你让他管人，他六亲不认，能把人管得服服帖帖。而且他并不违法，一切都按规矩来。这么说来，是不是觉得和这种人交朋友很难呢？因为他太较真了。总之，劫财之人的个性就有这九条特点。
<p>那么我刚才讲的，比肩和劫财的重点主要体现在性格、钱财以及夫妻关系方面。这是普通的算命说法。要是进行更深入的算命呢？比肩、劫财的重点就不在这些方面了。比如说，我们害怕破财，领薪水的人害怕破财，害怕离婚，这是普通人的情况。对照古代的读书人来说，大丈夫何患无妻，书中自有黄金屋，书中自有颜如玉。所以比肩、劫财的缺点对于他们而言是完全不存在的，换五六个妻子，破几亿的财，都不算什么。而比肩、劫财对于上流社会的说法就不一样了。比肩、劫财与日主属于同一种五行，比肩、劫财是帮身的，和日主相同，这就是扶身，身指的就是日主，也就是我们所说的身强。
<p>古人书生论命时所关心的是有没有前途，能不能中进士。这个条件与破财、克妻是不相干的。所以带有比肩、劫财表示身强、心高，就是心气很高。要知道一个八字里只有八个字，与日主五行相同的不只是一个字。所以会有倾向，就是“我要怎么样”。各位也经常听到很多人说“我想怎么样”，但能不能做到就是另外一回事了。那么有些人根本就不想怎么样，从来没想过，没志气，倒也平平安安。所以比肩、劫财在人生观、前途方面来说是有理想的，但不一定能成功。没有比肩、劫财，也就是没有与日主相同五行的人则平平淡淡，也就是我们所说的平安就是福。那么到底谁好谁不好呢？这就要以论命者所关注的问题来衡量了。
<p>比如说八字没有劫财的人，包括地支也没有，那在职业论命范畴就对他说：你给别人做事比自己当老板好。他也不想自己去做老板，也不想操那份心。所以论命的范围是很宽的，以后会越讲越多。现在比肩、劫财所讲的范围，就是他个人的性格，不是前途，以及对钱财和女人。
<p>那么比肩是克财的，劫财也是克财的。但是这两种的克法就完全不一样。比肩是不计较的，那么比如说，带比肩的人离婚，和带劫财的人离婚，看法完全不同。带比肩的人，如果他离婚啊，他不会骂人家的，甚至于他会怎么讲：你嫁给我本来就是错误的。那个劫财的想法正好相反，我娶了你才是倒霉哪！那个一进一出，这观点不一样。那么离婚，总会谈到钱的是不是？带比肩的男的离婚，有多少拿多少，统统给你算了。
<p>带劫财的可不是这样啊，那可是要讨价还价、斤斤计较的。比如说，男方有几亿身家，他可能只给你三百万。他会斤斤计较，离婚的方式和人生观都不一样。那么，带劫财的人是心气高的人。那么再看是在哪一柱，如果是月柱劫财，男性命主会破财又克妻。如果日主坐劫财呢？那么这种情况的解释要以人之常情来衡量，都三十一到四十五岁了，大概也有妻子了，谈离婚哪有那么简单？也就是我们所看到的——不离婚了，两个人却像仇人一样。
<p>时下劫财和比肩差不多，五六十岁以后，很少谈及夫妻之事，我只是让他不要胡乱投资。那么在这里呢！破财也分人情方面，我只让他不要胡乱投资，他会不会破财呢？一样会破财，钱被太太拿走了，被儿女拿走了，这是他自己的情况。那么这说的就是比肩和劫财在破财方面相同与不同的地方。至于夫妻之间的情况，那就相差太远了。比肩的人肯先承认自己不对，认为我的钱就是你的钱，不过是放在我这里或者放在你那里罢了！太太把他的钱花光了，他觉得无所谓，就好比是自己花掉了一样。
<p>那劫财就不一样了，带劫财的在夫妻之间的这种关联跟比肩的完全不一样。是一种在没有法律共识的情况下，你的是你的，我的是我的。比如说我们都看到社会上有很多这样的人，先生把钱交给太太，当然不是两三万，而是一百万、五百万啦！这太太怎么说呢？这五百万是我的了，你给我没错，现在是我的。你要我拿出来的时候，是我拿出来的，不是你的钱。她有那种区分！第二种就扯不清了。比如说房子的首期款是太太付的，每个月的贷款是先生出的，那么这个房子是谁的？还有第三种，这个女人对先生有一种先天的看法，她认为怎样，先生的意见都不如她。
<p>我也时常听到女人说：“要是听我的话，早就发财了。他就是不听我的。”一种看不起丈夫的态度明显地流露出来。有时候，有位太太请我去看阳宅，我就问她：“要不要问问你先生呀？”她说：“不用管他啦！”那股看不起丈夫的意味很浓了。这还不算，她自己决定一件事，明明丈夫肯定会反对，可她还是要那么做。我亲眼见过有太太把房子抵押出去做生意，她丈夫根本不知情！所以，夫妻之间相处，劫财和比肩的情况相差太远了。
<p>那么还有劫财之人的这种性格——不能输。第一句话，你前面讲的第一句一定得是好话，后面坏话你可以尽管讲。要是你第一句话讲了坏话，他会讲话讽刺你。我以前年轻的时候不懂事，就会那么直截了当地去讲，结果他反问我，我的命就那么差吗？这就搞得大家气氛很糟糕。因为带有劫财命格的女人挑选男人，不是钱的问题，她要从心底里佩服你，以她那么高的眼光，她所佩服的男人当然是有的！但这种男人都已经结婚了嘛！她宁可做小三，也不愿意跟一个和她差不多的人在一起，她不肯与之匹配。有时候小姐相亲回来，我就问她：这次怎么样啊？她怎么回答呢？哼！一个小男生。其实人家并不是小男生啊！她把人家看成小男生了。相反，如果那种好男人找不到，她还是要结婚的。她宁可找比她小的，说我照顾他也可以，变得走向两个极端了，太太成了总经理，先生到厂里做事去了。
<p>那么最后一条，这种人呢敢爱敢恨。譬如一般夫妻离了婚了，还是留个面子的。他不是啊！只要提到这个人什么好话、坏话都讲得出来。所以，谈劫财同比肩，破财之本身是相同的，细节就大为不同。那么我们在算命的时候，不管她怎么怎么样的八字，我们都站在她的立场，来为她服务的。像这种八字我们怎么建议呢？当然讲好听话，你有帮夫运。那是不错！
<p>这种八字我们除了谈理论之外，只谈理论是没法算命的。就像我刚才那几句话，你照本宣科念给人家听，人家可不爱听！得重新包装一下。比如说，你是有帮夫运的，但有几件事要注意，就是下面写的：劫财重的人，第一件事就建议他，宁可自己当老板，千万别跟人合作。为啥呢？你有当老板的命。这是客气说法啦！就他那性格，能跟谁合作呀！根本合作不下去嘛！所以，凡是合作的事都是有始无终。要是他跟我说，他跟朋友合开了家公司，照我看最多三年，这不是算出来的，是根据他的性格判断的。所以说绝对不能合作，摆地摊也得自己摆。这对他来说是最好的建议！
<p>夫妻之间，我们都建议他各自保有各自的财产，不要合在一起。劫财这个性格就有这种情形。那么劫财也是一样啊，劫财在年破家裹财，在时破妻。那么唯独不同，破的方式不一样。比肩是好像一棵树缓缓倒的。劫财像地震倒房子，一下子就倒。所以差别就在此。那么带比肩的肯认输，带劫财的不认输。大家都体会到了吧！所以一共只有十个，你把十种就都知道了，这个人的轮廓就画出来有六成。但是不能谈细节，不能谈流年，总数以十五年分，在年谈十五岁，在月谈三十岁。所以八字里带比肩、劫财的，好的事情很少，坏的事情多。尤其对夫妻，最怕年月带上这两个字，那么这一段就讲到这里为止。</p>

 SSDW:`<h1>十神定位 </h1>
<p>今天所讲的命理叫做子平法，子平是一位叫做徐子平的人，对一般人而言就是排八字。子平法的内容分作三个范围：第一个范围是业余的有兴趣买本书看看，那么他会看书知道理论，但是他不太会替人家谈吉凶祸福。这个过程大概是两三个月，有这个标准的人是非常多的。那么过了这个阶段之后，人家问他什么事情，他答复人家，就进入第二个阶段，也就是第二个范围。区别是收钱不收钱，专业是论件收费的。业余的朋友问问，不过比较简单一些。那么今天我们这一段讲的范围是属于实务，就是真正要谈吉凶祸福，属于第三个范围。
<p>那么什么叫做命理的范围呢？它有个定义，算命到底要管多少事情，它管五件事情，叫做妻财子禄寿。妻，就是夫妻，你的婚姻怎么样？财就是钱财，会不会发财呢？子是几个小孩？如果专业的话还分下去，什么时候生几男几女？禄就是做官，寿就是寿命。这五件事情都是人所关心的。但对我们论命来讲是大不同，因为人生不是十全十美的，单单讲妻来说，有没有太太，那算是妻，那夫妻合不合得来？会不会离婚？那是细节问题了。财也是一样，一万块也是钱，一百块也是钱，一个亿也是钱，那到底多少？这就是细节问题了。可密可细。
<p>妻财子禄寿是法定的五项规定，但它并没有讲怎么样去得到答案，把答案求出来就要排八字。八字大家都知道八个字：年月日时，那么要用一个人的生命来算，人出生的时间，怎么会同人的一生有关系呢？就好比我们一个工具的模子，你压下去，什么力量就产生出什么样的形状。那你一出生的年月日时，受金木水火土五颗星的角度来决定你的磁场，然后每天还在转的，这就是流年。所以第一个规则就是根据你的出生年月日时来排出八字，就是甲乙丙丁等等，这里没有吉凶祸福，只是个符号。那么接下来呢，这个年月日时就按照我们这样一分就分开了。年柱管一到十五岁，比如甲子年。月柱也是两个字，管十六到三十岁，每一柱管十五年。日主管三十一到四十五岁，时柱就是四十六岁到寿终没有期限。
<p>那么四柱排出来，你谈妻财子禄寿，就要在四柱中区分。我们比较不重视年柱，一到十五岁，你家里再有钱，也就是坐轿车去上学；你再苦，也就是走路去上学，这对本人没什么大影响。所以年柱一到十五岁完全指的是你的祖上。祖上虽然值得一提，但不是我们算命的主题，只能顺带说一句：你是书香门第。人生真正开始，是从月柱开始。那么要区分时代，现在这种算命的方式，和七十年以前的算命方式是不一样的，为什么不一样呢？清朝有科举，有人一天就可以中进士，现在没有了。所以在古代，月柱非常重要，既然说到科举，那当然是越早中越好嘛！日柱对应三十到四十五岁，所以人生最重要的就是日柱！
<p>所以算命的四个柱、八个字，是以日主为标准，比如说你生在甲子日，你这个命就属木，甲为木，一切刑冲合会都以日干为标准。所以孔子说：男三十而立。时柱代表晚年。那你说四柱哪一柱重要呢？这不是我们来决定的，由来宾来决定。来宾年纪已经超过五十岁了，当然时柱重要。如果是父母为孩子问的，当然月柱为先。所以是为来宾服务的。这是从时间上而言的，并没有谈到吉凶祸福。那么吉凶祸福的产生，有几种推算的方式： 第一种算命方式讲刑冲合会，大家都听说过子午冲、卯酉冲、金克木……等等，那么在初级班刚开始研究的时候，光背那些刑冲合会的三刑、六冲、三合，会背却不会用，到了实务班时，刑冲合会就带上了时间、六亲、性格，那就可以开始谈八字了。假定一个人，今年是辛卯年，如果是八月出生的，那就卯酉冲，那就冲到年柱了，就是说这个人幼年有很多麻烦事，就算你出生在好的家庭，也有问题，一到三十岁。如果假定是个女命，一到三十岁，钱财倒可以慢慢谈了，第一件事情最明显的是结婚最好超过三十岁，所以我们建议她最好不要早婚，原因就在此。
<p>所以冲刑在年柱和月柱，管一到三十岁。再比如为人家起名字，这个小孩子将来会不会荣华富贵倒不是最要紧的，首先不要年柱和月柱对冲，至少他三十岁之前能够顺利过日子。如果月柱和月柱对冲的话，那对人生来讲是最麻烦的一件事情。譬如卯酉冲、子午冲，月柱和日柱对冲，这个十六岁到四十五岁，是人生最好的年龄，四十五岁如果你带冲刑的话，它所管的范围，当然是非常多的。最明显的一件事情是什么呢？就是我们讲的贫贱夫妻百事哀。如果你钱不顺、事业也不顺，头一件反映出来的就是家里不和了。
<p>在我一生中所见过的八字，只要日月对冲的，没有一个是能够一夫一妻走到最后的。日时对冲是到了晚年，对于这类人，我们就建议他要早点退休。很多人问我们，你看我五十岁要不要退休啊？那就取决于你的日时了。如果时柱好的，就劝他不要退休，还要继续做事。如果对冲的话，我就劝他退休以后不要再做事。这算命只有一种纲领，并没有细节，并没有把妻财子禄带入进去，这叫刑冲合会。
<p>你命带合的人，人缘当然好，人缘好不好并不代表你有多大本事，不过是代表你朋友多一点，熟人多一点而已。那么在刑冲合会所有神煞之中，男命和女命的算法是不一样的，结构差异很大。如果命带合，人缘好。女命则恰恰相反，她最怕人缘好。除非她是电影明星、歌星，需要大家来捧场。如果家庭主妇八字显示人缘好的话，恐怕她就要出去工作了，还一定要兼任社会职务。这说的是第一种刑冲合会的算命情况。
<p>第二种算命方式讲神煞，不知道你们有没有听过这个词。要是没听过“神煞”这两个字，那我讲几个词你们肯定知道，就是桃花、驿马、贵人。大家平日里总挂在嘴边说：这个人命带桃花、这个人命带贵人，这是一种特征。有的人一辈子都没人帮忙，有的人到处都有人帮忙，这种特征并不能决定你的吉凶祸福，仅仅是一种现象而已。比如命带桃花，可能让你人财两得，但也可能人财两失。要是你命带驿马，命好的人可以坐飞机去国外游玩，要是命不好，你的驿马就是送披萨，累得够呛。贵人也是如此，送你一万块的是贵人，送你一栋豪宅的也是贵人，所以在普通算命中，神煞要和刑冲联系起来看。如果桃花带冲，在那个时间段内，不管你和谁在一起，都会倒霉。所以我们排出八字后，先看冲刑，再看神煞，这里面并不涉及荣华富贵，只是讲述你生活的形态。
<p>第三种算命方式讲性格。那么神煞过了之后，就讲你性格了。这个人的性格很重要，这个人性格急躁，这个人有机会也不敢去闯，有些人借了钱敢去做股票，这就是他的性格。那么时间、神煞、性格，这些是我们必须全盘掌握的。但是真正到了实务论命也未必都用得到。人家所问的通常是他关心的事情。譬如说来实问我：今年想到大陆投资，你看好不好？这不是好命、坏命的问题啊，这是问一件事情啊！这个问事啊！一种是随便问问，还有一种是专题问，这个专题问就恐怕连实务论命都不大能办得到，要专业论命才办得到。什么叫做专题论命呢？你看我有没有儿子？这个问题就大了，不是有钱、没有钱的问题了。假如一个小姐她离婚、离了三次，她自己都怕，我到底还有没有婚姻？这个同性格、钱财统统都没有关系，只是针对一个人来的。那么你把这个几条统统搞清楚了，当然是最好的了。
<p>还有一种，也是针对中产阶级的情况。这里有个二选一的问题，你是要爱情，还是要钱？你只能选其一，其他的就先不讨论了。说的就是那种有钱但没结婚的女人，或者有好几个太太、虽然有钱但家务事却一团糟的情况，这也是我们在实际命理论断中的一种情形。
<p>另外还有一种人，曾经遭遇大灾大难，后来却发达了。我们算命常说的“三光”，即刀光、血光、剑光，他们都经历过，但后来拥有了数亿资产。那么，实务论命针对的这三种人，不包括总统、不包括立法委员、也不包括每小时收费一百块的人，不涵盖这些群体。这就是我们所说的论命内容。为什么要这样界定呢？因为大家的情况各不相同。比如说破财，几乎没有人不怕，但你去问立法委员怕不怕破财，他才不怕呢！他只怕选不上，破财算得了什么！这就是人与人之间的差异。再比如有钱人和穷人，对生命的看法就不一样。穷人会说“死得穷不得”，而有钱人则不同，他们觉得钱算什么，命才是第一位的。这种情况就不属于实务论命的范畴。我先给大家说明一下这个范围，所以研究实务论命是针对普通大众而言的。
<p>那么这个讲的是范围了，这是沙拉油，这是酱油，但它不是荣啊！我把一个八字给你，你还是不会算啊！为什么先讲这些呢？我怕你弄错了对象，你乱算是不行的。譬如我刚才讲的实务论命，有人问你：我明天打官司会不会坐牢？这就办不到了。譬如我问你：人家欠我钱倒债，要得回来要不回来，这就不好办了。这是属于另外一个范围，那么现在呢，我们把题目转回来，真正的实务。
<p>想做官的人不一定有官可以做，但是六亲、妻财子禄寿，每个人都有的。那么一个八字，在初学时大家都知道算命讲天干、地支、讲五行生克、甲庚冲、乙辛冲，都会背，但其中并没有吉凶祸福。所以实际算命中，金木水火土反而变得没有用。另外一种组合法，以日柱五行做标准，譬如甲子日，属木，另外七个字呢，三个天干、四个地支都有五行的，五行和五行之间就有克出、克入，克出、克入不是冲刑，冲刑是两柱之间在一起产生出冲刑的，日柱对四柱里面天干、地支，每个冲刑、冲克之间产生出一种另外一种符号，这在《子平基础概要》的表上讲得很清楚，就是十神。
<p>它本身没有吉凶祸福，而是与其他事物存在关联。这里便衍生出亲属关系，第一种与“我”相关的叫做比肩、劫财，“同我”指的是五行相同，也就是你的兄弟。所以我们在算命时，判断有没有兄弟、能不能得到帮助，就看“同我”这一项。第二种是“我生”，例如木生火，这本身并没有什么吉凶含义，但换个说法，“我生者”被称为食神、伤官。对于女性命局来说，食神、伤官就代表小孩。如果一个女性的八字排出来，日主为木，而四柱中没有火，那就表示她没有孩子，是按照这样的方式来判断的。第三种是“我克”，比如木克土，“我克者”为财，财就是钱财。在算命里，妻财处于同一宫位，算女人和算钱财用的是同一条公式，听起来很现实，大概事实也是如此，你有钱，遇到女人的机会就会多一些。
<p>财分为正财、偏财，正财代表妻子，偏财代表妾室，我们现在说就是小三；偏财也代表父亲。第四种是克我，比如木遇到金，克我者为官杀，分为正官、七杀，对于女性命局来说，这一点非常重要，正官、七杀就是你的丈夫。女性命局中没有财没关系，婚姻对于女性来说是最重要的，所以女性命局最怕四柱中没有官杀，那样一辈子都不会有婚姻。第五种是生我者为印绶，母亲生我，正印代表母亲，偏印代表继母。这样比肩、劫财、食神、伤官、印绶、财官出现之后，六亲的代表就明确了。这才刚刚开始算命，还不是谈你的荣华富贵，而是谈你的亲属关系。从五行生克，再转变到十神生克，就是算命的开始，如果你只会背诵子午冲、卯酉冲、金生水、水生木，那是不行的。
<p>那么在转变到十神生克呢？就是比劫生食伤、食伤生财、财生官杀、官杀生印、印生比劫。这是实务论命里面的十神生克。那么八字排出来，就有那个十神生克它的数，那么对普通算命者来说，六亲第一，表象第二。各位不知道有没有发觉到，有些人很有钱，但你看不出来，有些人你看他手头很紧，但他很有钱。这个区别就是看财官。在天干的，人家能看出来。在地支的，人家看不出来。这就是区别。如果天干地支都有，在算命里边叫做天透地藏，里里外外都有，这就是第一步所介绍出来的。听懂这个，第二步功夫就是比劫克财、比劫生食伤等十神生克之后，还分轻重，就是你有了财了，那到底有多少？你讲不出多少，不行的。是多、是少，是讲轻重，轻重需要依据那个《子平基础概要》里的十二生旺库，最旺的是临官，最差的是绝。就是我们讲的绝命的绝。就等于我们吃一碗饭，很大碗也是一碗饭，很小的碗也是一碗饭，就是比衰旺。比这个衰旺需要两道手续，从甲乙丙丁比衰旺，再带进十神比衰旺，这个是原则。
<p>练到熟练需要多长时间呢？根据我的经验，大家要背得很熟，就像乘法口诀一样，需要三个月时间。那么这三个月做什么呢？坐在那里等吗？当然不是。我教命理几十年，这是第二个阶段。第一阶段排八字领进门大概需要一个月的时间，这时还不会算。到你会排八字之后，会查十神，以及刚才讲的十神生克，包括那个东方甲乙寅卯木、南方丙丁巳午火……等等需要三个月时间。那么三个月的时间，就把精力转移到统计学方面，这个刑冲合会、十神生克，如果对一个年轻学生来说要把它背熟可能只需要三天。但是大家都是成年人，必须要两三个月，而且不是背出来就可以，就算你能背得出来，每天还要念上一两次，两个月以后才能上手。那么剩下的这段时间，怎么样呢？就是现在我们讲的整个实务论命的主题。大家如果研究过排八字或者看见过排八字，都知道，排来排去就是比肩、劫财、食神、伤官那十个字，翻过来、翻过去就那十个字，那么谁碰到谁就会有什么样的结果。这就变成一种统计，比肩坐财怎么样、财坐比劫是怎么样就变成一种统计，只要知道一点，谁克谁，知道一点就可以了。
<p>像我刚才说的，把十个字一起说，什么比劫财、财劫印，听都听糊涂了。但在讲十神定位的时候就不会这样，它说比肩，就不会说劫财；说劫财，就不会说正财，这样就不会乱。这在我们刚入门的时候叫做十神定位。看一个八字，大概能把人的妻子、禄运、寿命看出六成。对于业余人士来说，能看出六成也算是有成绩了。那么大家首先要记住，比劫代表兄弟，食伤是女命的孩子，财是男命的妻子，也是男女命的父亲，官杀是女命的丈夫，正印是母亲，偏印是后母，这说的是六亲。知道这些之后，就能连带看出人的性格。比如月柱上有比肩，由此就能推断。比肩代表兄弟，那他当然有兄弟。比劫财，劫财也意味着劫夺妻子，也会破财，月柱对应的年龄是二十到三十岁，所以这个人不可能早婚。判断吉凶是依据公式，再结合人之常情来说的。接下来我会一条一条、一段一段地给大家讲解。</p>`,
 SSSK:`<h1>十神生剋 </h1>
<p>那么我们在讲十神定位时是一个一个讲的，也是分别讲年限，讲性格，讲六亲，那么现在我们把它们集中合在一起讲，就画成一个表，首先我们是只讲术语的公式。先生说：比劫生食伤、食伤生财、财生官杀、官杀生印、印生比劫。一点吉凶祸福都没有，就是二得四、三得九一样，从这个基本上相生。隔一位是相克，比劫克财、财克印、印克食伤、食伤克官杀、官杀克比劫。这是生克制度，相生相克中间没有吉凶祸福，如果一谈到吉凶祸福，就是把我以前分别讲的，现在连进去了。
<p>对六亲讲，比劫是兄弟，那么兄弟只是个符号了，连下去要你自己想的啊！如果比劫在年，指兄弟，你小孩子兄弟有什么关系呢？比劫在年是破财，你又没有钱，需要你自己去想。如果在月上呢，比劫破财，你就要想到，财不是钱财了，是女朋友了，妻财啦！如果比劫在时柱，都五十多岁了还要破财，就是你忙忙碌碌，那么女人也要啰啰嗦嗦的啦！这个要自己带上去的啦！在年月日时带进去兄弟。
<p>食神伤官对女命来说是小孩，所以女命问小孩一定要看食伤，那么这个首先要牵连一句话了，这个食伤有成，当然是旺，才有成就，同你谈得来谈不来又是另外一回事。单单讲十神是旺不旺，谈得来谈不来是在冲刑。所以女命月上食伤是没有什么用的，因为小孩子还小嘛！那么如果男命食伤，无关小孩，食伤是性格了，就厚道了，或是恃才而骄。那么食伤它是生财的，财分正财偏财，那么你说我有食伤去找钱，那么你是财格带食伤，你已经也有钱了，还有人朝你来投资，找人家投资找得到。如果你是正财、偏财没有食伤的，要靠你一个人的力量。那么财生官杀，官杀是夫妻了，先生了，那么这个女命啊，先生有钱，你就有钱了。
<p>如果你是财生官杀的，那么你就会同你先生的财搞到一起去了，把先生同钱连在一起了嘛！这种细节会慢慢、慢慢越说越深。那么官杀生印，官杀有权势，但我没有讲修养的啦！譬如说民国初年的军阀，很有权，很粗鲁的，让人家看不起。譬如曾国藩、李鸿章做大官又有学问，官生印啊！印生比劫啊！这个是一个人又谦虚又有礼貌，不管你走到什么地方，都对你有利。这是六亲，又放宽一点了。
<p>然后个别性格，就是第三圈。带比肩人比较散漫，散漫就看你在哪一柱了。譬如时柱五十几岁，比肩在天干，你到五十几岁还是无所谓的啦！劫财是保护自己的，那么如果你时支是羊刃劫财，到晚年都好像一切都是你对。食神是很宽厚的，所以算命里面啊，大家都比较喜欢食神，纵然发不了大财，厚厚道道，没有是非，身体健康。伤官有才，但是骄。
<p>各位仔细看《子平基础概要》，里面十神都有写明的。那么正财就很节俭的，譬如说时柱正财的人，晚年啊都很节省。所以有一些做生意的人，也来学点命理，如果一个推销商，你要向正财格的人卖个什么东西，很难的。如果推销偏财格的人那就容易了。或者比劫也容易，他本来就把钱看的轻的。这是正财，端正简朴不乱花钱。偏财人的个性呢，慷慨大方。那么正官呢，阴阳相吸，刚好，恰到好处。七杀呢，同性相克，是有点过火的，不论是管人或者做事，都有点管得严一点。那么正印、偏印，正印是有礼貌又谦虚。
<p>比如我举个例子说，你有麻烦了，找七杀格的人帮忙，他会帮你的。找正印格的帮忙，那不会，听听而已，他不会卷进去的啊！如果偏印啊，他连听都懒得听了，偏印是一种属于艺术性的人，谈抽象的东西，你叫他跑那个慈济功德会倒还可以的。为了让大家容易了解，我就把他集中在一个表上面。那么就是我们算命强调的三到。
<p>那么这是算命的基本公式与条件，还谈不上真正算命。为什么要背生克呢？讲死的是克，倒不讲死生，因为人生哪，事不如意常八九，因为算命都以反面为主，你问我能不能发财？我先内心认为，真正发财的人很少了。要问发财，财怕什么？财怕比劫，如果天干有两个比劫，很难发财的啦！就算你会赚到钱，也会搞掉的。
<p>比如你问儿子读书聪明不聪明？那读书是印，才子也很少的啦！那么如果天干是财的，那财克印了，他根本不是读书的料嘛！他是做生意的料嘛！赚钱不一定要学问好的啦！所以我就建议他，无所谓了，管他什么学校，念念就可以啦！将来是商人。所以一定要看出反克。譬如问你先生好不好，先生是官杀了，如果天干有伤官的话，伤官是克官杀的，至于不好到什么程度，慢慢谈细节。所以这个表，在会算命的人，直接用克的，然后再联想到别的问题。
<p>譬如说时支比劫，破财，那这个就看他问什么？非但是破财啊，连你太太、女人都算在内的啊！晚年家务事也很多啊！那么财破掉了，人没有钱不行的啦！还要再去赚回来。那联想到他能退休吗？不能的啦！这样层次就一步一步深远了，一次两次的就深远了。所以普通人问一件事情，你只要看十神在哪里，看它克什么就可以了。譬如说这个大家都喜欢的钱，财是好事，但是财克印啊！他对文化不会有什么兴趣的，他可以捐钱，但自己不会搞进去的。那么这个是补充在十神定位时用的，那么听懂不太管用，最好是能背得出来。</p>
`,
 SY:`<h1>壽夭 </h1>
<p>当我们对算命基础理论懂了之后，就会帮朋友看八字。那么来宾不一定是什麼年齡、什麼身份、什麼榮，那不是我決定的啦！是外邊客人點什麼榮，我才用什麼的啦！
<p>算命也是一样，那么在谈荣华富贵之前，不知道各位有没有想到一个问题，这一切都要有命才可以的啦！发都发不大那还有什么命啊！我们叫夭煞！大人来算命，当然是用不着啦！尤其新生一个小孩子，也许他只是找我取个名字，或是在没有出生之前他找我选个日子剖腹生产，根据我们人之常情谈，我不会随随便便就把他想成荣华富贵的啦！这个很少的了，一百个都没一个，甚至一千个都没两三个，我从坏地方想的，好事情未必有，坏的事情，倒要避免开的啦。如果你看出来了，也不能讲，你怎么能够讲人家小孩子活不到十五岁呢？但是在们选剖腹生产日子的时候，我们就要特别注意这一点，那么这个我再举出两种例子，比较好懂了，这个同财杀食伤印一点关系都没有。那个讲夫妻、妻子、晚年之事。
<p>冲夭煞是在《三命通会》里面，这本书很有名的，那么它有两首诗先念给各位听听：生日对时人短命，那么各位听懂它的意思，也开始练习看原文，各位看我的著作，只是入门的，到最后你们还是要看原文的。这个对就是冲，生百对时人短命就是日时相冲，那么大家就用得到了。六冲要背住，那么生日对时很多的啦！譬如今天日子，你午时出生，那就子午冲了。光一句是不够的！生年对月亦伤，那么年上是子午冲，年月对冲、日时对冲，这就构成冲天煞，如果你单独的子午冲在年，平常讲只是讲你出生三十岁之前麻烦事很多。
<p>如果你很单纯地卯酉冲在日时，也只是解释为你晚年，三十岁到老，啰嗦事很多。这倒是时常见得到的。如果你两组一起看到了，譬如说我们知道今年辛卯年，八月是卯酉冲，那在八月中、你千万不要搞出日时相冲，这机会并不高啦！一撞上的话，人生值此少年亡！他没讲几岁啊！
<p>那么所以冲刑合会如果你不会背，那你怎么能看这个呢？所以我建议各位要把六冲背熟。所以我们看小孩子八字，看到我们也不讲，那怎么办呢？如果以台湾的民俗风情讲，我是建议每年都要安太岁，而且我叫他到他家附近一百年以上的庙，我怕他给人家骗掉，百年之庙就不会有问题。所以这一条呢，尤其在剖腹生产更重要。
<p>譬如现在讲是八月，已经过去了，八月份的话你日时冲，就搞得上这条。那么会不会一定死呢？这个我也要同各位做一个说明。我亲眼见过的，年月冲、日时冲的人，是我的学生，他并没有死，但是因为他小时候是日本战争年代，他妈妈的前一个先生阵亡了，带着三个小孩又嫁给第二个先生。所以他三个兄弟姓都不一样，大哥姓李、老三姓王、第五个姓周。这个虽然是他私事，但是可以想像他的童年是怎么过的了。那么除非你遭遇到极其意想不到的经历，譬如说小儿麻痹或者是怎么、怎么样了种种，不是一般人所遇到的，才可以躲得过、避得开的啊！那么这是比死好一点，这是第一条。
<p>各位要记住，尤其是关于帮人选日子剖腹生产。所以我时常建议一些懂姓名学的人，要备一点这个基本的八字知识，我见过有一个公务员，他是科长，懂点姓名学，帮人家取名字，那么也大意啊，把人家小孩称谓怎么样。不到一年，小孩去世了，因为他不懂这条，姓名学的比划是好命，你能不能有这个命是个问题啊！活得到活不到也是问题啊！就好比我们算命，时柱正财一定有钱，但你活得到活不到，同这个不相干啊！所以这一句话大家要注意到！
<p>第二条，还是讲冲刑的，生日对时须可叹，跟前面一条一样，所以我们造八字，尽量避免日时双冲啊！就算搞不到天折这一条，晚年是非常多的啦！就算有钱也不是好事。生时对年亦堪伤，这条就比刚才这条觉得多了，譬如生日对时，每天都有的啦！譬如，今天子日，你午时生的，就子午冲了。今天卯日，你酉时，就卯酉冲了。每一天都有日时冲的，机会有六分之一或者十二分之一！那么在生年对时，这一条是只要在辛卯年生的人，今年卯年，卯酉冲，不要碰酉时。
<p>那么这两组如果分别谈呢，问题不大！酉日卯时生，晚年冲，那么酉年、卯时冲，年时相冲那么远，本来没什么关系的，如果连到一起，也就今年说卯年人生在酉时的，千万不要日子也来冲，也就是不要选卯日啊！我再重复一次，今年卯年，生在酉时就是年时冲，如果你再生在卯日，也卯酉冲，就是日时冲，两道合在一起，那就不仅仅是福气问题了，牵连到那个小孩子养不大了！所以谈荣华富贵什么之前，先要谈幼年。
<p>所以我们时常建议人家，安太岁怎么怎么，像这种我们一再特别交代，七岁以前一定要安太岁。那么这个哪堪生处同时岁，二八风流寿不长，二八是多少？十六岁啊！风流，他怎么能风流？家要有钱啊！
<p>那么就等于说这两组。夭折有很多种的，这两组大家最好懂，而且只要地支冲，所以我优先把这两组夭折为大家讲。
<p>你看一看，我相信你不可能看得出妻财子禄寿全部，那么像这样，你可以看得出来，有没有冲，子午冲、卯酉冲，这种不要说我们算命人讲了，就普通人啊，大概也都知道，这六冲的。这个只能意会啊，不可以对人家讲的。这个包括做生意，谈生意也不要撞上这种事情，年月冲、日时冲，你一定谈不成的！这个范围可以拉到别的地方去了。
<p>关于这个天钦只讲这两种，事实上不只两种，在《三命通会》里边，是有说得比较具体一点，我也举过一些例子，不过这个例子是属于纯理论的。因为天寿这两个字，不论在理论方面，或者是实务方面，都是比较忌讳谈的，甚至根本就不谈，怕人家听得不舒服。好像缺德！那么根据实质在在的例子来说呢， 天寿是分成两种的，一种天寿是自然死亡，就生病而病故，所以我所举的例子，是提供初级人学的。只讲冲刑的，一看就能懂。那么除了冲刑以外有关天寿的，是另外有法则的。所谓天寿的标准，以二十八岁为标准。过了二十八岁，虽然不理想，也不算是夭了！在学理方面，讲到会妨碍到人生，身体健康不健全的，有以下三种： 第一种，年月日冲刑，譬如甲子年、庚午月两组冲的人非常福薄，这第一种，这组还好懂。第二点呢要有一点学理根基的，也就我们讲的日主太强，强到一个八字比劫禄刃印全、比肩、劫财出天干，地支有羊刃，建禄又带正印，譬如甲日主地支有寅卯、天干甲乙比劫俱有，而且还带印，还生子时，比劫禄刃印五者俱全，主忽然之间死亡。我们叫做凶终，也就是暴毙啦！身太强这种暴毙呢，这讲生病的啦！不是谓意外身故。意外身故会另外讲。
<p>第二种，日主弱到极点，就是日主无根，譬如甲日主，四个地支藏天干都没有甲，那么四柱无根的八字并不是没有的，经常有的，但不一定会死的。但是不可以犯上另外两个字，日主无根不可以财杀当令，那我举个具体的八字大家来体会一下。譬如壬日主支藏天干一个壬癸都没有，已经身很弱了，根本不能托财官，那么又生在午月，这就是财当令，为什么我指定是午月呢，这是四柱年限决定的，那么如果生在午年是十五岁以前，生在午月三十岁以前，午日、午时呢？还是一样论啦！不过已经超过它月有没有财当令！这很容易看得出来的，至于他会不会跟你讲的，我想不会的，怕对方当事人听了会很难过。
<p>除了财当令以外，还有一个杀当令，七杀当令一个是克日主的，一个是日主去克的，因为日主无根，哪个你都不能承受。譬如甲日主，支藏天干完全没有根基，又生在申月，强金伐木，一下就把你给砍了。这是第二组的，理论上讲会夭！
<p>第三种，就是第一个是连环三刑，八字本身已经有寅巳申了，大运是寅、流年是申，这就是连环三刑。八字寅巳申，大运流年也是寅巳申。或者八字丑戌未，流年也遇上丑戌未，这个叫凶终，不过是正好流年遇到，你年轻就夭折了。并不是你命该夭折，而是流年撞上，这叫连环三刑。这是讲夭，是属于生病的正常。我们说人的病，生个病要死，要十天、八天的，其实未必，几个小时就可以叫你走的。所以古人讲黄泉路上无老少。这个夭折是讲生病，古今同论。
<p>那另外一种夭折呢，现在比较少，古时比较多，方式也不同，叫意外夭折！那么意外夭折呢，在清朝时候有很多新的名字，譬如落井关，小时候掉井里了，现在不会有这个事情，以前妈妈带着小孩，在水井边上洗衣服、洗菜，不小心掉进去了，这就意外夭折，叫落井关。那不是只有这种啊，野狼、老虎、狮子都可以把你小孩叼走的。那这种是意外之事，还有什么不见了、走失了、迷路了，那时候没有身份证没有指纹啊，到哪里去问呢，问都问不到，对他讲也等于是没有了。
<p>那么拿现在讲呢，一样有那种事情，比较少一点。叫什么呢？车祸！那么这个是意外的。意外的死亡是用关煞的，这个算命啊，有两件事情不公开谈，第一个就是意外车祸死亡的特种死，病死的也许还会讲。还有一种不谈，就是残花煞就是很年轻就在外面混了，一直混到老也没有结果。这两种在命理中间啊，认为是不太好摆在嘴上讲的。
<p>那么这个意外死亡，或者是病夭死亡，另外还有一种不分大人小孩都在内的，也就是有人问我，坐飞机失事啊！管你大人小孩一起都走了，难道说那么多人的八字通通都一起犯三刑了吗？大家都在伤官见官了吗？不可能的嘛！飞机几百人一起撞山死了，或一次大海啸，上千人跟着走了。这种劫数上死的，不在算命范围之内算的。另有一种比我们命理更大的一种循环是在后面，譬如说我们停电，停电不是我家的事啊！不是灯泡坏了，我们只能管灯泡坏，管不到停电！所以在天灾方面，病死的，我们还可以劝他，做点功德了，或者从小就有病的。意外死那是很难预防的！
<p>所以夭折呢，在命理中间所有公式里，是属于最少的一种，我们叫关煞，那么这个遇到的话，是《三命通会》所讲的比较可靠，就是年日双冲，日时双冲，通常从地支冲刑上讲，那么流年上的呢，不是张三李四都可以看得出来。那要三刑啊，这个意外死亡的，古今是不一样的，那么现在开个车子撞死，倒个车都会没有看到，这个撞到人，因时代之不同，这个不能算命，只能算业，过去这个业。夭折是没有流月的！只有年的！所谓的业，与因果是有关的，比如生小孩生了好几个，都带不大的，这是共业问题。
<p>所以关于天这方面，再补上这一点点啊！</p>
`,
 DH:`<p>一看字面就知道了！——败财。但是这个“大耗”不是指败财啊！不是你今天做股票赔了三十万，明天开店赔掉两百万，不是指这个。“大耗”是忽然之间损耗钱财，到你根本承受不了！我用个最简单的比喻，各位容易懂的。譬如说我买栋房子，刚刚付了头期款两百万，第二天大地震房子倒了，那怎么办呢？非但房子没得住，你还是要缴后面贷款的了，这两百万还是借来的，这叫“大耗”！或者是开车子出去撞到人了，一下子赔人家多少多少，出乎意料之外，一下子叫你不能承受了，这叫“大耗”。那么“大耗”的解释，比“孤寡”又要宽一点，怎么宽一点呢？就是我们以前十神定位的那套概念，要移到神煞来了。你“大耗”在年，这是指你家里忽然败下来了，通常算命不算这一个的，年上也没有“大耗”。
<p>如果月上大耗，固然是讲你三十岁以前，还要讲你上面那个什么十神？如果正财坐大耗，你的财是因为女人或做生意败的。如果正官坐大耗，如果女人的话，那是你的先生或者你的男朋友给你带来的。如果女命食伤坐大耗，这个原因是你小孩给你带来的。如果比劫坐大耗，这是你的兄弟或朋友给你带来的。各位有没有体会？就是我以前讲的三到，以前我讲三到只是讲十神啦！现在同样三到要到神煞啦！所以命带大耗很伤脑筋的。就算能复原，也非常累的。</p>

 DYLN3:`<h1>大运流年 -3 </h1>
<p>下面还是大运流年，会越讲越细，流年会细到流月，一年有十二个月，你说我今年不好？固然这样说是可以的啦！但我再细问你一句，到底哪个月最不好？就要谈流月了啊！没有谈流日的，流日是择日啊！算命没有算哪一天的，只有算月是为止。今天我所讲的大运，最多只讲一步运。通常算命只算六步大运，算到六十几岁，每步运都有差别的。这是一直进到流年、流月，到这个地步算是能够入门了。
<p>在讲到大运、流年之前，对以前所讲过的刑冲合会，要做一点细节上的补充。以前所讲的是个纲领，因为那时候考虑到各位对四柱基本规则恐怕背得还不够熟，现在应该没有问题了。所谓补充点细节，基本上还是刑冲合会，问题是在天干、地支、四柱之间细节的配合。
<p>首先讲冲。天干冲地支冲是很容易懂。譬如甲子见庚午，双冲，照以前的讲法呢，就看在四柱哪一柱了，年月三十岁，月日是中年，大运是十年，流年是一年，这个是基础的讲法。再深一点，就看天干比劫、食神、伤官，冲的什么六亲了。地支呢？看有没有神煞，连带六亲的神煞是为主题了。虽然讲三十年、三十年事情很多，就照代表的正财、正官，或者桃花、贵人，以这几个为主题而论。
<p>再往下讲一点呢，就是人之常情了。同样是正官带冲，要看你几岁，在年上不能谈事业，在时上失之太迟。这三种一起合起来呢，就是我们以前所讲的三到——时间到，六亲到，性格到。
<p>现在所要补充的呢，是这三种之外的。什么是三种以外的呢？
<p>首先我讲两柱双冲：甲子冲庚午，三十年。三十年它也有个轻重，到底是前十五年为重呢？还是后十五年呢？冲也可以因麻烦而得到成功，也可以完全只有麻烦，一点好处都没有。那么这个层次呢？用在八字上讲可以，用在流年上讲也可以，区别在哪里？要用禄跟绝。甲禄在寅，绝在申（十天干禄绝）。
<p>现在我举个例子：
甲寅日、庚申月。甲禄在寅，庚禄在申，两个都是旺位，两强对冲，当然是有是非，六亲性格完全照着，但是因为两强对冲，在算命中间叫做什么呢？叫做正气无刑，冲刑得地，这是因冲而得到成功。
<p>这第一种坐在旺位而对冲。
<p>第二种：一个旺、一个绝。比如庚申日，遇到庚寅月，地支也是冲，天比地冲了。外表相同，内中暗冲，每逢天干相同、地支冲，在六亲朋友上讲是你的同辈暗冲，外人看不见，内斗！那么是庚寅、庚申天比地冲。
<p>如果我们换个例子，庚申日是最旺位，那么寅申冲了，要看天干是什么，可以甲寅、丙寅、庚寅，旺冲衰，庚寅是庚的绝位，丙寅是火的长生位，所以旺的冲弱的，弱的那边被冲掉了。譬如说：甲绝在申，他生在甲申月，天干是坐绝的，那么我们叫做盖头，甲绝在申，这个申字姑且不论是否绝，都没什么用处的，那么以申来讲，是甲绝在申，以甲来讲也是甲绝在申。用甲来讲是截脚，所以盖头截脚，前后七年半是不一样的，旺的冲、越冲越发，绝的冲，就是会遭遇很多麻烦事情。
<p>现在我们讲刑，各位都知道，丑戌未三刑，寅巳申三刑，那如果只见到两个呢？半刑，一半，那当然要轻得多了，时效也短得多了。我们先拿寅巳申做比喻，可以寅申，可以寅巳，可以巳申，三种它见了一半，如果寅申这一半论冲不论刑，他本来就是寅申冲嘛！寅巳呢？这叫半刑，在算命上是比较不采用的，因为时间很短，力量也只有一半。
<p>唯独巳申，这两个字见面，就模棱两可了。在寅巳申三刑里边遇到巳申叫做半刑，但巳申在六合里是巳申合水，子丑合土，是属于六合。那么到底算半刑还是算合呢？这种决定法在天干。比如乙巳、丙申，天干木火相生，地支就当六合。如果是乙巳、庚申，天干合、地支合，就变成双六合。如果天干剋、地支巳申，就作半刑。在实际算命上，半刑是很少论的，只有三刑才完全论的。
<p>那三合三会，也会只见到两个字，譬如申子辰三合水，那只有两个呢？申子半合，子辰半合，如果遇到申辰呢？完全不论！凡是三合三会只见到两个字，一定要带出中间的子午卯酉四正。才算半合，两个半会、半合可以当一个三合，譬如申子辰三合水，亥子丑三会水，只有申子没有辰，亥子丑呢？后边带个亥，变得一半是三合，一半是三会。这种合起来的呢，杂拼的，力量也有三合的力量，但真正人生之过程是很复杂的。这个杂拼的八字，等于我拿张一百块的纸钞，或者给你一百块的零钱，价值是相同的，但用起来很不方便。所以三合三会如果见到一半，那么就是有半合半会，一定要带子午卯酉，不带子午卯酉就算不上半合半会。
<p>这就在刑冲合会啊！半截而论，见一半。那么丑戌未也是，丑戌是半刑了，丑未算冲，戌未也是半刑。实际算命上半刑、半会的力量很少计算进去，但是一定要知道，这个只有一半的情形。那么这个冲刑合会过了呢，就往下讲。
<p>大运也可以冲八字的，流年更可以双冲，也可以冲八字、也可以冲大运，一样是双冲，都是论吉凶，但时效是不同的。譬如你是庚午年出生的，遇到甲子流年，那是流年冲八字，凡是大运与流年冲上八字的，冲动八字本身的不论是吉或是凶，都是原来的事情。譬如说两个人过去有不愉快的事情，三五年都不提，今年反而变出一件事情来。
<p>凡是大运、流年冲八字是讲旧的事情。至于说旧的什么事情呢？那就看天干了。十神财官印，或者地支什么神煞，又朝这方面的倾向来了。如果反过来，流年只冲大运，不冲八字，譬如说八字上没有庚午，大运上有庚午，甲子流年冲大运，一样是双冲，是解释为新的事情，如果同时也八字冲一柱，大运也冲一柱，就是新旧事情都有，只一件事情。这就是运岁命三柱对冲发生这个问题。
<p>比如说乙酉月、庚辰日，干支双六合，如果没有其他冲刑，是说这个人年轻时一直到四十五岁，诸事都顺利，四十五岁过完之后呢，这顺就没有了，没有不代表他遭遇什么大倒霉，只是力量没有了。
<p>如果日时双冲，就不一样，例如丙戌时，就是先双合，后双冲，这就复杂了。合的时候后边带冲，后面冲的时候，前面又带合。不可以解释为前面三十年好，三十年过后就论坏，不是这样子的，他同时就受牵连。如果是带冲的，前面好，也是有啰嗦的。后面虽然是冲，因为前面带合，就算不好，多少留点余地。那么先冲后合或者先合后冲，我们宁可选取先冲后合，宁可麻烦在前，不要先合之后再来冲。
<p>这个问题，在八字本身很长，管三十年。最容易发生在流年，今年流年双合，明年流年双冲，如此就不能单独解释为一年，合的那年好，冲的那年坏，不是这样子的。前面双合、明年双冲，要解释为因今年的这个好处，变成明年的坏处。最怕感情之事，最多一年，好得不得了，后来变仇人。如果前一年双冲，第二年双合，坏还是坏，好还是好，但实质上的过程，是因为这个不好，反而造成后面那个第二年的成就。
<p>那么这是冲合在八字、大运、流年。它有一种连锁性的关联。那么有一种八字连着三年合，有的八字连着三年冲，你不能解释为连着三年的好运，也不能解释为连着三年的坏运。每逢两年以上的三年四年那种冲合的，我们讲三年好了，连着三年冲，是指第二年，前面两年倒没什么。好比我们打撞球，五个球搅在一起，你打的是第一个球，走的是最后面的球，不会五个球一起走。
<p>所以冲合，遇到三十年好了，好坏是在最后一年。那么譬如打官司吧！某个人判十年牢，他真坐十年牢是，那流年上会有十年坏流年吗？不会的。那什么原因搞上他十年。这从重的地方讲。从小地方讲，一个人在财务方面摔一跤，搞破产了，有的人两年就恢复了，有的人十年才恢复，中间并没有十年都是坏流年那种情形。所以各位在实务论命的时候，遇到某一年之冲刑，在理论上讲是这年不好，这一年不好，冲刑过去了，并不代表吉凶就过去了。就等于说，我拿根火柴，燃烧了一个东西，火柴灭了，但我点燃的这个东西它没有灭，要等到火摸灭掉以后才算事情了掉。
<p>在一般情况下，真正的大凶大吉并不多见，一百件、八十件都是些普通的麻烦事，通常这些麻烦自己维持不到一年就会过去。如果遇到大吉大凶的流年，第二个发生的时候，中间的距离，他会连过去的。比如我用一个比较好懂的例子来说明，夫妻离婚了，今年因为双冲而离婚，明年不冲了，那明年就会有新的婚姻吗？不会的。要等到好的流年，三合六合才会有的，往往要等两三年甚至五六年。
<p>所以一个坏运过掉，只代表原来这件事过去了，事情过去了，影响是在的啊！那我们就拿刀杀了个人，今年杀掉的，杀完以后没事了，但是法律在，所以重大之事，这个冲刑只是解释为一个因，到底什么时候过去，要等第二个好流年来，这件事情才过去！好在风水轮流转，几年之内就会变好的。
<p>所以说，小事情我们按一年来论，大事情不是按一年来论，要等这件事情彻底解决才算完。所以我们遇到别人流年不利的时候，不是光看年份的，要劝他赶紧把这件事情处理掉。经常遇到明年犯冲刑的八字，我们就会这样劝他：比如现在已经十一月了，我就劝他，能今年解决就今年解决算了，吃点亏就吃点亏。如果今年实在来不及处理，我就劝他明年拖着，拖过明年再说，把不好的流年拖过去。
<p>这是关于刑冲在命理实务中的解释。不是死板地按照字面意思来理解。那么两好夹一坏，两坏夹一好，这些都是可以带过去的，我上次也讲过了。一般性的问八字，其实也只是问一个流年，流年都是讲双冲，不是双合的，那么我现在举一点点例子，试看各位能不能跟得上。我今年冲、明年合，不需要每年看，在六十甲子里面，排列组合排列得很详细的，各位可以看我的书《四角方阵刑冲合会透解》，譬如我们讲，前几年乙酉年、丙戌年，两年是连在一起的，每个人都遇得到，如果你八字有庚辰就不一样了，庚辰遇到乙酉是双合，第二年丙戌就是双冲了。有七分之一以上的八字，冲合是两年轮流的，有些是单独冲，合，也隔很远，很独立的一年好、一年坏。遇到冲合并见的呢，他只好一年的，就是我们时常讲的，见好就收。各位可以在《四角方阵刑冲合会透解》书上看一看。所以算流年啊，不是每一个八字都一样，有的很好算，有的不好算。</p>`,
 DYLN1:`<h1>大運流年 -1 </h1>
<p>从现在开始讲实务。只要各位把以前所讲的十神定位、刑冲合会都能记熟了，就可以全部用活性的
方式来套到任何一个八字上。举个例子：
坤造
丁酉
癸卯
丙辰
丙申
各位发觉到随便哪个命拿上来就是八个字啦！八个字要谈很多很多的事情出来，就是根据以前所讲的，全部谈下来。尤其在实务论命上，一个人坐在你前面，不管你是研究的还是从业的，他就听你答案了。那必须在非常快速的时间内，就要开口跟人家讲答案。要多快呢？两分钟！那么你的规则要背熟，哪里先下手呢？就从冲刑合会先下手。
<p>年月丁癸冲、酉卯冲，这个很明显的。如果你背不出这两组规则，你根本就看出来。这一双冲，不要谈它细节了，一三十岁绝对太平不了。那么这个大范围就已经给它先拉住。
<p>那日时呢？丙辰、丙申，八字有的是明的冲刑合会，有的是暗的冲刑合会，有点经验的人都看得出来，丙申、丙辰中间拱一个子，这就拱了成申子辰了。连带下来，申子辰会水，丙日主，那会的是什么东西呢？对十神讲是什么呢？七杀嘛！这是个女命，一眼之下，婚姻答案已经出来了。
<p>前面冲并不是只讲夫妻的喔！三十年全部在内。出身也不高，什么都在内了，亲戚朋友都在内，一无所成！但是丙辰、丙申拱个子，申子辰就会夫了，拱这个字是暗的，暗拱的，人家看不见，那么答案就是三十五岁以后她才有一个有实无名的对象。实，就是真正有个男人，名位是没有的，因为她是暗拱的，这是从年看过来的。
<p>那么有经验的一看就知道到底都是如此的了，因为她一直拱到晚年了。尤其女人的婚姻过了五十岁以后就很难谈的了，只能算有没有而已，好坏很难谈的了，这一看就知道。
<p>那我怎么对她讲呢？不是我怎么讲了，是她怎么问了，以及她什么时候来的？几岁来的？她在我心目中的答案就知道了。三十岁以前来，连交个男朋友搞长都难啊！三十岁以后，可以有一个对象，没有名位，这是初步的答案。这是讲八字，并没有讲大运，并没有讲流年。
<p>那么根据这个基本理论，再延伸到流年这个结构，我以前只讲申子辰拱子，三合一一直到死，现在我把它延伸到流年了。大家从现在开始对六十甲子要有相当的认识啊！就算你不会背，至少今年、明年后年这几年你要知道清楚。因为申子辰中间拱个子，流年每逢申子辰年，就可以三合的，有个子字在，遇到申年，申子辰，流年拱个子，带大运，是这样子拱上来的。遇到辰年，也是时上的申子辰，如果这个女人今年她来问，今年是辛卯年，明年是壬辰年，明年就申子辰。这样讲起来岂不是十二年就有三次了？一点不假！这个解释法就和以前的解释法不同，放松了。
<p>以前我们讲女命带合，人缘好，没有讲到哪一年？也可以想想看，不可能每年都人缘好，只是总平均讲人缘好。那么这样子，每隔三年她就三合一次，那她三年就换一个男人啊？这倒未必！每隔三年她就会遇得到人家来追她，打电话给她啰！一定遇得到。因为她个性就是这个样子，谁都喜欢跟她聊聊，因为她本身就带三合的。每隔三年就会遇上一次，那么以总平均讲，或然率那么高，一辈子啊，那个婚姻不会一次的了。至于一个、两个、三个、四个、五个，这个不要从道德眼光看，这有明、有暗的，如果官杀混杂在天干，谁都知道，她也不避讳，官杀混杂是讲天干的不是地支，十年只有两次。地支三合的话，三年就有一次，所以我们跟她说：妳人缘很好，每隔三年就有一次。这是讲或然率。有的人家知道，有的人家不知道，如果总平均讲，这个女的有三个、五个对象是很平常的，就是拱这个子是夫。
<p>实务论命又比较更细一点了，你不能光讲一个形式，有一个男人啊！有钱没钱？对她怎么样？还是在三合当令、不当令这个题目上讲了。申子辰拱这个子，三合就是七杀，拱这个子是正官，要分开谈。各位要体会到，单单讲拱子来讲，是暗夫，又是三合七杀，那么，虽然是暗夫，她有太太的待遇。这个人我认识的，我所知道的已经五个或者六个了。她每一任男朋友对待她，对待自己太太一样的，平起平坐，对外也公开，甚至她可以同她男朋友的太太坐在一起聊聊天的。因为她拱夫拱成正的。

<p>所谓称之为终身啊，至少得三十年。那如此细批的话，就不是马上可以交差的啊！一般业余研究命理的也不需要研究到那么细。那么业余研究八字的人，只是你既然懂批八字了，也愿意为人批，我都建议他每年过年发贺年片嘛！你在发贺年片的时候，加几句话就可以了。譬如明年壬辰，代批壬辰年流年，任君赞赏，就批一年。
<p>那么她并不是每年都一样的！她的丈夫好，也不是年年都好的啦！也有高低起伏的啦！这样分析下去呢！就要讲大运，讲大运啊！除非是详细批终身，从出生那步大运讲起，一般性就看她来的时候几岁，从来的时间讲起，那么她月柱壬戌，阴阳男女命的大运是反排的，第一步运是辛酉运，第二步运是庚申运，还是小孩子，没什么可以批的。第三步运己未大运，二十几岁了，从己未这步运来开始看她的八字，那么假定说这位小姐，二十五岁在己未大运，那么这个八字本来只有四柱，一谈到运就变成五柱咯！要把大运这个己未加上去的咯！它不是平行的，它一柱可以同四柱都有关系的，年柱边上有个己未，月柱边上有个己未，这个己未，对着四柱一起来看的啦！
<p>先看大运新加上去的刑冲，这个未字先对四个地支看，未同午半会，未同戌有没有关系啊？未戌半刑的，未同申有没有关系呢，没有关系，未同巳有没有关系？我讲这个八字，从开始一直到现在，大概有二十分钟，连带大运讲，你真正运用的时候，只有二分钟，二分钟之内不能把我那个二十分钟内所讲的内容，通通组合得起来，那你就失之过慢，不能会客了。人家坐在你前面，会感到很无聊，因为你思考的时间，总平均只有二分钟。

<p>那么岁运是八字同流年中间的桥梁。命好、命坏，十五年、十五年这样分啊！大范围都是划出来的。这个流年啊，单独双冲或者双合的并不多，双冲的只有十年，双合的也只有十年，那么这个人生活起来也很公平，也就是好坏啊！一生中间也不到十年，跳来跳去，十次啊！至于说有没有会得上三刑？有没有会得上三合、三刑？有没有再遇到冲合？这些复式的问题，就大运是中间的一个桥梁。像刚才讲的那个是在己未大运，一看就是伤官运了，食神格也变成伤官格了。
