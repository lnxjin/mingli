<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            overflow: hidden;
        }
        .serif {
            font-family: 'Noto Serif SC', serif;
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #666;
        }
        
        /* 左侧栏样式 */
        .sidebar {
            background: #111;
            border-right: 1px solid #222;
        }
        
        /* 列表项样式 - 增大文字 */
        .list-item {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        .list-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .list-item.active {
            background: rgba(102, 126, 234, 0.15);
            border-left-color: #667eea;
            color: #fff;
        }
        
        /* 右侧内容区 */
        .content-area {
            background: #0f0f0f;
        }
        
        /* iframe 样式 */
        .content-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }
        
        /* 分类标签 - 增大字号 */
        .category-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }
        
        /* 搜索框 */
        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .search-box:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.08);
        }
        
        /* 加载动画 */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid #667eea;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 分类颜色 */
        .cat-基础 { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .cat-十神 { background: rgba(168, 85, 247, 0.2); color: #c084fc; }
        .cat-格局 { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .cat-神煞 { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .cat-女命 { background: rgba(244, 63, 94, 0.2); color: #fb7185; }
        .cat-流年 { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
        .cat-其他 { background: rgba(100, 116, 139, 0.2); color: #94a3b8; }
        
        /* 空状态 */
        .empty-state {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        /* 分类过滤器换行 */
        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        /* 响应式 */
        .mobile-menu-btn {
            display: none;
        }
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: flex;
            }
            .sidebar {
                position: fixed;
                z-index: 50;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.8);
                z-index: 40;
            }
            .overlay.show {
                display: block;
            }
        }
    </style>
</head>
<body class="h-screen flex flex-col">

        ];

        let currentCategory = 'all';
        let searchTerm = '';
        let activeFile = null;

        function renderList() {
            const list = document.getElementById('chapter-list');
            const filtered = fileData.filter(item => {
                const matchesCat = currentCategory === 'all' || item.category === currentCategory;
                const matchesSearch = item.display.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                    item.name.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesCat && matchesSearch;
            });

            document.getElementById('total-count').textContent = filtered.length;
            
            list.innerHTML = filtered.map(item => `
                <div class="list-item px-4 py-4 rounded-lg cursor-pointer flex items-center gap-4 group ${activeFile === item.file ? 'active' : ''}" 
                     onclick="loadContent('${item.file}', '${item.display}')" 
                     data-file="${item.file}">
                    <div class="w-10 h-10 rounded-lg bg-gradient-to-br ${getCatColor(item.category)} flex items-center justify-center text-sm font-bold text-white shrink-0 shadow-lg">
                        ${item.category[0]}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-base font-medium text-gray-200 truncate group-hover:text-white transition-colors leading-relaxed">${item.display}</div>
                        <div class="flex items-center gap-2 mt-1.5">
                            <span class="category-badge cat-${item.category}">${item.category}</span>
                        </div>
                    </div>
                    ${activeFile === item.file ? `
                        <svg class="w-5 h-5 text-indigo-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    ` : ''}
                </div>
            `).join('');
        }

        function getCatColor(cat) {
            const colors = {
                '基础': 'from-blue-500 to-cyan-500',
                '十神': 'from-purple-500 to-pink-500',
                '格局': 'from-amber-500 to-orange-500',
                '神煞': 'from-emerald-500 to-teal-500',
                '女命': 'from-rose-500 to-red-500',
                '流年': 'from-indigo-500 to-violet-500',
                '其他': 'from-gray-500 to-slate-500'
            };
            return colors[cat] || colors['其他'];
        }

        function loadContent(filename, displayName) {
            activeFile = filename;
            renderList();
            
            if (window.innerWidth < 768) {
                toggleSidebar();
            }

            document.getElementById('empty-view').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            
            const frame = document.getElementById('content-frame');
            frame.classList.add('hidden');
            
            document.getElementById('current-file-name').textContent = displayName;
            
            frame.src = filename;
            
            frame.onload = () => {
                document.getElementById('loader').classList.add('hidden');
                frame.classList.remove('hidden');
            };
            
            frame.onerror = () => {
                document.getElementById('loader').classList.add('hidden');
                alert('加载失败，请检查文件是否存在');
            };
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderList();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('bg-white/10', 'text-white', 'border-white/20');
                    b.classList.add('bg-transparent', 'text-gray-400', 'border-transparent');
                });
                btn.classList.remove('bg-transparent', 'text-gray-400', 'border-transparent');
                btn.classList.add('bg-white/10', 'text-white', 'border-white/20');
                
                currentCategory = btn.dataset.cat;
                renderList();
            });
        });

        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('open');
            document.querySelector('.overlay').classList.toggle('show');
        }

        renderList();
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && window.innerWidth < 768) {
                document.querySelector('.sidebar').classList.remove('open');
                document.querySelector('.overlay').classList.remove('show');
            }
        });
    </script>
</body>
</html>
