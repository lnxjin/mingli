<h1>天乙贵人 </h1>
<p>天乙贵人大家都知道是后天贵人，可以借得到钱，坐牢人家把我保出来，跳票可以借得到钱。开店没有钱，你借钱开店铺那个不是解难，是增福。所以天乙贵人只是处理你患难的。那么一般性所想的，有难时有人救就不错了，这个是天乙贵人，女命不能用天乙贵人，最多一个天乙贵人，有首诗：「一坐天乙是好命，两坐天乙心不定，三坐天乙反为豪家正。」两个贵人怎么办呢？难以取舍了，就心不定了。三个贵人呢？干脆做小三算了，这个豪家正，豪门里边去了，就是贵人帮了你大忙，干脆嫁给你算了。这是天乙贵人，男女不一样的，男命没有关系，多少人借钱给我都可以。</p>
