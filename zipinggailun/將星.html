<h1>將星 </h1>
<p>一看好像做将军，命带将星不代表你能做将军，这个人啊，不刚，也不吵架，但是他所决定出来的事情啊，不会动摇。他不跟你吵，也不跟你闹，他决定下来的事怎么样都不会改变，这个叫将星。</p>
