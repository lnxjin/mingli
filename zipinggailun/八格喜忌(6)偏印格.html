<h1>八格喜忌(6)偏印格 </h1>
<p>七杀格逆用之外，就是偏印格了。偏印格在十神定位里面，性格方面都有具体的解释，偏印格属于逆用的，只有用偏财才可以。那么除此之外，都没有办法，逆用只要找到克它的就可以了。那么是不是同时要兼顾格局不带合、日主要强、格局不带冲，这是统统一样的，顺用、逆用八种格局一样的，不能冲，不能合，日主要强，统统包括在内。所以八种格局八种用法，我们认真归类起来讲呢，还是依据十神生克，不过把它分成可克与不可克两类而已！</p>
