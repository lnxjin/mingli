<h1>文昌貴人 </h1>
<p>文昌贵人，大概只能给男人用了，文昌一看就知道了，书读得好，譬如男人五个博士不是更好了吗？女人就不是好事。那么暂且我不谈，现在少了，古代社会多，我个人体会到一个女人，如果有两个博士就很麻烦，很难嫁啦！妳要找两个博士的男人，不好找了。所以女人普普通通什么大学毕业，国中都没有关系啦！所以文昌贵人是对男人，希望书读得好，你命带文昌考得到好学校，等等。贵人就是前面是好的，后面好不好另当别论了，我们也见过好朋友、好部下翻脸的，你栽培的人反你的，这另当别论啦！</p>
