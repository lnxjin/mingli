<h1>紅豔煞 </h1>
<p>跟桃花不同，红艳煞多情，怪怪的。我随便举个例子，譬如一个大公司的千金，她喜欢外劳，那嫁给他，在法律上讲得通，听起来怎么样呢？好奇怪啊！她专门搞那种合法但不合情的，这叫红艳煞，多情。男命也是，譬如某一位先生，他以前认识一位女朋友，后来分手了，他始终念念不忘这个女朋友，后来他自己生了个女儿，把他女朋友的名字，弄一个字来，嵌到他女儿的名字上。二十年前的东西，他还留着，自作多情啊！这叫红艳煞，通常指怪的地方，就是身份不符合，彼此身份不符合，又倒是真情相爱。那么桃花是一时高兴。偏财是偏妻。三种选，对他本人损害最大的是偏财，因为他有事后人情，等到分手之后，还同她有交情在。</p>
