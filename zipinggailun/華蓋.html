<h1>華蓋 </h1>
<p>华盖真正解释起来，就是你看庙前面一层层那个装饰品啊，装饰的，那么直接指到庙里去了。所以华盖的意思就有点艺术性了。命带华盖的人同偏印不同，偏印是性格古怪，命带华盖的人，他倾向于那种宗教性的这方面，尤其宗教。那么华盖可高可低，譬如说画画如张大千名动公卿。比如佛光山，很多大官都跑去坐。往下低、往下降，一直降到比较低一点，譬如我们电视上看到跳八家将，这也是华盖啊！
<p>乱童神佛上身也是华盖啊！华盖重的人啊！这不是商人，就是商人的话，他也是在这行里的，比如卖金纸什么的，这就是华盖。所以女命不要带华盖，女命带华盖倾向去修道了，修成修不成，另当别论。</p>
